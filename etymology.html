            align-items: center;
        }

            margin-bottom: 25px;
        }

            margin-bottom: 10px;
            color: #1a252f;
        }

            background: #ffffff;

            flex-direction: column;
            align-items: center;
            gap: 20px;
            box-sizing: border-box;
            border: 1px solid #e9ecef;

        .stats {
            font-size: 1.2rem;
            font-weight: 700;
            color: #2980b9;
            padding: 12px 30px;
            border-radius: 30px;
            background-color: #ebf5fb;

        }

        #searchBar {
            width: 100%;
            max-width: 600px;
            padding: 14px 25px;
            font-size: 1.05rem;
            border: 2px solid #dee2e6;
            border-radius: 30px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        #searchBar:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
        }

        .filter-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .filter-label {

            color: #495057;

        }

            background-color: #f1f3f5;
            color: #495057;
            border: 1px solid #ced4da;
        }

            background-color: #e9ecef;
        }

            color: white;
            border-color: #3498db;

            color: white;
            border-color: #27ae60;
        }

            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            width: 100%;
            padding-bottom: 50px;
        }

        .card {
            background-color: transparent;
            height: 240px; /* Taller card to fit multiple examples */

            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 16px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
        }

            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;

            right: 15px;

            font-weight: bold;
            background: #f1f3f5;
            padding: 4px 10px;
            border-radius: 12px;
            color: #6c757d;
        }

            background-color: #2c3e50;
            color: white;
            transform: rotateY(180deg);
            border-bottom: 6px solid #1a252f;
            justify-content: flex-start;
            padding-top: 25px;
        }

        .card-back h3 {
            margin: 0 0 5px 0;
            font-size: 1.4rem;
            color: #f1c40f;
            text-transform: capitalize;
        }
        
        .card-back .origin-text {
            font-size: 0.9rem;
            color: #adb5bd;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-back p.subject {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

            width: 100%;
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 8px;
            box-sizing: border-box;
        }

            font-size: 0.8rem;
            color: #adb5bd;
            margin-bottom: 5px;

            text-align: center;

            color: #6c757d;
            background: white;
            border-radius: 15px;

    </style>
</head>

    let discoveredCards = new Set();
    let currentSubject = 'all';
    let currentLang = 'all';

    function initFilters() {
        // Subject Filters
        document.querySelectorAll('#subjectFilters button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#subjectFilters button').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentSubject = e.target.dataset.filter;
                renderCards();
            });
        });

        // Language Filters
        document.querySelectorAll('#langFilters button[data-filter]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#langFilters button[data-filter]').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentLang = e.target.dataset.filter;
                renderCards();
            });
        });
        
        // Search bar
        document.getElementById('searchBar').addEventListener('input', renderCards);
    }

    function renderCards() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const searchTerm = document.getElementById('searchBar').value.toLowerCase();
        let visibleCount = 0;

        // Always display cards alphabetically by root, including on first load and after filtering.
        dictionary
            .map((item, index) => ({ item, index }))
            .sort((a, b) => a.item.root.localeCompare(b.item.root, undefined, { sensitivity: 'base' }))
            .forEach(({ item, index }) => {
            // Check Filters
            const matchesSubject = currentSubject === 'all' || item.subject === currentSubject;
            const matchesLang = currentLang === 'all' || item.language.toLowerCase() === currentLang;
            
            // Check Search
            const matchesSearch = 
                item.root.toLowerCase().includes(searchTerm) || 
                item.meaning.toLowerCase().includes(searchTerm) ||
                item.examples.toLowerCase().includes(searchTerm) ||
                item.language.toLowerCase().includes(searchTerm);

            if (matchesSubject && matchesLang && matchesSearch) {
                visibleCount++;
                const card = document.createElement('div');
                card.className = `card ${item.subject}`;
                
                // Set language icon logic
                const langIcon = item.language === "Greek" ? "🏛️" : "🦅";
                
                if (discoveredCards.has(index)) {
                    card.classList.add('flipped');
                }

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">
                            <span class="lang-badge">${langIcon} ${item.language}</span>
                            <div class="visual">${item.visual}</div>
                            <h2>${item.root}</h2>
                        </div>
                        <div class="card-back">
                            <h3>${item.meaning}</h3>
                            <div class="origin-text">From ${item.language}: <em>${item.originalWord}</em></div>
                            <p class="subject">${item.subject}</p>
                            <div class="example-container">
                                <div class="example-title">Examples (UK English)</div>
                                <p class="examples">${item.examples}</p>
                            </div>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    card.classList.toggle('flipped');
                    if (card.classList.contains('flipped')) {
                        discoveredCards.add(index);
                    } else {
                        discoveredCards.delete(index); 
                    }
                    updateStats();
                });

                grid.appendChild(card);
            }
        });

        if (visibleCount === 0) {
            grid.innerHTML = `<div class="no-results">No terms found matching your precise criteria. Try adjusting the filters!</div>`;
        }
        
        // Ensure total dictionary count reflects the current database
        document.getElementById('stats').innerText = `Terms Discovered: ${discoveredCards.size} / ${dictionary.length}`;
    }

    function updateStats() {
        const stats = document.getElementById('stats');
        stats.innerText = `Terms Discovered: ${discoveredCards.size} / ${dictionary.length}`;
        if (discoveredCards.size === dictionary.length && dictionary.length > 0) {
            stats.innerText = `🎉 All ${dictionary.length} Terms Discovered! 🎉`;
            stats.style.backgroundColor = "#27ae60";
            stats.style.color = "white";
        } else {
            stats.style.backgroundColor = "#ebf5fb";
            stats.style.color = "#2980b9";
        }
    }

    function revealAllCards() {
        dictionary.forEach((_, index) => discoveredCards.add(index));
        renderCards();
        updateStats();
    }

    // Initialize the app on load
    window.onload = () => {
        initFilters();
        renderCards();
        updateStats();
    };
