ch can be _____________", "a": "reversed"}, {"q": "A change which creates new products and cannot be reversed is _________ change", "a": "chemical"}, {"q": "Draw a particle diagram for a solid", "a": "Solid: particles in a fixed regular lattice, touching, vibrating in place.", "d": "particle:solid"}, {"q": "Draw a particle diagram for a liquid", "a": "Liquid: particles touching but random, able to slide past each other.", "d": "particle:liquid"}, {"q": "Draw a particle diagram for a gas", "a": "Gas: particles far apart, random, moving quickly in all directions.", "d": "particle:gas"}, {"q": "Particles are arranged regularly in a ….?", "a": "solid"}, {"q": "Particles are arranged randomly, but touching in a …?", "a": "liquid"}, {"q": "Particles move around randomly in a ….?", "a": "gas"}, {"q": "Why does temperature of a substance increase as it is heated?", "a": "Particles gain more kinetic energy and temperature is a measure of kinetic energy"}, {"q": "How much mass a substance contains compared to it's volume is…", "a": "density"}, {"q": "State the equation which links density, mass and volume", "a": "ρ=m/v"}, {"q": "State the units of density", "a": "kg/m3"}, {"q": "State the units of volume", "a": "m3"}, {"q": "Density RPA: How do you find the volume of a regular shape?", "a": "Use a ruler to measure width, length and height"}, {"q": "Density RPA: What is the equation for the volume of a cube?", "a": "Volume = b x h x d"}, {"q": "Density RPA: What equipment is needed to find the volume of an irregular shaped object?", "a": "Eureka can and a measuring cylinder"}, {"q": "Density RPA: How do you find the mass of a liquid?", "a": "Measure the mass of a measuring cylinder, measure the mass of the water and the measuring cylinder find the difference"}, {"q": "Density RPA: What piece of equipment is used to find mass?", "a": "Balance"}]}, {"name": "Internal energy and energy transfers", "cards": [{"q": "The energy stored inside a system by the particles which make it up is known as ____________ energy", "a": "internal"}, {"q": "What is internal energy?", "a": "The total kinetic energy and potential energy of all the particles in a system"}, {"q": "Energy stored within moving objects is __________", "a": "kinetic"}, {"q": "Energy stored in particles because of their position is…?", "a": "potential energy"}, {"q": "Particles wich are further apart have _________ potential energy", "a": "more"}, {"q": "Sketch the heating curve for water", "a": "Heating curve for water: rising, flat at 0°C (melting), rising, flat at 100°C (boiling), rising.", "d": "graph:heatingwater"}, {"q": "Why doesn't temperature increase during melting?", "a": "Energy is being used to weaken forces between particles"}, {"q": "Why doesn't temperature increase during evaporation", "a": "Energy is being used to weaken forces between particles"}, {"q": "The amount of energy required to change the state of one kilogram of a substance with no change in temperature is the …?", "a": "specific latent heat"}, {"q": "Latent heat of fusion is for changing…?", "a": "solid to liquid"}, {"q": "Latent heat of vaporisation is for changing….?", "a": "liquid to vapour (gas)"}, {"q": "The energy needed to raise the temperature 1 kg of a material by 1ᵒC is the __________", "a": "specific heat capacity"}]}, {"name": "Particle model and pressure", "cards": [{"q": "The average kinetic energy of particles is known as the ___________", "a": "temperature"}, {"q": "Increasing temperature ______________ pressure in a gas if volume is constant", "a": "increases"}, {"q": "The force exerted by gas on a surface as the particles collide with it is known as….?", "a": "gas pressure"}]}]}, {"name": "Atomic Structure", "subtopics": [{"name": "Atoms and isotopes", "cards": [{"q": "Define atom", "a": "The smallest part of an element that can exist."}, {"q": "All substances are made up of…?", "a": "atoms"}, {"q": "The radius of an atom is …?", "a": "0.1 nm (1 x 1010 m)"}, {"q": "The overall charge on an atom is…", "a": "zero/neutral"}, {"q": "Who came up with the Plumb Pudding model of the atom", "a": "J J Thompson"}, {"q": "Describe the Plumb Pudding model of the atom", "a": "A ball of positive charge with negative electrons embedded in it"}, {"q": "Was the Plumb Pudding model correct?", "a": "no"}, {"q": "What experiment did Rutherford do?", "a": "Alpha particle scattering"}, {"q": "What did Rutherford's experiment reveal?", "a": "Atoms have a central area of positive charge with electrons surrounding it"}, {"q": "Who discovered that electrons are located in energy levels?", "a": "Niels Bohr"}, {"q": "What did Jame Chadwick discover about the atom?", "a": "That the nucleus contains neutrons as well as protons"}, {"q": "What did John Dalton contribute to our understanding of atomic theory?", "a": "Matter is made up of descrete, spherical particles, known as atoms"}, {"q": "Name the three subatomic particles", "a": "proton, neutron, electron"}, {"q": "Which particles are located in the atoms nucleus", "a": "protons, neutrons"}, {"q": "What is the charge of each subatomic particle?", "a": "proton +1, neutron 0, electron -1"}, {"q": "What is the mass of each subatomic particle?", "a": "proton 1, neutron 1, elecrton ≈ 0"}, {"q": "Define peer review", "a": "Checking of scientific results by other scientific experts"}, {"q": "Define mass number", "a": "The total number of protons and neutrons in an atom"}, {"q": "Define atomic number", "a": "The number of protons in an atom (number of electrons is the same in a neutral atom)"}, {"q": "Electrons in atoms are located in ___________", "a": "energy levels"}, {"q": "Absorption of radiation by an atom may result in ____________ moving to a ________________ energy level", "a": "electrons, higher"}, {"q": "Emission of radiation from an atom may lead to _____________ moving to a ______________ energy level", "a": "electrons, lower"}, {"q": "Define background radiation", "a": "Radiation that comes from the surroundings"}, {"q": "Define isotope", "a": "An atom of the same element with different numbers of neutrons"}, {"q": "We cannot predict when a given atom will decay, this means that radioactive deacy is ….?", "a": "random"}, {"q": "Given an example of a source of background radiation", "a": "Radon from rocks, the sun, nuclear power, hospital treatments"}]}, {"name": "Atoms and nuclear radiation", "cards": [{"q": "Name the three types of radiation", "a": "alpha, beta and gamma"}, {"q": "What is an alpha particle?", "a": "two protons and two neutrons"}, {"q": "What is a beta particle?", "a": "an electron"}, {"q": "What is gamma radiation?", "a": "electromagnetic wave (NOT a particle)"}, {"q": "What is the range of alpha radiation in air?", "a": "short - 5 cm in air"}, {"q": "What is the range of gamma radiation in air?", "a": "unlimited in air"}, {"q": "What's the range of beta radiation in air?", "a": "medium - about 1 m"}, {"q": "What will absorb (stop) alpha radiation?", "a": "paper/skin"}, {"q": "What will absorb (stop) beta radiation?", "a": "about 5 mm aluminium"}, {"q": "What will absorb (stop) gamma radiation?", "a": "several centimetres of lead"}, {"q": "What is the ionising power of alpha radiation?", "a": "very high"}, {"q": "What is the ionising power of beta radiation?", "a": "medium"}, {"q": "What is the ionising power of gamma radiation?", "a": "low"}, {"q": "What is meant by the ionising power of radiation?", "a": "how likely it is to ionise atoms which it comes into contact with"}, {"q": "How does alpha decay alter the mass number of the parent nucleus?", "a": "decreases by 4"}, {"q": "How does alpha decay alter the atomic number of the parent nucleus?", "a": "decreases by 2"}, {"q": "How does beta decay alter the mass number of the parent nucleus?", "a": "stays the same"}, {"q": "How does beta decay alter the atomic number of the parent nucleus?", "a": "increases by 1"}, {"q": "How does gamma radiation alter the mass and atomic number of the parent nucleus", "a": "unchanged (energy is released as the particles in the nucleus reorganise to a lower energy arrangement)"}, {"q": "The process of radiation removing electrons from atoms to form ions is called…?", "a": "ionisation"}, {"q": "Define radioactive decay", "a": "An unstable nucleus changes to become more stabe and gives out radiation"}, {"q": "Define activity", "a": "Rate at which decay occurs"}, {"q": "What are the units of activity?", "a": "Becquerels (Bq)"}, {"q": "Define count rate", "a": "Number of decays recorded each second by a Geiger-Muller tube"}, {"q": "Defne half life", "a": "The time taken for number of radioactive nuclei in a sample to halve OR time taken for count rate (or activity) from a sample to fall to half its initial value"}, {"q": "How do you find the half life from a graph?", "a": "Find the maximum activity, halve it and read off the corresponding time"}]}, {"name": "Hazards and uses of radioactive emissions", "cards": [{"q": "If ionisation happens in DNA it can cause ___________ which may result in ____________", "a": "mutations, cancer"}, {"q": "Define contamination", "a": "The unwanted presence of materials containing radioactive atoms"}, {"q": "Define irradiation", "a": "When an object is exposed to radiation"}, {"q": "Does an irradiatied object become radioactive itself?", "a": "no"}]}]}, {"name": "Forces", "subtopics": [{"name": "Forces and their interactions", "cards": [{"q": "State the equation which links gravitaional field strength, mass and weight", "a": "W=mg"}, {"q": "What is the unit of weight?", "a": "Newtons (N)"}, {"q": "What is the unit of mass?", "a": "kilograms (kg)"}, {"q": "What is unit of gravitational field strength?", "a": "newtons per kilogram (N/kg)"}, {"q": "What is the unit of force?", "a": "Newtons (N)"}, {"q": "What is the unit of distance?", "a": "meters (m)"}, {"q": "A value with magnitude only is a ________?", "a": "scalar"}, {"q": "A value with magnitude and direction is a ____________?", "a": "vector"}, {"q": "Distance an speed are examples of _________ quantities", "a": "scalar"}, {"q": "Force, displacement and velocity are examples of __________ quantities", "a": "vector"}, {"q": "What is a contact force?", "a": "A force between two object which are touching"}, {"q": "What ia a non-contact force?", "a": "A force between objects which are separated by space."}, {"q": "Give two examples of contact forces", "a": "e.g. friction, air resistance"}, {"q": "List three non-contact forces", "a": "gravitational, electrostatic, magnetic"}, {"q": "Define weight", "a": "A downward force created by the interactiono f a mass with an object gravitational field"}, {"q": "Define a field", "a": "This is set up around any object that exhibits a non-contact interaction"}, {"q": "Interaction pair", "a": "Equal and opposite forces resulting from a single interaction"}, {"q": "Define normal reaction force", "a": "Any force that is part of an interaction pair that is produced in response to a force acting"}, {"q": "Define resultant force", "a": "The total ingle force acting on a body when two or more forces are acting on it"}, {"q": "Define weight", "a": "The force ofgravity acting on an object's mass"}, {"q": "What device is used to measure weight?", "a": "A newtonmeter"}, {"q": "What is the name of the single point at which an object's mass appears to act?", "a": "centre of mass"}, {"q": "The center of mas of an object is…", "a": "the single point at which the objects weight appears to act."}, {"q": "Define gravitational field strength", "a": "The amount of force each kilogram of mass is pulled down by on earth"}]}, {"name": "Work done and energy transfer", "cards": [{"q": "State the equation which links distance, force and work done", "a": "W=Fs"}, {"q": "What is the unit of work done?", "a": "Joules (J)"}, {"q": "Work is done when an object is ….", "a": "… moved through a distance"}, {"q": "What is the definition of work?", "a": "The energy transferred to an object when a force acts over a distance" s the resultant force on an object travelling at terminal velocity", "a": "0"}, {"q": "Sketch the velocity time graph for a parachutist", "a": "draw on board"}, {"q": "Acceleration of falling objects close to the earth is ________", "a": "9.8 m/s2"}, {"q": "When the force moving an object is balanced by frictional forces it is moving at its _____________ _____________", "a": "terminal velocity"}, {"q": "The stopping distance of a vehicle is the sum of the …..", "a": "thinking and breaking distances"}, {"q": "The distance a vehicle travels while the driver is reacting is the …", "a": "thinking distance"}, {"q": "The distance a vehicle travels which the driver is breaking is the …", "a": "breaking distance"}, {"q": "Reaction time is…", "a": "the time it takes a driver to react"}, {"q": "A typical reaction time is …", "a": "0.2-0.9 s"}, {"q": "Factors which influence reaction time are…", "a": "tiredness, drug, alcohol, distractions"}, {"q": "Fctors which affect breaking distance are …", "a": "weather conditions, conditions of breaks and tyres"}, {"q": "Both thinking and breaking distance are affected by which factor?", "a": "speed of vehicle"}, {"q": "The greater the speed of a vehicle, the _________ the force required to stop the vehicle", "a": "greater"}]}, {"name": "Momentum", "cards": [{"q": "State the equation which links mass, momentum and velocity", "a": "ρ = mv"}, {"q": "State the equation for momentum (HT)", "a": "P = m x v"}, {"q": "What are the units of momentum?", "a": "kilogram metres per second (kg m/s)"}, {"q": "What is the unit of momentum? (HT)", "a": "Kgm/s"}]}]}, {"name": "Waves", "subtopics": [{"name": "Waves in air, fluids and solids", "cards": [{"q": "Write the equation linking frequency, wavelength and wave speed", "a": "v = fλ"}, {"q": "What equation links frequency and time period?", "a": "F = 1 / T"}, {"q": "What is the unit of frequency?", "a": "Hertz (Hz)"}, {"q": "What is the unit of wavelength?", "a": "metres (m)"}, {"q": "What is the unit of wave speed?", "a": "metres per second (m/s)"}, {"q": "The maximum displacement of a point on a wiavw away from its undeisturbed position is the…", "a": "Amplitude"}, {"q": "The distance from a point on one wave to the equivalent point on the next wave is the …", "a": "wavelength"}, {"q": "The number of waves passing a point each second is the…", "a": "Frequency"}, {"q": "Name an example of a longitudinal wave", "a": "Sound"}, {"q": "Name an example of a transverse wave", "a": "light, water, any electromagnetic"}, {"q": "Oscillations are along the same direction as the direction of travel is a _________ wave", "a": "longitudinal"}, {"q": "Oscillations are at right angles to the direction of travel in a ____________ wave", "a": "transverse"}, {"q": "The time needed for one wave to pass a given point is the…", "a": "period"}, {"q": "The region in a longitudinal wave where particles are closest together is a …", "a": "compression"}, {"q": "The region in a longitudinal wave where particels are furthest apart is a…", "a": "rarefaction"}, {"q": "Draw a transverse wave and label the wavelength and amplitude", "a": "Transverse wave: oscillations ⟂ to travel. Wavelength = crest→crest; amplitude = rest→crest.", "d": "wave:transverse"}, {"q": "Draw a longitudinal wave and label the wavelength", "a": "Longitudinal wave: oscillations ∥ to travel, with compressions and rarefactions.", "d": "wave:longitudinal"}, {"q": "How are waves used to detect objects in deep water and measure water depth?", "a": "Echo sounding, using high frequency sound waves"}, {"q": "The process taking place when a wave bounces off of a surface", "a": "reflection"}, {"q": "The process taking place when a wave enters a different density medium and changes direction", "a": "refracion"}, {"q": "Refraction changes both the _________ and ___________ of a wave", "a": "direction and speed"}, {"q": "Which two angles are equal in reflection", "a": "angle of incidence and angle of reflection"}, {"q": "What is the word for reflection from a smooth surface?", "a": "Specular reflection"}, {"q": "What is the word for reflection from a rough surface?", "a": "Diffuse reflection"}, {"q": "What happens to waves at the boundary between materials?", "a": "They can be reflected, absorbed or transmitted."}, {"q": "Draw a ray diagram to show how light is reflected by a plane mirror.", "a": ""}, {"q": "What is the relationship between the angles of incidence and reflection.", "a": "Angle of incidence = angle of reflection"}, {"q": "Waves have different velocities in different substances. What effect does this lead to?", "a": "Refraction"}, {"q": "Draw a ray diagram to show how light is refracted at a surface between two materials.", "a": ""}, {"q": "Draw a wave front diagram to explain how refraction is related to the change of speed that happens when a wave travels from one medium to another.", "a": ""}]}, {"name": "Electromagnetic waves", "cards": [{"q": "What is the speed of elecrtomagnetic radiation?", "a": "300 000 000 m/s"}, {"q": "What is the EM radiation with the shortest wavelength?", "a": "gamma"}, {"q": "What is the EM radiation with the longest wavelength?", "a": "Radio"}, {"q": "What is the EM radiation with the highest frequency?", "a": "Gamma"}, {"q": "What is the EM radiation with the lowest frequency?", "a": "Radio"}, {"q": "List the EM spectrum from long to short wavelength.", "a": "Radio, microwave, infrared, visible, UV, X-rays, gamma"}, {"q": "Can EM waves travel through space?", "a": "yes"}, {"q": "What EM wave is used for satellite communication?", "a": "microwave"}, {"q": "Give one use of microwaves", "a": "cooking food"}, {"q": "Give two uses of IR radiation", "a": "electrical heaters, infrared cameras"}, {"q": "Give a use of visible radiation", "a": "Fibre optic communications"}, {"q": "Which radiation is used in sun tanning?", "a": "UV"}, {"q": "Give one use of X-rays.", "a": "Medical imaging"}, {"q": "Give one use of gamma rays", "a": "Medical treatments"}, {"q": "Why are X-rays good for taking images of bone?", "a": "absorbed by bone but transmitted through soft tissue"}, {"q": "Why are gamma rays used in medical treatment?", "a": "Can kill cancer cells"}, {"q": "What are the risks of exposure to UV radiation?", "a": "Premature skin aging, increased risk of skin cancer"}, {"q": "What are the risks of exposure of X-rays?", "a": "X-rays are ionising so can cause mutations which may result in cancer"}, {"q": "What are the risks of exposure to gamma rays?", "a": "Gamma rays are ionising so can cause mutations which may result in cancer"}, {"q": "How can radio waves be produced?", "a": "Oscillations in electrical circuits."}, {"q": "How are radio waves related to alternating current?", "a": "When radio waves are absorbed they may create an alternating current with the same frequency as the radio wave itself, so radio waves can themselves induce oscillations in an electrical circuit."}, {"q": "How are electromagnetic waves related to atoms and nuclei?", "a": "Changes in atoms and the nuclei of atoms can result in electromagnetic waves being generated or absorbed over a wide frequency range."}, {"q": "Where do gamma rays originate from?", "a": "Changes in the nucleius of an atom."}, {"q": "What is radiation dose?", "a": "Radiation dose is a measure of the risk of harm resulting from an exposure of the body to the radiation."}, {"q": "What are the units of radiation dose?", "a": "Sieverts, Sv"}, {"q": "How many millisieverts (mSv) make up 1 sievert (Sv)?", "a": "1000 millisieverts (mSv) = 1 sievert (Sv)"}, {"q": "What effect do ultraviolet waves have on skin?", "a": "They can cause it to age prematurely and they increase the risk of skin cancer."}, {"q": "Which types of EM radiation are ionising?", "a": "X-rays and gamma rays"}, {"q": "What effects can ionising radiation have on the body?", "a": "They can cause mutation of genes and cancer."}, {"q": "What are the uses of each type of EM radiation?", "a": "radio waves – television and radio • microwaves – satellite communications, cooking food • infrared – electrical heaters, cooking food, infrared cameras • visible light – fibre optic communications • ultraviolet – energy efficient lamps, sun tanning • X-rays and gamma rays – medical imaging and treatments"}, {"q": "List the EM spectrum from short to long wavelength.", "a": "Gamma, xray, UV, Visible, IR, Micro, Radio"}, {"q": "An object is said to _________ radiation when energy from an EM wave is taken up by the object", "a": "absorb"}, {"q": "An object is said to _________ radiation when a wave can pass through the object", "a": "transmit"}]}]}, {"name": "Magnetism and Electromagnetism", "subtopics": [{"name": "Permanent and induced magnetism, magnetic forces and fields", "cards": [{"q": "The places on a magnet where the magnetic forces are the strongest are called the…", "a": "poles"}, {"q": "What is the definition of a magnetic field?", "a": "The area around a magnet where a force acts on another magnet or magnetic material"}, {"q": "The area around a magnet where a force acts on another magnet or magnetic material in the…", "a": "Magnetic field"}, {"q": "Two like poles always ______", "a": "repel"}, {"q": "Tow opposite poles always _______", "a": "attract"}, {"q": "What is a permanent magnet?", "a": "A magnet that produces its own magnetic field."}, {"q": "What is an induced magnet?", "a": "A magnetic material which becomes a magnet when placed in a magnetic field."}, {"q": "A magnetic material which becomes a magnet when placed in a magnetic field is a _______ _________", "a": "induced magnet"}, {"q": "What type of magnet loses its magnetism when it is removed from a magnetic field?", "a": "induced magnet"}, {"q": "Which three elements are magnetic?", "a": "iron, cobalt and nickel"}, {"q": "Draw the magnetic field around a bar magnet", "a": "Bar magnet: field lines loop from N to S, closest (strongest) at the poles.", "d": "mag:bar"}, {"q": "What two methods can you use to obesrve the field around a bar magnet?", "a": "Iron filings or plotting compass"}, {"q": "Draw the magnetic field between two like poles.", "a": "Two like poles: lines repel, with a neutral point between them.", "d": "mag:like"}, {"q": "Draw the magnetic field between two unlike poles.", "a": "Two unlike poles: lines run from N to S, attracting.", "d": "mag:unlike"}, {"q": "How can you use a compass to plot the magnetic field pattern of a magnet?", "a": "Place the compass in the field around the magnet. Draw a dot where the compass points.(North and South). Move the compass so that the South direction of the needle is at the dot you just drew. Repeat until the lines form a loop."}, {"q": "The strength of magnetic field surrounding a conducting wire depends on…", "a": "Size of current and distance from wire"}]}, {"name": "The motor effect", "cards": [{"q": "When current flows through a conducting wire…", "a": "A magnetic field is produced around the wire. The strength of the magnetic field depends on the current through the wire and the distance from the wire."}, {"q": "Give the name for the magnet created using a coil of wire", "a": "solenoid"}, {"q": "Where is the strongest field in an electromganet created by a coil of wire?", "a": "inside the coil"}, {"q": "What two words describe the magnetic field within the coil of a solenoid?", "a": "strong and uniform"}, {"q": "What is an electromagnet?", "a": "A solenoid containing an iron core which increases its strength"}, {"q": "What is an important property of a solenoid/electromagnet as a magnet", "a": "can be switched on and off with electric current"}, {"q": "What is a solenoid?", "a": "Shaping a wire to form a solenoid increases the strength of the magnetic field created by a current through the wire. The magnetic field inside a solenoid is strong and uniform."}, {"q": "How can the strength of a solenoid be increased?", "a": "By adding an iron core."}, {"q": "What is an electromagnet?", "a": "It is a solenoid with an iron core."}, {"q": "Draw the magnetic field pattern of a solenoid.", "a": "Bar magnet: field lines loop from N to S, closest (strongest) at the poles.", "d": "mag:bar"}, {"q": "Draw is the magnetic field pattern around a current carrying wire.", "a": "Bar magnet: field lines loop from N to S, closest (strongest) at the poles.", "d": "mag:bar"}, {"q": "Give three ways of increasing the force of a solenoid.", "a": "Add iron core, increase number of coils of wire, increase current, move magnetic material closer"}, {"q": "What is the motor effect?", "a": "When a conductor carrying a current is placed in a magnetic field the magnet producing the field and the conductor exert a force on each other. This is called the motor effect."}, {"q": "What does Fleming's left hand rule represent?", "a": "The relative orientation of the directions of the force, the current in the conductor and the magnetic field."}, {"q": "Give three ways of increasing the force of a motor.", "a": "Increase the number of coils of wire, increase the strength of the magnetic field, increase the current"}, {"q": "The right hand thumb rule shows relative direction of…", "a": "current and magnetic field around a wire"}, {"q": "State the equation which links current, force, length of conductor and magnetic flux density", "a": "F=BIl"}, {"q": "Flemming's left hand rule shows the relative directions of what things?", "a": "Force, magnetic field and current"}, {"q": "In Flemming's LH rule, the thumb gives the direction of …", "a": "Force"}, {"q": "In Flemming's LH rule, the second finger gives the direction of …", "a": "Current"}, {"q": "In Flemming's LH rule, the first finger gives the direction of …", "a": "Magnetic Field"}, {"q": "What happens to a coil of wire carrying a current in a magnetic field?", "a": "It rotates"}, {"q": "When a conductor carrying a current is placed in a magnetic field, the magnet and the conductor ….", "a": "exert an equal and opposit force on one another"}, {"q": "What is the unit of magnetic flux density?", "a": "Tesla (T)"}, {"q": "Which rule can be used to determine the direction a motor will rotate?", "a": "Flemming's left hand rule."}]}]}]}, {"name": "OCR GCSE Physics (Gateway)", "level": "GCSE", "topics": [{"name": "1 — Matter", "subtopics": [{"name": "1.1 The Particle Model", "cards": [{"q": "Write the equation that links density, mass and volume.", "a": "Density = mass ÷ volume (ρ = m/V)."}, {"q": "What is the SI unit of density?", "a": "Kilograms per cubic metre (kg/m³). g/cm³ is also common."}, {"q": "How would you find the density of a small regularly-shaped block?", "a": "Measure its mass on a balance, measure its dimensions to calculate the volume, then divide mass by volume."}, {"q": "How can you measure the volume of an irregularly-shaped stone?", "a": "Lower it into a eureka (displacement) can full to the spout and collect the water that overflows in a measuring cylinder; that volume equals the stone's volume."}, {"q": "Describe the arrangement and movement of particles in a solid.", "a": "Particles are packed closely in a fixed, regular pattern and can only vibrate about fixed positions.", "d": "particle:solid"}, {"q": "Describe the arrangement and movement of particles in a liquid.", "a": "Particles are close together but arranged randomly, and they can move around and slide past one another.", "d": "particle:liquid"}, {"q": "Describe the arrangement and movement of particles in a gas.", "a": "Particles are far apart and arranged randomly, moving quickly in all directions.", "d": "particle:gas"}, {"q": "Which state of matter usually has the highest density, and why?", "a": "The solid state, because its particles are packed most closely together so there is more mass in a given volume."}, {"q": "Why does a substance's density usually decrease when it melts or boils?", "a": "The particles move further apart, so the same mass occupies a larger volume."}, {"q": "What is meant by the internal energy of a substance?", "a": "The total kinetic and potential energy of all the particles that make up the substance."}, {"q": "When a substance is heated without changing state, what happens to its particles?", "a": "They gain kinetic energy and move (or vibrate) faster, so the temperature rises."}, {"q": "Why is a change of state described as a physical change rather than a chemical change?", "a": "No new substance is made and the change can be reversed; the particles themselves are unchanged."}, {"q": "What happens to the total mass of a substance when it changes state?", "a": "It stays the same — mass is conserved because no particles are gained or lost."}, {"q": "What name is given to the amount of matter packed into a given space?", "a": "Density."}, {"q": "Two objects have the same volume but different masses. Which has the greater density?", "a": "The one with the greater mass."}, {"q": "State one reason a measurement of an object's density might be too high.", "a": "The measured volume is too small (or the mass reading is too high), for example air bubbles were trapped or the object wasn't fully submerged."}, {"q": "What must you do to a measuring cylinder reading to be accurate?", "a": "Read the bottom of the meniscus at eye level."}]}, {"name": "1.2 Changes of State", "cards": [{"q": "Name the change of state from solid to liquid.", "a": "Melting."}, {"q": "Name the change of state from liquid to gas.", "a": "Boiling (or evaporating)."}, {"q": "Name the change of state from gas to liquid.", "a": "Condensing."}, {"q": "Name the change of state from liquid to solid.", "a": "Freezing (solidifying)."}, {"q": "Name the change of state when a solid turns straight into a gas.", "a": "Subliming (sublimation)."}, {"q": "Why does the temperature stay constant while a pure substance is melting or boiling?", "a": "The energy supplied is used to break bonds between particles (increasing potential energy) rather than increasing their kinetic energy, so the temperature does not change.", "d": "graph:heatingwater"}, {"q": "Define the specific heat capacity of a material.", "a": "The energy needed to raise the temperature of 1 kg of the material by 1 °C (or 1 K)."}, {"q": "Write the equation for the energy needed to change an object's temperature.", "a": "Energy = mass × specific heat capacity × temperature change (E = mcΔθ)."}, {"q": "Define the specific latent heat of a substance.", "a": "The energy needed to change the state of 1 kg of the substance with no change in temperature."}, {"q": "Write the equation linking energy, mass and specific latent heat.", "a": "Energy = mass × specific latent heat (E = mL)."}, {"q": "What is the difference between specific latent heat of fusion and of vaporisation?", "a": "Fusion is for melting/freezing (solid↔liquid); vaporisation is for boiling/condensing (liquid↔gas)."}, {"q": "On a heating graph, what does a flat (horizontal) section represent?", "a": "A change of state, where energy is transferred but the temperature stays constant.", "d": "graph:heatingwater"}, {"q": "What happens to the internal energy of a substance as it melts, even though its temperature is constant?", "a": "It increases, because the particles gain potential energy as the bonds between them are broken."}, {"q": "A block has a high specific heat capacity. What does this tell you?", "a": "It takes a lot of energy to change its temperature, so it heats up and cools down slowly."}, {"q": "Why does sweating help cool you down?", "a": "Evaporating sweat takes latent heat energy from your skin, lowering its temperature."}, {"q": "State the equation you would use to find the energy to heat ice, melt it, then heat the water.", "a": "Add the stages: E = mcΔθ (ice) + mL (melting) + mcΔθ (water)."}]}, {"name": "1.3 Pressure", "cards": [{"q": "Write the equation linking pressure, force and area.", "a": "Pressure = force ÷ area (p = F/A)."}, {"q": "What is the unit of pressure?", "a": "The pascal (Pa), which is equal to 1 newton per square metre (N/m²)."}, {"q": "Explain, using particles, how a gas exerts pressure on the walls of its container.", "a": "Gas particles move randomly and collide with the walls; each collision exerts a tiny force, and the total force per unit area is the pressure."}, {"q": "At constant temperature, what happens to the pressure of a fixed mass of gas if its volume is decreased?", "a": "The pressure increases, because the particles hit the walls more often in the smaller space (pressure × volume stays constant)."}, {"q": "State the relationship between the pressure and volume of a fixed mass of gas at constant temperature.", "a": "Pressure is inversely proportional to volume, so p × V is constant (Boyle's law)."}, {"q": "Why does the pressure in a liquid increase with depth?", "a": "There is a greater weight of liquid above pushing down, so more liquid particles press on a given area."}, {"q": "Write the equation for the pressure due to a column of liquid.", "a": "Pressure = height × density × gravitational field strength (p = hρg)."}, {"q": "Why does a sharp knife cut more easily than a blunt one?", "a": "Its edge has a smaller area, so the same force produces a much larger pressure."}, {"q": "What causes atmospheric pressure?", "a": "The weight of the air in the atmosphere pressing down on a surface due to collisions of air molecules."}, {"q": "Why does atmospheric pressure decrease as altitude increases?", "a": "There is less air above you, so a smaller weight of air presses down and there are fewer particle collisions."}, {"q": "What is upthrust?", "a": "The upward force a fluid exerts on an object, caused by the pressure being greater on the bottom of the object than on the top."}, {"q": "When does an object float in a fluid?", "a": "When the upthrust equals the object's weight (its average density is less than or equal to the fluid's)."}, {"q": "A force of 20 N acts on an area of 4 m². What is the pressure?", "a": "5 Pa (20 ÷ 4)."}, {"q": "Why do heavy vehicles like tractors have wide tyres?", "a": "The larger contact area lowers the pressure on soft ground so they don't sink in."}]}]}, {"name": "2 — Forces", "subtopics": [{"name": "2.1 Motion", "cards": [{"q": "What is the difference between a scalar and a vector quantity?", "a": "A scalar has size (magnitude) only; a vector has both magnitude and direction."}, {"q": "Give two examples of vector quantities.", "a": "Velocity, force, acceleration, displacement, momentum or weight (any two)."}, {"q": "What is the difference between distance and displacement?", "a": "Distance is how far an object travels (scalar); displacement is the straight-line distance and direction from start to finish (vector)."}, {"q": "Write the equation linking speed, distance and time.", "a": "Speed = distance ÷ time."}, {"q": "Roughly how fast does a person typically walk?", "a": "About 1.5 m/s."}, {"q": "What does the gradient (steepness) of a distance–time graph represent?", "a": "The speed of the object."}, {"q": "What does a horizontal line on a distance–time graph show?", "a": "The object is stationary (not moving)."}, {"q": "What does a curved line on a distance–time graph tell you?", "a": "The object is accelerating or decelerating (its speed is changing)."}, {"q": "Define acceleration.", "a": "The rate of change of velocity — how quickly velocity changes each second."}, {"q": "Write the equation linking acceleration, change in velocity and time.", "a": "Acceleration = change in velocity ÷ time taken (a = Δv/t)."}, {"q": "What is the unit of acceleration?", "a": "Metres per second squared (m/s²)."}, {"q": "On a velocity–time graph, what does the gradient represent?", "a": "The acceleration of the object."}, {"q": "On a velocity–time graph, what does the area under the line represent?", "a": "The distance travelled."}, {"q": "Write the equation that links final velocity, initial velocity, acceleration and distance.", "a": "v² = u² + 2as."}, {"q": "What is the approximate acceleration of free fall (g) near the Earth's surface?", "a": "About 9.8 m/s² (often taken as 10 m/s²)."}, {"q": "What is terminal velocity?", "a": "The steady maximum velocity a falling object reaches when the drag force balances its weight, so the resultant force is zero."}, {"q": "Describe how the forces change as a skydiver reaches terminal velocity.", "a": "At first weight is greater than drag so they accelerate; as speed rises drag increases until it equals weight, giving zero resultant force and constant velocity."}, {"q": "A car speeds up from 5 m/s to 25 m/s in 4 s. What is its acceleration?", "a": "5 m/s² ((25−5) ÷ 4)."}]}, {"name": "2.2 Newton's Laws", "cards": [{"q": "State Newton's first law of motion.", "a": "An object stays at rest or moves at constant velocity unless acted on by a resultant (unbalanced) force."}, {"q": "What is meant by the resultant force on an object?", "a": "The single force that has the same effect as all the forces acting on the object added together (as vectors)."}, {"q": "State Newton's second law as a word equation.", "a": "Resultant force = mass × acceleration (F = ma)."}, {"q": "What is inertial mass a measure of?", "a": "How difficult it is to change an object's velocity — the ratio of force to acceleration."}, {"q": "State Newton's third law.", "a": "When two objects interact they exert equal and opposite forces on each other."}, {"q": "Write the equation linking weight, mass and gravitational field strength.", "a": "Weight = mass × gravitational field strength (W = mg)."}, {"q": "What is the difference between mass and weight?", "a": "Mass is the amount of matter (kg) and is constant; weight is the force of gravity on that mass (N) and depends on the gravitational field strength."}, {"q": "Write the equation for momentum.", "a": "Momentum = mass × velocity (p = mv)."}, {"q": "State the principle of conservation of momentum.", "a": "In a closed system the total momentum before an event equals the total momentum after it."}, {"q": "Why is a larger force needed to stop a lorry than a car moving at the same speed?", "a": "The lorry has more mass, so more momentum, and force equals the rate of change of momentum."}, {"q": "What two parts make up the stopping distance of a vehicle?", "a": "Thinking distance plus braking distance."}, {"q": "Give two factors that increase a driver's thinking distance.", "a": "Tiredness, alcohol or drugs, distractions, or higher speed (any two)."}, {"q": "Give two factors that increase braking distance.", "a": "Higher speed, wet/icy roads, worn tyres or brakes, or a heavier load (any two)."}, {"q": "What happens to the energy of a car when the brakes are applied?", "a": "The kinetic energy is transferred to thermal energy in the brakes, which heat up."}, {"q": "Explain how a crumple zone reduces the force on passengers in a crash.", "a": "It increases the time over which the car stops, reducing the rate of change of momentum and therefore the force."}, {"q": "A 2 kg trolley accelerates at 3 m/s². What resultant force acts on it?", "a": "6 N (2 × 3)."}]}, {"name": "2.3 Forces in Action", "cards": [{"q": "What is the difference between a contact and a non-contact force?", "a": "A contact force acts when objects touch (e.g. friction); a non-contact force acts at a distance (e.g. gravity, magnetism, electrostatic)."}, {"q": "State Hooke's law.", "a": "The extension of a spring is directly proportional to the force applied, up to the limit of proportionality."}, {"q": "Write the equation linking force, spring constant and extension.", "a": "Force = spring constant × extension (F = kx)."}, {"q": "What is the limit of proportionality?", "a": "The point beyond which extension is no longer proportional to force, so the line on a force–extension graph starts to curve."}, {"q": "What is the difference between elastic and inelastic (plastic) deformation?", "a": "In elastic deformation the object returns to its original shape when the force is removed; in inelastic deformation it stays permanently changed.", "d": "graph:forceext"}, {"q": "Write the equation for the elastic potential energy stored in a stretched spring.", "a": "Elastic potential energy = ½ × spring constant × extension² (E = ½kx²)."}, {"q": "Write the equation for work done by a force.", "a": "Work done = force × distance moved in the direction of the force (W = Fd)."}, {"q": "What is the unit of work done, and what is it equivalent to?", "a": "The joule (J); 1 J = 1 N m (one newton-metre)."}, {"q": "What is the moment of a force?", "a": "The turning effect of a force about a pivot."}, {"q": "Write the equation for the moment of a force.", "a": "Moment = force × perpendicular distance from the pivot (M = Fd)."}, {"q": "State the principle of moments for a balanced object.", "a": "The total clockwise moment about a pivot equals the total anticlockwise moment."}, {"q": "How does a lever make a task easier?", "a": "It lets a small force at a large distance from the pivot produce a large moment (turning effect)."}, {"q": "How do gears change the moment (turning effect)?", "a": "A larger gear turning a smaller one changes the speed and the moment transmitted; a large gear gives a larger moment but turns more slowly."}, {"q": "What is the centre of mass of an object?", "a": "The single point through which the whole weight of the object appears to act."}, {"q": "A 4 N force acts 0.5 m from a pivot. What is the moment?", "a": "2 N m (4 × 0.5)."}, {"q": "A spring with spring constant 20 N/m is stretched by 0.1 m. What force is applied?", "a": "2 N (20 × 0.1)."}]}]}, {"name": "3 — Electricity", "subtopics": [{"name": "3.1 Static and Charge", "cards": [{"q": "How does an insulator become electrically charged by friction?", "a": "Rubbing transfers electrons from one material to the other; the material that gains electrons becomes negative and the one that loses them becomes positive."}, {"q": "Only one type of particle moves during charging by friction. Which is it?", "a": "The electron (negative charge). Protons in the nuclei do not move."}, {"q": "What is the rule for the forces between two charged objects?", "a": "Like charges repel; opposite charges attract."}, {"q": "What is an electric field?", "a": "A region around a charged object where another charge experiences a force."}, {"q": "Which way do the field lines point around a positive charge?", "a": "Away from the positive charge (they point in the direction of the force on a positive test charge)."}, {"q": "What happens to the strength of an electric field as you move away from a charge?", "a": "It gets weaker, shown by field lines becoming further apart."}, {"q": "Explain how a charged object can attract a small uncharged object.", "a": "The field of the charged object induces opposite charge on the near side of the uncharged object, so there is a net attraction."}, {"q": "Why can a large build-up of static charge cause a spark?", "a": "The strong electric field ionises the air, allowing charge to flow through it suddenly as a spark."}, {"q": "Give one everyday danger of static electricity.", "a": "A spark near flammable vapour or dust (e.g. when refuelling) could cause a fire or explosion."}, {"q": "Give one useful application of static electricity.", "a": "Electrostatic paint spraying, or dust precipitators in chimneys that remove smoke particles."}, {"q": "Write the equation linking charge, current and time.", "a": "Charge = current × time (Q = It)."}, {"q": "What is the unit of electric charge?", "a": "The coulomb (C)."}, {"q": "What is electric current?", "a": "The rate of flow of electric charge."}]}, {"name": "3.2 Simple Circuits", "cards": [{"q": "What is potential difference?", "a": "The energy transferred per unit charge between two points in a circuit (the 'push' driving the current)."}, {"q": "Write the equation linking potential difference, current and resistance.", "a": "Potential difference = current × resistance (V = IR)."}, {"q": "What is resistance?", "a": "A measure of how difficult it is for charge to flow; it is the ratio of potential difference to current."}, {"q": "What is the unit of resistance?", "a": "The ohm (Ω)."}, {"q": "How is an ammeter connected in a circuit, and what does it measure?", "a": "In series with the component; it measures the current.", "d": "sym:ammeter"}, {"q": "How is a voltmeter connected in a circuit, and what does it measure?", "a": "In parallel with the component; it measures the potential difference across it.", "d": "sym:voltmeter"}, {"q": "In a series circuit, what is true about the current?", "a": "It is the same at every point in the circuit."}, {"q": "In a series circuit, how is the total potential difference shared?", "a": "It is shared between the components, adding up to the supply potential difference."}, {"q": "How do you find the total resistance of resistors in series?", "a": "Add the individual resistances together."}, {"q": "In a parallel circuit, what is true about the potential difference across each branch?", "a": "It is the same across each branch and equal to the supply."}, {"q": "What happens to the total resistance when you add another resistor in parallel?", "a": "The total resistance decreases, because there are more paths for the current."}, {"q": "Describe the I–V graph for an ohmic conductor at constant temperature.", "a": "A straight line through the origin — current is directly proportional to potential difference.", "d": "iv:ohmic"}, {"q": "Describe the I–V graph for a filament lamp.", "a": "An S-shaped curve; as current rises the filament heats up and its resistance increases, so the line bends.", "d": "iv:lamp"}, {"q": "Describe the I–V graph for a diode.", "a": "Current only flows in one direction; there is very high resistance in reverse.", "d": "iv:diode"}, {"q": "How does the resistance of a thermistor change as it gets hotter?", "a": "Its resistance decreases as temperature increases."}, {"q": "How does the resistance of an LDR change as it gets brighter?", "a": "Its resistance decreases as light intensity increases."}, {"q": "Write two equations for electrical power.", "a": "Power = potential difference × current (P = VI), and Power = current² × resistance (P = I²R)."}, {"q": "Write the equation linking energy transferred, power and time.", "a": "Energy = power × time (E = Pt)."}, {"q": "Write the equation linking energy, charge and potential difference.", "a": "Energy = charge × potential difference (E = QV)."}, {"q": "Why does a longer wire have a higher resistance?", "a": "The charge has to travel further and collides with more ions, so it is harder for current to flow."}, {"q": "A 3 A current flows through a 4 Ω resistor. What is the potential difference across it?", "a": "12 V (3 × 4)."}]}]}, {"name": "4 — Magnetism and Magnetic Fields", "subtopics": [{"name": "4.1 Magnets and Magnetic Fields", "cards": [{"q": "What is the difference between a permanent and an induced magnet?", "a": "A permanent magnet produces its own magnetic field all the time; an induced magnet only becomes magnetic when placed in a magnetic field and loses most of it when removed."}, {"q": "Name three magnetic materials.", "a": "Iron, cobalt and nickel (steel is also magnetic)."}, {"q": "What is the rule for the force between two magnetic poles?", "a": "Like poles repel; unlike poles attract."}, {"q": "Is the force between two magnets a contact or non-contact force?", "a": "A non-contact force."}, {"q": "In which direction do magnetic field lines point?", "a": "From the north pole to the south pole of a magnet.", "d": "mag:bar"}, {"q": "What does the spacing of magnetic field lines tell you?", "a": "How strong the field is — lines closer together mean a stronger field.", "d": "mag:bar"}, {"q": "Where is a bar magnet's field strongest?", "a": "At the poles, where the field lines are closest together."}, {"q": "Draw the field between two unlike poles facing each other.", "a": "Curved field lines run directly from the north pole to the south pole, showing attraction.", "d": "mag:unlike"}, {"q": "How can you use a plotting compass to show a magnetic field?", "a": "Place the compass at points around the magnet and mark the direction the needle points; joining these shows the field lines."}, {"q": "Why does a compass needle point roughly north?", "a": "The Earth has its own magnetic field, and the compass needle (a small magnet) lines up with it."}, {"q": "What shape is the magnetic field around a straight current-carrying wire?", "a": "Concentric circles around the wire."}, {"q": "How can you find the direction of the field around a wire?", "a": "Use the right-hand grip rule: thumb points along the current, fingers curl in the field direction."}, {"q": "How can you make the magnetic field of a wire stronger?", "a": "Increase the current, or wind the wire into a coil (solenoid)."}, {"q": "What is a solenoid, and what is its field like?", "a": "A coil of wire; it produces a strong, uniform field inside similar to that of a bar magnet."}, {"q": "What is an electromagnet, and give one advantage over a permanent magnet.", "a": "A solenoid with an iron core; its magnetism can be switched on and off and its strength varied."}]}, {"name": "4.2 Uses of Magnetism", "cards": [{"q": "What is the motor effect?", "a": "When a current-carrying wire is placed in a magnetic field it experiences a force."}, {"q": "Write the equation for the force on a current-carrying conductor in a magnetic field.", "a": "Force = magnetic flux density × current × length (F = BIL)."}, {"q": "What is the unit of magnetic flux density?", "a": "The tesla (T)."}, {"q": "What does Fleming's left-hand rule give you?", "a": "The direction of the force (thumb) from the field (first finger) and current (second finger)."}, {"q": "Explain how a simple electric motor works.", "a": "A current-carrying coil in a magnetic field experiences forces on each side (motor effect) in opposite directions, creating a turning moment that spins the coil; a split-ring commutator reverses the current every half turn to keep it rotating."}, {"q": "How can you increase the speed of an electric motor?", "a": "Increase the current, use a stronger magnetic field, or add more turns to the coil."}, {"q": "How do loudspeakers use the motor effect?", "a": "A varying current in a coil in a magnetic field makes the coil (and attached cone) move back and forth, producing sound waves."}, {"q": "What is electromagnetic induction (the generator effect)?", "a": "A potential difference (and current, if there is a complete circuit) is induced when a conductor and magnetic field move relative to each other, cutting field lines."}, {"q": "Give two ways to increase the induced potential difference in a generator.", "a": "Move the magnet/coil faster, use a stronger magnet, or add more turns to the coil (any two)."}, {"q": "What does an alternator produce, and how?", "a": "Alternating current; a coil rotates in a magnetic field and slip rings keep the output connected the same way each half turn."}, {"q": "What is the purpose of a transformer?", "a": "To change the size of an alternating potential difference."}, {"q": "What is the difference between a step-up and a step-down transformer?", "a": "A step-up transformer increases the potential difference (more turns on the secondary); a step-down transformer decreases it (fewer turns on the secondary)."}, {"q": "Write the transformer equation linking potential differences and turns.", "a": "Vp/Vs = Np/Ns (primary pd ÷ secondary pd = primary turns ÷ secondary turns)."}, {"q": "For an ideal transformer, what is the relationship between input and output power?", "a": "They are equal: Vp × Ip = Vs × Is."}, {"q": "Why must transformers use alternating current, not direct current?", "a": "A changing (alternating) current produces a continually changing magnetic field, which is needed to induce a potential difference in the secondary coil."}, {"q": "Why does the National Grid use step-up transformers before transmission?", "a": "Raising the voltage lowers the current, which reduces energy wasted as heat in the cables."}]}]}, {"name": "5 — Waves in Matter", "subtopics": [{"name": "5.1 Wave Behaviour", "cards": [{"q": "What is the difference between a transverse and a longitudinal wave?", "a": "In a transverse wave the oscillations are at right angles to the direction of energy transfer; in a longitudinal wave they are parallel to it.", "d": "wave:transverse"}, {"q": "Give one example each of a transverse and a longitudinal wave.", "a": "Transverse: light or a water wave. Longitudinal: sound."}, {"q": "Describe a longitudinal wave in terms of compressions and rarefactions.", "a": "It is a series of compressions (particles close together) and rarefactions (particles spread out) travelling along the wave.", "d": "wave:longitudinal"}, {"q": "What is the amplitude of a wave?", "a": "The maximum displacement of a point from its rest (undisturbed) position."}, {"q": "What is the wavelength of a wave?", "a": "The distance between two corresponding points on adjacent waves (e.g. crest to crest)."}, {"q": "What is the frequency of a wave?", "a": "The number of complete waves passing a point each second, measured in hertz (Hz)."}, {"q": "Write the equation linking period and frequency.", "a": "Period = 1 ÷ frequency (T = 1/f)."}, {"q": "Write the wave equation linking wave speed, frequency and wavelength.", "a": "Wave speed = frequency × wavelength (v = fλ)."}, {"q": "Do waves transfer matter or energy?", "a": "They transfer energy (and information) without transferring matter."}, {"q": "How could you measure the speed of sound in air?", "a": "Time an echo over a known distance, or use two microphones a known distance apart connected to a timer, then use speed = distance ÷ time."}, {"q": "A wave has a frequency of 5 Hz and a wavelength of 2 m. What is its speed?", "a": "10 m/s (5 × 2)."}, {"q": "What is a wavefront?", "a": "A line joining points on a wave that are all at the same stage of their oscillation (e.g. all crests)."}]}, {"name": "5.2 The Electromagnetic Spectrum", "cards": [{"q": "List the electromagnetic spectrum from longest to shortest wavelength.", "a": "Radio, microwave, infrared, visible light, ultraviolet, X-rays, gamma rays."}, {"q": "What do all electromagnetic waves have in common?", "a": "They are transverse, transfer energy, and travel at the same speed (the speed of light) through a vacuum."}, {"q": "Which type of EM wave has the highest frequency and shortest wavelength?", "a": "Gamma rays."}, {"q": "Give a use of radio waves.", "a": "Broadcasting television and radio signals (communications)."}, {"q": "Give a use of microwaves.", "a": "Satellite communications and cooking food in a microwave oven."}, {"q": "Give a use of infrared radiation.", "a": "Thermal imaging, cooking/heating, or remote controls and short-range communication."}, {"q": "Give a use of ultraviolet radiation.", "a": "Security marking, detecting forged banknotes, or sterilising water; also sun-tanning."}, {"q": "Give a use of X-rays.", "a": "Producing images of bones and internal structures in medicine."}, {"q": "Give a use of gamma rays.", "a": "Sterilising medical equipment, killing cancer cells, or as medical tracers."}, {"q": "State one danger of ultraviolet radiation.", "a": "It can damage skin cells and cause skin cancer or eye damage."}, {"q": "State one danger of gamma rays or X-rays.", "a": "They are ionising and can damage or mutate cells, increasing the risk of cancer."}, {"q": "What happens to the speed of a wave when it refracts entering a denser medium?", "a": "It slows down, which changes its direction (bending towards the normal)."}, {"q": "How are radio waves produced?", "a": "By oscillations of charges (an alternating current) in an aerial/circuit."}, {"q": "What happens when a substance absorbs electromagnetic radiation?", "a": "The energy is transferred to the substance, which may heat up or cause an alternating current at the same frequency."}]}, {"name": "5.3 Wave Interactions", "cards": [{"q": "State the law of reflection.", "a": "The angle of incidence equals the angle of reflection (both measured from the normal)."}, {"q": "What is the difference between specular and diffuse reflection?", "a": "Specular reflection is from a smooth surface giving a clear image; diffuse reflection is from a rough surface scattering light in many directions."}, {"q": "Why does light refract when it passes from air into glass?", "a": "It slows down in the denser glass, which changes its direction (it bends towards the normal)."}, {"q": "What is the normal in a ray diagram?", "a": "A line drawn at 90° to the surface at the point where the ray meets it, used to measure angles."}, {"q": "What type of image does a convex (converging) lens form of a distant object?", "a": "A real, inverted, diminished image."}, {"q": "What is the focal length of a lens?", "a": "The distance from the centre of the lens to the principal focus (where parallel rays converge)."}, {"q": "What is the difference between a real and a virtual image?", "a": "A real image can be projected onto a screen because rays actually meet; a virtual image cannot, because the rays only appear to come from it."}, {"q": "Write the equation for magnification.", "a": "Magnification = image height ÷ object height."}, {"q": "What type of image does a concave (diverging) lens always produce?", "a": "A virtual, upright, diminished image."}, {"q": "What is a perfect black body?", "a": "An object that absorbs all the radiation that hits it and is also the best possible emitter of radiation."}, {"q": "All objects emit infrared radiation. How does this depend on temperature?", "a": "The hotter an object is, the more radiation it emits and the shorter the peak wavelength."}, {"q": "What determines whether an object's temperature stays constant?", "a": "It stays constant when it absorbs radiation at the same rate as it emits it."}, {"q": "Why does the Earth's temperature stay roughly stable overall?", "a": "On average it emits as much radiation back into space as it absorbs from the Sun."}, {"q": "Why does a red filter make white light appear red?", "a": "It transmits (lets through) red light and absorbs the other colours."}]}]}, {"name": "6 — Radioactivity", "subtopics": [{"name": "6.1 Radioactive Emissions", "cards": [{"q": "Describe the nuclear (Rutherford) model of the atom.", "a": "A tiny, dense, positively charged nucleus at the centre containing most of the mass, with electrons orbiting at a distance."}, {"q": "What did the alpha-scattering experiment show that the plum pudding model could not explain?", "a": "Most alpha particles passed straight through but a few were deflected or bounced back, showing the atom is mostly empty space with a small, dense, positive nucleus."}, {"q": "What are the relative charges of a proton, neutron and electron?", "a": "Proton +1, neutron 0, electron −1."}, {"q": "What does the atomic (proton) number of an atom tell you?", "a": "The number of protons in the nucleus (which determines the element)."}, {"q": "What does the mass number of an atom tell you?", "a": "The total number of protons and neutrons in the nucleus."}, {"q": "What is an isotope?", "a": "Atoms of the same element with the same number of protons but different numbers of neutrons."}, {"q": "What is an alpha particle?", "a": "Two protons and two neutrons (a helium nucleus)."}, {"q": "What is a beta particle?", "a": "A high-speed electron emitted from the nucleus when a neutron changes into a proton."}, {"q": "What is gamma radiation?", "a": "A high-energy electromagnetic wave emitted from the nucleus."}, {"q": "Compare the penetrating power of alpha, beta and gamma radiation.", "a": "Alpha is stopped by paper/skin, beta by a few mm of aluminium, and gamma is only reduced by thick lead or concrete."}, {"q": "Which type of radiation is the most strongly ionising?", "a": "Alpha radiation."}, {"q": "What happens to the mass and atomic number when a nucleus emits an alpha particle?", "a": "The mass number falls by 4 and the atomic number falls by 2."}, {"q": "What happens to the mass and atomic number when a nucleus emits a beta particle?", "a": "The mass number stays the same and the atomic number increases by 1."}, {"q": "What is meant by the activity of a radioactive source, and what is its unit?", "a": "The rate at which nuclei decay, measured in becquerels (Bq)."}, {"q": "Why is radioactive decay described as random?", "a": "You cannot predict which nucleus will decay or when; you can only give the probability."}, {"q": "Define the half-life of a radioactive isotope.", "a": "The average time taken for the number of undecayed nuclei (or the activity) to halve."}, {"q": "What is background radiation?", "a": "The low-level ionising radiation that is around us all the time from natural and man-made sources."}, {"q": "Name two sources of background radiation.", "a": "Radon gas from rocks, cosmic rays, food and drink, or medical X-rays (any two)."}]}, {"name": "6.2 Uses and Hazards", "cards": [{"q": "What is the difference between irradiation and contamination?", "a": "Irradiation is being exposed to radiation from an outside source; contamination is getting radioactive material on or inside you."}, {"q": "Why is contamination often more dangerous than brief irradiation?", "a": "The radioactive material stays with you and keeps emitting radiation, sometimes inside the body."}, {"q": "Why is an alpha source useful in a smoke detector?", "a": "Its short range means it is safe outside the detector but its strong ionisation makes the detector sensitive to smoke."}, {"q": "What makes a good radioactive tracer for medical use?", "a": "A gamma emitter with a short half-life, so it can be detected outside the body but does not stay radioactive for long."}, {"q": "How is gamma radiation used to treat cancer?", "a": "Carefully aimed beams of gamma rays are used to kill cancer cells (radiotherapy)."}, {"q": "Why is gamma radiation used to sterilise medical equipment?", "a": "It kills bacteria and microbes without needing high temperatures, so heat-sensitive items aren't damaged."}, {"q": "What is nuclear fission?", "a": "The splitting of a large unstable nucleus (such as uranium-235) into two smaller nuclei, releasing energy and neutrons."}, {"q": "What is a chain reaction in fission?", "a": "Neutrons released by one fission go on to cause further fissions, which release more neutrons, and so on."}, {"q": "What is the role of control rods in a nuclear reactor?", "a": "They absorb neutrons to control the rate of the chain reaction."}, {"q": "What is the role of the moderator in a nuclear reactor?", "a": "It slows down the neutrons so they are more likely to cause further fission."}, {"q": "What is nuclear fusion?", "a": "The joining of two light nuclei to form a heavier nucleus, releasing energy."}, {"q": "Why is nuclear fusion difficult to achieve on Earth?", "a": "Extremely high temperatures and pressures are needed to overcome the repulsion between the positively charged nuclei."}, {"q": "Give one way workers reduce their exposure when handling radioactive sources.", "a": "Use tongs/long handling tools, shielding, keep exposure time short, and stand well away."}, {"q": "A source has a half-life of 2 days. What fraction remains after 6 days?", "a": "One eighth (three half-lives: ½ → ¼ → ⅛)."}]}]}, {"name": "7 — Energy", "subtopics": [{"name": "7.1 Work Done", "cards": [{"q": "Name four energy stores.", "a": "Kinetic, gravitational potential, elastic potential, thermal, chemical, nuclear, magnetic or electrostatic (any four)."}, {"q": "Name the four ways energy can be transferred between stores.", "a": "Mechanically (by a force), electrically, by heating, and by radiation."}, {"q": "State the principle of conservation of energy.", "a": "Energy cannot be created or destroyed, only transferred from one store to another or dissipated."}, {"q": "What is the relationship between work done and energy transferred?", "a": "The work done by a force equals the energy transferred (they are equal and measured in joules)."}, {"q": "Write the equation for kinetic energy.", "a": "Kinetic energy = ½ × mass × velocity² (Eₖ = ½mv²)."}, {"q": "Write the equation for gravitational potential energy.", "a": "GPE = mass × gravitational field strength × height (Eₚ = mgh)."}, {"q": "What happens to the energy of a falling object (ignoring air resistance)?", "a": "Gravitational potential energy is transferred to the kinetic energy store."}, {"q": "What is meant by dissipated (wasted) energy?", "a": "Energy that is transferred to the surroundings in a non-useful way, usually heating, and becomes spread out."}, {"q": "What is a closed system?", "a": "A system in which no energy transfers take place into or out of it, so the total energy stays constant."}, {"q": "A 2 kg object moves at 3 m/s. What is its kinetic energy?", "a": "9 J (½ × 2 × 3²)."}, {"q": "A 5 kg mass is lifted 2 m (g = 10 N/kg). How much GPE does it gain?", "a": "100 J (5 × 10 × 2)."}, {"q": "Why does a moving car eventually stop if the engine is switched off?", "a": "Friction and air resistance do work, transferring its kinetic energy to thermal energy in the surroundings."}]}, {"name": "7.2 Power and Efficiency", "cards": [{"q": "What is power?", "a": "The rate at which energy is transferred or work is done."}, {"q": "Write two equations for power.", "a": "Power = energy transferred ÷ time (P = E/t), and Power = work done ÷ time (P = W/t)."}, {"q": "What is the unit of power, and what is 1 watt equal to?", "a": "The watt (W); 1 W = 1 joule per second."}, {"q": "Write the equation for efficiency.", "a": "Efficiency = useful energy (or power) output ÷ total energy (or power) input."}, {"q": "Why can no machine be 100% efficient?", "a": "Some energy is always dissipated to the surroundings as wasted energy (usually heating)."}, {"q": "What does a Sankey diagram show?", "a": "How the input energy is split into useful and wasted energy transfers, shown by the width of the arrows."}, {"q": "Give two ways to reduce unwanted energy transfers in a machine.", "a": "Lubrication to reduce friction, and thermal insulation to reduce heat loss."}, {"q": "How does the thickness of walls affect a building's rate of cooling?", "a": "Thicker walls reduce the rate of energy transfer, so the building cools more slowly."}, {"q": "How does the thermal conductivity of a material affect heat loss?", "a": "A lower thermal conductivity means energy is transferred through it more slowly, reducing heat loss."}, {"q": "A motor is 60% efficient and is supplied with 200 J. How much useful energy does it output?", "a": "120 J (0.6 × 200)."}, {"q": "A lamp transfers 500 J in 10 s. What is its power?", "a": "50 W (500 ÷ 10)."}, {"q": "Why is loft insulation used in houses?", "a": "It has a low thermal conductivity and traps air, reducing energy transfer by conduction so the house stays warm longer."}]}]}, {"name": "8 — Global Challenges", "subtopics": [{"name": "8.1 Physics on the Move", "cards": [{"q": "What is the stopping distance of a vehicle?", "a": "The thinking distance plus the braking distance."}, {"q": "What is thinking distance?", "a": "The distance the vehicle travels during the driver's reaction time, before the brakes are applied."}, {"q": "What is braking distance?", "a": "The distance the vehicle travels while the brakes are being applied until it stops."}, {"q": "How does doubling the speed affect the braking distance (roughly)?", "a": "Braking distance increases with the square of the speed, so doubling the speed makes it about four times longer."}, {"q": "Why is a larger force needed to stop a vehicle quickly?", "a": "A quick stop means a large change in momentum in a short time, and force = rate of change of momentum."}, {"q": "Explain how seatbelts and airbags reduce injury in a crash.", "a": "They increase the time taken for the passenger to stop, reducing the rate of change of momentum and so the force on them."}, {"q": "Why do brakes get hot when used heavily?", "a": "The kinetic energy of the vehicle is transferred to thermal energy in the brakes as they do work against friction."}, {"q": "Write the equation for momentum.", "a": "Momentum = mass × velocity (p = mv)."}, {"q": "State the conservation of momentum for a collision.", "a": "The total momentum before the collision equals the total momentum after it (in a closed system)."}, {"q": "Give two factors that increase a driver's reaction (thinking) time.", "a": "Tiredness, alcohol, drugs, or distractions such as a phone (any two)."}, {"q": "A 1000 kg car travels at 20 m/s. What is its momentum?", "a": "20 000 kg m/s (1000 × 20)."}, {"q": "Why can very large decelerations be dangerous to passengers?", "a": "They require very large forces on the body, which can cause serious injury."}]}, {"name": "8.2 Powering Earth", "cards": [{"q": "What is the difference between a renewable and a non-renewable energy resource?", "a": "A renewable resource is replenished as fast as it is used and won't run out; a non-renewable one is used faster than it forms and will run out."}, {"q": "Name three non-renewable energy resources.", "a": "Coal, oil, natural gas (fossil fuels) and nuclear fuel."}, {"q": "Name four renewable energy resources.", "a": "Wind, solar, hydroelectric, tidal, wave, geothermal or biofuel (any four)."}, {"q": "Give one advantage and one disadvantage of fossil fuels.", "a": "Advantage: reliable and can meet high demand. Disadvantage: they release carbon dioxide (greenhouse gas) and are non-renewable."}, {"q": "Give one advantage and one disadvantage of wind power.", "a": "Advantage: renewable with no fuel cost or carbon emissions in use. Disadvantage: unreliable (no power when there is no wind) and some find turbines noisy or unsightly."}, {"q": "Why are some renewable resources described as unreliable?", "a": "Their output depends on conditions such as sunshine, wind or tides, which are not always available when demand is high."}, {"q": "What environmental problem is caused by burning fossil fuels?", "a": "They release carbon dioxide, which increases the greenhouse effect and contributes to climate change (and sulfur dioxide causing acid rain)."}, {"q": "What is the National Grid?", "a": "The network of transformers and cables that distributes electricity from power stations to consumers."}, {"q": "Why does the National Grid transmit electricity at very high voltage?", "a": "High voltage means lower current, which reduces energy wasted as heat in the transmission cables."}, {"q": "What is the role of a step-down transformer in the National Grid?", "a": "It reduces the high transmission voltage to a safer, usable voltage for homes and businesses."}, {"q": "Give one advantage of nuclear power as an energy resource.", "a": "It produces large amounts of energy reliably without releasing carbon dioxide."}, {"q": "Give one disadvantage of nuclear power.", "a": "It produces radioactive waste that must be stored safely for a long time, and accidents can be serious."}]}, {"name": "8.3 Beyond Earth", "cards": [{"q": "What force keeps planets, moons and satellites in orbit?", "a": "Gravity (gravitational attraction)."}, {"q": "Name the stages in the life cycle of a star about the size of the Sun.", "a": "Nebula → protostar → main sequence star → red giant → white dwarf."}, {"q": "What happens to a star much more massive than the Sun at the end of its life?", "a": "It becomes a red supergiant, explodes as a supernova, then forms a neutron star or, if massive enough, a black hole."}, {"q": "What keeps a main sequence star stable?", "a": "The inward force of gravity is balanced by the outward pressure from the energy released by nuclear fusion."}, {"q": "How are elements heavier than hydrogen and helium formed?", "a": "By nuclear fusion in stars; elements heavier than iron are formed in supernova explosions, which also scatter them into space."}, {"q": "What is red-shift?", "a": "The shift of light from distant galaxies towards the red (longer wavelength) end of the spectrum, showing they are moving away from us."}, {"q": "How does red-shift support the idea that the universe is expanding?", "a": "More distant galaxies show greater red-shift, meaning they are moving away faster, which is what you expect if the whole universe is expanding."}, {"q": "What is the Big Bang theory?", "a": "The theory that the universe began from a very small, hot, dense point and has been expanding ever since."}, {"q": "What evidence supports the Big Bang theory?", "a": "The red-shift of distant galaxies and the cosmic microwave background radiation."}, {"q": "For a stable circular orbit, what happens if the orbital radius is smaller?", "a": "The object must move faster; a smaller orbit means a higher orbital speed."}, {"q": "Why is the velocity of an object in a circular orbit always changing even at constant speed?", "a": "Its direction is constantly changing, and velocity is a vector, so a changing direction means changing velocity (acceleration)."}, {"q": "What is an artificial satellite used for?", "a": "Communications, weather monitoring, GPS/navigation or scientific observation (any one)."}]}]}]}, {"name": "Edexcel GCSE Physics", "level": "GCSE", "topics": [{"name": "Topic 1 – Key Concepts of Physics", "subtopics": [{"name": "Units, prefixes and equations", "cards": [{"q": "what does the prefix tera- (T) correspond to in standard form?", "a": "×10¹²"}, {"q": "what does the prefix giga- (G) correspond to in standard form?", "a": "×109"}, {"q": "what does the prefix mega- (M) correspond to in standard for", "a": "×106"}, {"q": "what does the prefix kilo- (k) correspond to in standard form?", "a": "×10³"}, {"q": "what does the prefix deci- (d) correspond to in standard form?", "a": "×10-1"}, {"q": "what does the prefix centi- (c) correspond to in standard form?", "a": "×10-2"}, {"q": "what does the prefix milli- (m) correspond to in standard form", "a": "×10-3"}, {"q": "what does the prefix micro- (µ) correspond to in standard form", "a": "×10-6"}, {"q": "what does the prefix nano- (n) correspond to in standard form?", "a": "×10-9"}, {"q": "What prefix can be used to represent the multiple ×10¹²?", "a": "tera- (T)"}, {"q": "What prefix can be used to represent the multiple ×109?", "a": "giga- (G)"}, {"q": "What prefix can be used to represent the multiple ×106?", "a": "mega- (M)"}, {"q": "What prefix can be used to represent the multiple ×10-1?", "a": "deci- (d)"}, {"q": "What does the prefix 'kilo' (k) mean as a power of ten?", "a": "10³ (one thousand)."}, {"q": "What does the prefix 'milli' (m) mean as a power of ten?", "a": "10⁻³ (one thousandth)."}, {"q": "What does the prefix 'micro' (µ) mean as a power of ten?", "a": "10⁻⁶ (one millionth)."}, {"q": "What does the prefix 'nano' (n) mean as a power of ten?", "a": "10⁻⁹."}, {"q": "Convert 2.5 kilometres into metres.", "a": "2500 m (× 1000)."}, {"q": "Convert 400 milliseconds into seconds.", "a": "0.4 s (÷ 1000)."}, {"q": "Give the SI base units of mass, length and time.", "a": "Kilogram (kg), metre (m) and second (s)."}, {"q": "Why should you quote an answer to a sensible number of significant figures?", "a": "So the precision claimed matches the precision of the data used; extra figures imply false accuracy."}, {"q": "Write 0.00047 m in standard form.", "a": "4.7 × 10⁻⁴ m."}]}]}, {"name": "Topic 2 – Motion and Forces", "subtopics": [{"name": "Motion, speed and acceleration", "cards": [{"q": "Define vector", "a": "A quantity that has both magnitude and direction"}, {"q": "What is the difference between a scalar and a vector quantity?", "a": "A scalar has size (magnitude) only; a vector has both magnitude and direction."}, {"q": "What is the equation linking kinetic energy, mass and velocity?", "a": "Ek= 0.5mv2"}, {"q": "What is the equation to calculate speed?", "a": "Speed = distance / time"}, {"q": "Define scalar", "a": "A quantity that has magnitude only"}, {"q": "Give two examples of vector quantities.", "a": "Velocity, force, acceleration, displacement, momentum or weight (any two)."}, {"q": "Force, displacement and velocity are examples of __________ quantities", "a": "vector"}, {"q": "What is the equation to calculate acceleration?", "a": "acceleration = change in velocity / time"}, {"q": "Give the equation linking speed, distance and time", "a": "Speed = distance/time"}, {"q": "What is the difference between distance and displacement?", "a": "Distance is how far an object travels (scalar); displacement is the straight-line distance and direction from start to finish (vector)."}, {"q": "State the equation which links distance, speed and time", "a": "s=vt"}, {"q": "What unit is acceleration measured in?", "a": "m/s²"}, {"q": "Describe distance-time graph for constant speed", "a": "Straight line sloping up and right"}, {"q": "Roughly what is a typical speed for a car on a motorway?", "a": "About 30 m/s (roughly 70 mph)."}, {"q": "Why is velocity a vector but speed a scalar?", "a": "Velocity states a direction as well as a size, whereas speed states only the size."}, {"q": "How do you find the distance travelled from a velocity–time graph?", "a": "Calculate the area under the line."}, {"q": "What is meant by uniform acceleration?", "a": "Acceleration that stays constant, so velocity changes by equal amounts in equal times."}]}, {"name": "Newton's laws and forces", "cards": [{"q": "Define resultant force", "a": "Total force acting on a body"}, {"q": "State Newton's first law of motion.", "a": "An object stays at rest or moves at constant velocity unless acted on by a resultant (unbalanced) force."}, {"q": "What are the units of gravitational field strength?", "a": "newtons per kilogram"}, {"q": "What is inertia?", "a": "How hard it is to change the motion of an object"}, {"q": "Define balanced force", "a": "Forces acting on a body are equal in size but opposite in direction"}, {"q": "What is meant by the resultant force on an object?", "a": "The single force that has the same effect as all the forces acting on the object added together (as vectors)."}, {"q": "State the equation which links gravitaional field strength, mass and weight", "a": "W=mg"}, {"q": "What is Newton's 1st law?", "a": "A body will remain at rest, or continue to move with a constant velocity if forces are balanced"}, {"q": "Define unbalanced force", "a": "The force acting in one direction is greater than the force acting in the opposite direction"}, {"q": "State Newton's second law as a word equation.", "a": "Resultant force = mass × acceleration (F = ma)."}, {"q": "What is the unit of weight?", "a": "Newtons (N)"}, {"q": "What does Newton's 1st law tell us about objects moving at a constant velocity?", "a": "Resultant force = zero (balanced forces)"}, {"q": "Define weight", "a": "Force that acts on a mass because of the gravitational force"}, {"q": "What does a resultant force of zero tell you about an object's motion?", "a": "It is either stationary or moving at a constant velocity (Newton's first law)."}, {"q": "Describe the Edexcel required practical to investigate the acceleration of a trolley.", "a": "Vary the force (or mass) on a trolley and measure its acceleration using light gates; a graph shows acceleration ∝ force and acceleration ∝ 1/mass."}, {"q": "What is the approximate value of gravitational field strength on Earth?", "a": "About 9.8 N/kg (often taken as 10 N/kg)."}]}, {"name": "Momentum", "cards": [{"q": "Give the units of momentum", "a": "kg m/s"}, {"q": "Write the equation for momentum.", "a": "Momentum = mass × velocity (p = mv)."}, {"q": "State the equation for momentum (HT)", "a": "P = m x v"}, {"q": "What is a crumple zone?", "a": "Area at front and back of a car designed to crumple"}, {"q": "Define momentum in words", "a": "How difficult it is to stop a moving object"}, {"q": "State the principle of conservation of momentum.", "a": "In a closed system the total momentum before an event equals the to
