e current?", "a": "Reverses direction"}, {"q": "How can you increase the current induced from a generator?", "a": "Move wire (or magnet) faster, Add more turns to wire, Increase magnetic field strength"}, {"q": "Which rule do you use to find the direction of current in a generator?", "a": "Fleming's Right Hand Rule"}, {"q": "What does each finger represent in Fleming's Right Hand Rule?", "a": "Thumb = movement (force) , First finger = magnetic field, Second finger = current"}, {"q": "Why do generators produce AC electricity?", "a": "Current that is induced reverses direction every half turn"}, {"q": "Why so transformers have an iron core?", "a": "To pass on the alternating magnetic field from primary to secondary coil"}, {"q": "How is an alternating current set up in the secondary coil of a transformer?", "a": "Alternating magnetic field induces an alternating voltage and current"}, {"q": "What is the transformer equation?", "a": "V1/V2 = N1/N2"}, {"q": "What assumption is made in the transformer equation?", "a": "1"}, {"q": "N1=2000  V1=240V   V2=4.8V  how many turns are on the secondary coil?", "a": "40 turns"}, {"q": "What unit is magnetic field strength measured in?", "a": "T (Tesla)"}]}]}, {"name": "Distance, Speed, Acceleration", "subtopics": [{"name": "2.1", "cards": [{"q": "What is the equation to calculate speed?", "a": "Speed = distance / time"}, {"q": "What unit is speed measured in?", "a": "m/s"}, {"q": "What is the difference between speed and velocity?", "a": "Velocity is speed in a particular direction"}, {"q": "What is the equation to calculate acceleration?", "a": "acceleration = change in velocity / time"}, {"q": "What unit is acceleration measured in?", "a": "m/s²"}, {"q": "What does the steepness or gradient of a distance-time graph represent?", "a": "Speed"}, {"q": "What does a horizontal line on a distance-time graph represent?", "a": "Stationary (not moving)"}, {"q": "What does a steep line on a distance-time graph represent?", "a": "Fast constant speed"}, {"q": "How does a distance-time graph show an object returning back to its start position?", "a": "Line coming down (decreasing distance)"}, {"q": "What does the steepness or gradient of a velocity-time graph represent?", "a": "acceleration"}, {"q": "HT: What does the area under a velocity-time graph represent?", "a": "distance travelled"}, {"q": "What does a horizontal line on a velocity-time graph represent?", "a": "constant speed (velocity)"}, {"q": "What does a steep line on a velocity-time graph represent?", "a": "high constant acceleration"}, {"q": "What is the definition for thinking distance?", "a": "Distance travelled between seeing the object and applying the brakes"}, {"q": "What is the definition for braking distance?", "a": "Distance travelled between applying the brakes and coming to a stop"}, {"q": "How do we calculate overall stopping distance?", "a": "Overall Stopping distance = Thinking distance + Braking distance"}, {"q": "Name 3 factors that affect thinking distance", "a": "Speed, Alcohol, Drugs, Tiredness"}, {"q": "Name 3 factors that affect braking distance", "a": "Speed, Conditions of brakes, tyres and road"}, {"q": "What factor affects both thinking and braking distance?", "a": "Speed of the vehicle"}, {"q": "What is found by thinking distance/speed?", "a": "Reaction time"}]}]}, {"name": "Newton's laws", "subtopics": [{"name": "2.2", "cards": [{"q": "What is inertia?", "a": "How hard it is to change the motion of an object"}, {"q": "What is Newton's 1st law?", "a": "A body will remain at rest, or continue to move with a constant velocity if forces are balanced"}, {"q": "What does Newton's 1st law tell us about objects moving at a constant velocity?", "a": "Resultant force = zero (balanced forces)"}, {"q": "What is a resultant force?", "a": "Overall force acting on an object"}, {"q": "What is the resultant force?     24N<--      -->39N", "a": "15N -->"}, {"q": "What is Newton's 2nd law?", "a": "Resultant force = mass x acceleration (F=ma)"}, {"q": "What is the definition of mass?", "a": "How much matter (stuff) is in an object"}, {"q": "What is the definition of weight?", "a": "Force due to gravity on an object"}, {"q": "What unit is used for mass?", "a": "kg (kilograms)"}, {"q": "What unit is used for weight?", "a": "N (Newtons)"}, {"q": "What happens to your weight if you go to the Moon?", "a": "Weight decreases as there is less gravity"}, {"q": "What happens to your mass if you go to the Moon?", "a": "Stays the same unless you lose a body part on the way!"}, {"q": "What is the equation that links weight and mass?", "a": "Weight = mass x gravitational field strength (W=mg)"}, {"q": "What is the gravitational field strength on Earth?", "a": "10N/kg"}, {"q": "What is the weight of a 250kg car on Earth?", "a": "2500N"}, {"q": "What is Newton's 3rd law?", "a": "If object A exerts a force on object B, then object B exerts an equal and opposite force on object A"}, {"q": "If a bat pushes a ball forwards with 400N what does the ball do?", "a": "Ball pushes the bat backwards with 400N"}, {"q": "Describe how Newton's 3rd law applies to a rocket?", "a": "Exhaust fumes exert a force down on ground, ground exerts an equal and opposite force up on the rocket"}, {"q": "Why does the acceleration of a rocket change as it flies?", "a": "Mass decreases as it uses up fuel"}, {"q": "When a skydiver first jumps from a plane why do they accelerate?", "a": "Weight is bigger than air resistance"}, {"q": "When a skydiver speeds up what happens to air resistance?", "a": "Increases until it balances weight"}, {"q": "When weight and air resistance are balanced what happens to the motion of the skydiver?", "a": "Constant speed (terminal velocity)"}, {"q": "What happens to the skydiver when they open their parachute?", "a": "Air resistance increases and is bigger than weight, so they slow down"}, {"q": "When a skydiver slows down what happens to air resistance?", "a": "Decreases until it balances weight"}, {"q": "What does terminal velocity mean?", "a": "Constant speed due to balanced forces"}, {"q": "When a skydiver falls which force remains constant?", "a": "Weight"}]}]}, {"name": "Work and Energy", "subtopics": [{"name": "2.3", "cards": [{"q": "What type of energy is the energy transferred to an object when it is moved?", "a": "Work done"}, {"q": "What is the equation to calculate work done?", "a": "Work done = force x distance"}, {"q": "What unit is used for work done?", "a": "J (Joules)"}, {"q": "What are the most common types of energy transferred as work done?", "a": "Heat and sound"}, {"q": "What type of objects have kinetic energy?", "a": "Objects that are moving"}, {"q": "HT: What is the equation to calculate kinetic energy?", "a": "Kinetic energy = 1/2 x mass x velocity² (KE=1/2mv²)"}, {"q": "What unit is used for kinetic energy?", "a": "J (Joules)"}, {"q": "What type of objects have gravitational potential energy?", "a": "Objects that are above the ground"}, {"q": "HT: What is the equation to calculate gravitational potential energy?", "a": "Potential energy = mass x gravitational field strength x height (PE=mgh)"}, {"q": "What unit is used for potential energy?", "a": "J (Joules)"}, {"q": "Describe the energy transfers in a bouncing ball", "a": "Max PE, as it falls PE decreases and KE increases, Max KE at floor and Min PE, as it rises PE increases KE decreases"}, {"q": "Why does a bouncy ball not bounce back to the original height?", "a": "Energy is transferred as work done against friction (heat and sound)"}, {"q": "Whose law states that extension of a spring is directly proportional to the force applied?", "a": "Hooke's law"}, {"q": "When you double the force on a spring what happens to the extension?", "a": "It doubles"}, {"q": "What is the equation given by Hooke's law?", "a": "Force = spring constant x extension (F = k x)"}, {"q": "What does k represent in Hooke's law?", "a": "spring constant"}, {"q": "What does it mean if a spring has a high spring constant?", rnova?", "a": "Black hole"}, {"q": "Name the 2 forces acting on a star", "a": "Gravity and Gas and radiation pressure"}, {"q": "Describe in terms of forces why a main sequence star is stable", "a": "Force of gravity inwards equals force of gas and radiation pressure outwards"}, {"q": "HT: What is the name of the graph that show temperature, brightness and size of a star called?", "a": "Hertzsprung-Russell (HR) diagram"}, {"q": "HT: What is unusual about the temperature scale on the HR diagram?", "a": "It goes from hot on lhs to cold on rhs (temperature decreases)"}, {"q": "HT: In which area of a HR diagram would you find a Red Super Giant?", "a": "Top right corner"}, {"q": "HT: In which area of a HR diagram would you find small, hot, dim stars?", "a": "Bottom left corner"}]}]}, {"name": "The Universe", "subtopics": [{"name": "2.6", "cards": [{"q": "What is a continuous spectrum?", "a": "Full rainbow"}, {"q": "How can white light be split into a continuous spectrum?", "a": "Glass prism, Diffraction grating, Spectrometer, Spectroscope"}, {"q": "What is a rainbow spectrum with dark lines across it known as?", "a": "Absorption Spectrum"}, {"q": "How are absorption lines produced?", "a": "Dust and gas absorb certain wavelengths (colour) of light which appear as dark lines at the missing wavelengths"}, {"q": "What do absorption lines tell us about a star?", "a": "Chemical composition (elements), how far away it is, how fast it's moving"}, {"q": "What is red shift?", "a": "Absorption lines on spectra from far away stars are shifted towards the red end of the spectrum"}, {"q": "Why do spectra from far away stars appear to be red shifted?", "a": "Star is moving away from us so light has stretched, wavelength increased"}, {"q": "Edwin Hubble plotted a graph of red shift against distance to a star. What did he calculate from it?", "a": "Age of the universe"}, {"q": "What does CMBR stand for?", "a": "Cosmic Microwave Background Radiation"}, {"q": "What is the CMBR?", "a": "Left over energy from Big Bang. High energy gamma rays stretched into microwaves"}, {"q": "Name 2 pieces of evidence for the Big Bang Theory", "a": "Red shift and CMBR"}, {"q": "What does red shift tell us about the Universe?", "a": "It is expanding"}]}]}, {"name": "Types of Radiation", "subtopics": [{"name": "2.7", "cards": [{"q": "What 2 things are found in the nucleus of an atom?", "a": "Protons and Neutrons"}, {"q": "When looking at an element on the periodic table which number is the nucleon number?", "a": "Top number"}, {"q": "When looking at an element on the periodic table which number is the proton number?", "a": "Bottom number"}, {"q": "What does the nucleon number tell us about the atom?", "a": "Total number of protons and neutrons in the nucleus"}, {"q": "How do you calculate the number of neutrons in an atom?", "a": "Nucleon number - Proton number (top-bottom)"}, {"q": "What is an isotope?", "a": "Atoms that are the same element, same number of protons but a different number of neutrons"}, {"q": "Why do atoms undergo radioactive decay?", "a": "Due to an imbalance in the number of protons and neutrons"}, {"q": "What are the 3 things an atom can emit when it decays?", "a": "Alpha, Beta and Gamma"}, {"q": "What is an alpha particle?", "a": "Helium nucleus (2 protons+ 2 neutrons)"}, {"q": "What is a beta particle?", "a": "High energy electron"}, {"q": "What is a gamma ray?", "a": "High energy Electromagnetic wave"}, {"q": "What is alpha absorbed by?", "a": "Paper or skin"}, {"q": "What is beta absorbed by?", "a": "Aluminium"}, {"q": "What is gamma absorbed by", "a": "Thick lead or very thick concrete"}, {"q": "Order alpha, beta, gamma from most to least penetrating", "a": "Gamma, Beta, Alpha"}, {"q": "Order alpha, beta, gamma from most to least ionising", "a": "Alpha, Beta, Gamma"}, {"q": "What does ionising mean?", "a": "Removes electrons, damages DNA and causes cancer"}, {"q": "What is the symbol for an alpha particle?", "a": "α or ⁴₂He or ⁴₂α"}, {"q": "What is the symbol for a beta particle?", "a": "β or ⁰₋₁ e or ⁰₋₁β"}, {"q": "What is the symbol for a gamma ray?", "a": "γ or ⁰ₒγ"}, {"q": "What do we do to ensure reliable results when measuring radioactivity?", "a": "Repeat it and do it over a long time period"}, {"q": "What are 4 natural sources of background radiation?", "a": "Radon gas, Cosmic rays, Rocks, Food and Buildings"}, {"q": "What are 2 artificial sources of background radiation?", "a": "Medical industry and Nuclear industry"}, {"q": "How is nuclear waste stored?", "a": "Cooled, turned into glass, put in steel drums, sealed in concrete, buried underground"}, {"q": "What are some risks with burying nuclear waste?", "a": "It could leak into the water source, stays radioactive for thousands of years, target for terrorism"}, {"q": "How is radon gas formed?", "a": "Uranium in volcanic rocks decays into radon"}, {"q": "Why is radon gas dangerous?", "a": "Alpha emitter so highly ionising and easy to breathe in"}, {"q": "Which areas of the UK have the highest radon gas levels?", "a": "Wales and Cornwall (more volcanic rocks)"}, {"q": "How can you reduce the amount of radon gas in your home?", "a": "Improve ventilation, extractor fans, air bricks for under floor ventilation"}]}]}, {"name": "Half-Life", "subtopics": [{"name": "2.8", "cards": [{"q": "What does \"radioactive decay is random\" mean?", "a": "We don't know which atom will decay next"}, {"q": "What does \"radioactive decay is spontaneous\" mean?", "a": "We don't know when an atom will decay"}, {"q": "What is half-life?", "a": "Time it takes for half of the unstable atoms to decay (time for activity to halve)"}, {"q": "What unit is used for activity?", "a": "Bq (Becquerels)"}, {"q": "After 42 days the activity of a sample decreased from 400Bq to 50Bq. What is the half-life?", "a": "400-->200-->100-->50  3 half lives = 42 days  1 half life = 42/3=14 days"}, {"q": "A sample has a half-life of 19 days. How long will it take for 75% of the sample to decay?", "a": "75%decayed = 25% left   100-->50-->25  2 half lives = 2x19=38days"}, {"q": "A sample has a half-life of 16years. If it has an original activity of 200Bq what will its activity be after 48years?", "a": "48/16=3 half lives  200-->100-->50-->25 so 25Bq left"}, {"q": "A rock once contained 1.0mg of U-238 but now has 0.25mg. The half-life is 4 billion years, how old is the rock?", "a": "1.0-->0.5-->0.25  2 half lives = 2x4 billion = 8 billion years"}, {"q": "Suggest a way of modelling radioactive decay", "a": "Throwing dice, Flipping coins etc"}, {"q": "What type of radioactive isotope is used in smoke alarms?", "a": "Alpha, can't travel through smoke so sets off alarm"}, {"q": "What type of radioactive isotope is injected directly into a tumour?", "a": "Alpha, highly ionising so kills cells but can't travel far to leave tumour"}, {"q": "What type of radioactive isotope is used to measure the thickness of aluminium sheet?", "a": "Beta, if aluminium is too thick it can't travel through"}, {"q": "What type of radioactive isotope is used in a medical tracer to monitor organs with an external camera?", "a": "Gamma, easily passes out of the body to the camera"}, {"q": "What type of radioactive isotope is used in external radiotherapy?", "a": "Gamma, easily passes through the body to the tumour"}, {"q": "Give an example of when a radioactive isotope with a long half-life is used", "a": "In a machine so it lasts for a long time"}, {"q": "Give an example of when a radioactive isotope with a short half-life is used", "a": "In the body so the patient gets a low amount of radiation"}]}]}, {"name": "Nuclear Decay and Energy", "subtopics": [{"name": "2.9", "cards": [{"q": "What is nuclear fission?", "a": "Unstable nucleus splits into smaller nuclei"}, {"q": "In a nuclear fission reactor why do neutrons need to be slowed down?", "a": "So they can be absorbed by uranium nucleus"}, {"q": "How is a chain reaction made in nuclear fission?", "a": "When a nucleus splits it releases more neutrons that go on to split other nuclei"}, {"q": "What is the role of the moderator?", "a": "Slows down the neutrons so they can be absorbed"}, {"q": "What is used as a moderator?", "a": "Water or graphite rods"}, {"q": "What is the role of the control rods?", "a": "Absorb extra neutrons to slow down the reaction"}, {"q": "What happens to the reaction if the control rods are removed?", "a": "Speeds up as there are lots of extra neutrons"}, {"q": "What happens to the reaction is the control rods are fully inserted?", "a": "Reaction stops as all neutrons are absorbed by control rods"}, {"q": "Why is the reactor surrounded in concrete?", "a": "To shield form radiation"}, {"q": "What is a disadvantage of nuclear fission power stations?", "a": "Produce radioactive waste with a long half-life"}, {"q": "What is nuclear fusion?", "a": "Small nuclei are joined together to form a larger one"}, {"q": "Where does nuclear fusion happen?", "a": "Stars"}, {"q": "What conditions are needed for nuclear fusion", "a": "High temperatures and high pressures"}, {"q": "What could be a fuel source for nuclear fusion on Earth?", "a": "Sea water (isotopes of hydrogen)"}, {"q": "What do nuclear fission and nuclear fusion power stations both have in common?", "a": "No CO2 produced"}, {"q": "Why could nuclear fusion be important in the future?", "a": "No CO2 produced and no long lived radioactive waste"}]}]}]}, {"name": "AQA GCSE Physics", "level": "GCSE", "topics": [{"name": "Skills", "subtopics": [{"name": "Working scientifically", "cards": [{"q": "Define accuracy", "a": "When a result is close to the true value"}, {"q": "Give an example of a random error", "a": "A one off error that creates anomalous data (not the same as human error)"}, {"q": "What do you do when equipment has a zero error?", "a": "Add/subtract the error value from all readings"}, {"q": "Define precision", "a": "When a set of results has a small range"}, {"q": "Define repeatable", "a": "When the original experimenter repeats the investigation using the same method and equipment and finds the same results"}, {"q": "Define reproducible", "a": "When the experiment is repeated by another person or by using different equipment and get the same results"}, {"q": "Define resolution", "a": "The smallest reading taken by a piece of equipment"}, {"q": "What is the resolution of a 30cm ruler?", "a": "1 mm"}, {"q": "What is the resolution of a standard protractor?", "a": "1 degree"}, {"q": "What is the resolution of an analogue clock?", "a": "1 sec"}, {"q": "Define independent variable", "a": "The variable that is changed"}, {"q": "Define dependent variable", "a": "The variable that is measured"}, {"q": "Define control variable", "a": "A variable that is kept the same as it would effect the dependant variable"}, {"q": "How do you calculate the uncertainty in a single date point?", "a": "± 1/2 the resolution"}, {"q": "How do you calculate the uncertainty in set of data?", "a": "± 1/2 range"}]}, {"name": "Command words", "cards": [{"q": "What do you have to do if an exam question says 'compare'?", "a": "Describe the similarities and differences between the things in the quesiton"}, {"q": "What do you have to do if an exam question says 'define'?", "a": "Write the knowledge organiser definition"}, {"q": "What do you have to do if an exam question says 'describe'?", "a": "Write down some facts, events or processes in an accurate way"}, {"q": "What do you have to do if an exam question says 'design'?", "a": "Write a method for the investigation"}, {"q": "What do you have to do if an exam question says 'determine'?", "a": "Use data/information from the question in your answer"}, {"q": "What do you have to do if an exam question says 'evaluate'?", "a": "Use the information in the question as well as your own knowledge to consider evidence for an against something"}, {"q": "What do you have to do if an exam question says 'justify'?", "a": "Use information in the question to support your answer"}, {"q": "What do you have to do if an exam question says 'predict'?", "a": "Write a possible outcome that could happen from the information given"}]}, {"name": "Prefixes", "cards": [{"q": "what does the prefix tera- (T) correspond to in standard form?", "a": "×10¹²"}, {"q": "what does the prefix giga- (G) correspond to in standard form?", "a": "×109"}, {"q": "what does the prefix mega- (M) correspond to in standard for", "a": "×106"}, {"q": "what does the prefix kilo- (k) correspond to in standard form?", "a": "×10³"}, {"q": "what does the prefix deci- (d) correspond to in standard form?", "a": "×10-1"}, {"q": "what does the prefix centi- (c) correspond to in standard form?", "a": "×10-2"}, {"q": "what does the prefix milli- (m) correspond to in standard form", "a": "×10-3"}, {"q": "what does the prefix micro- (µ) correspond to in standard form", "a": "×10-6"}, {"q": "what does the prefix nano- (n) correspond to in standard form?", "a": "×10-9"}, {"q": "What prefix can be used to represent the multiple ×10¹²?", "a": "tera- (T)"}, {"q": "What prefix can be used to represent the multiple ×109?", "a": "giga- (G)"}, {"q": "What prefix can be used to represent the multiple ×106?", "a": "mega- (M)"}, {"q": "What prefix can be used to represent the multiple ×10³?", "a": "kilo- (k)"}, {"q": "What prefix can be used to represent the multiple ×10-1?", "a": "deci- (d)"}, {"q": "What prefix can be used to represent the multiple ×10-2?", "a": "centi- (c)"}, {"q": "What prefix can be used to represent the multiple ×10-3?", "a": "milli- (m)"}, {"q": "What prefix can be used to represent the multiple ×10-6?", "a": "micro- (µ)"}, {"q": "What prefix can be used to represent the multiple ×10-9?", "a": "nano- (n)"}]}, {"name": "Conversions", "cards": [{"q": "How would you convert from cm to m?", "a": "÷100"}, {"q": "How would you convert from MW to W?", "a": "x1000000"}, {"q": "How would you convert from TJ to mJ?", "a": "x1000000000000000"}, {"q": "How would you convert from µm to fm?", "a":  "A battery is a store of __________ energy.", "a": "chemical"}, {"q": "Food is a store of __________ energy.", "a": "chemical"}, {"q": "A moving object is a store of ____________ energy", "a": "kinetic"}, {"q": "What is a gravitational potential store?", "a": "energy storred in objects raised up against the force of gravity."}, {"q": "A rock at the top of a hill is a store of ___________ energy.", "a": "gravitational potential"}, {"q": "What is an elastic potential store?", "a": "Energy stored in an object which has been stretched or compressed."}, {"q": "A compressed spring is a store of ___________ energy", "a": "elastic potential"}, {"q": "An inflated balloon is a store of __________ energy", "a": "elastic potential"}, {"q": "What is the type of energy transferred when a force moves through a distance?", "a": "Mechanical transfer"}, {"q": "Mechanical transfer is…?", "a": "The energy transfer when a force moves through a distance"}, {"q": "Electrical transfer is…?", "a": "Energy transferred when a charge moves."}, {"q": "What is the energy transferred when a charge moves?", "a": "electrical transfer"}, {"q": "What is the energy transferred by electromagnetic radiation?", "a": "Radiation transfer"}, {"q": "Radiation transfer is…?", "a": "The energy transferred by electromagnetic radiation."}, {"q": "Heat transfer is…?", "a": "Energy transferred when an object is heated."}, {"q": "When an object is heated the energy transferr is a…?", "a": "heat transfer"}, {"q": "List 4 energy stores.", "a": "Mechanical, electrical, radiation and heat."}, {"q": "The internal energy store is…", "a": "energy stored in the movement of particles."}, {"q": "The internal energy store of an object can be changed by…?", "a": "heating or cooling"}, {"q": "Define specific heat capacity", "a": "The energy needed to raise the temperature 1 kg of a material by 1ᵒC"}, {"q": "What are the units of specific heat capacity", "a": "J/kg°C"}, {"q": "What does it mean if a substance A has a higher specific heat capacity than substance B?", "a": "It takes more energy to increase its temp by 1 deg"}, {"q": "What is the difference between heat and temperature?", "a": "Heat = total energy stored in a substance Temp = measure of average kinetic energy of the particles in the substance"}, {"q": "Consider 4kg of copper and 4kg of gold, both at 50ᵒC. Which one contains the most heat energy?", "a": "gold - higher SHC"}, {"q": "SHC RPA: What piece of equipment is used to measure mass?", "a": "Balance"}, {"q": "SHC RPA: What piece of equipment is used to measure the energy transferred?", "a": "Joulemeter"}, {"q": "SHC RPA: What piece of equipment is used to measure temp?", "a": "Thermometer"}, {"q": "SHC RPA: What values do you plot on the graph?", "a": "x: energy transferred y: temperature"}, {"q": "SHC RPA: What variables need to be controlled in this experiment?", "a": "Voltage of powerpack, Duration of practical, energy transfer to the surroundings"}]}, {"name": "Conservation and dissipation of energy", "cards": [{"q": "What is the equation for calculating efficiency from energy?", "a": "Efficiency = useful energy output/total energy input"}, {"q": "What is the equation for calculating efficiency from power?", "a": "Efficiency = useful power output/useful power input"}, {"q": "What is the law of conservation of energy?", "a": "Energy cannot be created and destroyed but only transferred from one store to another."}, {"q": "What term is used to describe energy becoming spread out or transferred to a \"wasted\" store?", "a": "dissipation"}, {"q": "What term is used to describe a method for reducing unwanted energy transfers by reducing friction?", "a": "lubrication"}, {"q": "What is a thermal insulator?", "a": "A non-conductive material which reduces thermal energy transfers."}, {"q": "What is the name for a method of reducing energy transfers by the use of non-conductive materials?", "a": "insulation"}, {"q": "How does the thermal conductivity of the walls affect a building’s rate of cooling?", "a": "High TC means high rate of ET"}, {"q": "How does the thickness of the walls affect a building’s rate of cooling?", "a": "Thick = slow"}, {"q": "Types of insulation RPA: What are the IV, DV and CV?", "a": "IV: Type of insulation DV: Temp CV: Amount of water, duration of prac, start temp of water, amount of insulation"}, {"q": "Insulation thickness RPA: What are the IV, DV and CV?", "a": "IV: Number of layers, DV: Temperature CV: Amount of water, duration of prac, type of insulation"}, {"q": "Types of insulation RPA: What values are plotted on the graph?", "a": "X: Time Y: Temperature"}, {"q": "Types of insulation RPA: How can you make the experiment vaild?", "a": "Repeat each material 3 times and find a mean, Use a digital thermometer with a higher resolution to make it more accurate"}, {"q": "SHC RPA: Why do you wrap the sample in insulation?", "a": "To reduce unwanted energy transfers to the surroundings"}, {"q": "What is the definition of power?", "a": "Power is the rate of transfer of energy or the rate of doing work"}, {"q": "What does the efficiency of an appliance tell us?", "a": "The proportion of the input energy/power that is transferred in a useful way"}, {"q": "Define Efficiency", "a": "The proportion of input energy that is transferred usefully within a system"}]}, {"name": "National and global energy resources", "cards": [{"q": "Name two non-renewable energy resources", "a": "Fossil fuels, nuclear fuel"}, {"q": "What are some advantages of fossil fuels as an energy resource?", "a": "reliable, cheap"}, {"q": "What is a reliable energy source", "a": "one which can produce energy all the time."}, {"q": "What are some disadvantages of fossil fuels?", "a": "carbon dioxide (greenhouse gas) produced leading to global warming. Can produce sulphur dioxide causing acid rain."}, {"q": "What are some advantages of nuclear fuel?", "a": "No carbon dioxide produced, reliable."}, {"q": "What are some disadvantages of nuclear fuel?", "a": p: a circle with a cross inside.", "d": "sym:lamp"}, {"q": "Draw the circuit symbol for a fuse", "a": "Fuse: a rectangle with a line running straight through it.", "d": "sym:fuse"}, {"q": "Draw the circuit symbol for a voltmeter", "a": "Voltmeter: a circle with a V inside; connected in parallel.", "d": "sym:voltmeter"}, {"q": "Draw the circuit symbol for an ammeter", "a": "Ammeter: a circle with an A inside; connected in series.", "d": "sym:ammeter"}, {"q": "Draw the circuit symbol for a thermistor", "a": "Thermistor: a resistor rectangle with a diagonal line ending in a horizontal foot.", "d": "sym:thermistor"}, {"q": "Draw the circuit symbol for an LDR", "a": "LDR: a resistor in a circle with two arrows pointing in (light in).", "d": "sym:ldr"}, {"q": "Electric Current is….?", "a": "the flow of electric charge"}, {"q": "Potential difference between two points in a circuit is….?", "a": "the work done when a couloumb of charge passes between the points."}, {"q": "In a circuit the potential difference causes …..?", "a": "charge to flow"}, {"q": "Resistance is…?", "a": "caused by anything which opposes the flow of electric charge"}, {"q": "Particles which can be 'charges' in electric circuits are…", "a": "electrons or ions"}, {"q": "Define voltage", "a": "The amount of energy per unit charge"}, {"q": "Define current", "a": "The rate of flow of charge"}, {"q": "Define resistance", "a": "How difficult it is for charge to flow"}, {"q": "What is an ammeter?", "a": "A device used to measure current"}, {"q": "What is a voltmeter?", "a": "A device used to measure potential difference"}, {"q": "Define potential difference", "a": "The amount of energy per unit charge across a device"}, {"q": "What are the 4 factors that effect the resistance of a wire?", "a": "Length, cross section, material and temperature"}, {"q": "Why are metals good conductors?", "a": "They have delocalised electrons"}, {"q": "Resistance RPA: What are the IV, DV and CV?", "a": "IV: Length of wire, DV: Resistance of wire, CV: cross section, temp of wire"}, {"q": "Resistance RPA: Name a safety concern related to this practical", "a": "Burns - hot wire. Turn of equipment between readings"}, {"q": "Resitance RPA: State two reasons why we turn the equipment off between readings", "a": "1) To try and control the temperature of a wire (CV) 2) So the wire doesn’t get hot so that you down burn yourself"}, {"q": "Resitance RPA: What values are plotted on the graph?", "a": "x: Length y: resistance"}, {"q": "Resitance RPA: What is the relationship between length and resistance?", "a": "Directly proportional"}, {"q": "Resitance RPA: How do you know the relationship between length and resistance is directly proportional?", "a": "The graph is a straight line through origin"}, {"q": "What is Ohms law?", "a": "The potential difference across a component is directly proportional to current through it"}, {"q": "What is an ohmic conductor?", "a": "A component that has a fixed resistance at a constant temp"}, {"q": "What is an LDR?", "a": "Device where the resistance decreases when the brightness increases"}, {"q": "What is a thermiser?", "a": "Device where the resistance decreases when the temp increases"}, {"q": "What is a diode?", "a": "Device that only allows current to flow in one direction"}, {"q": "What is the relationship between resistance and light intensity in an LDR?", "a": "Light increase, resistance decreases"}, {"q": "What is the relationship between resistance and temp in a thermistor?", "a": "Hotter = lower resistance"}, {"q": "Draw the I-V characteristic for a fixed resistor", "a": "Ohmic conductor / fixed resistor: a straight line through the origin (I ∝ V).", "d": "iv:ohmic"}, {"q": "Draw the I-V characteristic for a filament lamp see", "a": "Filament lamp: an S-shaped curve — gradient falls as it heats and resistance rises.", "d": "iv:lamp"}, {"q": "Draw the I-V characteristic for a diode", "a": "Diode: ~no current until the threshold voltage, then a sharp rise (almost none in reverse).", "d": "iv:diode"}, {"q": "Describe the I-V characteristic for a fixed resistor", "a": "Current and potential difference are directly proportional, resistance is constant", "d": "iv:ohmic"}, {"q": "Describe the I-V characteristic of a filament lamp", "a": "Resistance is not constant, it increases as p.d. increases", "d": "iv:lamp"}, {"q": "Explain why resistance increases with increased p.d. in a filament lamp", "a": "temperature increases causing ions to vibrate and increasing collisions with electrons flowing through the filament"}, {"q": "Describe the I-V characteristic of a diode", "a": "The current only flows through the diode in one direction, there is a very high resistance in the reverse direction.", "d": "iv:diode"}, {"q": "The _________ wire is a safety feature of appliances", "a": "earth"}, {"q": "IV RPA: What is the role of a variable resistor?", "a": "Allows you to control the current in the circuit by changing the resistance"}, {"q": "IV RPA: What are the IV, DV and CV?", "a": "IV: Current, DV: Potential difference, CV: temp"}]}, {"name": "Series and parallel circuits", "cards": [{"q": "What is a series circuit?", "a": "A circuit with only one route for charge to flow"}, {"q": "What is a parallel circuit?", "a": "A circuit with more than one route for charge to flow"}, {"q": "How do you calculate the resistance in a series circuit?", "a": "Resistance adds up"}, {"q": "State the rule for current in a series circuit", "a": "the current is the same at every point in the circuit and in every component"}, {"q": "State the rule for potential difference in a series circuit", "a": "the total potential difference of the power supply is shared between components"}, {"q": "State the rule for resistance in a series circuit", "a": "the more resistors, the greater the resistance. RT=R1+R2"}, {"q": "State the rule for current in a parallel circuit", "a": "the total current through the whole circuit is the sum of the currents through the separate
