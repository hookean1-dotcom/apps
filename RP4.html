tion of travel of the wave"}, {"q": "Give an example of a transverse wave", "a": "Light, EM spectrum, S Seismic waves"}, {"q": "Give an example of a longitudinal wave", "a": "Sound waves, Pressure waves, P seismic waves"}, {"q": "What is the definition of wavelength?", "a": "Minimum distance between two points on a wave oscillating in phase (length of one complete oscillation)"}, {"q": "What is the definition of frequency?", "a": "Number of oscillations of a wave per second"}, {"q": "What is the amplitude of a wave?", "a": "Distance from the middle of the wave to the top"}, {"q": "What does it mean if waves are \"in phase\"?", "a": "Waves have the same frequency and are at the same point in their cycles at the same time"}, {"q": "What is phase difference?", "a": "Difference in position of 2 points within a cycle of oscillation"}, {"q": "If point B is a whole cycle ahead of point A what is their phase difference?", "a": "2π radians or 360°  or in phase"}, {"q": "If point B is half a wavelength ahead of point A what is their phase difference?", "a": "π radians or 180°  or in antiphase"}, {"q": "What is the wave equation?", "a": "c = f λ"}, {"q": "What is a polarised wave?", "a": "A transverse wave in which particle oscillations occur in only one of the directions at right angle to direction of propagation"}]}]}, {"name": "Wave Properties", "subtopics": [{"name": "2.5", "cards": [{"q": "What is the definition of diffraction?", "a": "Spreading out of waves when they meet obstacles"}, {"q": "What is the relationship between the amount of diffraction and the slit size?", "a": "If λ is equal to or great than the width of the slit there is more diffraction (semi-circular wavefronts)"}, {"q": "What is the principle of superposition?", "a": "If two wave sources occupy the same region then the total displacement at any point is the vector sum of their displacements"}, {"q": "If two waves arrive at a point in phase what type of interference occurs?", "a": "Constructive"}, {"q": "If two waves arrive at a point in antiphase what type of interference occurs?", "a": "Destructive"}, {"q": "What is the definition of coherence?", "a": "Waves which has a constant phase difference and same frequency"}, {"q": "Give an example of a coherent light source", "a": "A laser"}, {"q": "Give an example of an incoherent light source", "a": "Light bulb"}, {"q": "In Young's double slit experiment what is shown by bright fringes?", "a": "Constructive Interference"}, {"q": "In Young's double slit experiment what is shown by dark fringes?", "a": "Destructive Interference"}, {"q": "What is the equation used to find the wavelength of light in Young's double slit experiment?", "a": "λ = aΔy/D where Δy = fringe separation   a = distance between centre of slits and D = distance from slits to screen"}, {"q": "Calculate λ if fringe width = 0.50mm on a screen 60cm from two slits 0.75mm apart", "a": "λ = 6.25x10⁻⁷m"}, {"q": "When a diffraction grating is used with a light source what is the central bright fringe called?", "a": "Central maximum (zero order)"}, {"q": "What is the definition of a stationary (or standing) wave?", "a": "A pattern of disturbances in which energy is not propagated"}, {"q": "How is a stationary wave produced?", "a": "Superposition of two progressive waves of equal amplitude and frequency travelling in opposite directions"}, {"q": "What is a node?", "a": "Point where amplitude of stationary wave is zero"}, {"q": "What is an anti-node?", "a": "Point where amplitude of stationary wave is a maximum"}]}]}, {"name": "Refraction of Light", "subtopics": [{"name": "2.6", "cards": [{"q": "What is the law of reflection?", "a": "angle of incidence = angle of reflection"}, {"q": "What type of barrier causes reflected waves to converge at a point?", "a": "Curved (concave) barrier like a satellite dish"}, {"q": "What is the bending of light called?", "a": "refraction"}, {"q": "Why does light bend when it enters a glass block?", "a": "slows down as it enters a more dense material"}, {"q": "What is Snell's law?", "a": "At a boundary between two materials the ratio of sin(i) to sin(r) is a constant"}, {"q": "What is the definition of refractive index?", "a": "n = speed of light in a vacuum / speed of light in the medium"}, {"q": "Put these materials in order from highest to lowest refractive index: glass, air, diamond, water", "a": "Diamond, Glass, Water, Air"}, {"q": "What does TIR stand for?", "a": "Total Internal Reflection"}, {"q": "What are the two conditions for TIR?", "a": "angle of incidence greater than critical angle and travelling in more dense material towards less dense material"}, {"q": "What is the definition for the critical angle?", "a": "The largest angle of incidence for which refraction can occur at 90° to the normal"}, {"q": "What happens if angle of incidence is smaller than critical angle?", "a": "Refraction"}, {"q": "What happens if angle of incidence is equal to critical angle?", "a": "Travel along boundary (maximum refraction)"}, {"q": "What happens if angle of incidence is larger than critical angle?", "a": "Total Internal Reflection"}, {"q": "n1 = 1.5  n2 =  1  what is the critical angle?", "a": "θc = 41.8°"}, {"q": "What type of optical fibre has a small core diameter so the only possible path through is along its axis?", "a": "Monomode (single mode)"}, {"q": "What is the advantage of monomode fibres over multimode fibres?", "a": "Data doesn't travel on different paths and arrive at different times so there is no overlapping/smearing/muddling of data"}, {"q": "What is multimode dispersion?", "a": "Light takes different paths which arrive at different times and light spreads out"}, {"q": "How can multimode dispersion be reduced?", "a": "Cladding and Using angles close to critical angle to cut down range of paths"}]}]}, {"name": "Photons", "subtopics": [{"name": "2.7", "cards": [{"q": "What is a photon?", "a": "Packet (of bundle) of light"}, {"q": "What equation links the energy of a photon with frequency?", "a": "E = hf   or E = hc/λ"}, {"q": "What does h stand for in E = hf?", "a": "Planck constant = 6.63x10⁻³⁴ Js"}, {"q": "A blue LED emits light λ=430nm. Calculate the energy of each photon emitted", "a": "E = 4.63x10⁻¹⁹ J"}, {"q": "A red LED emits light λ=620nm and has a power of 0.5mW how many photons are emitted per second?", "a": "E = 3.21x10⁻¹⁹ J   Total number of photons = 1.56x10¹⁵"}, {"q": "What is the definition of an electronvolt?", "a": "Energy transferred when an electron moves between two point with a pd of 1V"}, {"q": "How many Joules are in 1eV?", "a": "1eV = 1.60x10 J⁻¹⁹"}, {"q": "How many electronvolts are in 8.0x10⁻¹⁸ J?", "a": "50eV"}, {"q": "Write the EM spectrum in order from longest to shortest wavelength", "a": "Radio, Microwave, Infrared, Visible, Uv, Xray, Gamma"}, {"q": "What do all EM waves have in common?", "a": "Travel at the same speed, all transverse waves"}, {"q": "Which EM wave as the longest wavelength/lowest frequency?", "a": "Radio"}, {"q": "Which EM wave as the shortest wavelength/highest frequency?", "a": "Gamma"}, {"q": "What are the wavelengths of the visible spectrum?", "a": "400-700nm"}, {"q": "What is a typical wavelength of a gamma ray?", "a": "10⁻¹² m"}, {"q": "What is a typical wavelength of a microwave?", "a": "10⁻² m"}, {"q": "What is a typical wavelength of a radio wave?", "a": "10² m"}, {"q": "What is the photoelectric effect?", "a": "When light of a short enough wavelength falls on a surface, electrons are emitted from the surface"}, {"q": "What is the work function?", "a": "The minimum energy needed to remove an electron from the surface"}, {"q": "What is the symbol for the work function?", "a": "φ"}, {"q": "What equation links kinetic energy and the work function?", "a": "Ek (max) = hf - φ"}, {"q": "On a graph of frequency (x axis) against Ek max (y axis) how would you find h and φ?", "a": "y intercept = φ   gradient = h"}, {"q": "What is the definition of ionisation?", "a": "The removal of one or more electron from an atom"}, {"q": "What is the definition of ionisation energy?", "a": "Minimum energy needed to remove and electron from the atom in its ground state"}, {"q": "Calculate the wavelength of a photon required to ionise an atom if the energy gap is 16.3eV", "a": "λ = 9.14x10⁻⁸m"}, {"q": "What name is given to the effect that light behaves in different ways?", "a": "Wave-particle duality"}, {"q": "What is de Broglie's equation linking photon wavelength to momentum?", "a": "p = h / λ"}, {"q": "Calculate the de Broglie wavelength of an electron moving at 10% the speed of light", "a": "λ = 2.43x10⁻¹¹ m"}, {"q": "Calculate the effective mass of a photon of red light with wavelength 700nm", "a": "m = 3.16x10⁻³⁶ kg"}]}]}, {"name": "Lasers", "subtopics": [{"name": "2.8", "cards": [{"q": "What does LASER stand for?", "a": "Light Amplification by Stimulated Emission of Radiation"}, {"q": "What happens to an electron when a photon is absorbed?", "a": "Electron is excited to a higher energy level"}, {"q": "What happens to an electron when a photon is emitted?", "a": "Electron drops down to a lower energy level"}, {"q": "What is the definition of stimulated emission?", "a": "Emission of a photon from an excited atom triggered by passing a photon of equal energy to energy gap"}, {"q": "During stimulated emission how are the emitted photon and passing photon similar?", "a": "Same frequency, same phase, same direction of travel  (coherent)"}, {"q": "What is the definition of a population inversion?", "a": "When a higher energy state is more heavily populated than a lower energy state in a system"}, {"q": "What does N2 > N1 tell us about the energy states in a system?", "a": "Population inversion"}, {"q": "What is the definition of pumping?", "a": "Feeding energy into the amplifying medium of a laser to produce a population inversion"}, {"q": "Why is a population inversion not usually possible if there are only 2 energy levels?", "a": "Incoming photon is just as likely to stimulate emission as it is to be absorbed by a low energy electron"}, {"q": "Why is a 4 energy level laser system better than a 3 energy level laser system?", "a": "More efficient, less pumping required (E2 is as depopulated as possible)"}, {"q": "State 4 ways in which light from lasers differs from normal light?", "a": "Polarised, coherent, monochromatic, parallel beam"}, {"q": "Why do lasers contain a partially reflective mirror?", "a": "To reflect photons back and forth to produce more photons and let out 1% of light each time"}, {"q": "What problem is caused by high intensity pumping?", "a": "It gets very hot and so isn't efficient"}, {"q": "Give two advantages of a semiconductor laser", "a": "Cheap, Small, More efficient, Easy to mass produce"}, {"q": "Give two uses of a semiconductor laser", "a": "DVD players, Barcode readers, Telecommunications, Laser surgery, Image scanning"}]}]}, {"name": "Circular Motion", "subtopics": [{"name": "3.1", "cards": [{"q": "What is the definition of frequency?", "a": "Number of cycles (oscillations) per second"}, {"q": "What is the definition of period?", "a": "Time taken for one complete cycle (oscillation)"}, {"q": "A drill rotates at 600rpm. What's the period?", "a": "T = 0.1s"}, {"q": "What is the definition of angular velocity?", "a": "For an object moving in a circle at uniform speed will rotate through an angle θ in time t (ω = Δθ/Δt)"}, {"q": "What is the symbol and unit for angular velocity?", "a": "ω  unit = rad s⁻¹"}, {"q": "What is the definition of a radian?", "a": "A unit to measure angles equal to 57.3° ("}, {"q": "How many degrees and radians is one complete cycle?", "a": "360° = 2π rad"}, {"q": "What is 1.4 radians in degrees?", "a": "80.2°"}, {"q": "What is 30° in radians?", "a": "0.52 rad"}, {"q": "What equation links angular velocity to frequency?", "a": "ω = 2πf"}, {"q": "Calculate the angular velocity of the second hand on a clock", "a": "ω = 0.105 rads⁻¹"}, {"q": "What equation can be used to find the angle swept out by an arc?", "a": "θ = arc length / radius          θ = s/r"}, {"q": "A 1.32m long thread is wound around a tube with circumference 0.48m. Calculate angle subtended by whole thread.", "a": "5.5π = 990°"}, {"q": "What can angular velocity also be called?", "a": "Angular frequency or angular speed"}, {"q": "What equation links velocity to angular velocity?", "a": "v = ωr"}, {"q": "Why is an object travelling in a circular path accelerating even if it has a constant speed?", "a": "Because it constantly changes direction, so changes velocity and acceleration = change in velocity / time"}, {"q": "What 2 equations can be used to find centripetal acceleration?", "a": "a = v²/r  or a = ω²r"}, {"q": "What 2 equations can be used to find the centripetal force?", "a": "F = mv²/r   or  F = mω²r"}, {"q": "At the top of a loop the loop what forces contribute to the centripetal force?", "a": "Weight and normal reaction forces both act downwards"}, {"q": "At the bottom of a loop the loop what forces contribute to the centripetal force?", "a": "Normal reaction force only. Weight acts in opposite direction"}, {"q": "On a merry-go-round what forces contribute to the centripetal force?", "a": "Friction only"}, {"q": "A 32.5kg child on a merry-go-round 1.72m from centre generates a maximum friction of 114N. Calculate the maximum angular velocity before they fall off", "a": "ω= 1.43 rads⁻¹"}]}]}, {"name": "Vibrations", "subtopics": [{"name": "3.2", "cards": [{"q": "What does centripetal mean?", "a": "Towards the centre"}, {"q": "What is the definition of simple harmonic motion?", "a": "acceleration is always directed toward and is proportional to the distance from a fixed point (a = -ω²x)"}, {"q": "What is the acceleration of an object with SHM when it passes through equilibrium?", "a": "a = 0"}, {"q": "What is the simple harmonic motion equation?", "a": "a = -ω²x"}, {"q": "At what point does an object with SHM have a maximum acceleration?", "a": "At a maximum displacement (Amplitude)"}, {"q": "What is the definition of amplitude?", "a": "Maximum displacement from equilibrium position"}, {"q": "What does ε stand for in the equation x = A cos (ωt+ε)?", "a": "Phase angle (phase constant)"}, {"q": "Draw a displacement-time graph for an object with SHM", "a": "cos graph"}, {"q": "Draw a velocity-time graph for an object with SHM", "a": "- sin graph"}, {"q": "Draw an acceleration-time graph for an object with SHM", "a": "-cos graph"}, {"q": "Show that a simple pendulum undergoes SHM", "a": "a = -gx/l  so ω² = g/l"}, {"q": "What equation links the period of a pendulum to its length?", "a": "T = 2π √(l/g)"}, {"q": "Show that a mass on a spring undergoes SHM", "a": "a = -kx/m so ω² = k/m"}, {"q": "What equation links the period of a mass on a spring to its mass?", "a": "T = 2π √(m/k)"}, {"q": "A 0.5kg mass is attached to a spring where k=200Nm⁻¹ and displaced 2mm. Calculate the frequency of oscillation and the number of vibrations per minute", "a": "T = 0.31s   f = 3.18Hz   191rpm"}, {"q": "What is g on the Moon if a pendulum has length 62mm and completes 20 oscillations in 24.5s?", "a": "T = 1.225s     g = 1.6ms⁻²"}, {"q": "What is the definition of free oscillations?", "a": "When a system is displaced and then released"}, {"q": "Describe the energy changes as a pendulum oscillates", "a": "Max displacement has max PE and zero KE, PE decreases and KE increases as moves to equilibrium etc"}, {"q": "What is the definition of damping?", "a": "The dying away due to resistive forces of the amplitude of free oscillations"}, {"q": "What is the definition of critical damping?", "a": "When resistive forces are just large enough to prevent oscillations occurring"}, {"q": "What type of damping causes the system to take a long time to return to equilibrium?", "a": "Overdamping"}, {"q": "Give an example of light damping", "a": "Air resistance slows down pendulum etc"}, {"q": "Give an example of heavy damping", "a": "Swinging doors, mattress springs, bouncy castle"}, {"q": "Give an example of critical damping", "a": "Car suspension, speedometer, old ammeters with needle"}, {"q": "Give an example of overdamping", "a": "Earthquake protection in skyscrapers, door closing systems"}, {"q": "Why do suspension systems need to have critical damping?", "a": "To regain control asap. So bumps aren't too hard (overdamp) and don't bounce up and down lots (light/heavy damping)"}, {"q": "What is the definition of forced oscillations?", "a": "When a driving force is applied to cause oscillations with the applied/driving frequency"}, {"q": "What is resonance?", "a": "When natural frequency equals the driving frequency oscillations have a large amplitude"}, {"q": "Draw a resonance curve", "a": "Tall thin spike at natural frequency"}, {"q": "Describe what happens to a resonance curve is the oscillation is damped", "a": "Amplitude decreases, peak broadens, frequency of max amplitude decreases"}, {"q": "Give 2 examples of when resonance is useful", "a": "Microwave ovens, Circuit tuning (Radios), MRI, lasers"}, {"q": "Give an example of when resonance can be dangerous", "a": "Bridges"}]}]}, {"name": "Kinetic Theory", "subtopics": [{"name": "3.3", "cards": [{"q": "What is the definition of a mole?", "a": "The amount of substance that contains as many particles as 12g of Carbon-12"}, {"q": "What is 6.02x10²³ particles?", "a": "Avogadro's constant NA = number of particles in 1 mol"}, {"q": "What is the mass of one mole of a substance called?", "a": "Molar mass (found on periodic table mass number)"}, {"q": "What is an atomic mass unit?", "a": "u = 1.66x10⁻²⁷ kg 1/12 of the mass of carbon-14 (mass of a proton/neutron)"}, {"q": "What is the molecular mass of Oxygen in kg?", "a": "Mr = 16 x 1.66x10⁻²⁷ = 2.66x10⁻²⁶ kg"}, {"q": "What is the atomic mass number, molar mass and molecular mass for U-235?", "a": "Atomic mass = 235 Molar mass = 235gmol⁻¹  Molecular mass = 3.901x10⁻²⁵ kg"}, {"q": "What is the molecular mass of sulfuric acid (H2SO4)?", "a": "Mr = (1x+2)+32+(16x4) = 98u = 1.63x10⁻²⁵kg"}, {"q": "What equation links moles with total mass?", "a": "moles = total mass / molar mass    n = m/M"}, {"q": "What equation links Avogadro's constant to the number of moles?", "a": "moles = number of particles / number of particles in 1 mole     n = N/NA"}, {"q": "How many molecules are there in 20kg of oxygen gas (O2)?", "a": "molar mass = 0.032kgmol⁻¹  n = 625mol   N = 3.76x10²⁶"}, {"q": "What name is given to the theory that describe gas as particles constantly moving in random directions?", "a": "Kinetic theory"}, {"q": "What causes gas pressure?", "a": "Particles collide with surface of an object and exert a force which creates a pressure"}, {"q": "Give 2 assumptions of kinetic theory", "a": "Particles constantly move, travel in random directions, travel in straight lines, don't lose energy in collisions"}, {"q": "What happens to pressure when volume increases?", "a": "Pressure decreases at a decreasing rate because there is more room so less collisions"}, {"q": "What happens to pressure when temperature increases?", "a": "Pressure increases (directly proportional) because more energy and more collisions"}, {"q": "What happens to volume when temperature increases?", "a": "Volume increases (directly proportional) because energy increases so particles move further apart"}, {"q": "What name is given to the temperature where particles have no energy and exert no pressure?", "a": "Absolute zero"}, {"q": "What temperature is absolute zero?", "a": "0 kelvin = -273.15 degrees celsius"}, {"q": "What is 25deg celsius in kelvin?", "a": "298.15K"}, {"q": "What is an ideal gas?", "a": "A gas that obeys pV=nRT"}, {"q": "What is the ideal gas equation?", "a": "pV=nRT"}, {"q": "What is the molar gas constant?", "a": "R = 8.31 Jmol⁻¹K⁻¹"}, {"q": "Give 2 assumptions of the behaviour of an ideal gas", "a": "Elastic collisions, particles exert forces only when they collide, particles have negligible volume"}, {"q": "T1 = 18°C  P1 = 100kPa    T2 = 220°C   Calculate P2", "a": "P2 = 169.4kPa"}, {"q": "What equation links the molar gas constant with the Boltzmann constant?", "a": "k = R /NA"}, {"q": "What is mean square speed?", "a": "Average of the squares of the speeds"}, {"q": "Calculate the mean square speed: 310    320    330   340   350", "a": "109,100 ms⁻¹"}, {"q": "What does rms speed stand for?", "a": "Root mean square speed"}, {"q": "How do you find the internal energy of a gas?", "a": "U = 3/2 nRT"}, {"q": "How do you find the kinetic energy of each particle of gas?", "a": "KE = 3/2 kT"}, {"q": "Calculate the mean kinetic energy and rms speed of a nitrogen molecule at 300K", "a": "KE = 6.21x10⁻²¹ J     rms speed = 517ms⁻¹"}]}]}, {"name": "Thermal Physics", "subtopics": [{"name": "3.4", "cards": [{"q": "What is a system?", "a": "A collection of particles inside a boundary"}, {"q": "What is the definition for internal energy of a system?", "a": "Sum of kinetic and potential energy of the particles in a system"}, {"q": "What is the symbol for internal energy of a system?", "a": "U"}, {"q": "Calculate the internal energy of 3 moles of gas at 300K", "a": "U = 11.2kJ"}, {"q": "What is the definition of heat?", "a": "Energy flow from a high temperature region to a low temperature region due to the temperature difference"}, {"q": "What is the symbol for heat?", "a": "Q"}, {"q": "Why can a system not have heat?", "a": "Heat is the flow of energy in and out"}, {"q": "What is the definition of work?", "a": "work is the energy done on or by a system equal to pΔV (energy transferred)"}, {"q": "What is the symbol for work?", "a": "W"}, {"q": "What is meant by thermal equilibrium?", "a": "Two systems in thermal contact exchange no heat as they are the same temperature"}, {"q": "What is the first law of thermodynamics?", "a": "ΔU = Q - W   change in internal energy equal heat entering system minus work done by the system"}, {"q": "How can work be found on a p-V graph?", "a": "Area under the graph"}, {"q": "What shape is a p-V graph is a change occurs at a constant temperature (isothermal)?", "a": "Curved"}, {"q": "What does it mean if W is negative?", "a": "Work is done on the gas (gas is compressed)"}, {"q": "3mol of gas is heated from 300K to 400K at constant pressure. Calculate ΔU, W and Q", "a": "ΔU = 3739.5J  W = 2493J  Q = 6232.5J"}, {"q": "What is specific heat capacity?", "a": "Amount of heat energy needed to increases the temperature of 1kg by 1degree"}, {"q": "What is the specific heat capacity equation?", "a": "Q = m c Δϴ"}, {"q": "What symbol is used to represent temperature?", "a": "ϴ"}, {"q": "What are the units of specific heat capacity?", "a": "J kg⁻¹ K⁻¹"}, {"q": "Describe the changes shown by a vertical upwards arrow on a p-V graph", "a": "pressure increases at a constant volume so temperature must increase"}, {"q": "Describe the changes shown by a horizontal arrow to the right on a p-V graph", "a": "volume increases at a constant pressure so temperature must increase"}, {"q": "What is the work done for a vertical upwards arrow on a p-V graph?", "a": "zero"}, {"q": "If a p-V graph creates a closed loop how can you find the work done?", "a": "Area inside the loop"}]}]}, {"name": "Nuclear Decay", "subtopics": [{"name": "3.5", "cards": [{"q": "What 2 things are found in the nucleus of an atom?", "a": "Protons and Neutrons"}, {"q": "When looking at an element on the periodic table which number is the nucleon number?", "a": "Top number"}, {"q": "When looking at an element on the periodic table which number is the proton number?", "a": "Bottom number"}, {"q": "What does the nucleon number tell us about the atom?", "a": "Total number of protons and neutrons in the nucleus"}, {"q": "How do you calculate the number of neutrons in an atom?", "a": "Nucleon number - Proton number (top-bottom)"}, {"q": "What is an isotope?", "a": "Atoms that are the same element, same number of protons but a different number of neutrons"}, {"q": "Why do atoms undergo radioactive decay?", "a": "Due to an imbalance in the number of protons and neutrons"}, {"q": "What are the 3 things an atom can emit when it decays?", "a": "Alpha, Beta and Gamma"}, {"q": "What is an alpha particle?", "a": "Helium nucleus (2 protons+ 2 neutrons)"}, {"q": "What is a beta particle?", "a": "High energy electron"}, {"q": "What is a gamma ray?", "a": "High energy Electromagnetic wave"}, {"q": "What is alpha absorbed by?", "a": "Paper or skin"}, {"q": "What is beta absorbed by?", "a": "Aluminium"}, {"q": "What is gamma absorbed by", "a": "Thick lead or very thick concrete"}, {"q": "Order alpha, beta, gamma from most to least penetrating", "a": "Gamma, Beta, Alpha"}, {"q": "Order alpha, beta, gamma from most to least ionising", "a": "Alpha, Beta, Gamma"}, {"q": "What does ionising mean?", "a": "Removes electrons, damages DNA and causes cancer"}, {"q": "What is the symbol for an alpha particle?", "a": "α or ⁴₂He or ⁴₂α"}, {"q": "What is the symbol for a beta particle?", "a": "β or ⁰₋₁ e or ⁰₋₁β"}, {"q": "What is the symbol for a gamma ray?", "a": "γ or ⁰ₒγ"}, {"q": "What do we do to ensure reliable results when measuring radioactivity?", "a": "Repeat it and do it over a long time period"}, {"q": "What type of decay occurs when a neutron changes into a proton, electron and electron neutrino?", "a": "Beta decay"}, {"q": "When measuring the radioactivity of sources what measurement should be taken first?", "a": "Background radiation with no absorbed in place"}, {"q": "When using a magnetic field to identify radiation which type of radiation has the largest deflection?", "a": "Beta as it has less mass"}, {"q": "When using a magnetic field to identify radiation which type of radiation is not deflected?", "a": "Gamma rays as they have no charge"}, {"q": "What does T½ stand for?", "a": "Half life"}, {"q": "What is the definition of half life?", "a": "Time taken for the number of radioactive nuclei (or activity) to halve"}, {"q": "What is the definition of activity?", "a": "Rate of decay of a sample of radioactive nuclei"}, {"q": "What unit is used for activity?", "a": "Bq (Becquerel)"}, {"q": "What is the decay constant?", "a": "λ determines the rate of decay (bigger λ means more rapid decay)"}, {"q": "What is the decay equation linking activity and number of unstable nuclei?", "a": "A = - λN"}, {"q": "What equation links half life and the decay constant?", "a": "λ = ln2 / T½"}, {"q": "In the equation N = N0 / 2x what does x represent?", "a": "The number of half-lives that have passed"}]}]}, {"name": "Nuclear Energy", "subtopics": [{"name": "3.6", "cards": [{"q": "What are the units of mass-energy?", "a": "kg or J"}, {"q": "What is the conservation of mass-energy?", "a": "Energy cannot be lost or gained, only transferred from one form to another"}, {"q": "What is the definition of binding energy?", "a": "Energy needed to dissociate a nucleus into its constituent nucleons"}, {"q": "How do you calculate the binding energy?", "a": "Find the mass defect then use E=mc2"}, {"q": "What is 1u equivalent to in eV?", "a": "1 u = 931 MeV"}, {"q": "Sketch a binding energy graph", "a": "Steep straight line, then curve downwards slowly, labelled Fusion left of peak and Fission right of peak"}, {"q": "What is nuclear fusion?", "a": "Smaller nuclei are fused together to make heavier elements"}, {"q": "What is nuclear fission?", "a": "Heavy nucleus splits into smaller nuclei"}, {"q": "What is the most stable nuclei?", "a": "Iron / Nickel"}, {"q": "Which elements undergo fusion?", "a": "Elements lighter than iron"}, {"q": "Which elements undergo fission?", "a": "Elements heavier than iron"}]}]}, {"name": "Capacitance", "subtopics": [{"name": "4.1", "cards": [{"q": "What is a capacitor?", "a": "A pair of conducting plates separated by an insulator. If a pd is placed across them they acquire equal and opposite charges"}, {"q": "What is the definition of capacitance?", "a": "capacitance = charge on either plate/potential difference between plates   C=Q/V"}, {"q": "What is the unit of capacitance?", "a": "F (Farad)"}, {"q": "What is the symbol for a capacitor?", "a": "˧ Ͱ"}, {"q": "What is the definition of a dielectric?", "a": "Insulator between the plates of a capacitor"}, {"q": "What equation links capacitance to the area of the plates?", "a": "C = ε0A/d"}, {"q": "A parallel plate capacitor with separation 1.5mm has a capacitance of 3μF calculate the area", "a": "A = 508m²"}, {"q": "How can the energy stored by a capacitor be found from a Q-V graph?", "a": "Area under the graph"}, {"q": "What is the equation for energy stored in a capacitor?", "a": "U = ½ QV"}, {"q": "Describe the electric field between the plates of a parallel plate capacitor", "a": "Uniform, equally spaced parallel lines"}, {"q": "What equation links electric field strength with pd?", "a": "E = V/d"}, {"q": "What are the units of electric field strength?", "a": "Vm⁻¹"}, {"q": "What happens to the total capacitance if capacitors are joined in series?", "a": "Total capacitance decreases  1/CT = 1/C1 + 1/C2"}, {"q": "What happens to the total capacitance if capacitors are joined in parallel?", "a": "Total capacitance increases CT = C1 + C2"}, {"q": "A 4μF, 6μF and 12μF capacitor are joined in series what is the total capacitance?", "a": "C = 2μF"}, {"q": "A 4μF, 6μF and 12μF capacitor are joined in parallel what is the total capacitance?", "a": "C = 22μF"}, {"q": "What equation shows the exponential growth of a charging capacitor?", "a": "Q = Q0(1-e-t/RC)"}, {"q": "What does τ represent?", "a": "τ = RC = time constant"}, {"q": "What equation shows the exponential decay of a discharging capacitor?", "a": "Q = Q0 e-t/RC"}]}]}, {"name": "Electrostatic and Gravitational Fields", "subtopics": [{"name": "4.2", "cards": [{"q": "What is a field?", "a": "A region in which a force is felt"}, {"q": "What is the definition of gravitational field strength?", "a": "Force experienced per unit mass by a mass placed in the field (g=F/m)"}, {"q": "What is the gravitational field strength on Earth at the surface?", "a": "g = 9.81 Nkg⁻¹"}, {"q": "Astronaut of mass 120kg weighs 3.2kN on Jupiter what is the gravitational field strength of Jupiter?", "a": "g = 27 Nkg⁻¹"}, {"q": "What is Newton's law of gravitation?", "a": "F = Gm1m2/r2"}, {"q": "What is does G represent in Newton's law of gravitation?", "a": "Gravitational constant = 6.67x10⁻¹¹ N m² kg⁻²"}, {"q": "Earth's mass = 6x1024kg, radius = 6.4x103km, calculate the force between Earth and 60kg mass on surface", "a": "F = 589N"}, {"q": "A 2kg mass is 20cm left of point P. A 3kg mass is 10cm right pf point P. Calculate the resultant gravitational field strength at P", "a": "g = 1.67x10-8 Nkg-1 to the right"}, {"q": "What is the definition of gravitational potential?", "a": "Work done per unit mass in bringing mass from infinity to that point"}, {"q": "What is the equation to find gravitational potential?", "a": "Vg = -GM/r"}, {"q": "What is the unit of gravitational potential?", "a": "Jkg-1"}, {"q": "Why does the equation for gravitational potential need a minus sign?", "a": "Gravity is always attractive so work will be done by the mass"}, {"q": "What is the definition of escape velocity?", "a": "Minimum velocity at which a projectile is thrown upwards to never return to Earth"}, {"q": "What is the equation to calculate potential energy of a mass in a gravitational field?", "a": "PE = -mVg  or PE = -Gm1m2/r"}, {"q": "What is meant by the term equipotential surfaces?", "a": "Surfaces where gravitational or electric potential is the same"}, {"q": "What shape are equipotential surfaces for a planet?", "a": "spherical"}, {"q": "What 2 pieces of information do electric field lines give about the electric field?", "a": "Strength of field and direction of field"}, {"q": "Draw the field lines for a positive point charge", "a": "Field lines point radially outward and equally spaced"}, {"q": "Draw the field lines for a negative point charge", "a": "Field lines point radially inward and equally spaced"}, {"q": "What is meant by a point charge?", "a": "All charge is concentrated to a single point (infinitely small radius)"}, {"q": "What is Coulomb's law?", "a": "F = Q1Q2/4πε₀r2"}, {"q": "What is permittivity?", "a": "How well a material allows an electric field to pass through it"}, {"q": "What is the force between charges Q1 = +5μC and Q2 = -2.5μC separated by 1cm?", "a": "F = - 1125N (attractive)"}, {"q": "What is the definition of electric field strength?", "a": "Force experienced per unit charge by a small positive charge placed in an electric field"}, {"q": "What is the definition of electric potential?", "a": "Work done per unit charge in bringing a positive charge from infinity to that point"}, {"q": "What does the gradient of a VE-r graph represent?", "a": "-electric field strength"}, {"q": "What does the gradient of a Vg-r graph represent?", "a": "-gravitational field strength"}]}]}, {"name": "Orbits and the wider Universe", "subtopics": [{"name": "4.3", "cards": [{"q": "What can 9x10⁹ F⁻¹m be used as an approximation for?", "a": "1/4πε₀"}, {"q": "What is Kepler's 1st law of planetary motion?", "a": "Each planet moves in an ellipse with the Sun at one focus"}, {"q": "What is Kepler's 2nd law of planetary motion?", "a": "The line joining a planet to the centre of the Sun sweeps out equal areas in equal times"}, {"q": "What is Kepler's 3rd law of planetary motion?", "a": "T² is proportional to r³ in which r is the semi-major axis of its ellipse"}, {"q": "When can circular motion equations be applied to planets?", "a": "If their orbit is close to a perfect circle"}, {"q": "Draw an elliptical orbit and label a focus, semi-major axis and semi-minor axis", "a": "Focus at each of widest points. Semi-major axis from centre to focus. Semi-minor axis shortest line from centre to edge"}, {"q": "Which of Kepler's laws can be represented as T² = 4π²r³ / GM ?", "a": "Kepler's 3rd law"}, {"q": "Astronauts appear to be weightless but what is really happening?", "a": "They are in free fall accelerating towards the Earth all the time"}, {"q": "Calculate the orbital speed of a satellite 100km above the Earth's surface. Mass of Earth=6.02x10²⁴kg Radius=6.4x10⁶m", "a": "v = 7846 ms⁻¹"}, {"q": "What type of galaxy is the Milky Way?", "a": "Spiral galaxy (flat disc)"}, {"q": "What is dark matter?", "a": "Matter which we can't see or detect by any sort of radiation but existence is inferred from gravitational effect"}, {"q": "What does the difference between the observed and calculated rotational speeds imply about the galaxy?", "a": "There must be more matter we can't see (dark matter)"}, {"q": "What is a binary system?", "a": "Two bodies orbit about a point which is the centre of mass"}, {"q": "What equation is used to find the distance of a binary star from the centre of mass of the system?", "a": "r₁ = (M₂ / M₁+M₂) d"}, {"q": "Sirius A (m=4.12x10³⁰kg) and Sirius B (m=2.04x10³⁰kg) are a binary system with a period of 50 year. Calculate d", "a": "d = 2.96x10¹²m = 19.7AU"}, {"q": "What is the definition of radial velocity of a star?", "a": "The component of a star's velocity along the line joining it and an observer on Earth"}, {"q": "What is the doppler shift equation?", "a": "Δλ/λ = v/c"}, {"q": "Light emitted from a distant star moving away has λ=591.5nm, on Earth it is detected with λ=595.1nm. Calculate radial velocity of star", "a": "v = 1.83x10⁶ ms⁻¹"}, {"q": "What does the gradient of a graph of radial velocity against distance represent?", "a": "Hubble's constant  H₀ = v/d"}, {"q": "What is Hubble's law?", "a": "speed of recession of a galaxy is directly proportional to its distance from Earth"}, {"q": "How can the age of the universe be deduced?", "a": "1/H₀"}, {"q": "What are the problems with using Hubble's constant?", "a": "Uncertainty in H₀ since determined using redshift, assumption that radial velocity of galaxy is constant"}, {"q": "What are the 3 possible fates of the universe?", "a": "Open, Closed and Flat"}, {"q": "What will happen if the density of the universe is less than the critical density?", "a": "Universe will keep on expanding forever"}, {"q": "What will happen if the density of the universe is greater than the critical density?", "a": "It will stop expanding and collapse in a big crunch"}]}]}, {"name": "Magnetic Fields", "subtopics": [{"name": "4.4", "cards": [{"q": "What is the definition of a magnetic field?", "a": "Direction in which N pole of free magnet points. Magnitude B = F/IL"}, {"q": "Draw the magnetic field for a bar magnet", "a": "Loops from N to S, lots of lines at the ends of the magnet", "d": "mag:bar"}, {"q": "Describe the magnetic field of a current carrying wire", "a": "circles around the wire getting further apart"}, {"q": "If a current carrying wire is held vertically with current flowing downwards what direction would the magnetic field be?", "a": "clockwise"}, {"q": "Which rule do you use to find the magnetic field direction for a current carrying wire?", "a": "Right hand grip rule"}, {"q": "What is a solenoid?", "a": "Coil of wire"}, {"q": "What 3 things do magnetic field lines show?", "a": "Shape, direction and strength of magnetic field"}, {"q": "Where is the magnetic field strongest on a bar magnet?", "a": "At the poles as there are more field lines close together"}, {"q": "Which direction do magnetic field lines travel on a bar magnet?", "a": "North --> South"}, {"q": "When drawing a magnetic field what do an x and a · represent?", "a": "x = into paper (back of arrow)   dot = out of paper (head of arrow)", "d": "mag:bar"}, {"q": "Which rule do you use to find the movement of a wire in a motor?", "a": "Fleming's Left Hand Rule"}, {"q": "What does each finger represent in Fleming's Left Hand Rule?", "a": "Thumb = movement (force) , First finger = magnetic field, Second finger = current"}, {"q": "What names is given to the effect where a current carrying wire in a magnetic field experiences a force?", "a": "Motor effect"}, {"q": "In the equation F = BILsinθ what does B represent?", "a": "Magnetic field strength"}, {"q": "How can you increase the size of the force on a wire in a motor?", "a": "Increase current, Increase magnetic field strength, Increase number of turns (length of wire)"}, {"q": "In a magnetic field in what direction does a force act on an electron?", "a": "At 90⁰ to the direction of movement (making circular path) FLH"}, {"q": "Why do electrons in a magnetic field follow circular motion?", "a": "Force exerted at 90⁰ to the direction of motion at all times"}, {"q": "What equation is used to link force and charge on an electron in a magnetic field?", "a": "F = Bqv sinθ"}, {"q": "For an electron in a magnetic field which rule is used to find the direction of the force?", "a": "Fleming's Left Hand but this shows current (+→-) so electron travels in opposite direction to current"}, {"q": "What equation can be found by combining the magnetic and centripetal force on an electron?", "a": "Bq = mv/r"}, {"q": "Electron has v=3.7x10⁷ms⁻¹ in field B=0.47mT at right angle. What is the radius of the path in B field?", "a": "r = 0.45m"}, {"q": "What is the definition of Hall voltage?", "a": "When a magnetic field is applied to a conductor carrying a current at right angles to field a voltage appears"}, {"q": "A current of 5A flows in a long straight wire Calculate the magnetic field strength at right angle distance of 20cm", "a": "B = 5.0x10⁻⁶ T"}, {"q": "A solenoid of length 1.45m has 9560 turns. Calculate B inside the solenoid when I=320mA", "a": "B = 2.66x10⁻³ T"}, {"q": "What happens if two current carrying conductors next two each other with currents in the same direction?", "a": "Two wires will attract"}, {"q": "What happens if two current carrying conductors next two each other with currents in opposite directions?", "a": "Two wires will repel"}, {"q": "Describe the motion of a charged particle that enters a uniform electric field at right angles", "a": "Deflected in a parabola"}, {"q": "Describe how a linear accelerator works", "a": "Ions accelerated in straight line by alternating pd between drift tube of increasing length"}, {"q": "Describe how a cyclotron works", "a": "Electric field accelerates charged particles as they cross dees and travel in a spiral"}, {"q": "Describe how a synchrotron works", "a": "Protons accelerated by alternating pd and kept in a circular path by a magnetic field. Both pd and B increase as speed increases so higher energies can be achieved"}]}]}, {"name": "Electromagnetic Induction", "subtopics": [{"name": "4.5", "cards": [{"q": "What process occurs when a wire moves through a magnetic field producing a current?", "a": "Electromagnetic Induction"}, {"q": "If a wire moves the opposite way through a magnetic field what happens to the current?", "a": "Reverses direction"}, {"q": "How can you increase the size of a current induced?", "a": "Move wire (or magnet) faster, Increase area of coil (more turns), Increase magnetic field strength"}, {"q": "Which rule do you use to find the direction of an induced current?", "a": "Fleming's Right Hand Rule"}, {"q": "What does each finger represent in Fleming's Right Hand Rule?", "a": "Thumb = movement (force) , First finger = magnetic field, Second finger = current"}, {"q": "What is the equation to find Magnetic Flux?", "a": "φ = ABcosθ"}, {"q": "What is Magnetic Flux?", "a": "A measure of the magnetic field passing through a wire"}, {"q": "What is the symbol used for magnetic flux?", "a": "φ"}, {"q": "What is the unit used for magnetic flux?", "a": "Wb (Weber) = Tm²"}, {"q": "What is Flux linkage?", "a": "When a coil of wire encloses a magnetic field consists of multiple turns Nφ"}, {"q": "What units are used for flux linkage?", "a": "Wb or Wb turn"}, {"q": "What is the definition of Faraday's law?", "a": "When the flux linking an electrical circuit is changing an emf is induced equal to rate of change of flux linkage"}, {"q": "What is the equation for Faraday's law?", "a": "E = -Δ(Nφ)/Δt"}, {"q": "What is the definition of Lenz's law?", "a": "The direction of current from an induced emf opposes the change in flux linkage that causes the current"}]}]}]}, {"name": "AQA A-Level Physics", "level": "A-Level", "topics": [{"name": "Section 0 - Physics Skills", "subtopics": [{"name": "0.1 - Prefixes, units and conversions", "cards": [{"q": "What power of ten does the prefix 'p' represent?", "a": "10⁻¹²"}, {"q": "What power of ten does the prefix 'n' represent?", "a": "10⁻⁹"}, {"q": "What power of ten does the prefix 'µ' represent?", "a": "10⁻⁶"}, {"q": "What power of ten does the prefix 'm' represent?", "a": "10⁻³"}, {"q": "What power of ten does the prefix 'k' represent?", "a": "10³"}, {"q": "What power of ten does the prefix 'M' represent?", "a": "10⁶"}, {"q": "What power of ten does the prefix 'G' represent?", "a": "10⁹"}, {"q": "What power of ten does the prefix 'T' represent?", "a": "10¹²"}, {"q": "What is the base unit of mass", "a": "kg"}, {"q": "What is the base unit of length", "a": "m"}, {"q": "What is the base unit of time", "a": "s"}, {"q": "What is the base unit of current", "a": "A"}, {"q": "What is the base unit of temperature", "a": "K"}, {"q": "What are the units of potential difference", "a": "V"}, {"q": "What are the units of density", "a": "kgm⁻³"}, {"q": "What are the units of energy", "a": "J"}, {"q": "What are the units of power", "a": "W"}, {"q": "What are the units of charge", "a": "C"}, {"q": "What is 1 m² in mm²", "a": "10⁶ mm²"}, {"q": "What is 1 m³ in cm³", "a": "10⁶ cm³"}, {"q": "What is 1 km² in m²", "a": "1x10⁶ m²"}, {"q": "What is 1 cm³ in mm³", "a": "10³ mm³"}]}, {"name": "0.2 - Measurement and Uncertainties", "cards": [{"q": "Define control variable", "a": "Something that must be kept constant to prevent it affecting the dependent variable"}, {"q": "Define repeatability", "a": "Similar results would be obtained if the experimental method was conducted again"}, {"q": "Define reproducibility", "a": "The same result can be obtained using different equipment and/or techniques"}, {"q": "How do you ensure a metre rule is vertical", "a": "Use a plumb line, set square or spirit level"}, {"q": "How do you avoid parallax error", "a": "Ensure eye, object and scale are all in line with each other OR ensure object and scale are directly adjacent to each other"}, {"q": "Define systematic Error", "a": "An error that follows a consistent pattern"}, {"q": "Define zero error", "a": "An error that occurs due to the measuring instrument reading a non-zero output when there is no input"}, {"q": "Define accuracy", "a": "How close a measurement is to the 'true' or accepted value"}, {"q": "Define precision", "a": "The smallest division in the scale of a measuring instrument/The smallest non-zero reading an instrument can take"}, {"q": "What is the precision of a multimeter", "a": "Depends on the scale selected"}, {"q": "What is the precision of a metre rule", "a": "1mm"}, {"q": "What is the precision of vernier calipers", "a": "0.1mm"}, {"q": "What is the precision of a micrometer", "a": "0.01mm"}, {"q": "What is the precision of a stopclock", "a": "0.1-0.2s (depending on reaction time)"}, {"q": "What is the absolute uncertainty in length", "a": "± the precision of the instrument"}, {"q": "What is the absolute uncertainty in a repeated readings", "a": "± ½ the range of the repeats"}, {"q": "What is the absolute uncertainty from a digital scale", "a": "± ½ the precision of the instrument"}, {"q": "Define percentage uncertainty", "a": "(Absolute uncertainty ÷ 'calculated OR measured' value) × 100"}, {"q": "How do you calculate the total uncertainty if quantities are added or subtracted?", "a": "The absolute uncertainties are added together"}, {"q": "How do you calculate the total uncertainty if quantities are multiplied or divided?", "a": "The percentage uncertainties are added together"}, {"q": "How do you calculate the total uncertainty if a quantity is raised to a power?", "a": "The percentage uncertainty is multiplied by that power"}, {"q": "How do you find uncertainty in a gradient?", "a": "± (gradient of the line of best fit − gradient of the line of worst fit)"}, {"q": "What is a line of worst fit?", "a": "A line that passes through the error bars with the greatest possible difference in gradient from the line of best fit"}, {"q": "What are error bars?", "a": "Lines to show the range of the absolute uncertainty of each data point on a graph"}, {"q": "What is relative uncertainty", "a": "(Absolute uncertainty ÷ 'calculated OR measured value')"}]}]}, {"name": "Section 1 - Particles, Radiation and Quantum Phenomena", "subtopics": [{"name": "1.1 - Atoms, Nuclei and Nuclear Decay", "cards": [{"q": "What does A - Z calculate?", "a": "The number of neutrons in the atom"}, {"q": "Describe the structure of an alpha particle", "a": "2 protons and 2 neutrons OR a helium nucleus"}, {"q": "What is the antiparticle of the electron", "a": "Positron"}, {"q": "What is the antiparticle of the neutron", "a": "Antineutron"}, {"q": "Define Atomic number (Z)", "a": "The number of protons in the atom"}, {"q": "Changing the atomic number (Z)changes what about the atom?", "a": "Changes the element"}, {"q": "What is the charge of a beta minus particle in coulombs", "a": "-1.6x10⁻¹⁹C"}, {"q": "What is the charge of a hydrogen +1 ion in coulombs", "a": "+1.6x10⁻¹⁹C"}, {"q": "What is the charge of an Alpha particle in coulombs", "a": "+3.2x10⁻¹⁹C"}, {"q": "What is a gamma ray?", "a": "A high energy photon emitted by the nucleus"}, {"q": "How does a particle compare to its corresponding antiparticle?", "a": "Same mass, opposite charge."}, {"q": "Define an isotope", "a": "An atom of an element with the same number of protons but a different number of neutrons."}, {"q": "Define mass number (A)", "a": "The total number of nucleons in the atom"}, {"q": "What is the maximum range of the Strong Nuclear Force", "a": "3 femtometres / 3x10⁻¹⁵m"}, {"q": "What is the type of nuclear radiation with the greatest rest mass", "a": "Alpha particle"}, {"q": "What is the type of nuclear radiation with the highest specific charge", "a": "Beta"}, {"q": "Describe pair production", "a": "A photon is converted into a particle and its corresponding antiparticle"}, {"q": "What is the rest mass of a Gamma ray", "a": "Zero"}, {"q": "Define specific charge", "a": "Charge (C) / Mass (kg)"}, {"q": "What happens to the nucleons during beta minus decay?", "a": "A neutron changes into a proton"}, {"q": "What is a Beta particle?", "a": "A high energy electron"}, {"q": "What is a nucleon?", "a": "A proton or neutron in the nucleus"}, {"q": "Why is the strong nuclear force required for nuclei to be stable?", "a": "Electrostatic repulsion of the protons in nucleus."}]}, {"name": "1.2 - Fundamental Forces and Exchange Particles", "cards": [{"q": "What can be transferred by an exchange particle", "a": "Force, energy, momentum and charge."}, {"q": "Describe electron capture", "a": "An inner shell electron is absorbed by a proton in the nucleus. The proton is converted to a neutron and a neutrino is produced"}, {"q": "What is the exchange particle associated with Beta decay", "a": "The W boson"}, {"q": "What is the exchange particle of the electromagnetic force", "a": "Virtual photon"}, {"q": "Draw the feynman diagram for Beta minus decay.", "a": "β⁻ decay: neutron → proton, emitting an electron (β⁻) and an electron antineutrino, via a W⁻.", "d": "feyn:betaminus"}, {"q": "Draw the feynman diagram for Beta plus decay", "a": "β⁺ decay: proton → neutron, emitting a positron (β⁺) and an electron neutrino, via a W⁺.", "d": "feyn:betaplus"}, {"q": "Draw the feynman diagram for Electron capture", "a": "Electron capture: proton + electron → neutron + electron neutrino, via a W⁺.", "d": "feyn:ecapture"}, {"q": "What is the interaction involved in Beta decay", "a": "The weak nuclear interaction"}, {"q": "What is the interaction that acts between charged particles only", "a": "Electromagnetic"}, {"q": "What is the interaction that is repulsive below 0.5fm", "a": "Strong nuclear interaction"}, {"q": "What are the interactions with a limited range", "a": "Strong and weak nuclear interactions"}, {"q": "What are the interactions with an infinite range", "a": "Electromagnetic and gravity"}, {"q": "What is the maximum range of the strong nuclear force", "a": "3fm"}, {"q": "Draw the Feynman diagram for electromagnetic repulsion between two electrons", "a": "EM repulsion: two electrons exchange a virtual photon (γ) and repel.", "d": "feyn:emrepulsion"}, {"q": "What is the fundamental exchange particle for the strong nuclear force", "a": "Gluon"}, {"q": "What is the weakest fundamental force", "a": "Gravity"}]}, {"name": "1.3 - Particle Classifications", "cards": [{"q": "What is an example of a strange meson", "a": "Kaon"}, {"q": "All baryons decay into which particle?", "a": "protons"}, {"q": "Always have opposite sign for their quantum numbers", "a": "Antiparticles"}, {"q": "What is the baryon number of an anti-strange quark", "a": "=-1/3"}, {"q": "Billions of these particles pass through your body every second", "a": "Neutrinos"}, {"q": "What is the family of particles that are subject to all four fundamental interactions", "a": "Hadrons"}, {"q": "Describe leptons", "a": "Group of particles that are subject to the weak nuclear force but not the strong nuclear force"}, {"q": "Describe a muon", "a": "Same charge as an electron but much greater mass"}, {"q": "Describe a neutrino", "a": "A lepton with a rest mass less than an electron"}, {"q": "What family of particles are nucleons", "a": "Baryons"}, {"q": "Which particles are produced when a muon decays", "a": "Electron, electron antineutrino and muon neutrino"}, {"q": "What is the Quark composition of a Baryon", "a": "Three quarks"}, {"q": "What is the Quark composition of a neutron", "a": "up down down (udd)"}, {"q": "What is the Quark composition of a proton", "a": "up up down (uud)"}, {"q": "What is the Quark composition of an anti-baryon", "a": "Three antiquarks"}, {"q": "What is the Quark composition of an pi plus", "a": "up, anti-down"}, {"q": "What is the Quark composition of K plus", "a": "up, anti strange"}, {"q": "The strong nuclear interaction is responsible for?", "a": "Holds quarks together in hadrons"}, {"q": "The two types of hadron are called?", "a": "baryons and mesons"}, {"q": "What is the baryon number of an neutron", "a": "1"}, {"q": "What is the baryon number of an up quark?", "a": "= 1/3"}, {"q": "What is the Lepton number of a Kaon?", "a": "0"}, {"q": "What is the strangeness of a strange quark", "a": "-1"}]}, {"name": "1.4 - Particle Interactions", "cards": [{"q": "What is this process called? - An inner shell electron is absorbed by a proton in the nucleus. The proton is transformed into a neutron and a neutrino is emitted", "a": "Electron capture"}, {"q": "How much can strangeness change by in a weak interaction?", "a": "-1, 0 or +1"}, {"q": "What is the interaction responsible for the decay of strange particles", "a": "Weak interaction"}, {"q": "What is the interaction responsible for the production of strange particles.", "a": "Strong interaction"}, {"q": "Which leptons are subject to the electromagnetic interaction", "a": "Electrons and muons"}, {"q": "Which mesons decay through the weak interaction", "a": "Kaons"}, {"q": "Name the quantities that are conserved in all particle interactions.", "a": "Charge, Momentum, Mass-energy, Lepton number, Baryon number"}, {"q": "Particle not subject to the strong or electromagnetic interaction are called?", "a": "Neutrino"}, {"q": "Particles with a baryon number of zero are called?", "a": "Leptons and mesons"}, {"q": "Particles with a lepton number of zero are called?", "a": "Baryons and mesons (Hadrons)"}, {"q": "Quantum number that is not always conserved is called", "a": "Strangeness"}, {"q": "Quantum numbers that are always conserved are called", "a": "Lepton and baryon"}, {"q": "Reason why a neutrino can't interact through the electromagnetic interaction", "a": "It has no charge"}, {"q": "The fundamental exchange particle for the strong nuclear force is called", "a": "Gluon"}, {"q": "The mesons that transmits the strong nuclear force between nucleons is called", "a": "Pi meson"}, {"q": "The only stable baryon is called", "a": "Proton"}, {"q": "What happens in terms of quarks during beta minus decay", "a": "A down quark (in a neutron) turns into an up quark (in a proton)"}, {"q": "What happens in terms of quarks during beta plus decay", "a": "An up quark (in a proton) turns into an down quark (in a neutron)"}, {"q": "When is strangeness conserved?", "a": "Strong interaction"}]}, {"name": "1.5 - Quantum Phenomena", "cards": [{"q": "The energy of a photon is inversely proportional to…?", "a": "Wavelength"}, {"q": "Define threshold frequency", "a": "The minimum frequency of light required to produce photoelectrons"}, {"q": "Define work function of a metal", "a": "The minimum energy required to remove an electron from the surface of the metal"}, {"q": "How do you calculate the threshold frequency from the work function?", "a": "Divide the work function by Planck's constant"}, {"q": "What happens to the photon energy if frequency is doubled?", "a": "Doubled"}, {"q": "What happens to the number of photoelectrons per second if the intensity of light remains the same but frequency is doubled?", "a": "Halved"}, {"q": "What happens to the photoelectrons produced if the intensity of a light source is increased but the frequency is constant?", "a": "More photoelectrons will be produced but they will have the same maximum kinetic energy"}, {"q": "Why does the kinetic energy of photoelectrons from monochromatic light vary in the photoelectric effect?", "a": "The work function is a minimum energy. Some electrons require more energy to be liberated."}, {"q": "Define the ground state of an atom", "a": "The lowest energy level an electron can occupy"}, {"q": "Define ionisation", "a": "The addition or removal of an electron from a neutral atom."}, {"q": "Define ionisation energy", "a": "The energy required to remove an electron that is in the ground state of an atom."}, {"q": "Define excitation of an atom", "a": "The atom gains energy and an electron moves up to a higher energy level."}, {"q": "Which processes can lead to the excitation of an atom", "a": "A collision with a charged particle ,The absorption of a photon by an electron in the atom."}, {"q": "Describe the de-excitation of an atom", "a": "An electron moves down energy levels and emits a photon"}, {"q": "What two variables determine the De Broglie wavelength of a particle?", "a": "Mass and velocity"}, {"q": "Which key piece of evidence that demonstrated the validity of De Broglie's matter-wave hypothesis?", "a": "Electron diffraction through a thin metal foil"}, {"q": "A photon can ionise an atom if its energy is greater than …?", "a": "the ionisation energy"}, {"q": "Two factors that determine the maximum kinetic energy of photoelectrons are…?", "a": "The frequency of the light and the work function of the metal"}, {"q": "A photon can produce a photoelectron if its frequency is greater than", "a": "the threshold frequency"}]}]}, {"name": "Section 2 - Waves and Optics", "subtopics": [{"name": "2.1 - Waves Basics and Polarisation", "cards": [{"q": "Define amplitude", "a": "Maximum displacement of the medium from equilibrium"}, {"q": "Define frequency", "a": "The number of wave cycles per second OR the number of waves passing a point per second"}, {"q": "Define time period", "a": "Time for one complete wave cycle"}, {"q": "What is the relationship between frequency and time period?", "a": "f = 1/T or inverse proportionality"}, {"q": "Describe a transverse wave", "a": "Displacement is perpendicular to the direction of wave propagation"}, {"q": "What is meant by coherent sources of waves", "a": "Same frequency and constant phase difference."}, {"q": "Describe the principle of superposition", "a": "When two or more waves meet the total displacement is the (vector) sum of the displacements of the individual waves."}, {"q": "Give an example of longitudinal waves", "a": "Sound, primary seismic waves"}, {"q": "Give an example of transverse waves", "a": "Waves on a plucked string, secondary seismic waves, electromagnetic radiation"}, {"q": "Describe plane polarised light", "a": "Electromagnetic waves with oscillations in a single direction perpendicular to wave propagation"}, {"q": "Describe unpolarised waves", "a": "Waves with oscillations in many directions perpendicular to wave propagation."}, {"q": "Which waves can't be polarised?", "a": "Longitudinal waves"}, {"q": "What is the phase difference between points quarter a wavelength apart?", "a": "Pi/2 radians OR 90'"}, {"q": "What is the phase difference between waves in antiphase", "a": "Pi radians OR 180'"}, {"q": "Describe the effect of a polarising filter", "a": "Only transmits the component of the wave parallel to the filter"}, {"q": "Describe the effect of crossed polarising filters", "a": "No light is transmitted"}, {"q": "Give a use of polarising filters", "a": "LCD screens, 3D TV, polarimetry in manufacturing, stress analysis, anti-glare sunglasses"}, {"q": "Light reflected from a shiny surface is", "a": "partially polarised"}, {"q": "Light scattered is", "a": "polarised"}, {"q": "Define oscillation", "a": "A displacement one way and then the other about an equilibrium position."}, {"q": "Define displacement (waves)", "a": "Measures how far a particle is from its equilibrium position."}, {"q": "Define propagation", "a": "Describes the motion of a wave through a medium/space"}, {"q": "Define a mechanical wave", "a": "Requires a medium to travel in"}]}, {"name": "2.2 - Standing waves", "cards": [{"q": "What is µ in f = (1/2L)×√(T/µ)", "a": "Mass per unit length of the string kgm⁻¹"}, {"q": "What is always formed at an open-end of a tube", "a": "(Displacement) Antinode"}, {"q": "What is always formed at the closed end of a tube", "a": "(Displacement) Node"}, {"q": "Describe the amplitude in a progressive wave", "a": "Is the same at every point along the wave"}, {"q": "Describe the amplitude in a standing wave", "a": "Varies continuously as you move along the wave. Maximum at antinodes, minimum at nodes"}, {"q": "Define an antinode", "a": "A point where the waves are in phase and constructively interfere"}, {"q": "What are the conditions required for a standing wave to form?", "a": "Two waves travelling/propagating in opposite directions superpose with the same frequency and similar amplitudes"}, {"q": "What is the distance between adjacent nodes on a standing wave?", "a": "Half a wavelength"}, {"q": "What is f in f = (1/2L)×√(T/µ)", "a": "Frequency of the fist harmonic on a string"}, {"q": "Give 3 factors that determine the 1st harmonic on a string", "a": "Length, tension and mass per unit length"}, {"q": "What is L in f = (1/2L)×√(T/µ)", "a": "Length of the string (m)"}, {"q": "What does the loudness of a sound depend on?", "a": "Depends on the amplitude of a sound wave"}, {"q": "Define a node", "a": "A point where the waves are in antiphase and destructively interefere"}, {"q": "What occurs where a node is produced", "a": "Destructive interference"}, {"q": "What occurs where an antinode is produced", "a": "Constructive interference"}, {"q": "What is the phase difference between points either side of a node?", "a": "Pi radians"}, {"q": "Phase difference of all points between two adjacent nodes", "a": "Zero"}, {"q": "What does the pitch produced by a string depend on?", "a": "Depends on the frequency of the 1st harmonic"}, {"q": "What is T in f = (1/2L)×√(T/µ)", "a": "Tension on the string (N)"}, {"q": "Why can only certain frequency standing waves be produced on strings?", "a": "The must be nodes at the fixed ends and only certain frequencies/wavelengths allow this."}]}, {"name": "2.3 - Refraction and Total Internal Reflection", "cards": [{"q": "What is the angle of refraction at the critical angle", "a": "Ninety degrees"}, {"q": "What are the conditions required for total internal reflection", "a": "The second medium has a lower refractive than the first. The angle of incidence is greater than the critical angle."}, {"q": "Definition of the refractive index of a material", "a": "Speed of light in a vacuum/Speed of light in material"}, {"q": "What is material dispersion", "a": "The spreading out of pulses/loss of signal quality due to the different speeds at which different wavelengths travel in the core"}, {"q": "What is modal dispersion", "a": "The spreading out of pulses/loss of signal quality due to the different lengths of paths taken by rays in the optic fibre"}, {"q": "How do you prevent material dispersion in optic fibres", "a": "Use monochromatic light"}, {"q": "What remains constant when a wave travels into a different medium", "a": "Frequency"}, {"q": "The angle of incidence is measured relative to", "a": "the normal of the boundary."}, {"q": "What can be done to reduce modal dispersion in optic fibres?", "a": "Use a narrow core Use a core and cladding with similar refractive indices Use repeaters to reconstruct the signal along the fibre."}, {"q": "What is the purpose of the cladding on an optic fibre?", "a": "To protect the optic fibre from scratches and damage. To prevent the signal from being transmitted into other fibres (cross talk) To provide a large critical angle (and reduce modal dispersion)"}, {"q": "When entering a material with a higher refractive index the wave speed", "a": "decreases."}, {"q": "When entering a material with a higher refractive index the waves refract", "a": "Toward the normal"}, {"q": "When entering a material with a lower refractive index the wavelength", "a": "increases"}]}, {"name": "2.4 - Interference", "cards": [{"q": "What is a coherent source of light", "a": "Same frequency and constant phase difference"}, {"q": "What is d in nλ=dsinθ", "a": "Distance between slits in a diffraction grating"}, {"q": "What is D in w = λD/s", "a": "Distance between the double slits and the screen"}, {"q": "What is a diffraction grating", "a": "A series of many, closely spaced parallel slits"}, {"q": "What is the effect of decreasing wavelength at a single slit", "a": "Diffracted waves spread out less"}, {"q": "What is the effect of reducing the size of a single slit", "a": "Diffracted waves spread out more"}, {"q": "What is the effect of reducing the spacing of slits in a diffraction grating", "a": "Increases the angle of each beam"}, {"q": "What is the fringe pattern for a single slit", "a": "Central fringe is twice the width of all others. Outer fringes are much less intense than the central maximum."}, {"q": "What is the fringe pattern for double slits", "a": "Spacing of fringes is constant (and intensity reduces gradually from the centre)"}, {"q": "What happens if white light is used in the two slit experiment", "a": "Central fringe is white, inner fringes run have violet on the inside edge and red on the outside edge."}, {"q": "What is the maximum beam order from a diffraction grating", "a": "d/λ (rounded down to the nearest whole number)"}, {"q": "What is n in nλ=dsinθ", "a": "Order of the beam"}, {"q": "How many beams are produced by a diffraction grating?", "a": "2n+1 where n is the maximum beam order"}, {"q": "What is the path difference for constructive interference", "a": "A whole number of wavelengths"}, {"q": "What is the path difference for destructive interference", "a": "An odd number of half wavelengths"}, {"q": "What is the path length difference between adjacent slits along the nth order beam", "a": "n wavelengths"}, {"q": "What produces a bright fringe", "a": "Constructive interference of the light from each slit"}, {"q": "What produces a continuous spectrum of light", "a": "Hot objects such as filament lamps and the sun"}, {"q": "What produces a dark fringe", "a": "Destructive interference of the light from each slit"}, {"q": "What produces coherent, monochromatic light", "a": "Laser"}, {"q": "what is s in w = λD/s", "a": "Distance between the double slits"}, {"q": "Slit spacing (m) for a diffraction grating is equal to", "a": "1 / number of lines per metre"}, {"q": "What was used by Young to provide coherent light for the two slits", "a": "Narrow single slit"}, {"q": "What is w in w = λD/s", "a": "Fringe seperation"}, {"q": "What is a zero order beam", "a": "The central bright beam from a diffraction grating"}]}]}, {"name": "Section 3 - Mechanics and Materials", "subtopics": [{"name": "3.1 - Describing and Modelling Motion", "cards": [{"q": "Define displacement", "a": "The distance of an object from a point in a specific direction (vector)"}, {"q": "Define velocity", "a": "Rate of change of displacement (vector)"}, {"q": "Define speed", "a": "Change in distance travelled per unit time (scalar)"}, {"q": "Define acceleration", "a": "Rate of change of velocity (vector)"}, {"q": "What are the units of acceleration", "a": "ms⁻²"}, {"q": "Define constant velocity", "a": "Speed and direction of motion don't change"}, {"q": "What is shown by the gradient of a distance-time graph", "a": "Speed"}, {"q": "What is shown by the gradient of a displacement-time graph", "a": "Velocity"}, {"q": "What is shown by the gradient of a velocity-time graph", "a": "Acceleration"}, {"q": "What is shown by thearea under a velocity-time graph", "a": "Change in displacement"}, {"q": "What is shown by the area under an acceleration-time graph", "a": "Change in velocity"}, {"q": "When would you use a SUVAT equation", "a": "Used for motion of an object along a straight line with constant acceleration"}, {"q": "What is the effect of mass on the acceleration for an object in free-fall", "a": "None"}, {"q": "Describe the path of projectiles", "a": "Parabolic"}, {"q": "What is the effect of air resistance on horizontal projectile motion", "a": "Horizontal speed is reduced and hence range is reduced."}, {"q": "An object projected horizontally has an initial vertical velocity of", "a": "zero"}, {"q": "What is the angle of projection that results in maximum range", "a": "45°"}, {"q": "The acceleration of a projectile", "a": "Is always g downwards"}, {"q": "What happens to the horizontal velocity in projectile motion", "a": "Constant"}, {"q": "If a projectile returns to its starting height initial and final velocities have", "a": "the same magnitude"}, {"q": "What is the equation used for the horizontal component of projectile motion", "a": "Displacement = Velocity x time (since horizontal velocity is constant)"}, {"q": "Which aspect links vertical and horizontal motion of a projectile", "a": "Time taken for projectile motion"}, {"q": "Why can SUVAT equations can be used for the vertical component of projectile motion", "a": "Since the motion is in a single direction with a constant acceleration"}, {"q": "What is the effect of air resistance on the motion of an object projected above the horizontal", "a": "Reduces the maximum height reached and makes the descent of the projectile steeper than the ascent."}, {"q": "Define air resistance", "a": "The drag force exerted due to friction between the projectile and the air. Always acts in the opposite direction to motion and increases with speed."}]}, {"name": "3.2 - Forces and Motion", "cards": [{"q": "Give 3 factors that affect the drag on an object", "a": "Speed, shape and the viscosity of the fluid it's travelling through"}, {"q": "What are the forces on an object falling at terminal velocity", "a": "The drag force must be equal and opposite to the weight"}, {"q": "Define friction", "a": "Force that acts between surfaces to oppose motion"}, {"q": "Define inertia", "a": "The resistance of an object to changes in its motion"}, {"q": "Momentum changes when", "a": "A resultant force is acting"}, {"q": "Give Newton's 1st Law of motion", "a": "An object will remain at rest of move at a constant velocity unless acted upon by a resultant force"}, {"q": "Give Newton's 2nd Law of motion", "a": "Resultant force is equal to rate of change of momentum"}, {"q": "Give Newton's 3rd Law of motion", "a": "When two objects interact they exert forces on each other that are equal in magnitude, opposite in direction, are of the same type and act along the same line."}, {"q": "Define resultant force", "a": "The vector sum of forces acting on an object"}, {"q": "Why does the acceleration of a rocket gradually increases during lift off", "a": "Since the mass gradually decreases"}, {"q": "What is the same for two unequal masses hanging over a pulley", "a": "The tension acting"}]}, {"name": "3.3 - Momentum and Energy", "cards": [{"q": "Give the equation for Momentum", "a": "Mass × velocity"}, {"q": "Units equivalent to kgms⁻¹", "a": "Ns"}, {"q": "Resultant force", "a": "Equal to the rate of change of momentum"}, {"q": "Give the equation for Impulse", "a": "Force × time"}, {"q": "What is shown by the Area under a force time graph", "a": "Impulse"}, {"q": "What is shown by the Gradient of a momentum-time graph", "a": "Resultant force"}, {"q": "Force × time", "a": "Equal to change in momentum"}, {"q": "When an object of momentum p collides elastically  at right angles with a wall", "a": "Change in momentum = -2p"}, {"q": "Conservation of momentum", "a": "The total momentum in a system is constant provided no external force acts"}, {"q": "In an Elastic Collision Kinetic energy is", "a": "conserved"}, {"q": "In an Inelastic collision some kinetic energy", "a": "is transferred to other forms"}, {"q": "What is the law of conservation of energy", "a": "Energy cannot be created or destroyed, ony transferred between objects and transformed between types"}, {"q": "Give the equation for Work done", "a": "Force × displacement in the direction of the force"}, {"q": "Effect of friction on a moving object", "a": "Transfers kinetic energy primarily to thermal energy"}, {"q": "Change in gravitational potential energy is equal to the change in kinetic energy", "a": "If no resistive forces are acting"}, {"q": "Energy transferred is equivalent to", "a": "Work done"}, {"q": "Give the equation for Efficiency", "a": "Useful energy out ÷ Total energy in"}, {"q": "For an object sliding downhill at constant speed, Gravitational potential energy lost =", "a": "work done by friction"}, {"q": "For a vehicle travelling uphill at constant speed, Work done by driving force =", "a": "Gain in gravitational potential energy + work done by friction"}, {"q": "Define power", "a": "Energy transferred per second"}, {"q": "Unit equivalent to Js⁻¹", "a": "Watts"}, {"q": "For an object travelling at constant velocity under a driving force", "a": "Power = Force × velocity"}, {"q": "On a force-distance graph the area under the line represent", "a": "work done"}, {"q": "Give the equation for Energy stored in a stretched spring", "a": "½ F×∆L"}, {"q": "Give the equation for Kinetic Energy", "a": "½ m v²"}, {"q": "Base units equivalent to a Joule", "a": "kg m² s⁻²"}, {"q": "Give the equation for Change in gravitational potential energy", "a": "m g ∆h"}]}, {"name": "3.4 - Materials", "cards": [{"q": "Define the Limit of proportionality", "a": "The point at which a material stops obeying Hooke's Law"}, {"q": "What is the effect of connecting two identical springs in series", "a": "Halve the stiffness/k"}, {"q": "What is the effect of connecting two identical springs in parallel", "a": "Double the stiffness/k"}, {"q": "What is the density of water", "a": "1000kgm⁻³"}, {"q": "Define density", "a": "Mass per unit volume"}, {"q": "What are the units of k (spring constant)", "a": "Newtons per metre (Nm⁻¹)"}, {"q": "What is Hooke's Law", "a": "The change in length of an object is directly proportional to the applied force."}, {"q": "Define the Elastic limit", "a": "The point at which a material starts to permanently change shape"}, {"q": "What is a compressive force", "a": "A force that reduces the length of an object"}, {"q": "The units of stress", "a": "Pascals (Pa)"}, {"q": "Define Young's Modulus", "a": "Stress / Strain (within the limit of proportionality)"}, {"q": "What is the Material property measured by the Young's Modulus", "a": "Stiffness"}, {"q": "Define Ultimate tensile strength", "a": "The maximum stress a material can withstand before breaking"}, {"q": "What is the Feature of a stress-strain graph that tells you the Young's Modulus", "a": "The gradient (of the initial straight line section)"}, {"q": "Define the yield point", "a": "The point when strain starts to increase very rapidly with stress."}, {"q": "Define Elastic deformation", "a": "Material returns to its original shape when the load is removed"}, {"q": "Define Plastic deformation", "a": "Material remains permanently deformed after the load is removed."}, {"q": "What is shown by the Area under a force-extension graph", "a": "Work done stretching the material/energy stored in a spring"}, {"q": "Define Tensile Strain", "a": "Change in length per unit original length"}, {"q": "Define Tensile stress", "a": "Tensile force divided by cross-sectional area"}, {"q": "What has the same units as stress", "a": "Young's Modulus"}]}]}, {"name": "Section 4 - Electricity", "subtopics": [{"name": "4.1 - Charge, Current and Resistance", "cards": [{"q": "Define Current (A)", "a": "Rate of flow of charge (Cs-1)"}, {"q": "Give the equation for Total charge transferred (C)", "a": "I×t (As)"}, {"q": "Define the Amp", "a": "Coulomb per second"}, {"q": "Define potential difference", "a": "Work done per unit charge between two points"}, {"q": "What is the SI unit for potential difference", "a": "Volts"}, {"q": "Define the volt", "a": "Joule per Coulomb"}, {"q": "Define EMF", "a": "Work done per unit charge supplied to the charge carriers"}, {"q": "What are the units of power", "a": "Watts"}, {"q": "Give the equation for electrical power", "a": "I×V"}, {"q": "What is Ohm's Law", "a": "The p.d. across a component is proportional to current provided physical conditions don't change"}, {"q": "What is the equation for Resistance", "a": "V÷I"}, {"q": "Units equivalent to an Ohm", "a": "VA⁻¹"}, {"q": "How is an ammeter connected?", "a": "In series"}, {"q": "How is an voltmeter connected?", "a": "In parallel"}, {"q": "What is the resistance of an ideal voltmeter", "a": "Infinite"}, {"q": "What is the resistance of an ideal ammeter", "a": "Zero"}, {"q": "What are the units of resistivity", "a": "Ωm"}, {"q": "Define Resistivity", "a": "A measure of a material's opposition to current (=RA/L)"}, {"q": "Define a superconductor", "a": "A material with a resistivity of zero below a critical temperature"}, {"q": "What is meant by the critical temperature?", "a": "The temperature below which a material becomes a superconductor."}, {"q": "Give a use of a superconductor", "a": "MRI scanners, particle accelerators, maglev trains."}, {"q": "Describe an electrical conductor", "a": "A material containing free charge carriers"}, {"q": "Describe an electrical insulator", "a": "A material with no free electrons/charge carriers"}, {"q": "What is meant by a charge carrier", "a": "A particle that can move in a material and transfer energy (e.g. electrons in metals, ions)"}, {"q": "Describe a Metallic Conductor", "a": "A material containing delocalised electrons that can carry electrical current"}, {"q": "Describe a Semiconductor", "a": "A material where the number of free charge carriers varies (e.g. with temperature)"}, {"q": "Why does resistance increase with temperature", "a": "Lattice ion vibrations increase causing more frequent collisions between electrons and lattice ions."}, {"q": "Why does current lead to heating in resistors", "a": "Electrons collide with the lattice ions and transfer some of their kinetic energy to the ion's vibrations."}]}, {"name": "4.2 - Electrical Components", "cards": [{"q": "Draw the circuit symbol for an Ammeter.", "a": "Ammeter: a circle with an A inside; connected in series.", "d": "sym:ammeter"}, {"q": "Draw the circuit symbol for a Voltmeter.", "a": "Voltmeter: a circle with a V inside; connected in parallel.", "d": "sym:voltmeter"}, {"q": "Draw the circuit symbol for a Cell.", "a": "Cell: one long thin line (+) and one short thick line (–).", "d": "sym:cell"}, {"q": "Draw the circuit symbol for a Diode.", "a": "Diode: a triangle pointing to a bar; current flows only in the arrow's direction.", "d": "sym:diode"}, {"q": "Draw the circuit symbol for a LED.", "a": "LED: a diode with two small arrows pointing away (emitting light).", "d": "sym:led"}, {"q": "Draw the circuit symbol for a Resistor.", "a": "Resistor: a plain rectangular box in the wire.", "d": "sym:resistor"}, {"q": "Draw the circuit symbol for a Variable resistor.", "a": "Variable resistor: a rectangle with a diagonal arrow through it.", "d": "sym:variable_resistor"}, {"q": "Draw the circuit symbol for a LDR.", "a": "LDR: a resistor in a circle with two arrows pointing in (light in).", "d": "sym:ldr"}, {"q": "Draw the circuit symbol for a Heater.", "a": "Heater: a resistor rectangle acting as the heating element.", "d": "sym:heater"}, {"q": "Draw the circuit symbol for an Electrical Motor.", "a": "Motor: a circle with an M inside.", "d": "sym:motor"}, {"q": "Draw the circuit symbol for a Potentiometer.", "a": "Potentiometer: a resistor rectangle with an arrow tap (three terminals).", "d": "sym:potentiometer"}, {"q": "Sketch the I–V characteristic graph for an Ohmic conductor.", "a": "Ohmic conductor / fixed resistor: a straight line through the origin (I ∝ V).", "d": "iv:ohmic"}, {"q": "Draw the circuit symbol for a Lamp.", "a": "Lamp: a circle with a cross inside.", "d": "sym:lamp"}, {"q": "Draw the circuit symbol for a Fuse.", "a": "Fuse: a rectangle with a line running straight through it.", "d": "sym:fuse"}, {"q": "Sketch the I–V characteristic graph for a Lamp.", "a": "Filament lamp: an S-shaped curve — gradient falls as it heats and resistance rises.", "d": "iv:lamp"}, {"q": "Sketch the I–V chara
