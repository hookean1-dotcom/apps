<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrieval Practice</title>
<style>
:root{
  --bg:#f4f6fb; --panel:#ffffff; --panel2:#f8fafc; --ink:#1a2233; --muted:#697089;
  --line:#e4e8f2; --accent:#4f46e5; --accent2:#7c3aed; --accent-soft:#eef0fe;
  --good:#0ea371; --shadow:0 1px 2px rgba(20,28,55,.06),0 8px 24px rgba(20,28,55,.07);
  --shadow-lg:0 18px 50px rgba(30,25,90,.18); --radius:16px;
}
html[data-theme="dark"]{
  --bg:#0d1017; --panel:#161b25; --panel2:#1b212e; --ink:#e8ecf5; --muted:#95a0bb;
  --line:#28303f; --accent:#818cf8; --accent2:#a78bfa; --accent-soft:#20263a;
  --good:#34d399; --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 26px rgba(0,0,0,.35);
  --shadow-lg:0 22px 60px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
a{color:inherit}
.wrap{max-width:1240px;margin:0 auto;padding:22px clamp(14px,3vw,32px) 60px}

header.top{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px}
.logo{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:grid;place-items:center;box-shadow:0 6px 18px rgba(79,70,229,.35);flex:none}
.logo svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:2.2}
.brand h1{font-size:1.32rem;margin:0;letter-spacing:-.02em;font-weight:800}
.brand p{margin:0;font-size:.82rem;color:var(--muted);font-weight:500}
.spacer{flex:1}
.iconbtn{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--panel);
  color:var(--ink);cursor:pointer;display:grid;place-items:center;transition:.15s}
.iconbtn:hover{border-color:var(--accent);color:var(--accent)}
.iconbtn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2}

.controls{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;gap:14px;margin-bottom:20px}
.selrow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:720px){.selrow{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:6px;min-width:0}
.field label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.sel{position:relative}
select{width:100%;appearance:none;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  padding:11px 38px 11px 13px;border-radius:11px;font-size:.92rem;font-weight:600;cursor:pointer;
  font-family:inherit;transition:.15s;text-overflow:ellipsis}
select:hover{border-color:var(--accent)}
select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.sel::after{content:"";position:absolute;right:14px;top:50%;width:9px;height:9px;border-right:2px solid var(--muted);
  border-bottom:2px solid var(--muted);transform:translateY(-70%) rotate(45deg);pointer-events:none}

.actionrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.count{display:flex;align-items:center;gap:10px}
.count>span{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:4px;gap:2px}
.seg button{border:none;background:none;color:var(--muted);font-weight:700;font-size:.9rem;padding:7px 15px;
  border-radius:8px;cursor:pointer;font-family:inherit;transition:.15s;min-width:44px}
.seg button:hover{color:var(--ink)}
.seg button.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.3)}
.custom{display:flex;align-items:center;gap:7px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.custom input{width:60px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  padding:8px 10px;border-radius:10px;font-size:.92rem;font-weight:700;font-family:inherit;text-transform:none}
.custom input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.custom input.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.btn{border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-weight:700;font-size:.9rem;
  padding:11px 17px;border-radius:11px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
  font-family:inherit;transition:.15s}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2.2}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;
  box-shadow:0 6px 16px rgba(79,70,229,.32)}
.btn.primary:hover{color:#fff;filter:brightness(1.06)}
.pushend{margin-left:auto}

.meta{display:flex;align-items:center;gap:10px;margin:0 4px 14px;flex-wrap:wrap;color:var(--muted);font-size:.9rem;font-weight:500}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--accent-soft);color:var(--accent);
  border-radius:99px;padding:5px 13px;font-size:.82rem;font-weight:700}
.chip.lvl{background:var(--panel);border:1px solid var(--line);color:var(--muted)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{perspective:1600px;min-height:210px;cursor:pointer}
.inner{position:relative;width:100%;height:100%;min-height:210px;transition:transform .55s cubic-bezier(.4,.15,.2,1);
  transform-style:preserve-3d}
.card.flip .inner{transform:rotateY(180deg)}
.grid.compact{grid-template-columns:repeat(auto-fill,minmax(226px,1fr));gap:12px}
.grid.compact .card,.grid.compact .inner{min-height:150px}
.grid.compact .face{padding:14px 15px}
.grid.compact .qtext{font-size:.9rem;line-height:1.32}
.grid.compact .atext{font-size:.88rem;line-height:1.35}
.grid.compact .qnum{margin-bottom:7px;font-size:.62rem}
.grid.compact .tap{margin-top:9px;font-size:.68rem}
.grid.compact .diagram{padding:8px;margin:4px 0 8px}
.grid.compact .diagram svg{max-height:128px}
.grid.compact .acap{font-size:.74rem}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:20px;display:flex;flex-direction:column;overflow:hidden}
.face::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--accent),var(--accent2))}
.front{background:var(--panel)}
.back{transform:rotateY(180deg);background:linear-gradient(180deg,var(--panel),var(--panel2))}
.back::before{background:linear-gradient(90deg,var(--good),#22c55e)}
.qnum{font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.qnum .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.back .qnum .dot{background:var(--good)}
.qtext{font-size:1.06rem;font-weight:650;line-height:1.4;letter-spacing:-.01em;flex:1;display:flex;align-items:center}
.atext{font-size:1rem;font-weight:600;line-height:1.45;color:var(--ink)}
.tap{margin-top:14px;font-size:.76rem;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.tap svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}
.back .scrolly{overflow-y:auto;flex:1;margin:-4px -6px;padding:4px 6px}
.diagram{margin:6px 0 10px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;
  display:grid;place-items:center;color:var(--ink)}
.diagram svg{width:100%;height:auto;max-height:190px}
.diagram svg :where(path,line,circle,rect,polygon,polyline,ellipse){stroke:currentColor;stroke-width:2.4;fill:none;
  vector-effect:non-scaling-stroke;stroke-linecap:round;stroke-linejoin:round}
.diagram svg .t{fill:currentColor;stroke:none;font-family:inherit;font-weight:700}
.diagram svg .ts{fill:var(--muted);stroke:none;font-family:inherit;font-weight:600}
.diagram svg .fillc{fill:currentColor;stroke:none}
.diagram svg .acc{stroke:var(--accent)}
.diagram svg .accf{fill:var(--accent);stroke:none}
.diagram svg .red{stroke:#e5484d}
.diagram svg .redf{fill:#e5484d;stroke:none}
.diagram svg .blue{stroke:#3b82f6}
.diagram svg .bluef{fill:#3b82f6;stroke:none}
.diagram svg .dash{stroke-dasharray:4 4}
.acap{font-size:.82rem;color:var(--muted);font-weight:500;line-height:1.4;margin-top:2px}

.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)}
footer{margin-top:34px;text-align:center;color:var(--muted);font-size:.8rem}
.count-note{font-size:.82rem;color:var(--muted);font-weight:500}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div>
        <h1>Retrieval Practice</h1>
      </div>
    </div>
    <div class="spacer"></div>
    <button class="iconbtn" id="themeBtn" title="Toggle dark mode" aria-label="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>
    </button>
  </header>

  <section class="controls">
    <div class="selrow">
      <div class="field"><label for="courseSel">Course</label><div class="sel"><select id="courseSel"></select></div></div>
      <div class="field"><label for="topicSel">Topic</label><div class="sel"><select id="topicSel"></select></div></div>
      <div class="field"><label for="subSel">Sub-topic</label><div class="sel"><select id="subSel"></select></div></div>
    </div>
    <div class="actionrow">
      <div class="count">
        <span>Questions on screen</span>
        <div class="seg" id="countSeg">
          <button data-n="3" class="on">3</button>
          <button data-n="6">6</button>
          <button data-n="9">9</button>
        </div>
        <div class="custom"><span>or</span><input id="customCount" type="number" min="1" max="60" inputmode="numeric" placeholder="#" aria-label="Custom number of questions"><span>custom</span></div>
      </div>
      <button class="btn primary pushend" id="shuffleBtn">
        <svg viewBox="0 0 24 24"><path d="M16 3h5v5M4 20 21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        Shuffle
      </button>
      <button class="btn" id="revealBtn">
        <svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
        Reveal all
      </button>
    </div>
  </section>

  <div class="meta" id="meta"></div>
  <div class="grid" id="grid"></div>

  <footer>Click any card to flip it. Built from your imported question banks &middot; <span id="tot"></span></footer>
</div>

<script>
const DATA = {"courses": [{"name": "KS3 Science", "level": "KS3", "topics": [{"name": "Biology: Structure and function of living organisms", "subtopics": [{"name": "Cells and organisation", "cards": [{"q": "State the 5 sub-cellular organelles in an animal cell", "a": "Nucleus, cell membrane, ribosomes, cytoplasm, mitochondria"}, {"q": "State the 8 sub-cellular organelles in an plant cell", "a": "Nucleus, cell membrane, ribosomes, cytoplasm, mitochondria, cell wall, chloroplast and vacuole"}, {"q": "State the function of the nucleus of a cell", "a": "Contains DNA and controls the function of the cell"}, {"q": "State the function of the cell membrane of a cell", "a": "Controls what enters and leaves the cell"}, {"q": "State the function of the ribosome of a cell", "a": "Where protein synthesis occurs (proteins are made)"}, {"q": "State the function of the cytoplasm of a cell", "a": "Where chemical reactions occur in a cell"}, {"q": "State the function of the mitochondria of a cell", "a": "Where aerobic respiration occurs in a cell"}, {"q": "State the function of the cell wall of a cell", "a": "Provides support for the cell"}, {"q": "State the function of the chloroplast of a cell", "a": "Absorbs light for photosynthesis"}, {"q": "State two functions of the vacuole of a cell", "a": "Stores minerals and sugars and gives structure"}, {"q": "Define \"prokaryotic cell\" and \"eukaryotic cell\"", "a": "DNA is not contained in a nucleus"}, {"q": "Define \"eukaryotic cell\"", "a": "DNA contained in a nucleus"}, {"q": "State two adaptations of an ovum cells", "a": "Contains half of the DNA, lots of cytoplasm"}, {"q": "State three adaptations of sperm cells", "a": "Contains half of the DNA, lots of mitochondria, tail"}, {"q": "State two adaptations of nerve cells", "a": "Long, dendrites to connect to other cells"}, {"q": "State three adaptations of red blood cells", "a": "Large surface area, no nucleus, haemoglobin"}, {"q": "State two adaptations of muscle cells", "a": "Protein fibres to contract and relax and lots of mitochondria"}, {"q": "State the function of red blood cells", "a": "Carry oxygen around the body"}, {"q": "State two adaptations of ciliated cells", "a": "Tiny hairs (cilia)"}, {"q": "State the function of ovum cells", "a": "Carry female genetic information"}, {"q": "State the function of sperm cells", "a": "Carry male genetic information"}, {"q": "State the function of nerve cells", "a": "Transmit electrical messages around the body"}, {"q": "State the function of  muscle cells", "a": "Contract and relax"}, {"q": "State an adaptation of a palisade cell", "a": "Lots of chloroplasts"}, {"q": "State the function of  ciliated cells", "a": "Move mucus out of airways"}, {"q": "State three adaptations of a root hair cell", "a": "Large surface area, lots of mitochondria, large vacuole"}, {"q": "State the function of  palisade cells", "a": "Lots of chloroplasts"}, {"q": "State the function of  root hair cell", "a": "Absorb water and minerals from the soil"}, {"q": "Define \"stem cell\"", "a": "An undifferentiated (non-specialised) cell"}, {"q": "Where are stem cells found in plant and animals?", "a": "Plants = meristem, animals = bone marrow"}, {"q": "Define 'tissue'", "a": "A group of cells with similar structure working together for a specific function"}, {"q": "Define 'organ'.", "a": "A group of tissues working together for specific functions"}, {"q": "Reorder the following in increasing size order: Organ, cell, tissue, organ system, organism", "a": "Cell < Tissue < Organ < Organ system < Organism"}, {"q": "Name 6 organ systems in the body", "a": "Circulatory, nervous, muscular, respiratory, digestive, skeletal"}, {"q": "Name the 3 types of muscle", "a": "Skeletal, smooth, cardiac"}, {"q": "What are the 4 main types of tissues found in animals", "a": "Connective, Epithelial, Muscular, Nervous"}, {"q": "What is the role of connective tissue", "a": "Connects different parts of the body together"}, {"q": "What is the role of muscular tissue", "a": "Contracts and causes the movement of limbs"}, {"q": "What is the role of the nervous tissue", "a": "Sends signals around your body"}, {"q": "Where in the body would you find epithelial tissue?", "a": "Linings of organs e.g. stomach, lungs, intestines"}, {"q": "Define \"diffusion\"", "a": "The movement of particles from a high concentration to a low concentration"}]}, {"name": "Skeletal and muscular systems", "cards": [{"q": "Where are blood cells made?", "a": "Bone marrow"}, {"q": "Which part of the skeleton protects the lungs", "a": "The rib cage"}, {"q": "Approx. how many bones is the human skeleton made of", "a": "200"}, {"q": "Which mineral makes bones strong?", "a": "calcium"}, {"q": "Name the 4 main functions of the skeleton", "a": "1. Support  2. protect vital organs 3. movement 4. make blood cells"}, {"q": "What is the purpose of white blood cells", "a": "To protect against infection"}, {"q": "Which of the following is a hinge joint - shoulder>Hip>Knee", "a": "Knee"}, {"q": "Name the smooth substance at the end of a bone", "a": "cartilage"}, {"q": "What type of joint  is a hip joint", "a": "Ball and socket"}, {"q": "How are muscles attached to bone?", "a": "By strong tendons"}, {"q": "Name the two muscles in the upper arm", "a": "biceps and triceps"}, {"q": "How are bones linked together", "a": "Joints"}, {"q": "What is a synovial joint", "a": "A freely movable joint"}, {"q": "How do muscles work?", "a": "By getting shorter - contraction"}, {"q": "What are antagonistic muscles?", "a": "A 'pair' of muscles that act on a joint. As one contracts, the other relaxes"}, {"q": "Give an example of a pair of antagonastic muscles found in the legs", "a": "quadriceps and hamstrings"}]}, {"name": "Nutrition and digestion", "cards": [{"q": "Name the 7 food groups", "a": "Carbohydrates, proteins, fats, fibre, vitamins, minerals, water"}, {"q": "State 2 examples of food rich in carbohydrates", "a": "Rice and pasta"}, {"q": "State 3 examples of food rich in protein", "a": "Fish, meat and eggs"}, {"q": "State 3 examples of food rich in fat", "a": "Butter, cheese and chocolate"}, {"q": "State 3 examples of food rich in minerals and vitamins", "a": "Fruit and vegetables"}, {"q": "State 2 examples of food rich in fibre", "a": "Brown bread and cereal"}, {"q": "Define \"balanced diet\"", "a": "Eating a variety of foods in the correct proportions"}, {"q": "State three diseases associated with an unbalanced diet", "a": "Obesity, anorexia and Type 2 diabetes"}, {"q": "Define \"anorexia\"", "a": "Refusing to eat to lose weight"}, {"q": "Give three reasons why someone may need to consume more calories than normal", "a": "1) very active, 2) growing, 3) pregnant"}, {"q": "Which enzyme helps us to digest carbohydrates?", "a": "Amylase"}, {"q": "Which enzyme helps us to digest proteins?", "a": "Protease"}, {"q": "State the 7 main organs in the digestive system", "a": "Mouth, oesophagus, stomach, pancreas, liver, small intestine, large intestine"}, {"q": "Which enzyme helps us to digest fats?", "a": "Lipase"}, {"q": "Where is amylase produced?", "a": "Salivary glands and small intestine"}, {"q": "Where is protease produced?", "a": "Stomach, pancreas and small intestine"}, {"q": "Where is lipase produced?", "a": "Pancreas and small intestine"}, {"q": "Where is bile produced?", "a": "The liver"}, {"q": "What is absorbed from the small intestine?", "a": "Nutrients"}, {"q": "What is absorbed from the large intestine?", "a": "Water"}, {"q": "Which nutrients do not need to be digested?", "a": "Minerals, vitamins and water"}, {"q": "Where is most food digested?", "a": "Small intestine"}, {"q": "What is produced when proteins are digested?", "a": "Amino acids"}, {"q": "Where does digestion start?", "a": "The mouth"}, {"q": "What gives the small intestine a large surface ares?", "a": "Villi"}, {"q": "When faeces are passed out of the body, this is called?", "a": "Egestion"}, {"q": "What is the role of the teeth in digestion?", "a": "Break down food into smaller pieces"}]}, {"name": "Gas exchange systems", "cards": [{"q": "What is respiration?", "a": "A chemical reaction which uses glucose and oxygen to release energy"}, {"q": "Give the equation for aerobic respiration", "a": "glucose + oxygen -> carbon dioxide + water"}, {"q": "Outline the flow of air from the atmosphere into our lungs, starting from the nasal cavity.", "a": "Nasal cavity --> trachea --> bronchi --> bronchioles --> alveoli"}, {"q": "What two structures change the pressure inside the chest cavity to ventilate lungs?", "a": "Intercostal muscles + Diaphragm"}, {"q": "Describe the state of the diaphragm as we breathe in.", "a": "Contracts and flattens"}, {"q": "Describe the state of the diaphragm as we breathe out.", "a": "Relaxes and return to dome shape"}, {"q": "State the function of the ribcage.", "a": "Protect the heart and lungs"}, {"q": "State one adaptation of the lungs for efficient gas exchange.", "a": "Lots of alveoli to increase surface area; Rich blood supply/Extensive capillary network; Thin walls (one cell thick)"}, {"q": "What is the scientific name for the windpipe?", "a": "Trachea"}, {"q": "Why is it important for the lungs to have a rich blood supply?", "a": "Maintain steep concentration gradient for efficient diffusion"}, {"q": "What is the name for respiration with oxygen?", "a": "Aerobic"}, {"q": "What is ventilation?", "a": "Breathing"}, {"q": "What are tiny air sacs in the lungs called?", "a": "Alveoli"}, {"q": "Where does respiration happen", "a": "Mitochondria"}, {"q": "Name the 6 main structures of the respiratory system", "a": "Mouth, nose, trachea, bronchus, bronchioles, alveoli"}, {"q": "State three ways that the lungs are adapted for gas exchange", "a": "1) Thin walls, 2) good blood supply, 3) moist walls"}, {"q": "Define \"diffusion\"", "a": "The moment of particles from a high concentration to a low concentration"}, {"q": "Which gas diffuses from the alveoli (lungs) into the blood?", "a": "Oxygen"}, {"q": "  the waxy cuticle?", "a": "To protect the leaf"}, {"q": "What is the function of the spongy layer?", "a": "Creates spaces to allow CO2 to diffuse into the leaf"}, {"q": "State three ways that a leaf is adapted for gas exchange", "a": "Large surface area, thin, stomata"}, {"q": "Give an example of diffusion occurring in a plant", "a": "Gas exchange (oxygen and carbon dioxide)"}, {"q": "Where is osmosis used within a plant?", "a": "Water moving into the root"}, {"q": "Define \"translocation\"", "a": "Movement of sugars through a plant"}, {"q": "Where is active transport used within a plant?", "a": "To move minerals into the root"}, {"q": "Which substance is used to test for the presence of starch?", "a": "Iodine solution"}, {"q": "What is the colour of iodine solution if starch is present?", "a": "Blue/black"}, {"q": "What is the colour of iodine solution if starch is not present?", "a": "Orange/brown"}, {"q": "State one hazard associated with using iodine solution", "a": "Harmful"}, {"q": "Why is a leaf boiled in ethanol before being tested for starch?", "a": "To break down the cell walls"}, {"q": "State one hazard associated with using ethanol", "a": "It is flammable"}, {"q": "What is starch?", "a": "An insoluble store of glucose"}, {"q": "How is starch formed in a plant?", "a": "During photosynthesis"}]}, {"name": "Cellular respiration", "cards": [{"q": "Define aerobic respiration", "a": "Glucose reacts with oxygen to release energy"}, {"q": "What is the word equation for respiration?", "a": "Glucose + oxygen -> carbon dioxide + water (+energy)"}, {"q": "What is the symbol equation for respiration?", "a": "C6H12O6 + 6O2 -> 6CO2 + 6H2O (+energy)"}, {"q": "Where does aerobic respiration occur?", "a": "In the mitochondria"}, {"q": "Define 'anaerobic respiration' (extension only)", "a": "Glucose is broken down without oxygen to release energy"}, {"q": "Where does anaerobic respiration occur? (extension only)", "a": "In the cytoplasm"}, {"q": "What do plants make in ana a weak alkali?", "a": "pH 8-10"}, {"q": "What is the pH of a strong alkali?", "a": "pH 11-14"}, {"q": "What is the formula for sodium hydroxide", "a": "NaOH"}, {"q": "Define \"neutralisation\"", "a": "The reaction of an acid with an alkali to form a neutral salt and water"}, {"q": "Recall the general equation for a neutralisation reaction", "a": "Acid + alkali -> salt + water"}, {"q": "What makes an acid a concentrated acid?", "a": "Lots of acid particles in a given volume"}, {"q": "What makes an acid a weak acid?", "a": "Very few acid particles in a given volume"}, {"q": "What makes an acid a strong acid? (extension only)", "a": "Completely ionises in water"}, {"q": "What makes an acid a weak acid? (extension only)", "a": "Partially ionises in water"}]}]}, {"name": "Chemistry: Energetics", "subtopics": [{"name": "General", "cards": [{"q": "Define \"exothermic\"", "a": "A reaction which gives out energy"}, {"q": "Define \"endothermic\"", "a": "A reaction which takes in energy"}]}]}, {"name": "Chemistry: Periodic Table", "subtopics": [{"name": "General", "cards": [{"q": "Define \"period\"", "a": "Rows in the periodic table"}, {"q": "Define \"group\"", "a": "Columns in the periodic table"}, {"q": "Which side of the periodic table contains metals?", "a": "Left"}, {"q": "Which side of the periodic table contains non-metals?", "a": "Right"}, {"q": "Where are alkali metals found in the periodic table?", "a": "Group 1"}, {"q": "Where are halogens found in the periodic table?", "a": "Group 7"}, {"q": "Give 4 properties of metals", "a": "*High melting point\n*Good thermal and electrical conductors\n*Ductile\n*Malleable"}, {"q": "Give 4 properties of non-metals", "a": "*Low melting point\n*Poor thermal and electrical conductors\n*Brittle"}, {"q": "Define \"alloy\" (extension only)", "a": "Mixture of two elements, one is a metal"}, {"q": "Why are alloys hard? (extension only)", "a": "Atoms are different sizes so can't slide over each other"}, {"q": "What is the name for the smaller number given for each element?", "a": "Atomic number"}, {"q": "What is the name for the bigger number given for each element?", "a": "Mass number"}, {"q": "How do you calculate the number of protons for an element?", "a": "Use the atomic number"}, {"q": "Name 6 alkali metals in order of reactivity (low to high)", "a": "Lithium, sodium, potassium, rubidium, caesium, francium"}, {"q": "When cut, how do alkali metals (group 1) appear?", "a": "Shiny"}, {"q": "What is formed when alkali metals (group 1) react with water?", "a": "Alkaline metal hydroxide"}, {"q": "What happens to reactivity as you move down the alkali metals (group 1)?", "a": "Increases"}, {"q": "How do you calculate the number of electrons for an element?", "a": "Use the atomic number"}, {"q": "How do you calculate the number of neutrons for an element?", "a": "Mass number - atomic number"}, {"q": "How are elements arranged in the periodic table?", "a": "In order of atomic number (lowest to highest)"}, {"q": "The column (group) in the periodic table tells us the …", "a": "Number of electrons in the outer shell"}, {"q": "What is the name of the elements found in the middle of the periodic table that are not part of a group?", "a": "Transition metals"}, {"q": "Why did Mendeleev do when creating the modern periodic table? (extension only)", "a": "Left gaps to make the pattern fit"}, {"q": "How do you calculate the relative formula mass of a compound? (extension only)", "a": "Add up the mass numbers"}, {"q": "Name the 5 halogens (group 7) in order of reactivity (low to high)", "a": "Astatine, Iodine, Bromine, Chlorine, Fluorine"}, {"q": "State 3 properties of the halogens (group 7)", "a": "Non-metal, highly reactive, diatomic"}, {"q": "What happens to reactivity as you move down the halogens (group 7)?", "a": "Decreases"}, {"q": "Name three noble gases (group 0) (extension only)", "a": "Helium, neon, argon"}, {"q": "State 3 properties of the noble gases (group 0) (extension only)", "a": "Non-metal, inert, gases"}, {"q": "What happens to density as you move down the noble gases (group 0)? (extension only)", "a": "Increases"}]}]}, {"name": "Chemistry: Materials", "subtopics": [{"name": "General", "cards": [{"q": "What is the reactivity series?", "a": "A list of elements ordered by their reactivity"}, {"q": "How can metals be placed in order of their reactivity?", "a": "Add the metals to water or acid and see which ones react the most (by how much fizzing there is)"}, {"q": "What is the name for a reaction where oxygen is removed from a compound?", "a": "Reduction"}, {"q": "Explain why zinc can be extracted from zinc oxide with carbon but magnesium cannot be extracted from magnesium oxide with carbon", "a": "Magnesium is more reactive than carbon (1), Zinc is less reactive than carbon (1), Carbon can therefore remove oxygen from zinc oxide but not magnesium oxide (1)"}, {"q": "Define oxidation in the context of loss and gain of electrons", "a": "Oxidation is the loss of electrons"}, {"q": "Define reduction in the context of loss and gain of electrons", "a": "Reduction is the gain of electrons"}, {"q": "Define a displacement reaction", "a": "A reaction in which a more reactive element takes the place of a less reactive element in one of its compounds or in solution"}, {"q": "Explain why gold and silver can be found naturally in the Earth's crust", "a": "It is very unreactive"}, {"q": "What process is used to extract metals more reactive than carbon", "a": "Electrolysis"}, {"q": "Define an ore", "a": "A material containing enough metal in it for it to be economically worthwhile to extract the metal."}, {"q": "How are ceramics made?", "a": "Shaping wet clay and heating in furnace"}, {"q": "State two properties of ceramics", "a": "Hard and tough"}, {"q": "Why do we glaze ceramics?", "a": "To make them waterproof"}, {"q": "What is a polymer?", "a": "A very large molecule made from smaller molecules called monomers"}, {"q": "Give an example of a polymer", "a": "Plastic"}, {"q": "Give two properties of polymers", "a": "Insulators, unreactive"}, {"q": "Define \"composite\"", "a": "A material made form two or more different types of material"}, {"q": "Give two examples of composites", "a": "MDF and fibreglass"}, {"q": "What is MDF made from?", "a": "Wood fibres and glue"}, {"q": "Why do we use composites?", "a": "We can combine materials with useful properties"}]}]}, {"name": "Chemistry: Earth and atmosphere", "subtopics": [{"name": "General", "cards": [{"q": "How are fossil fuels formed?", "a": "Dead plant and animal material trapped under rocks millions of years ago"}, {"q": "Name three fossil fuels", "a": "Coal, oil, natural gas"}, {"q": "Name 3 greenhouse gases", "a": "Water, carbon dioxide and methane"}, {"q": "Describe 2 ways that humans are contributing to climate change", "a": "Burning fossil fuels and deforestation"}, {"q": "Describe the greenhouse effect (extension only)", "a": "Greenhouse gases prevent heat from escaping from the Earth into space"}, {"q": "How does photosynthesis has an effect on the carbon cycle?", "a": "Plants absorb carbon dioxide for photosynthesis so reduce carbon dioxide levels in the atmosphere"}, {"q": "How does respiration has an effect on the carbon cycle?", "a": "Respiration releases carbon dioxide so increases carbon dioxide levels in the atmosphere"}, {"q": "How does combustion has an effect on the carbon cycle?", "a": "Combustion releases carbon dioxide so increases carbon dioxide levels in the atmosphere"}, {"q": "Define \"finite\" resource", "a": "A resource that will run out"}, {"q": "Give 2 reasons why humans should recycle?", "a": "1) So that we don't run out of finite resources 2) so waste isn't burnt producing carbon dioxide"}, {"q": "How old is the Earth?", "a": "4.6 billion years old"}, {"q": "Which gas was most prevalent in the early atmosphere?", "a": "carbon dioxide"}, {"q": "Which other gases were present in the early atmosphere?", "a": "methane, water vapour and ammonia"}, {"q": "What do scientists believe were the source of the gases that made up the early atmosphere?", "a": "Volcanoes"}, {"q": "What has happened to the levels of carbon dioxide in the atmosphere today?", "a": "It has decreased"}, {"q": "What has happened to the levels of methane in the atmosphere today?", "a": "It has decreased"}, {"q": "What happened to the water vapour?", "a": "It condensed to form the oceans"}, {"q": "What happened to the carbon dioxide?", "a": "It was absorbed by green plants and algae in photosynthesis"}, {"q": "Where did the oxygen come from?", "a": "It was releasedby green plants in algae in photosynthesis"}, {"q": "Which fuel locked away the carbon when animals and plants died?", "a": "Fossil fuels (coal, oil, natural gas)"}, {"q": "What are the 4 main layers of the Earth", "a": "inner core, outer core, mantle, crust"}, {"q": "Describe the Earth's crust", "a": "realtively thin and rocky"}, {"q": "Describe the Earth's mantle", "a": "properties of a solid but can flow very slowly"}, {"q": "Describe the Earth's core", "a": "made from nickel and iron"}, {"q": "Give the 3 main gases that make up the Earth's atmosphere", "a": "nitrogen (78%), oxygen (21%), other inc. argon (0.9%)"}, {"q": "Define \"abundance\"", "a": "If there is a lot of something"}, {"q": "How can the percentage of oxygen in the air be determined?", "a": "Reacting with copper"}]}, {"name": "Rocks", "cards": [{"q": "What is weathering?", "a": "Breakdwon of rocks by the action of weather, plants, animals and chemical processes"}, {"q": "Name three types of weathering", "a": "biological, chemical, physical"}, {"q": "What is biological weathering", "a": "breakdown of rocks because of the actions of living organisms"}, {"q": "What is chemical weathering?", "a": "Erosion of rocks by chemicals that react with their minerals"}, {"q": "Why is rainwater slightly acidic?", "a": "carbon dioxide from the air has dissolved into it"}, {"q": "What happens when acidic rainwater falls on limestone and chalk?", "a": "A chemical reaction happens>soluble substances are formed>dissolve in water>washed away weathering the rock"}, {"q": "What is acid rain", "a": "rain that contains dissolved acidic gases such as nitrogen oxides and sulphur dioxide"}, {"q": "What is biological weathering", "a": "breakdown of rocks because of physical processes"}, {"q": "What can cause physical weathering?", "a": "changes in temperature, freezing and thawing, effects of wind, rain and waves"}, {"q": "How can a change in temperature affect rocks?", "a": "Rock gets hot = expands, rock gets cold = contracts. If this happens many times, cracks form and pieces of rock fall away"}, {"q": "What is freeze-thaw?", "a": "Water gets into a crack, freezes, expands and pushes crack further apart, ice melts, more water can get in crack"}, {"q": "How can the wind affect rocks?", "a": "Wind = blows tiny grains of sand against rock, wear the rock away"}, {"q": "What is erosion?", "a": "movement of broken pieces of rock away from the site of weathering"}, {"q": "Compare weathering and erosion", "a": "weathering = wearing away of rocks; erosion = movement of broken pieces of rock"}, {"q": "What is transport (rock cycle)", "a": "Movement of rock from one place to another"}, {"q": "Name the 3 types of rock", "a": "igneous, sedimentary, metamorphic"}, {"q": "Define \"porous\"", "a": "Allows water to pass through it"}, {"q": "Define \"grain\"", "a": "a small particle of rock"}, {"q": "What are igneous rocks?", "a": "Rocks that are formed under very hot conditions within the Earth"}, {"q": "How are igneous rocks formed?", "a": "molten rock (magma) that has cooled and solidified"}, {"q": "What is magma?", "a": "Molten rock that is found within the Earth"}, {"q": "Name the two types of igneous rocks", "a": "extrusive, intrusive"}, {"q": "How are extrusive igneous rocks formed?", "a": "Magma erupted onto surface as lava - cooled quickly"}, {"q": "How are intrusive igneous rocks formed?", "a": "Magma cooled slowly deep underground"}, {"q": "Define \"lava\"", "a": "Molten rock that's released from the Earth's core in a volcano or fissure"}, {"q": "Give some examples of igneous rocks", "a": "obsidian, granite"}, {"q": "Why do igneous rocks not contain fossils?", "a": "Fossils in original rock will have melted"}, {"q": "What are sedimentary rocks?", "a": "Rocks formed through deposition of sediments"}, {"q": "Give some examples of sedimentary rocks", "a": "limestone, sandstone, chalk, shale"}, {"q": "How do sedimentary rocks form?", "a": "transport > deposition > sedimentation > compaction > cementation"}, {"q": "What are sedimentary rocks like?", "a": "Contain rounded grains in layers. Oldest at bottom, youngest at top"}, {"q": "Can sedimentary rocks contain fossils?", "a": "Yes"}, {"q": "What are metamorphic rocks?", "a": "Rocks formed from other rocks that are changed because of heat or pressure"}, {"q": "How are metamorphic rocks formed?", "a": "Rocks buried deep uunderground or squeezed > rocks heated and put under pressure > minerals they contain changed chemically"}, {"q": "Do metamorphic rocks contain fossils", "a": "Rarely = any fossils present in original sedimentary will not normally survive the heat and pressure"}, {"q": "Give some examples of metamorphic rocks", "a": "marble (from limestone), slate (fromed from shale)"}, {"q": "What is the rock cycle?", "a": "All the processes involved in creating, changing and destroying rocks"}, {"q": "Give the stages of the rock cycle", "a": "weathering and erosion > transportation and deposition > sedimentation > compaction and cementation > burial, high temp + pressure > melting > slowly lift to surface"}]}]}, {"name": "General", "subtopics": [{"name": "General", "cards": [{"q": "What are igneous rocks like?", "a": "contain randomly arranged interlocking crystals"}, {"q": "Compare the two types of igneous rocks", "a": "Extrusive = small crystals, intrusive = large crystals"}]}]}, {"name": "Physics: Energy", "subtopics": [{"name": "General", "cards": [{"q": "How is the energy stored in food released?", "a": "Combustion or respiration"}, {"q": "Define \"combustion\"", "a": "Process of burning by heat"}, {"q": "What is respiration?", "a": "A chemical reaction which uses glucose and oxygen to release energy"}, {"q": "Define \"calorie\"", "a": "Amount of energy (in food) available"}, {"q": "Give the unit for energy", "a": "Joule (J)"}, {"q": "Why are kilojoules used on food labels", "a": "A lot of energy is available from most foods"}, {"q": "Give the unit for energy", "a": "Joule (J)"}, {"q": "Define \"power\"", "a": "rate of using energy"}, {"q": "Give the unit used for power", "a": "Watt (W)"}, {"q": "What do electrical appliances have to show the power rating?", "a": "Electrical rating plates"}, {"q": "What does an electrical rating plate show?", "a": "Power rating of the appliance in W"}, {"q": "What do fuel bills show?", "a": "energy used in kWh, kilowatt hour; cost of each kW hour, total cost of energy used"}, {"q": "What is an energy supplier?", "a": "companies that provide electricity and gas"}, {"q": "Give the formula to caclulate energy in kWh", "a": "energy in kWh = power in kW x time in hours"}, {"q": "How can the cost of energy be calculated?", "a": "cost = energy used in kWh x cost of 1 kWh"}, {"q": "What is 'domestic' energy", "a": "Energy used in the home"}, {"q": "What are fossil fuels?", "a": "Natural, finite fuel formed from the remains of living organisms, eg. oil, coal, natural gas"}, {"q": "Give the two categories energy sources can be placed in", "a": "renewable, non-renewable"}, {"q": "Define 'renewable' energy source", "a": "can be replaced, will not run out"}, {"q": "Define 'non- renewable' energy resource", "a": "cannot be replaced once they are all used up"}, {"q": "Give some energy sources", "a": "fuels, food, stores (batteries or wind)"}, {"q": "Name 3 fossil fuels", "a": "Coal, oil, natural gas"}, {"q": "Define \"finite\" resource", "a": "only used once and is in limited supply"}, {"q": "Approximately how much electricty in the UK is generated from fossil fuels", "a": "three quarters"}, {"q": "How do power stations generate electricity?", "a": "burning fuel releases energy > energy boils water > steam turns turbines > turbines turn electrical generators"}, {"q": "What is a turbine?", "a": "Revolving machine with blades. Can be turned by wind, water or steam"}, {"q": "What is an electrical generator?", "a": "Device that converts kinetic energy into electrical energy"}, {"q": "Suggest a negative affect of using fossil fuels", "a": "releases pollution, carbon dioxide, sulphur dioixde and nitrous oxides"}, {"q": "What is nuclear fuel?", "a": "fuel that releases energy through nuclear reactions"}, {"q": "Give the main nuclear fuels used", "a": "uranium, plutonium"}, {"q": "Give an advantage of nuclear fuels", "a": "do not produce sulphur dioxide or carbon dioxide"}, {"q": "Give disadvantages of nuclear fuels", "a": "non-renewable; if there is an accident radioactive material may be released into the environment, nuclear waste remains dangerous for thousands of years"}, {"q": "State four examples of non-renewable energy resources", "a": "Coal, oil, natural gas, nuclear power"}, {"q": "State six examples of renewable energy resources", "a": "Solar, wind, waves, hydroelectric, geothermal, biomass"}, {"q": "State the three fossil fuels", "a": "Coal, oil, natural gas"}, {"q": "State two disadvantages of using fossil fuels to generate electricity", "a": "Releases greenhouse gases, non-renewable"}, {"q": "Define \"power\"", "a": "How quickly energy is transferred by a device"}, {"q": "State the standard unit of power", "a": "Watt"}, {"q": "State the equation to calculate the cost of energy at home", "a": "Cost=power(kw) x time(hours) x price(per kWh)"}, {"q": "How do you convert watts into kilowatts?", "a": "Divide by 1000"}, {"q": "Name seven energy stores", "a": "Thermal (internal), chemical, kinetic, gravitational potential, elastic potential, electrostatic potential, magnetic"}, {"q": "Define \"conservation of energy\"", "a": "Energy cannot be created or destroyed; it can only be transferred, stored or dissipated"}, {"q": "Define \"dissipated\"", "a": "Spread out wastefully"}, {"q": "State the equation for efficiency", "a": "Efficiency= useful energy output/total energy input"}, {"q": "Define \"energy transfer\"", "a": "Energy being converted from one energy store to another"}, {"q": "Define \"gravitational potential energy store\"", "a": "The energy of an object at height"}, {"q": "Define \"elastic potential energy store\"", "a": "The energy stored when an object is stretched or squashed"}, {"q": "Name the diagram used to represent energy transfer (Ext)", "a": "Sankey diagram"}, {"q": "Define \"radiation\"", "a": "Transfer of thermal energy as a wave"}, {"q": "Define \"thermal conductor\"", "a": "Material that allows heat to move quickly through it"}, {"q": "Define \"thermal insulator\"", "a": "Material that allows heat to travel slowly though it"}, {"q": "In which states can convection occur?", "a": "Liquids and gases (fluids)"}, {"q": "Define \"temperature\"", "a": "A measure of the motion and energy of the particles"}, {"q": "State the standard unit of temperature", "a": "Degrees Celsius (oC)"}, {"q": "Define \"thermal (internal) energy\"", "a": "Quantity of energy stored in a substance due to the vibration of its particles"}, {"q": "State the standard unit of thermal (internal) energy", "a": "Joules"}]}]}, {"name": "Physics: Motion and forces", "subtopics": [{"name": "Describing motion", "cards": [{"q": "Define \"speed\"", "a": "How much distance is covered in a given time"}, {"q": "Define \"acceleration\"", "a": "How much speed increases or decreases in a given time"}, {"q": "State the equation for calculating speed", "a": "Speed = distance/time"}, {"q": "State the equation for calculating acceleration", "a": "Acceleration = change in speed/time"}, {"q": "State the units for speed", "a": "m/s or km/hr"}, {"q": "State the units for acceleration", "a": "metres per second squared (m/s2)"}, {"q": "What does a straight line on a distance-time graph show?", "a": "Object travelling at a constant speed"}, {"q": "What does a curved line on a distance-time graph show?", "a": "Object accelerating or decelerating"}, {"q": "What does a straight line on a velocity-time graph show?", "a": "Object accelerating"}, {"q": "What does a horizontal line on a distance-time graph show?", "a": "Object at rest (not moving)"}]}, {"name": "Forces", "cards": [{"q": "What is the unit for force?", "a": "Newton"}, {"q": "Name the apparatus used to measure forces", "a": "Newton meter"}, {"q": "Define \"force\"", "a": "A push or a pull that acts on an object due to the interaction with another object"}, {"q": "Define \"contact force\"", "a": "A force that acts when objects are physically touching"}, {"q": "Define \"non-contact force\"", "a": "A force that acts when objects are physically separated"}, {"q": "Name five examples of contact forces", "a": "Friction, air resistance, tension, compression, normal contact force"}, {"q": "Name three examples of non-contact forces", "a": "Gravitational force, electrostatic force, magnetic force"}, {"q": "Define \"resultant force\"", "a": "Single force that can replace all the forces acting on an object and have the same effect"}, {"q": "Name two things that could happen when the forces on an object are balanced", "a": "Object remains at rest, object remains at constant speed and direction"}, {"q": "Name four things that could happen when the forces on an object are unbalanced", "a": "Object accelerates (speeds up), decelerates (slows down), changes shape, changes direction"}, {"q": "What would the resultant force on an object be if the forces are balanced?", "a": "Zero"}, {"q": "What is the name of the diagram used to represent the forces acting on an object?", "a": "Free-body diagram"}, {"q": "Define \"friction\"", "a": "Force opposing motion which is caused by the interaction of surfaces moving over each other"}, {"q": "Define \"drag\"", "a": "Friction force when one object is a liquid or a gas"}, {"q": "Define \"tension\"", "a": "Force extending or pulling apart"}, {"q": "Define \"compression\"", "a": "Force squashing or pushing together"}, {"q": "Define \"normal contact force\"", "a": "Push force acting between two solid objects"}, {"q": "Define \"air resistance\"", "a": "Friction force acting between an object and air particles"}, {"q": "State two examples of situations where it is useful to reduce friction", "a": "Sports, vehicles"}, {"q": "State two ways of reducing friction or drag", "a": "Make objects streamlined, use lubricants"}, {"q": "State Newton's Third Law", "a": "When two objects interact, the forces they exert on each other are equal and opposite"}, {"q": "State the equation for Hooke's Law", "a": "Force = spring constant x extension"}, {"q": "Define \"moment of a force\"", "a": "The turning effect of a force"}, {"q": "State the equation for moment of a force", "a": "Moment of a force = force x distance to the pivot"}, {"q": "State the unit for \"moment of a force\"", "a": "Nm (Newton metre)"}, {"q": "State what happens when the anticlockwise moments are equal to the clockwise moments acting on an object?", "a": "The object balances"}, {"q": "State the units of spring constant", "a": "Newton per metre (N/m)"}, {"q": "What happens when the clockwise and anticlockwise moments acting on an object are unequal", "a": "The object rotates"}]}, {"name": "Pressure in fluids", "cards": [{"q": "Define \"pressure\"", "a": "The force exerted over an area"}, {"q": "State the two ways that pressure on a surface can be increased", "a": "1. Increase the force 2. decrease the area"}, {"q": "State the equation used to calculate pressure", "a": "P=F/A, Pressure=Force/Area"}, {"q": "State the units of pressure", "a": "N/m2 or Pascals"}, {"q": "State the reason that pressure in a fluid increases with depth", "a": "Increased weight of fluid above"}, {"q": "Define \"fluid\"", "a": "Liquid or gas"}, {"q": "Define \"upthrust\"", "a": "The upward force that a liquid or gas exerts on a body floating in it"}, {"q": "Define \"atmospheric pressure\"", "a": "The pressure caused by the weight of the air above a surface"}, {"q": "State the cause of pressure in a fluid", "a": "Particles hitting the surface of the container"}, {"q": "State why an object floats", "a": "If the upthrust balances the weight"}]}]}, {"name": "Physics: Waves", "subtopics": [{"name": "General", "cards": [{"q": "Define \"wave\"", "a": "A wave transfers energy without transferring matter"}, {"q": "Define \"transverse waves\"", "a": "The direction of vibration is at right angles to the direction of motion of the wave"}, {"q": "Define \"longitudinal wave\"", "a": "The direction of vibration is the same as the direction of motion of the wave"}, {"q": "Name three examples of transverse waves", "a": "Surface water waves, light, skipping rope"}, {"q": "Name three examples of longitudinal waves", "a": "Sound, ultrasound, slinky spring"}, {"q": "State the eight parts of the electromagnetic spectrum in order from long to short wavelength", "a": "Radio waves, microwaves, infrared, light, ultraviolet, X-rays, gamma rays"}, {"q": "Define \"amplitude\"", "a": "The maximum vibration, measured from the middle position of the wave"}, {"q": "Define \"frequency\"", "a": "Number of waves produced per second, in Hertz"}, {"q": "Define \"vacuum\"", "a": "A space with no particles in it"}, {"q": "Define \"wavelength\"", "a": "Distance between two corresponding points on a wave.  Measured in metres."}]}, {"name": "Light waves", "cards": [{"q": "State the relationship between incident and reflected angles", "a": "Angle of incidence=angle of reflection"}, {"q": "Define \"refraction\"", "a": "Change of direction of light going from one material into another"}, {"q": "Define \"incident ray\"", "a": "The incoming ray"}, {"q": "Define \ rresponding points on a wave.  Measured in metres."}, {"q": "Define \"vacuum\"", "a": "A space with no particles in it"}, {"q": "Define \"resting point\"", "a": "The mid-point of a wave vibration"}, {"q": "Define \"pitch\" of a sound wave", "a": "How high or low the sound is.  A high pitch has a high frequency."}, {"q": "Define \"volume\" of a sound wave", "a": "How loud or quiet a sound is. A high volume has a high amplitude."}, {"q": "State the unit of volume.", "a": "Decibels (dB)"}, {"q": "State the speed of sound in air", "a": "330m/s"}, {"q": "State the wave equation to calculate speed", "a": "v=fλ, wave speed = frequency x wavelength"}]}, {"name": "The ear", "cards": [{"q": "Name the six parts of the ear", "a": "Ear drum, bones, cochlea, auditory nerve, semi-circular canals, pinner"}, {"q": "Name the three bones in the middle ear", "a": "Hammer, anvil, stirrup"}, {"q": "State the function of the ear drum", "a": "Thin layer of membrane that picks up the vibrations of sounds waves"}, {"q": "State the function of the hammer, anvil and stirrup", "a": "Amplify the vibrations"}, {"q": "State the function of the cochlea", "a": "Long coiled tube filled with liquid that picks up vibrations and changes them to electrical signals"}, {"q": "State the function of the auditory nerve", "a": "Carries signals from the ear to the brain"}, {"q": "State the function of the semi-circular canals", "a": "Detect movement in the head and help with balance"}, {"q": "State the function of the pinner", "a": "The outer ear; directs vibrations into the ear"}, {"q": "Define \"ultrasound\"", "a": "Sound waves with frequency higher than the auditory range"}, {"q": "Define \"auditory range\"", "a": "The range of frequencies that an animal can hear (for humans 20Hz to 20000Hz)"}]}]}, {"name": "Physics: Electricity and electromagnetism", "subtopics": [{"name": "Current electricity", "cards": [{"q": "Define \"current\"", "a": "Flow of electricity"}, {"q": "Define \"potential difference\" (or \"voltage\")", "a": "Energy carried by the flow of electrical charge"}, {"q": "State the units of current", "a": "Ampere (Amp)"}, {"q": "State the units of potential difference", "a": "Volt (V)"}, {"q": "Define \"series\" circuit", "a": "Components in a circuit are all in one loop"}, {"q": "Define \"parallel\" circuit", "a": "Components in a circuit are in separate loops"}, {"q": "Define \"resistance\"", "a": "Slows down the flow of electricity"}, {"q": "State the units of resistance", "a": "Ohms"}, {"q": "State the equation used to calculate resistance", "a": "R=V/I, Resistance= potential difference/current"}, {"q": "State the equation used to calculate electrical power", "a": "P=IV, Power=current x potential difference"}, {"q": "What two things are needed for an electric current to flow", "a": "something to transfer energy to electrons  (battery), a complete path for the electrons to flow (circuit)"}, {"q": "State the rule for current in a series circuit", "a": "The current is the same at every point in the circuit and in every component"}, {"q": "State the rule for potential difference in a series circuit", "a": "The total potential difference of the power supply is shared between components"}, {"q": "State the rule for resistance in a series circuit", "a": "the more resistors, the greater the resistance. RT=R1+R2"}, {"q": "State the rule for current in a parallel circuit", "a": "The total current through the whole circuit is the sum of the currents through the separate components"}, {"q": "State the rule for potential difference in a parallel circuit", "a": "The potential difference across each branch in the circuit is the same"}, {"q": "State the rule for resistance in a parallel circuit", "a": "Adding more resistors in parallel decreases resistance"}, {"q": "What is an electrical conductor?", "a": "a material that allows charge to move easily through it"}, {"q": "What is an electrical insulator?", "a": "material that does not allow charge or heat to pass through ll of the time"}, {"q": "Define \"magnetic material\"", "a": "Material that becomes magnetic when in a magnetic field, but does not stay magnetic when it is removed"}, {"q": "Define \"magnetic field\"", "a": "The area around a magnet in which a magnetic material will experience a magnetic force"}, {"q": "Define \"magnetic poles\"", "a": "The ends of a magnetic field, called north-seeking (N) and south-seeking (S)"}, {"q": "State what happens when two 'like' magnetic poles are placed near each other (e.g. N and N)", "a": "Repel"}, {"q": "State what happens when two 'unlike' magnetic poles are placed near each other (e.g. N and S)", "a": "Attract"}, {"q": "State the instrument used to find the direction of a magnetic field", "a": "Compass"}, {"q": "What do magnetic field lines close together show?", "a": "A strong magnetic field"}, {"q": "State the direction that magnetic field lines flow", "a": "From the north-seeking to the south-seeking poles"}, {"q": "Define \"electromagnet\"", "a": "A non-permanent magnet turned on and off by controlling the current through it"}, {"q": "Define \"solenoid\"", "a": "Wire wound into a coil, part of an electromagnet"}, {"q": "Define \"core\"", "a": "Soft iron core which the solenoid if wrapped around"}, {"q": "State three ways that the strength of an electromagnet can be increased", "a": "Increase the current, increase the number of coils in the solenoid, the core"}, {"q": "State three uses of electromagnets", "a": "Bells, circuit breakers, loudspeakers"}, {"q": "State the reason that an electromagnet creates a magnetic field", "a": "A wire carrying a current produces an magnetic field"}, {"q": "State what happens to the strength of the magnetic field with increasing distance from the electromagnet", "a": "Decreases"}, {"q": "Name two things that have similar shape magnetic fields", "a": "Permanent magnet and electromagnet"}, {"q": "State two advantages of using an electromagnet instead of a permanent magnet", "a": "1. Can be turned vement of particles from a high concentration to a low concentration"}, {"q": "Define \"osmosis\"", "a": "The movement of water particles from a dilute to a concentrated solution through a partially permeable membrane"}, {"q": "Define \"active transport\"", "a": "The movement of particles from a low concentration to a high concentration using energy"}, {"q": "Give the properties of solids", "a": "particles arranged in a fixed position, vibrate in a fixed position, particles very close, cannot flow"}, {"q": "Give the properties of iquids", "a": "particles randomly arranged, move around each other, close, can flow"}, {"q": "Give the properties of gases", "a": "particles randomly arranged, move quickly in all directions, far apart, can flow"}, {"q": "Define \"density\"", "a": "A measure of compactness and ratio of mass to volume"}, {"q": "How much mass a substance contains compared to it's volume is…", "a": "density"}, {"q": "State the equation which links density, mass and volume", "a": "ρ=m/v"}, {"q": "State the units of density", "a": "kg/m3"}, {"q": "What two things are needed to determine density", "a": "mass of sample, volume of sample"}, {"q": "Hoe can you determine the volume of a solid?", "a": "regular solid = measuring side and calculating volume (l x w x h); using a eureka can and measuring the volume of displaced water"}, {"q": "Define \"Brownian motion\"", "a": "The random movement of particles in a fluid"}, {"q": "Which states does Brownian motion occur in?", "a": "Liquids and gases"}, {"q": "Define \"conservation of mass\"", "a": "Total mass of reactants before a reactions equal to the total mass of products after a reaction"}, {"q": "Define \"thermal (internal) energy\"", "a": "Quantity of energy stored in a substance due to the vibration of its particles"}, {"q": "Define \"temperature\"", "a": "A measure of the motion and energy of the particles"}, {"q": "Define \"conduction\"", "a": "Transfer of thermal energy by the vibration of particles"}, {"q": "D ?", "a": "The time taken for a planet to orbit the Sun"}, {"q": "What causes day and night?", "a": "The Earth spinning on its axis"}, {"q": "What causes the seasons?", "a": "The tilt of the Earth"}, {"q": "List the following from smallest to biggest: solar systems, moons, stars, planets, universe, galaxies, universe", "a": "moon, planet, star, solar system, galaxy, universe"}, {"q": "Name the galaxy that we are in", "a": "The Milky Way"}, {"q": "Define \"star\"", "a": "An object in space that gives out light and heat energy"}, {"q": "Name the force that keeps planets and moons in orbit around larger objects", "a": "Gravity"}, {"q": "Define \"natural satellite\"", "a": "A moon that orbits a planet"}, {"q": "Define \"artificial satellite\"", "a": "Manmade objects that orbit Earth; used for communications"}, {"q": "Name four methods used to investigate space", "a": "Earth-based telescopes, space-based telescopes, unmanned probes, manned missions"}, {"q": "State the standard unit of mass", "a": "Kilograms (kg)"}, {"q": "State the standard unit of weight", "a": "Newton (N)"}]}]}]}, {"name": "WJEC A-Level Physics", "level": "A-Level", "topics": [{"name": "Basic Physics", "subtopics": [{"name": "1.1", "cards": [{"q": "What are the 6 fundamental SI base units?", "a": "kg  m  s  K  A  mol"}, {"q": "What is N in base SI units?", "a": "kgms⁻²"}, {"q": "What is J in base SI units?", "a": "kgm²s⁻²"}, {"q": "What is V in base SI units?", "a": "kgm²A⁻¹s⁻³"}, {"q": "What does it mean if an equation is homogenous?", "a": "Both sides have identical base SI units"}, {"q": "What is a scalar?", "a": "A scalar is a quantity that has a magnitude only"}, {"q": "What is a vector?", "a": "A vector is a quantity that has a magnitude and direction"}, {"q": "What is displacement?", "a": "Vector equivalent of distance, shortest path A to B"}, {"q": "What is the difference between speed and velocity?", "a": "Velocity is speed in a particular direction (vector)"}, {"q": "How can you find the resultant of two vectors that are perpendicular?", "a": "Pythagoras"}, {"q": "Resolve the force, F, that acts at 30° below the horizontal into its components.", "a": "Horizontal: Fx = F cos(30)  Vertical: Fy = F sin (30)"}, {"q": "What is a moment?", "a": "Force x perpendicular distance from the pivot"}, {"q": "What can be described as the turning effect of a force?", "a": "Moment"}, {"q": "What is the principle of moments?", "a": "For a system to be in equilibrium the resultant moment equals zero"}, {"q": "What 2 conditions are needed for equilibrium?", "a": "Resultant force = zero and Resultant moment = zero"}, {"q": "3m horizontal bar hung from chains A and B. 25N at 0.85m from B. 30N at 1.75m from B. 40N at 0.65m from A. Calculate tension in chain A and B.", "a": "Tension in A = 55.9N  Tension in B = 39.1N"}, {"q": "What is the centre of gravity?", "a": "Single point at which entire weight of the body is considered to act"}, {"q": "What is density?", "a": "density = mass/volume"}, {"q": "What units can density be measured in?", "a": "kgm⁻³ or gcm⁻³"}, {"q": "Which state has the highest density in general?", "a": "Solids"}]}]}, {"name": "Kinematics", "subtopics": [{"name": "1.2", "cards": [{"q": "What is the difference between mean speed and instantaneous speed?", "a": "mean speed = total distance travelled/total time taken   instantaneous speed is the rate of change of distance"}, {"q": "What is the difference between mean velocity and instantaneous velocity?", "a": "mean velocity = total displacement/total time taken   instantaneous velocity is the rate of change of displacement"}, {"q": "What is the difference between mean acceleration and instantaneous acceleration?", "a": "mean acceleration = change in velocity/time taken   instantaneous acceleration is the rate of change of velocity"}, {"q": "What does the gradient of a displacement-time graph represent?", "a": "Velocity"}, {"q": "What does the gradient of a velocity-time graph represent?", "a": "Acceleration"},  are equal and opposite to accelerating forces (balanced)"}]}]}, {"name": "Dynamics", "subtopics": [{"name": "1.3", "cards": [{"q": "What is inertia?", "a": "How hard it is to change the motion of an object"}, {"q": "What is Newton's 1st law?", "a": "A body will remain at rest, or continue to move with a constant velocity if forces are balanced"}, {"q": "What does Newton's 1st law tell us about objects moving at a constant velocity?", "a": "Resultant force = zero (balanced forces)"}, {"q": "What is a resultant force?", "a": "Overall force acting on an object"}, {"q": "What is the resultant force?     24N<--      -->39N", "a": "15N -->"}, {"q": "What is Newton's 2nd law?", "a": "Rate of change of momentum is proportional to resultant force ΣF=Δp/t  (ΣF=ma)"}, {"q": "What is Newton's 3rd law?", "a": "If object A exerts a force on object B, then object B exerts an equal and opposite force on object A"}, {"q": "If a bat pushes a ball forwards with 400N what does the ball do?", "a": "Ball pushes the bat backwards with 400N"}, {"q": "Describe how Newton's 3rd law applies to a rocket?", "a": "Exhaust fumes exert a force down on ground, ground exerts an equal and opposite force up on the rocket"}, {"q": "What is the definition of mass?", "a": "How much matter (stuff) is in an object"}, {"q": "What is the definition of weight?", "a": "Force due to gravity on an object"}, {"q": "What is the equation that links weight and mass?", "a": "Weight = mass x gravitational field strength (W=mg)"}, {"q": "What is the equation to calculate momentum?", "a": "Momentum = mass x velocity (p=mv)"}, {"q": "What unit is used for momentum?", "a": "kgms⁻¹ or Ns"}, {"q": "What is the law of conservation of momentum?", "a": "Total momentum before interaction = total momentum after interaction if there are no external forces acting"}, {"q": "What equation links force and momentum?", "a": "Force = change in momentum / time (F=Δp /t)"}, {"q": "What is an elastic collision?", "a": "Collision where there is no change in total kinetic energy"}, {"q": "What is an inelastic collision?", "a": "Collision where kinetic energy is lost"}, {"q": "Car A m=95kg v=2.8m/s collides with car B m=140kg v=0. After the collision car A v= -0.4m/s, calculate velocity of car B.", "a": "v = 2.17m/s"}, {"q": "What does the gradient of a momentum-time graph represent?", "a": "Force"}, {"q": "What is the N3 pair for the Earth's force of gravity pulling you? down", "a": "You pulling the Earth up"}]}]}, {"name": "Energy Concepts", "subtopics": [{"name": "1.4", "cards": [{"q": "What is work done?", "a": "work done = force x distance moved in the direction of the force"}, {"q": "What type of energy is transferred to an object when it is moved?", "a": "Work done"}, {"q": "What are the most common types of energy transferred as work done?", "a": "Heat and sound"}, {"q": "What type of objects have kinetic energy?", "a": "Objects that are moving"}, {"q": "What is the equation to calculate kinetic energy?", "a": "Kinetic energy = 1/2 x mass x velocity² (KE=1/2mv²)"}, {"q": "What unit is used for kinetic energy?", "a": "J (Joules)"}, {"q": "What type of objects have gravitational potential energy?", "a": "Objects that are above the ground"}, {"q": "What is the equation to calculate gravitational potential energy?", "a": "Potential energy = mass x gravitational field strength x height (PE=mgh)"}, {"q": "What unit is used for potential energy?", "a": "J (Joules)"}, {"q": "Describe the energy transfers in a bouncing ball", "a": "Max PE, as it falls PE decreases and KE increases, Max KE at floor and Min PE, as it rises PE increases KE decreases"}, {"q": "Why does a bouncy ball not bounce back to the original height?", "a": "Energy is transferred as work done against friction (heat and sound)"}, {"q": "What is the principle of conservation of energy?", "a": "Energy cannot be created or destroyed, only transferred from one form to another"}, {"q": "What is the equation to calculate elastic energy?", "a": "Elastic Energy = 1/2 Fx  or = 1/2 kx²"}, {"q": "What is the definition of energy?", "a": "The amount of work an object can do"}, {"q": "What is the definition for power?", "a": "Work done per second or energy transferred per second (P=E/t)"}, {"q": "What does efficient mean?", "a": "Doesn't waste much energy"}, {"q": "What is the efficiency equation?", "a": "Efficiency = useful output/total input x100"}]}]}, {"name": "Solids Under Stress", "subtopics": [{"name": "1.5", "cards": [{"q": "Whose law states that extension of a spring is directly proportional to the force applied?", "a": "Hooke's law"}, {"q": "When you double the force on a spring what happens to the extension?", "a": "It doubles"}, {"q": "What is the equation given by Hooke's law?", "a": "Force = spring constant x extension (F = k x)"}, {"q": "What does k represent in Hooke's law?", "a": "spring constant"}, {"q": "What does it mean if a spring has a high spring constant?", "a": "Very stiff"}, {"q": "What unit is used for spring constant?", "a": "Nm⁻¹ or Ncm⁻¹"}, {"q": "How do you find the extension of a spring?", "a": "Extension = Stretched length - Original length"}, {"q": "How can you find the work done in stretching a spring?", "a": "Area under force-extension graph (W=1/2 F x)"}, {"q": "What does the gradient (steepness) of a force-extension graph represent?", "a": "Spring constant"}, {"q": "What are the 3 types of solid?", "a": "Crystalline, Amorphous and Polymers"}, {"q": "What is the definition of a crystal?", "a": "Solid in which atoms are arranged in a regular array with long range order"}, {"q": "What is the definition of a crystalline solid?", "a": "Solid consisting of a crystals with short and long range order"}, {"q": "Give 2 examples of crystalline solids", "a": "Metals (polycrystalline) and Quartz"}, {"q": "What is the definition of an amorphous solid?", "a": "Atoms arranged randomly. No long range order"}, {"q": "Give 2 examples of amorphous solids", "a": "Brick and Glass"}, {"q": "What is the definition of a polymeric solid?", "a": "Solid made up of chain-like molecules"}, {"q": "Give 2 examples of polymers", "a": "Rubber and Nylon"}, {"q": "What is the definition of a ductile material?", "a": "A material that can be drawn out into a wire"}, {"q": "What is the difference between plastic and elastic materials?", "a": "Elastic materials return to original size and shape when a force is removed, Plastic materials are permanently deformed"}, {"q": "Sketch the stress-strain graph for a crystalline material", "a": "Straight line then curve. Elastic limit, elastic and plastic regions labelled.", "d": "graph:stressstrain"}, {"q": "What is another name for a ductile fracture?", "a": "Necking"}, {"q": "What type of deformation do crystalline materials undergo?", "a": "Plastic deformation (necking)"}, {"q": "How can metals be strengthened?", "a": "Smaller grains or introducing foreign atoms"}, {"q": "Sketch the stress-strain graph for an amorphous material", "a": "Straight line. Elastic region only.", "d": "graph:stressstrain"}, {"q": "What type of fracture does an amorphous material undergo?", "a": "Brittle fracture / Crack propagation"}, {"q": "How fast can cracks propagate in amorphous materials?", "a": "Speed of sound"}, {"q": "How can amorphous materials be strengthened?", "a": "Reduce imperfections (thin fibres) or put under compression (pre-stressed concrete)"}, {"q": "Sketch the stress-strain graph for a polymeric material", "a": "Steep straight line, long flat line, steep straight line", "d": "graph:stressstrain"}, {"q": "Why is it hard to stretch a rubber band initially?", "a": "Van der Waals forces act over short distances to keep the molecules stuck together"}, {"q": "Why is it easy to stretch a rubber band after the initial section?", "a": "Molecule untangles and straightens out"}, {"q": "Why is it hard to stretch a rubber band in the final section?", "a": "Stretching/breaking strong covalent bonds requires a lot of force"}, {"q": "What is elastic hysteresis?", "a": "When the graphs of increasing and decreasing stress form a loop"}, {"q": "What is the area inside a hysteresis curve equal to?", "a": "Work done"}, {"q": "How can polymers be strengthened?", "a": "Cross-links (e.g. vulcanized rubber)"}, {"q": "What is stress?", "a": "Stress = Force / Area  (σ = F/A)"}, {"q": "What are the units of stress?", "a": "Pa or Nm⁻²"}, {"q": "What is strain?", "a": "Strain = extension/original length (ε = Δl/l)"}, {"q": "What are the units of strain?", "a": "None"}, {"q": "What is Young modulus?", "a": "Young modulus = stress/strain   (E = σ/ε)"}, {"q": "What are the units of Young modulus?", "a": "Pa or Nm⁻²"}, {"q": "E = 210GPa  m = 10kg  l = 100m  What is the extension?", "a": "6cm"}]}]}, {"name": "Using Radiation to Investigate Stars", "subtopics": [{"name": "1.6", "cards": [{"q": "What is a blackbody?", "a": "A body that absorbs all electromagnetic radiation that falls upon it (perfect emitter)"}, {"q": "What is a continuous spectrum?", "a": "Full rainbow"}, {"q": "How can white light be split into a continuous spectrum?", "a": "Glass prism, Diffraction grating, Spectrometer, Spectroscope"}, {"q": "What is a rainbow spectrum with dark lines across it known as?", "a": "Absorption Spectrum"}, {"q": "How are absorption lines produced?", "a": "Dust and gas absorb certain wavelengths (colour) of light which appear as dark lines at the missing wavelengths"}, {"q": "What do absorption lines tell us about a star?", "a": "Chemical composition (elements), how far away it is, how fast it's moving"}, {"q": "What is Wien's displacement law?", "a": "λmax = W / T where W = 2.90x10⁻³m K"}, {"q": "What name is given to the temperature where particles have no energy and exert no pressure?", "a": "Absolute zero"}, {"q": "What temperature is absolute zero?", "a": "0 kelvin = -273.15 degrees celsius"}, {"q": "What is 25deg celsius in kelvin?", "a": "298.15K"}, {"q": "What is Stefan's law?", "a": "P = A σ T⁴  where σ = 5.67x10⁻⁸ Wm⁻²K⁻⁴"}, {"q": "What is luminosity?", "a": "Total energy emitted per second (same as Power)"}, {"q": "What is the inverse square law of light?", "a": "I = P / 4πR²"}, {"q": "What does the R stand for in the inverse square law equation?", "a": "Distance to the object"}, {"q": "What is a light year?", "a": "Distance light travels in 1 year"}, {"q": "What is an Astronomical Unit?", "a": "Distance between the Earth and the Sun"}, {"q": "What are 3 units used to measure stellar distances?", "a": "Light year, Astronomical Unit and Parsec"}, {"q": "What is meant by multiwavelength astronomy?", "a": "Looking at objects using different telescope to find as much information as possible"}, {"q": "Why are most ground based telescope radio telescope?", "a": "Radio waves can travel through the atmosphere"}, {"q": "What does the presences of 21.1cm wavelength radio waves indicate?", "a": "Atomic Hydrogen clouds"}, {"q": "How is synchrotron radiation produced?", "a": "Electrons spiral around magnetic field and give off synchrotron radiation"}, {"q": "What does CMBR stand for?", "a": "Cosmic Microwave Background Radiation"}, {"q": "What is the CMBR?", "a": "Left over energy from Big Bang. High energy gamma rays stretched into microwaves"}]}]}, {"name": "Particles and Nuclear Structure", "subtopics": [{"name": "1.7", "cards": [{"q": "What are leptons?", "a": "Fundamental particles: electron and electron-neutrino"}, {"q": "What are hadrons?", "a": "Particles made up of quarks"}, {"q": "How many quarks make up a baryon?", "a": "3 quarks"}, {"q": "How many quarks make up a meson?", "a": "quark-antiquark pair (2)"}, {"q": "What is the charge of an up quark?", "a": "0.6666666666666666"}, {"q": "What is the charge of a down quark?", "a": "-0.3333333333333333"}, {"q": "What is the quark composition of a proton?", "a": "up up down"}, {"q": "What is the quark composition of an anti-neutron?", "a": "anti up, anti down, anti down"}, {"q": "What is the quark composition of a delta minus particle?", "a": "down, down, down"}, {"q": "What is the quark composition of a π⁻ meson?", "a": "anti up, down"}, {"q": "What is the lepton number of an electron?", "a": "1"}, {"q": "What is the lepton number of an electron anti-neutrino?", "a": "-1"}, {"q": "Give 3 examples of numbers that can be conserved in an interaction", "a": "momentum, charge, mass number, lepton number, baryon number, quark numbers"}, {"q": "Which force is present if there is a neutrino involved in an interaction?", "a": "Weak nuclear force"}, {"q": "Which force is present is there is a quark flavour change in an interaction?", "a": "Weak nuclear force"}, {"q": "Which force is present if an interaction only involves hadrons?", "a": "Strong nuclear force"}, {"q": "Which force is present if there are photons in an interaction?", "a": "Electromagnetic"}, {"q": "What are the 4 fundamental forces?", "a": "Gravitational, Strong nuclear, Weak nuclear and Electromagnetic"}]}]}, {"name": "Conduction of Electricity", "subtopics": [{"name": "2.1", "cards": [{"q": "What is the unit for charge?", "a": "C (Coulomb)"}, {"q": "What is the charge on an electron?", "a": "-1.6x10⁻¹⁹C"}, {"q": "What is the definition for electric current?", "a": "Rate of flow of electric charge  I = ΔQ/Δt"}, {"q": "What is the symbol for electric current?", "a": "I"}, {"q": "What is the unit for electric current?", "a": "A (Amps)"}, {"q": "Which direction does conventional current flow?", "a": "positive to negative"}, {"q": "Which direction to electrons actually flow?", "a": "negative to positive"}, {"q": "Describe the bonding structure in metals", "a": "metal lattice with free electrons"}, {"q": "What effect does increasing the resistance have on drift velocity?", "a": "Drift velocity decreases"}, {"q": "What is the equation linking current to drift velocity?", "a": "I = nAve"}, {"q": "For a wire radius=2mm  I=20A  n=4.8x10²⁹m⁻³  what is the maximum drift velocity?", "a": "v = 2.07x10⁻⁵ ms⁻¹"}, {"q": "What effect does doubling the drift velocity have on the current?", "a": "Current also doubles"}, {"q": "What can be said about the value of 'n' and 'e' for a certain material?", "a": "They are constant and do not change for a specific material"}, {"q": "If the radius of the wire doubles what effect does this have on the current?", "a": "A=πr²  so doubling radius means A x 4 so v decreases by a factor of 4"}, {"q": "What is the efficiency equation?", "a": "Efficiency = useful output/total input x100"}]}]}, {"name": "Resistance", "subtopics": [{"name": "2.2", "cards": [{"q": "What is the definition for potential difference?", "a": "Pd between two points is energy converted from electrical potential to another form per coulomb"}, {"q": "How much electrical energy is transferred if 2 Coulombs flow across a 6V component?", "a": "2 x 6 = 12J"}, {"q": "What equation links energy transferred to charge and pd?", "a": "ΔE = V Q                       V=W/Q               W=VIt"}, {"q": "What is the definition for electrical resistance?", "a": "Resistance of a conductor is the pd across it divided by resulting current through it  R=V/I"}, {"q": "What causes electrical resistance?", "a": "Collisions between free electrons and positive ions in metal lattice transfer energy"}, {"q": "Draw a current-voltage graph for a wire at a constant temperature", "a": "Straight line (directly proportional)"}, {"q": "What does a current-voltage graph for a wire at a constant temperature tell us about the resistance?", "a": "Constant resistance (straight line)"}, {"q": "Draw a current-voltage graph for a filament lamp", "a": "Curve increasing at a decreasing rate", "d": "iv:lamp"}, {"q": "What does a current-voltage graph for a filament lamp tell us about the resistance?", "a": "At low voltage resistance is constant (straight line), as voltage and temperature increase resistance increases", "d": "iv:lamp"}, {"q": "What is the definition of Ohm's law?", "a": "Current in a metal wire at a constant temperature is proportional to the pd across it"}, {"q": "What does it mean if a device is non-ohmic?", "a": "Temperature increases and resistance increases (not constant resistance)"}, {"q": "What is the definition of power?", "a": "Energy transferred per second  P=E/t"}, {"q": "What are 2 equations that link Power and Current?", "a": "P = I V   and P = I²R"}, {"q": "What is the resistivity equation?", "a": "R = ρL /A"}, {"q": "What is the unit of resistivity?", "a": "Ωm"}, {"q": "What effect does doubling the radius have on the resistance of the wire?", "a": "A=πr²  so doubling radius means A x 4 so R decreases by a factor of 4"}, {"q": "Calculate the length of a wire r=5.0x10⁻²cm  ρ=4.9x10⁻⁷Ωm  needed to make a 3Ω resistor", "a": "l = 4.81m"}, {"q": "What is the definition of superconducting transition temperature Tc?", "a": "Temperature at which material loses all resistance and becomes superconducting"}, {"q": "Give an example of a metal that exhibits superconductivity and one that doesn't", "a": "Zinc/Lead/Mercury exhibit superconductivity but Copper/Silver/Gold never do"}, {"q": "What is the advantage of using superconducting wires?", "a": "No resistance so no heat loss (less power dissipated)"}, {"q": "Give 2 applications/uses for superconductivity", "a": "Nuclear fusion reactors, Large Hadron Collider, Particle accelerators, MRI scanners, Large generators"}, {"q": "What is the disadvantage of using superconducting wires?", "a": "Difficult to sustain extremely low temperatures, materials are often brittle and hard to make into a wire"}]}]}, {"name": "DC Circuits", "subtopics": [{"name": "2.3", "cards": [{"q": "What happens to current in a series circuit?", "a": "Current is the same everywhere"}, {"q": "What happens to current in a parallel circuit?", "a": "Sum of current entering a junction is equal to currents leaving the junction"}, {"q": "What happens to voltage in a series circuit?", "a": "Sum of pd across components is equal to pd across the supply"}, {"q": "What happens to voltage in
