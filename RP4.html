it.", "a": "It is 1/12th the mass of a Carbon-12 atom"}, {"q": "How do you calculate the number of particles from the number of moles of a substance?", "a": "Number of particles = number of moles × Avagadro's constant"}, {"q": "How do you find the molar mass of a substance from the molecular mass?", "a": "Molar mass = Molecular mass x Avagadro's Number"}, {"q": "How do you find the total mass of a substance from the number of moles?", "a": "number of moles x molar mass"}, {"q": "How do you calculate the number of moles of a substance from the number of particles?", "a": "Number of particles÷Avagadro's number"}, {"q": "How do you find the molar mass of an element from its nucleon number?", "a": "Molar mass is equal to nucleon number in grams."}]}, {"name": "15.2 Gas Laws and the Ideal Gas Equation", "cards": [{"q": "Boyle's law: Pressure is inversely proportional to...", "a": "Volume for a fixed mass of gas at constant temperature"}, {"q": "Charles' law: Volume is proportional to...", "a": "Absolute temperature for a fixed mass of gas at constant pressure."}, {"q": "Gay Lassac's Law: Pressure is proportional to...", "a": "Absolute temperature for a fixed mass of gas at constant volume"}, {"q": "Avogadro's law: Volume occupied by a gas is proportional to...", "a": "Number of particles/moles if pressure and temperature are constant."}, {"q": "How do you find absolute zero from a pressure temperature graph?", "a": "Extrapolate the line to find the x-intercept."}, {"q": "What is R in pV = nRT?", "a": "Molar Gas Constant"}, {"q": "What is N in pV = NkT?", "a": "Number of particles"}, {"q": "What is n in pV = nRT?", "a": "Number of moles"}, {"q": "What is k in pV = NkT?", "a": "Boltzmann constant"}, {"q": "What units of temperature should be used in the ideal gas equation?", "a": "Kelvin"}, {"q": "What is the equation of state for an ideal gas?", "a": "pV = NkT OR pV = nRT"}, {"q": "What is meant by an ideal gas?", "a": "A theoretical gas that obeys the gas laws at all pressures and temperatures"}]}, {"name": "15.1-15.4 Temperature, Kinetic Theory and Pressure", "cards": [{"q": "What is the SI unit for pressure?", "a": "Pascal (Pa or Nm⁻²)"}, {"q": "How is pressure defined?", "a": "The force per unit area exerted normally to a surface"}, {"q": "Describe the relationship between root mean square speed of particles in a gas and absolute temperature.", "a": "rms speed is proportional √(absolute temperature)"}, {"q": "For what reason does increasing the temperature of an ideal gas increase pressure?", "a": "Particles have greater kinetic energy so there is a greater rate of collisions and greater change in momentum per collision."}, {"q": "For what reason does increasing the volume of an ideal gas decreases pressure?", "a": "P=F/A. Force exerted decreases as the rate of collisions with the container decreases and the surface area increases."}, {"q": "According to Newton's second law if a particle experiences a change in momentum...", "a": "There must be a force acting on the particle."}, {"q": "According to Newton's third law if a container exerts a force on a particle...", "a": "The particle must exert a force on the container."}, {"q": "How do you calculate the mean square speed of gas particles from their velocity?", "a": "Square the magnitude of the velocity of each individual gas molecule and then take the average of these values."}, {"q": "How do you calculate root mean square speed of a gas?", "a": "Square the magnitude of the velocity of each individual gas molecule, take the average of these values and then take the square root."}, {"q": "For what reason is root mean square speed used instead of velocity?", "a": "Average velocity is zero."}, {"q": "What is N in pV = ¹/₃ N m (c)²", "a": "Number of particles"}, {"q": "What is (c)² in pV = ¹/₃ N m (c)²", "a": "Mean square speed"}, {"q": "What is ³/₂kT equal to?", "a": "The mean kinetic energy of a gas particle"}, {"q": "What form is the internal energy of an ideal gas?", "a": "Purely kinetic (i.e. no potential energy)"}, {"q": "For what reason is there no potential energy in an ideal gas?", "a": "Becuase there are no force between particles (except during collisions)."}, {"q": "What is ³/₂NkT equal to?", "a": "Total internal energy of an ideal gas."}, {"q": "Kinetic theory assumption concerning volume", "a": "The volume of the particles in a gas is negligible compared to the volume of the container"}, {"q": "Kinetic theory assumption concerning forces", "a": "There are no electrostatic forces between particles except during collisions"}, {"q": "Kinetic theory assumption concerning motion", "a": "Particles are in continuous, rapid, random motion."}, {"q": "Kinetic theory assumption concerning collisions", "a": "The collisions particles undergo with each other and the container are all elastic"}, {"q": "Kinetic theory assumption concerning time", "a": "The duration of collisions is negligible compared to the time between collisions"}, {"q": "Describe the relationship between absolute temperature and the average KE of particles in a substance.", "a": "Absolute temperature is proportional to average kinetic energy of the particles in a substance."}]}, {"name": "16.1-16.3 Circular Motion", "cards": [{"q": "How many radians are there is 360 degrees?", "a": "2 pi"}, {"q": "What is the SI unit for angular velocity?", "a": "Radians per second."}, {"q": "Define angular velocity.", "a": "The rate of change of angle."}, {"q": "How do you calculate angular velocity from time period (T)?", "a": "Angular velocity = 2 pi / T"}, {"q": "How do you calculate angular velocity from frequency (f)?", "a": "Angular velocity = 2 pi f"}, {"q": "What is required for uniform circular motion?", "a": "A force that always acts perpendicular to velocity."}, {"q": "Why doesn't a centripetal force do any work on an object in circular motion!", "a": "The force has no component in the dircetion of motion/is always perpendicular to motion."}, {"q": "How do you calculate linear velocity from the time period (T) of an object in circular motion?", "a": "v = 2 pi r / T"}, {"q": "How do you calculate linear velocity from angular velocity?", "a": "v = angular velocity x radius"}, {"q": "How is it possible for an object to experience an acceleration but travel at a constant speed?", "a": "If acceleration is perpendicular to velocity, the velocity will change direction whilst speed is constant."}, {"q": "What provides the centripetal force for a car turning a corner?", "a": "Friction from the road on the tyres."}, {"q": "What provides the centripetal force on the moon?", "a": "The gravitational attraction of the Earth."}, {"q": "Apart from friction what contributes to the centripetal force on a banked track?", "a": "The horizontal component of the normal reaction."}, {"q": "If a mass on a string is swung in a vertical circle where is the tension greatest?", "a": "At the bottom of the circle."}, {"q": "If a mass on a string is swung in a vertical circle where is the tension least?", "a": "At the top of the circle."}]}, {"name": "17.1-17.3 Oscillations", "cards": [{"q": "What is the equilibrium position in an oscillation?", "a": "The point at which an object experiences no resultant force and thus no acceleration (the 'rest' position of an object)."}, {"q": "How many radians of phase are there in one complete oscillation?", "a": "2 x pi"}, {"q": "How do you calculate the angular frequency of an oscillation?", "a": "2 x pi x the frequency of the oscillation"}, {"q": "What are the conditions required for SHM?", "a": "The acceleration of an object is proportional, to its displacement from equilibrium and always in the opposite direction."}, {"q": "What is the acceleration of an object undergoing SHM when it's displacement is zero?", "a": "Zero"}, {"q": "What is meant by an Isochronous oscillator?", "a": "An oscillator with a period/frequency that is not dependent on amplitude."}, {"q": "Define a fiducial marker.", "a": "A pin or pointer placed at the equilibrium position of an oscillation."}, {"q": "What measures can be taken to improve the accuracy when measuring the time period of SHM?", "a": "Time over multiple oscillations and calculate the average of several repeats."}, {"q": "What is the kinetic energy of an SHM oscillator at maximum displacement?", "a": "Zero"}, {"q": "How does the total energy in an SHM oscillator change as time changes?", "a": "It is constant."}, {"q": "At what displacement is the potential energy of an SHM oscillator at a maximum?", "a": "At maximum displacement (x=±A)."}, {"q": "How do you calculate the total energy of an SHM oscillator from its amplitude?", "a": "E = ½ k A²"}]}, {"name": "17.4-17.5 Damping, driven oscillations and resonance", "cards": [{"q": "Define a free oscillation.", "a": "An oscillation in which no external driving force is present"}, {"q": "What causes damping of an oscillation?", "a": "An external force opposing motion."}, {"q": "What effect does damping of an oscillation have in terms of energy?", "a": "It transfers the KE of the oscillation to other forms, usually thermal energy."}, {"q": "What is meant by light damping of an oscillation?", "a": "A small damping force causing the amplitude of the oscillations to decrease slowly."}, {"q": "What is meant by heavy damping of an oscillation?", "a": "A damping force that results in a rapid decrease in the amplitude of oscillations."}, {"q": "Define very heavy damping of an oscillation.", "a": "A large damping force that prevents any oscillations of the system when its displaced."}, {"q": "What is the natural frequency of an oscillator?", "a": "The frequency at which osicllation will occur in a system with no external driving forces (free oscillations)"}, {"q": "What is meant by a forced oscillation?", "a": "An oscillation in which a (periodic) external driving force is present"}, {"q": "Define a driving frequency in oscillations.", "a": "The frequency of the external driving force in a forced oscillation"}, {"q": "How would you define resonance?", "a": "When the driving frequency of a forced oscillation is close to the natural frequency of the system resulting in large amplitude oscillations."}, {"q": "Define likely to occur when a mechanical system with little or no damping resonates.", "a": "The amplitude of the oscillations will increase until the object breaks."}, {"q": "What occurs in terms of energy during resonance?", "a": "There is the greatest possible transfer of energy from the driver to the forced oscillation."}, {"q": "What effects does increasing damping have on resonance?", "a": "It reduces the maximum amplitude and it reduces the frequency of maximum amplitude."}]}, {"name": "18.1-18.7 Gravitational Fields", "cards": [{"q": "What is meant by a gravitational field?", "a": "A region where a mass experiences a gravitational force."}, {"q": "What is meant by gravitational field strength?", "a": "The force per unit mass exerted on test mass at that point in the field."}, {"q": "In what units is gravitational field strength measured?", "a": "N kg⁻¹"}, {"q": "What does the direction of a gravitational field line show?", "a": "The direction of force on a test mass at that point in the field."}, {"q": "In the equation a field line diagram, what does the spacing of field lines stand for?", "a": "Field strength."}, {"q": "Define a radial gravitational field.", "a": "A gravitational field produced by a spherical (or point) mass in which the field lines all point towards the centre of mass of the object causing the field."}, {"q": "Define a uniform gravitational field.", "a": "A region where the gravitational field strength is constant."}, {"q": "How is a uniform gravitational field shown in a field line diagram?", "a": "Parallel, equally spaced field lines."}, {"q": "How would you define a point mass?", "a": "A idealised mass with zero size. The field outside a spherical mass can be modelled as the field around a point mass."}, {"q": "Give Newton's Law of Gravitation.", "a": "The gravitational attraction between two objects is proportional to the product of their masses and inversely proportional to the square of the distance between their centres of mass"}, {"q": "Write down Kepler's 1st Law.", "a": "A planet's orbit is an ellipse with the Sun at one of the two foci"}, {"q": "How would you define an aphelion?", "a": "The point in an orbit when an object is furthest from the sun and travelling slowest."}, {"q": "Define a perihelion.", "a": "The point in an orbit when an object is closest to the sun and travelling fastest."}, {"q": "Write down Kepler's 2nd Law.", "a": "A line segment joining the planet to the Sun sweeps out equal areas in equal time intervals."}, {"q": "Write down Kepler's 3rd Law.", "a": "For planets in the solar system the square of the orbital period is proportional to the cube of the average orbital radius."}, {"q": "Describe how gravitational field strength changes with distance from a point mass.", "a": "It obeys an inverse-square law."}, {"q": "What is meant by geostationary satellite?", "a": "A satellite with an orbital period of 24 hours which orbits above the equator in the same direction as the Earth's rotation so its apparent position in the sky remains unchanged."}, {"q": "What is meant by a satellite?", "a": "An object which orbits planet."}, {"q": "What is the absolute gravitational potential of a point?", "a": "The work done per unit mass to move an object from an infinite distance away to that point in the field."}, {"q": "How does gravitational potential change as distance from a point mass changes?", "a": "It is inversely proportional to distance."}, {"q": "How would you define escape velocity?", "a": "The velocity at which the magnitude of an object's kinetic energy is larger than the magnitude of its gravitational potential energy."}, {"q": "What is meant by gravitational potential energy?", "a": "The work done to move an object from infinity to a point in the gravitational field."}]}, {"name": "19.1 – 19.3 & 19.7 – Stars", "cards": [{"q": "What is the universe?", "a": "Everything that exists."}, {"q": "How would you define a Nebula?", "a": "A large cloud of gas (mainly hydrogen) and dust in space"}, {"q": "How would you define protostar?", "a": "A hot dense sphere of gas prior to the ignition of nuclear fusion in the core that creates a star"}, {"q": "What provides the energy required for a protostar to begin fusion?", "a": "Gravitation energy is transferred to thermal energy."}, {"q": "What is meant by nuclear fusion?", "a": "The fusing of light nuclei to produce heavier nuclei releasing energy in the process."}, {"q": "What is required for nuclear fusion to occur?", "a": "Extremely high temperatures and pressures."}, {"q": "What prevents gravity from causing stars to collapse?", "a": "The radiation and gas pressure pushing outward."}, {"q": "For what reason do large stars tend to remain stable for less time than smaller starts?", "a": "The pressure and temperature in the core is higher so they fuse hydrogen more quickly."}, {"q": "Define radiation pressure in a star.", "a": "Pressure from the photons created by fusion in the core of a star."}, {"q": "What is the gas pressure in a stars?", "a": "Pressure of the nuclei in the star's core pusing outwards."}, {"q": "What is meant by a main sequence star?", "a": "A stable star fusing hydrogen in helium."}, {"q": "What causes a star to leave the main sequence?", "a": "It runs low on hydrogen, affecting the stability of the star."}, {"q": "What is meant by a Red Giant?", "a": "The stage after the main sequence for a star with insufficient mass to go supernova."}, {"q": "Describe the structure of a red giant.", "a": "An inert core surronded by shells fusing elements heavier then Hydrogen."}, {"q": "What is meant by a white dwarf?", "a": "The very hot, dense remnant core of a red giant star."}, {"q": "What is the Chandrasekhar limit?", "a": "The mass of a star's core below which the star will form a white dwarf."}, {"q": "Define electron degeneracy pressure.", "a": "A quantum mechanical effect (due to Pauli exlcusion) which prevents the collapse of a stellar core to create a neutron star in white dwarves."}, {"q": "What is meant by a red supergiant?", "a": "A huge star in the last stages of its life prior to undergoing a supernova explosion. Elements up to iron may be produced by fusion in layers around its core"}, {"q": "What is meant by a (Type II) supernova?", "a": "The process of collapse of a red supergiant (at the end of its life) into a neutron star and the associated ejection of large amounts of stellar material into space."}, {"q": "How would you define a neutron star?", "a": "The extremely dense remnant core of a red supergiant star made almost entirely of neutrons."}, {"q": "How would you define a planetary nebula?", "a": "The outer layers of a red giant star driven off in the shockwave produced by the final collapse of the star."}, {"q": "Define a black hole.", "a": "The end stage of a stellar core with sufficient mass and density for its escape velocity to exceed the speed of light."}, {"q": "What is the typical mass of a stellar core that creates a black hole?", "a": "3 solar masses."}, {"q": "Define a Hertzsprung-Russell Diagram.", "a": "A log-log plot of luminosity (on the y-axis) against average surface temperature (backwards on the x-axis) for a group of stars."}, {"q": "What is the Luminosity of a star?", "a": "The total radiant power output of a star (Energy radiated per second)."}, {"q": "Define a black body.", "a": "An object that absorbs all radiation incident upon it."}, {"q": "How would you define a black body spectrum?", "a": "The characteristic spectrum of radiation emitted by all black bodies in thermal equilibriun with their surroundings."}, {"q": "What is Wien's displacement Law?", "a": "The peak emission wavelength of a black body spectrum is inversely proportional to the body's absolute temperature."}, {"q": "What is Stefan's Law", "a": "The total power emitted per unit surface area by a black body is proportional to the 4th power of the absolute temperature"}]}, {"name": "19.4-19.6 Line Spectra", "cards": [{"q": "What are electron energy levels in an atom?", "a": "Discrete energy levels within an atom in which electrons can exist."}, {"q": "What is the ground state (of an atom)?", "a": "The lowest allowed electron energy level in an atom."}, {"q": "What is the excited state of an atom?", "a": "An atom in which electrons have been raised to an energy level above the ground state."}, {"q": "What is an emission line spectrum", "a": "The spectrum of bright lines"}, {"q": "Define an absorption line spectrum.", "a": "The spectrum containing dark lines in a continuous spectrum produced by light passing through a gas."}, {"q": "Define a discrete quantity.", "a": "Occuring only at particular values (as opposed to continous)"}, {"q": "Define a diffraction grating.", "a": "A large number of closely spaced alternating transparent and opaque 'lines' used as a tool to produce spectra via interference."}, {"q": "What is meant by grating spacing for a diffraction grating?", "a": "The spacing between adjacent 'lines' in a grating."}, {"q": "What occurs in excitation of an atom?", "a": "The atom gains energy and an electron moves up to a higher energy level."}, {"q": "What processes can lead to the excitation of an atom?", "a": "A collision with a charged particle The absorption of a photon by an electron in the atom."}, {"q": "What occurs during de-excitation of an atom?", "a": "An excited electron drops down energy levels and emits a photon."}, {"q": "What determines the frequency photons can be absorbed or emitted by an atom?", "a": "The size of a gap between energy levels in the atom."}, {"q": "What determines the frequency of photons that can be absorbed or emitted by an atom?", "a": "The energy of the photon must be equal to a gap between energy levels."}, {"q": "What is d in nλ=dsinθ", "a": "Distance between slits in a diffraction grating"}, {"q": "What is n in nλ=dsinθ?", "a": "Order of the maximum"}, {"q": "What name is given to the central maximum formed by a diffraction grating?", "a": "Zero-order"}, {"q": "What is the path length difference between adjacent slits along the nth order maximum?", "a": "n wavelengths"}, {"q": "How do you find slit spacing of a diffraction grating from the number of lines per m?", "a": "1 / number of lines per m"}, {"q": "How do you find the highest order maximum for a diffraction grating?", "a": "d/λ (rounded down to the nearest whole number)"}, {"q": "How do you calculate the number of maxima produced by a diffraction grating?", "a": "2n+1 where n is the highest order of a maximum."}, {"q": "What is the effect of reducing the spacing of slits in a diffraction grating?", "a": "It increases the angles of each maximum."}, {"q": "What is the effect of increasing the wavelength incident on a diffraction grating?", "a": "It increases the angles of each maximum."}]}, {"name": "20.1-20.2 Astronomical distances and red shift", "cards": [{"q": "What is meant by an astronomical unit (AU)?", "a": "The average distance from Earth to the Sun"}, {"q": "How would you define a light year?", "a": "The distance that light travels in a vacuum in one year."}, {"q": "How would you define an arcminute?", "a": "An angle equal to 1/60th of 1°"}, {"q": "What is meant by an arcsecond?", "a": "An angle equal to 1/60th or an arcminute (1/3600th of a degree)"}, {"q": "How would you define stellar parallax?", "a": "The apparent shift of 'nearby' stars against the background of 'distant' stars due to the Earth's motion around the Sun"}, {"q": "How would you define a parsec?", "a": "The distance of an object with a parallax angle one arcsecond."}, {"q": "What is the maximum distance that can be measured by parallax?", "a": "100 parsecs"}, {"q": "What is the parallax angle of a star?", "a": "Half the angular shift observed in the apparent position of a nearby star from Earth over a period of six months. (using the largest shift in any six month period)"}, {"q": "What is d in the equation d = 1/p ?", "a": "Distance to a nearby star in parsecs."}, {"q": "What is p in the equation d = 1/p ?", "a": "Parallax angle of a nearby star in arcseconds."}, {"q": "What is the Doppler effect?", "a": "The apparent change in frequency of waves measured by an observer due to relative motion of the source and the observer."}, {"q": "How is the red/blue shift of a galaxy measured?", "a": "The absorption spectrum of the galaxy is compared to those of elements observed on the Earth."}, {"q": "Define blue-shift.", "a": "The shift towards shorter wavelengths of absorption lines of a galaxy moving towards the Earth."}, {"q": "How would you define red shift?", "a": "The shift towards longer wavelengths of absorption lines of a galaxy moving away from the Earth."}]}, {"name": "20.3-20.5 Cosmology", "cards": [{"q": "How is the velocity of a galaxy calculated from its red shift?", "a": "v = c x (Δf/f) OR (Δλ/λ)"}, {"q": "What observations did Hubble make about distant Galaxies?", "a": "Most galaxies are red shifted and that red shift tends to incease with distance."}, {"q": "What is Hubble's Law?", "a": "The recessional speed of distant galaxies is approximately proportional to their distance from us"}, {"q": "What is the cosmological principle?", "a": "The idea that the universe is homogenous and isotropic on a large scale and that the laws of physics are the same everywhere in the Universe."}, {"q": "What is meant by the homogeneous nature of the Universe.", "a": "The idea that matter (on a large scale) is distributed uniformly across the universe, which therfore has approximately constant density."}, {"q": "What does the term the isotropic nature of the Universe mean?", "a": "The idea that (on a large scale) the universe looks the same in all directions to every observer (there is no centre or edge to the Universe)."}, {"q": "What is the Big Bang?", "a": "The leading theory to describe the origin of the Universe in which space and time expanded from a singularity approximately 13.7 billion years ago."}, {"q": "What is Cosmic Microwave Background Radiation (CMBR)?", "a": "The largely uniform microwave radiation with the blackbody spectrum of an object at 2.7K detected in every direction in the sky."}, {"q": "How does the the Big Bang theory explain the Cosmic Microwave Background Radiation (CMBR)?", "a": "When it was young the Universe was very hot and filled with short wavelength photons. These photons have been red shifted as space has expanded."}, {"q": "How can Hubble constant be determined?", "a": "The gradient of the best-fit line for a plot of recessional speed (y-axis) vs distance (x-axis)"}, {"q": "How can the age of the Universe be estimated using the Hubble Constant?", "a": "age of the Universe = 1 / Hubble constant"}, {"q": "Approximately what percentage of the Universe is thought to be comprosed of normal matter?", "a": "0.05"}, {"q": "Approximately what percentage of the Universe is thought to be composed of dark matter?", "a": "0.27"}, {"q": "Approximately what percentage of the Universe is thought to be composed of dark energy?", "a": "0.68"}, {"q": "What is (Cosmic) inflation?", "a": "A period very early on (10⁻³⁵ - 10⁻³⁰s) in the evolution of the universe during which an unknown mechanism appears to have caused a very rapid expansion of the universe."}, {"q": "What process leads to the conversion of radiation to matter in the early Universe?", "a": "The conversion of high energy photons into particle-antiparticle pairs (pair production)."}, {"q": "What was the composition of the early Universe after fusion ended at around 100s.", "a": "75% Hydrogen, 25% Helium and trace amounts of lithium and berylllium."}, {"q": "Why was light able to freely propagate in the Universe from around 380,000 years?", "a": "Nuclei captured electrons forming neutral atoms."}, {"q": "How would you define dark matter?", "a": "A hypothetical form of matter that doesn't emit or absorb light postulated to explain the difference between the expected and observed orbits of stars around the galactic centres."}, {"q": "What evidence suggests the expansion of the Universe is accelerating?", "a": "Light from very distant type 1a supernova are less intense than predicted."}, {"q": "How would you define dark energy?", "a": "A hypothetical form of energy postulated to explain the apparent acceleration in the expansion of the Universe."}]}]}, {"name": "Module 6 — Particles and Medical Physics", "subtopics": [{"name": "21.1-21.6 Capacitance", "cards": [{"q": "Describe the construction of a capacitor.", "a": "Two conducting plates separated by an insulator."}, {"q": "How are charge stored and pd across a capacitor related?", "a": "Charge is proportional to voltage"}, {"q": "Describe what happens to the two plates of an uncharged capacitor when a p.d. is applied to it?", "a": "Electrons/charge flows off of one plate and flows on to the other causing one to become positive and the other negative."}, {"q": "What units are equivalent to a Farad?", "a": "CV-1 or coulombs per volt"}, {"q": "How do you calauclte the total capacitance for capacitors in parallel?", "a": "CT = C1 + C2 + C3 + …."}, {"q": "How do you calculte the total capacitance for capacitors in series?", "a": "1/CT = 1/C1 + 1/C2 + 1/C3…."}, {"q": "If capacitors are connected in series what quantitiy is the same for all capacitors?", "a": "Charge stored"}, {"q": "If capacitors are connected in parallel what quantitiy is the same for all capacitors?", "a": "p.d."}, {"q": "What is representd by the area under a p.d. - charge graphs?", "a": "Electrical energy transferred OR work done."}, {"q": "What does the gradient of a charge-p.d. graph for a capacitor represent?", "a": "Capacitance"}, {"q": "How are energy stored and p.d. on a capacitor related?", "a": "Energy stored is proportional to p.d. squared"}, {"q": "How are energy stored and charge on a capacitor related?", "a": "Energy stored is proportional to charge squared"}, {"q": "Out of Q, V and I which variable(s) follow the relationship x = x0 e-(t/RC) when discharging a capacitor?", "a": "Q, V and I"}, {"q": "Out of Q, V and I which variable(s) follow the relationship x = x0 e-(t/RC) when charging a capacitor?", "a": "I"}, {"q": "Out of Q, V and I which variable(s) follow the relationship x = x0 (1 - e-(t/RC) ) when charging a capacitor?", "a": "Q and V"}, {"q": "How do you calculate time constant in a capacitor circuit?", "a": "RC"}, {"q": "Give the meaning of the constant-ratio nature of exponential decay.", "a": "In equal time intervals the quantity decreases by equal factors."}, {"q": "How much charge remains after one time constant when discharging a capacitor?", "a": "e-1 OR 0.37 OR 37%"}, {"q": "How much charge remains after n time constants when discharging a capacitor?", "a": "e-n"}, {"q": "What is shown by the gradient of charge-time graph when charging a capacitor?", "a": "Charging current."}, {"q": "Write down a two uses of capacitors.", "a": "Energy storage e.g. for camera flashes, spot welding…, timing circuits, voltage smoothing, audio filters."}]}, {"name": "22 Electric Fields", "cards": [{"q": "Define an electric field.", "a": "A region where a charge experiences an electrostatic force."}, {"q": "Give the definition of electric field strength.", "a": "The force per unit charge on a positive test charge placed at that point"}, {"q": "State the units of electric field strength.", "a": "NC⁻¹ (or Vm⁻¹)"}, {"q": "What quantity does ε0 stand for?", "a": "permittivity of free space"}, {"q": "What quantity does εr stand for?", "a": "Relative permittivity (of a dielectric)."}, {"q": "What does the direction of an electric field line show?", "a": "The direction of the force exerted on a positive test charge."}, {"q": "What does the spacing of electric field lines show?", "a": "Field strength."}, {"q": "Are test charges positive or negative?", "a": "positive"}, {"q": "Which units are equivalent to Vm⁻¹?", "a": "N C⁻¹"}, {"q": "What is E = V/d used to calculate?", "a": "To find the uniform field strength between two parallel plates."}, {"q": "How would you define a dipole?", "a": "A pair of opposite sign charges separated by a small distance (e.g. a polar molecule like HCl)"}, {"q": "Write down Coulomb's law in words.", "a": "The force between two point charges is proportional to the product of the two charges and inversely proportional to the square of their separation distance."}, {"q": "How would you define electric potential difference?", "a": "The work done per unit positive charge in moving between two points"}, {"q": "Give the definition of absolute electric potential of a point.", "a": "The work done per unit positive charge to move from infinity to that point in the field."}, {"q": "What is the absolute electric potential an infinite distance from a 1C charge?", "a": "0"}, {"q": "Which units are equivalent to a V?", "a": "J C⁻¹"}, {"q": "How are the electrostatic force between two point charges and their separation distance related?", "a": "It is inversely proportional to the square of separation OR inverse square law"}, {"q": "How are potential and distance from a point charge related?", "a": "Potential α 1/distance"}, {"q": "Define a uniform electric field.", "a": "A region of space in which the electric field strength is the same at all points"}, {"q": "Define a radial field.", "a": "An electric field generated by a point charge OR a field that obeys the inverse square law."}, {"q": "What is meant by a neutral point in an electric field?", "a": "A point at which the resultant field strength is zero"}, {"q": "Is electric field strength a vector or a scalar quantity?", "a": "Vector"}, {"q": "Is electrical potential a vector or scalar quantity?", "a": "Scalar"}, {"q": "Give a similarity between electric and gravitational fields.", "a": "Both obey inverse square law for field strength (around a point mass/charge). Both have infinite range. Both act between two objects at a distance."}, {"q": "Write down two differences between electric and gravitational fields?", "a": "Gravitational fields act on masses, electric fields on charges: electric fields are much stronger that gravitational fields: electric fields can be attractive or repulsive, gravitational fields are always attractive: potential is always negative in a gravitational field."}, {"q": "When would you use V = Q / (4 pi ε0 r)?", "a": "To find the potential around a point charge/in a radial field."}, {"q": "In what situation is C = 4 x pi x ε0 x R used?", "a": "To calculate the capacitance on an isolated sphere."}, {"q": "In the equation C = 4 x pi x ε0 x R used, what does R stand for?", "a": "The radius of an isolated sphere."}, {"q": "How are electric potential energy and electric potential related?", "a": "EPE = V x q where q is the charge in the field."}]}, {"name": "23.1 – 23.3 Magnetic fields and the motor principle", "cards": [{"q": "What produces a magnetic field?", "a": "Moving charges and permanent magnets."}, {"q": "What does the direction of a magnetic field line show?", "a": "The direction of force on a free north pole."}, {"q": "In which direction do magnetic field lines flow?", "a": "From north to south."}, {"q": "How is a uniform magnetic field represented by field lines?", "a": "Parallel"}, {"q": "What does the spacing of magnetic field lines show?", "a": "Magnetic field strength/flux density."}, {"q": "How do you find the direction of the field lines around a current?", "a": "Using the right hand grip rule."}, {"q": "How is a field line or current running into the paper shown?", "a": "⊗"}, {"q": "How is a field line or current running out of the paper shown?", "a": ". in a circle"}, {"q": "For what reason does a current experience a force in a magnetic field?", "a": "The current's magnetic field interacts with the external one."}, {"q": "What is represented by the thumb in Fleming's Left Hand rule.", "a": "(Direction of) force"}, {"q": "What is represented by the first finger in Fleming's Left Hand rule.", "a": "(Direction of the) magnetic field"}, {"q": "What does the second finger represent in Fleming's LHR?", "a": "(Direction of) current"}, {"q": "When would you use Fleming's Left Hand Rule?", "a": "To find the direction of a current/moving charge in a magnetic field."}, {"q": "In what situation is F = BIL sinθ used?", "a": "To find the magnitude of force on a wire (carrying current) in a magnetic field."}, {"q": "In the equation F = BIL sinθ, what does θ stand for?", "a": "The angle between the current and the field direction."}, {"q": "Give the SI unit of flux density.", "a": "Tesla (T)"}, {"q": "Define a magnetic flux density.", "a": "The field strength that would cause a wire carrying a current of 1A perpendicular to the field to experience a force of 1N per m of length."}, {"q": "What experiment can be done to find flux density in the lab?", "a": "Set up a current carrying wire between the poles of a magnet on top of a top-pan balance."}, {"q": "What is F = Bqv used to calculate?", "a": "To find the force acting on a particle moving (at right angles) to a magnetic field?"}, {"q": "When would you use r = mv/BQ?", "a": "To find the radius of the path of a particle moving in a uniform magnetic field."}, {"q": "For what reason does a charged particle describe circular motion in a uniform magnetic field?", "a": "(There is a constant) force always acting at right angles to motion."}, {"q": "For what reason do only particles with the correct velocity travel in a straight line in a velocity selector?", "a": "The electric force balances the magnetic force (at this velocity)."}]}, {"name": "23.4-23.6 Electromagnetic Induction", "cards": [{"q": "Define magnetic flux.", "a": "It is the total component of the magnetic flux density passing at right angles through a surface of area A OR ∅ = BA cosθ"}, {"q": "What is the SI unit for flux?", "a": "Wb (Weber)"}, {"q": "In the equation ∅ = BA cosθ, what does ∅ stand for?", "a": "Flux"}, {"q": "How are flux and flux linkage related?", "a": "Flux linkage is flux multiplied by the number of turns on the coil"}, {"q": "What does θ represent in ∅ = BA cosθ?", "a": "The angle between the flux/field and the normal/perpendicular to the surface."}, {"q": "How do you calculate flux linkage?", "a": "N∅ where N is the number of turns on the coil and ∅ is the flux passing through the coil."}, {"q": "How are flux and flux density related?", "a": "Flux density is the flux per unit area perpendicular to the field."}, {"q": "How is flux represented in a field line diagram?", "a": "The total number of field lines passing through the object/surface."}, {"q": "How is flux density represented in a field line diagram?", "a": "The spacing of field lines."}, {"q": "In what other units is Tesla commonly expressed?", "a": "Wbm⁻² (or Nm⁻¹A⁻¹)"}, {"q": "Give Faraday's law.", "a": "The magnitude of an induced EMF is directly proportional to the rate of change of flux linkage."}, {"q": "What does ε represent in ε = -∆(N∅)/∆t?", "a": "Induced EMF."}, {"q": "Which law is described by the proportionality ε α ∆(N∅)/∆t?", "a": "Faraday's Law (of electromagnetic induction)."}, {"q": "Write down Lenz's law.", "a": "The direction of an induced EMF or current is always in such a direction as to oppose the change that created it."}, {"q": "What principle leads to Lenz's law?", "a": "Conservation of energy."}, {"q": "For what reason is there a negative sign in the equation ε = -∆(N∅)/∆t?", "a": "It is due to Lenz's law OR conservation of energy."}, {"q": "What type of transformer has more turns on its primary coil?", "a": "A step down transformer."}, {"q": "What type of transformer has more turns on its secondary coil?", "a": "A step down transformer."}, {"q": "Write down two ways in which energy losses in transformers are reduced?", "a": "Low resistance primary and secondary windings/laminated core/soft iron core"}, {"q": "For what reason is a laminated core used in a transformer?", "a": "To reduce the heating effect of (induced) eddy currents."}, {"q": "How would you define a laminated core?", "a": "A core made up of layers that are separated by an insulator."}, {"q": "Define soft iron.", "a": "Iron that can be easily magnetised and demagnetised."}, {"q": "Define an eddy current in a transformer.", "a": "A current induced by the changing flux in the core."}]}, {"name": "24.1-24.2 The Nuclear Atom", "cards": [{"q": "What material was used as a target in Rutherford's scattering experiment?", "a": "Gold foil, a few atoms thick"}, {"q": "What was measured in Rutherford's scattering experiment?", "a": "The angle of deflection of the alpha particles."}, {"q": "What happened to most of the alpha particle in Rutherford's scattering experiment?", "a": "They passed straight through the foil (with very little scattering)."}, {"q": "What proportion of alpha particles were scattered in Rutherford's scattering experiment?", "a": "Around 1 in 2000"}, {"q": "What proportion of alpha particles were deflected by more than 90° in Rutherford's scattering experiment?", "a": "Around 1 in 10,000"}, {"q": "What was concluded due to most of the alpha particles passing straight through the gold foil Rutherford's scattering experiment?", "a": "Most of the atom is empty space with most of the mass concentrated in a small nucleus."}, {"q": "What was concluded due to some alpha particles being scattered in Rutherford's scattering experiment?", "a": "The nucleus is positively charged."}, {"q": "How did Rutherford estimate the maximum radius of the nucleus?", "a": "He equated the KE of the alpha particle to the electric potential energy at closest approach to the nucleus."}, {"q": "How would you define a nucleon?", "a": "A proton or neutron."}, {"q": "How would you define an isotope?", "a": "A nucleus of an element with the same number of protons but a different number of neutrons."}, {"q": "Define an atomic mass unit.", "a": "One twelfth of the mass of a neutral carbon 12 atom."}, {"q": "How has the radius of the nucleus been measured?", "a": "By the diffraction of fast moving electron."}, {"q": "What is R in R = r₀A^(1/3)?", "a": "The radius of the nucleus."}, {"q": "What is r₀ in R = r₀A^(1/3) roughly equivalent to?", "a": "The radius of a proton."}, {"q": "What is A in R = r₀A^(1/3)", "a": "Nucleon number."}, {"q": "What force holds protons and neutrons together in the nucleus?", "a": "The strong nuclear force."}, {"q": "What is the maximum range of the strong nuclear force?", "a": "~3fm"}, {"q": "Below what distance is the strong nuclear force repulsive?", "a": "0.5fm"}]}, {"name": "24.3 – 24.6 Sub-atomic particles", "cards": [{"q": "Which group of particles are subject to the weak nuclear force but not the strong nuclear force?", "a": "Leptons"}, {"q": "What is the quark composition of a meson?", "a": "A quark and an antiquark."}, {"q": "Which force do Hadrons decay by?", "a": "The weak nuclear force."}, {"q": "What is the quark composition of a Baryon", "a": "Three quarks"}, {"q": "How would you define a neutrino?", "a": "A lepton with no charge and a tiny mass."}, {"q": "Why doesn't a neutrino experience the electromagnetic force?", "a": "They have no charge.."}, {"q": "What is the quark composition of a neutron?", "a": "up down down (udd)"}, {"q": "What is the quark composition of a proton?", "a": "up up down (uud)"}, {"q": "What is the quark composition of an anti-baryon?", "a": "Three antiquarks"}, {"q": "Name the two types of hadron.", "a": "baryons and mesons"}, {"q": "What force hold quarks together in hadrons?", "a": "The strong nuclear force."}, {"q": "What is the family of particles that are subject to both the strong and weak nuclear force?", "a": "Hadrons"}, {"q": "What type of particle are nucleons?", "a": "Baryons"}, {"q": "How does a proton compare to an antiproton?", "a": "The have the same mass but opposite charge."}, {"q": "How does an electron compare to a positron?", "a": "The have the same mass but opposite charge."}, {"q": "What is the antiparticle of the electron?", "a": "Positron."}, {"q": "What type of particle are there millions of passing through your body every second?", "a": "Neutrinos"}, {"q": "Describe beta minus decay.", "a": "A neutron in an unstable nucleus decays into a proton and emits an electron and an antineutrino."}, {"q": "Describe beta plus decay.", "a": "A proton in an unstable nucleus decays into a neutron and emits a positron and a neutrino"}, {"q": "What quark transformation occurs during beta minus decay?", "a": "A down quark (in a neutron) turns into an up quark (in a proton)"}, {"q": "What quark transformation occurs during beta plus decay", "a": "An up quark (in a proton) turns into an down quark (in a neutron)"}]}, {"name": "25.1 Types of Nuclear Radiation", "cards": [{"q": "Give the meaning of ionising radiation.", "a": "Radiation with sufficient energy to ionise atoms by removing electrons."}, {"q": "What is the charge of gamma radiation?", "a": "0"}, {"q": "How would you define a Beta minus particle?", "a": "A fast moving electron (emitted from a nucleus)"}, {"q": "What is meant by a Beta plus particle?", "a": "A fast moving positron (emitted from a nucleus)"}, {"q": "Define an alpha particle.", "a": "2 protons and 2 neutrons OR a helium nucleus"}, {"q": "What is the speed of gamma radiation?", "a": "3x10⁸ms⁻¹"}, {"q": "What type of nuclear radiation has the greatest rest mass", "a": "Alpha radiation"}, {"q": "Define gamma radiation.", "a": "A high energy photon (emitted by the nucleus)"}, {"q": "What is the charge of an Alpha particle?", "a": "+3.2x10⁻¹⁹C OR +2e"}, {"q": "What is the charge of a beta minus particle", "a": "-1.6x10⁻¹⁹C OR -e"}, {"q": "What type of nuclear radiation is not deflected by electric and magnetic fields?", "a": "Gamma rays"}, {"q": "What type of nuclear radiation is deflected the most by electric and magnetic fields?", "a": "Beta radiation"}, {"q": "When measuring the count rate of a radioactive source what must be taken into account?", "a": "The background count rate / count rate with no source present"}, {"q": "How do you find the corrected count rate for a radioactive source from the measured count rate.", "a": "measured count rate - background count rate"}, {"q": "How far do alpha particles typically travel in air?", "a": "A few cm"}, {"q": "What type of ionising radiation is stopped by a sheet of paper?", "a": "Alpha radiation"}, {"q": "For what reason are alpha particles strongly ionising?", "a": "They have a relatively large mass and charge."}, {"q": "What is the range of beta particles in air?", "a": "Around 1m"}, {"q": "What type of radiation requires around 1-3mm of aluminium to stop it?", "a": "Beta radiation"}, {"q": "What type of radiation is the least ionising?", "a": "Gamma rays"}, {"q": "For what reason is gamma the least ionising form of radiation?", "a": "It has no charge."}, {"q": "What thickness of lead will stop a significant proportion of gamma rays?", "a": "3-4cm"}, {"q": "For what reason is ionising radiation dangerous?", "a": "It can damage living cells and DNA."}, {"q": "What procedure is routinely used to minimise the dose when handling radioactive sources in the lab?", "a": "Use tongs and hold it away from your body."}, {"q": "What are the three key steps for reducing radiation dose?", "a": "Maximise distance from source, minimise exposure time and use shielding."}]}, {"name": "27.1 & 27.3 X-rays and CAT scans", "cards": [{"q": "What provides the energy of the X-rays in an X-ray tube?", "a": "The kinetic energy of the accelerated electrons."}, {"q": "Define an X-ray.", "a": "A photon produced by the deceleration of a fast moving electron"}, {"q": "What is the typical p.d. of an X-ray tube for medical imaging?", "a": "30-100kV"}, {"q": "What causes the emission of electrons from the cathode in an X-ray tube?", "a": "It is heated to produce thermionic emission."}, {"q": "What name is given to the anode in an X-ray tube?", "a": "The target metal."}, {"q": "Define an essential property for the target metal in an X-ray tube.", "a": "High melting point."}, {"q": "What causes the production of X-rays in an X-ray tube?", "a": "The deceleration of electrons when they hit the target metal/anode."}, {"q": "In an X-ray tube what happens to most of the kinetic energy lost by the electrons when they hit the anode?", "a": "It is transferred to thermal energy of the anode."}, {"q": "What measures can be taken to prevent an anode melting in an X-ray tube?", "a": "It is cooled by oil or rotated"}, {"q": "What feature of X-ray tubes protects the radiographer?", "a": "Lead lining."}, {"q": "What determines the maximum frequency of X-rays produced in an X-ray tube?", "a": "The maximum kinetic energy of a single electron."}, {"q": "When would you use λ = hc/eV?", "a": "To find the minimum wavelengths of X-ray produced (by an X-ray tube)"}, {"q": "What is V in the equation λ = hc/eV?", "a": "The accelerating potential difference."}, {"q": "Describe the beam used by CAT scanners.", "a": "A thin (1-10mm) fan."}, {"q": "What happens to the position of the X-ray tube during a CAT scan?", "a": "It rotates around the patient."}, {"q": "What are the key advantages of CAT scans over conventional X-rays?", "a": "They produce a 3D image and can distinguish between tissues with similar attenuation coefficients."}, {"q": "What are the disadvantages of CAT scans compared to conventional X-rays?", "a": "The radiation dose is greater and they are more expensive and take more time."}, {"q": "How does a CAT scan produce a 3D image?", "a": "A series of slices are imaged and processed via a computer."}]}, {"name": "27.2 X-ray attenuation", "cards": [{"q": "What is X-ray attenuation?", "a": "The decrease in intensity as X-rays pass through matter."}, {"q": "What are the four mechanisms of X-ray attenuation?", "a": "Simple scatter, Photoelectric Effect, Compton Scattering, Pair Production"}, {"q": "What occurs during simple scatter of X-rays?", "a": "The X-ray interacts with an electron in an atom and changes direction but not energy."}, {"q": "Which method of attenuation is most significant with X-rays with energy in the range 1-20keV?", "a": "Simple scatter"}, {"q": "What occurs during the photoelectric effect attenuation of X-rays?", "a": "The X-ray is absorbed by an electron in an atom which gains the energy of the photon and leaves the atom."}, {"q": "Which method of attenuation is significant with X-rays with energies up to 100keV?", "a": "Photoelectric effect"}, {"q": "Which method of attenuation is most significant to medical X-ray imaging?", "a": "The photoelectric effect."}, {"q": "What occurs during Compton scattering attenuation of X-rays?", "a": "The X-ray interacts with an electron in the atom causing the electron to be ejected and the photon to be scattered with reduced energy."}, {"q": "Which method of attenuation is significant with X-rays with energy in the range 0.5-5MeV?", "a": "Compton scattering."}, {"q": "What occurs during pair production with X-rays?", "a": "An X-ray interacts with the nucleus of an atom converting the energy of the photon to and electron and a positron."}, {"q": "Which method of attenuation occurs with X-rays with energies 1.02MeV?", "a": "Pair production"}, {"q": "What is I in the equation I = I₀e^(-µx)?", "a": "Transmitted intensity"}, {"q": "What is I₀ in the equation I = I₀e^(-µx)?", "a": "Intensity before absorption"}, {"q": "What is µ in the equation I = I₀e^(-µx)?", "a": "Attenuation/absorption coefficient."}, {"q": "What is x in the equation I = I₀e^(-µx)?", "a": "Thickness of the absorbing substance"}, {"q": "What is the SI unit for attenuation coefficient?", "a": "m⁻¹"}, {"q": "What is meant by a contrast medium in X-rays?", "a": "A material with a high attenuation coefficient used to image soft tissue."}, {"q": "What contrast medium is typically to examine blood flow?", "a": "Iodine"}, {"q": "What contrast medium is typically used to image the digestive system?", "a": "Barium sulfate"}, {"q": "How are X-rays used for cancer therapy?", "a": "A linear accelerator produces high energy X-rays that destroy cells."}, {"q": "For what reason are high energy X-rays prefereable to gamma radiation for cancer therapy?", "a": "An X-ray source can be turned off."}, {"q": "What is X-ray attenuation?", "a": "The decrease in intensity as X-rays pass through matter."}, {"q": "What are the four mechanisms of X-ray attenuation?", "a": "Simple scatter, Photoelectric Effect, Compton Scattering, Pair Production"}, {"q": "What occurs during simple scatter of X-rays?", "a": "The X-ray interacts with an electron in an atom and changes direction but not energy."}, {"q": "Which method of attenuation is most significant with X-rays with energy in the range 1-20keV?", "a": "Simple scatter"}, {"q": "What occurs during the photoelectric effect attenuation of X-rays?", "a": "The X-ray is absorbed by an electron in an atom which gains the energy of the photon and leaves the atom."}, {"q": "Which method of attenuation is significant with X-rays with energies up to 100keV?", "a": "Photoelectric effect"}, {"q": "Which method of attenuation is most significant to medical X-ray imaging?", "a": "The photoelectric effect."}, {"q": "What occurs during Compton scattering attenuation of X-rays?", "a": "The X-ray interacts with an electron in the atom causing the electron to be ejected and the photon to be scattered with reduced energy."}, {"q": "Which method of attenuation is significant with X-rays with energy in the range 0.5-5MeV?", "a": "Compton scattering."}, {"q": "What occurs during pair production with X-rays?", "a": "An X-ray interacts with the nucleus of an atom converting the energy of the photon to and electron and a positron."}, {"q": "Which method of attenuation occurs with X-rays with energies 1.02MeV?", "a": "Pair production"}, {"q": "What is I in the equation I = I₀e^(-µx)?", "a": "Transmitted intensity"}, {"q": "What is I₀ in the equation I = I₀e^(-µx)?", "a": "Intensity before absorption"}, {"q": "What is µ in the equation I = I₀e^(-µx)?", "a": "Attenuation/absorption coefficient."}, {"q": "What is x in the equation I = I₀e^(-µx)?", "a": "Thickness of the absorbing substance"}, {"q": "What is the SI unit for attenuation coefficient?", "a": "m⁻¹"}, {"q": "What is meant by a contrast medium in X-rays?", "a": "A material with a high attenuation coefficient used to image soft tissue."}, {"q": "What contrast medium is typically to examine blood flow?", "a": "Iodine"}, {"q": "What contrast medium is typically used to image the digestive system?", "a": "Barium sulfate"}, {"q": "How are X-rays used for cancer therapy?", "a": "A linear accelerator produces high energy X-rays that destroy cells."}, {"q": "For what reason are high energy X-rays prefereable to gamma radiation for cancer therapy?", "a": "An X-ray source can be turned off."}]}, {"name": "27.4 – 27.5 – Imaging with Gamma Radiation", "cards": [{"q": "Which radionuclide is used for imaging with a gamma camera?", "a": "Technitium-99m"}, {"q": "Which radionuclide is used in PET scanning?", "a": "Fluorine-18"}, {"q": "For what reason are gamma emitting sources useful for imaging inside the body?", "a": "They are the least ionising and can penetrate through a patient to be detected externally."}, {"q": "For what reason are short half-lives necessary for the radioisotopes used for medical imaging?", "a": "To ensure a large activity from a small amount and to minimise radiation dose after the procedure."}, {"q": "Define a medical tracer.", "a": "A compound containing a radioisotope that is put into the patients body."}, {"q": "What is the function of a collimator in a gamma camera?", "a": "To absorb any photons not travelling along the axis of the tubes so the source location of gamma radiation can be idenitifed."}, {"q": "How is a collimator in a gamma camera constructed?", "a": "It is a honeycomb of long, thin lead tubes."}, {"q": "What is the function of a scintillator in a gamma camera?", "a": "It produces many photons of visible light when a gamma photon interacts with it."}, {"q": "What is the function of the photomultiplier tubes in a gamma camera?", "a": "They convert visible light photons to an electrical pulse."}, {"q": "What is the function of the computer in a gamma camera?", "a": "It processes the signals from the photomultipliers to locate where the gamma ray originated to produce an image showing the concentrations of medical tracer."}, {"q": "What type of radiation is detected in a PET scan?", "a": "Gamma"}, {"q": "What type of radiation is emitted by Fluorine-18 nucleus in a PET scan?", "a": "Beta plus/positron"}, {"q": "What process produces gamma photons in a PET scan?", "a": "Electron and positron annihilation."}, {"q": "How is the the source of the gamma photons located in a PET scan?", "a": "By the time delay between the arrival of diametrically opposite gamma photons."}, {"q": "What is the typical time delay between the arrival of gamma photons in PET scan?", "a": "Nanoseconds"}, {"q": "For what reason is medical imaging using gamma emitting tracers useful?", "a": "It can measure the function of organs in the body rather than just the structure."}, {"q": "What are the disadvantages of a PET scan?", "a": "They are expensive and require facilities to prepare tracers local to the scanner."}]}, {"name": "27.6 Ultrasound scans", "cards": [{"q": "What is the range of human hearing?", "a": "20Hz-20kHz"}, {"q": "Define an ultrasound transducer.", "a": "A device for emitting and detecting ultrasound."}, {"q": "What is the minimum frequency of ultrasound?", "a": "20 kHz"}, {"q": "What is the piezoelectric effect?", "a": "When a crystal produces an EMF when it is distorted."}, {"q": "What happens to a piezoelectric crystal when. p.d. is applied across opposite faces?", "a": "It is compressed or stretched."}, {"q": "What are the main advantages of ultrasound imaging?", "a": "It is non-invasive and does not require ionising radiation."}, {"q": "What range of frequencies are typically used for ultrasound scans?", "a": "1-15MHz"}, {"q": "How is an ultrasound pulse generated by a transducer?", "a": "A high frequency p.d. is applied at the natural frequency of the piezoelectric crystal causing the crystal to resonate."}, {"q": "How is an ultrasound pulse detected by a transducer?", "a": "Sound incident on the crystal causes it to vibrate generating an EMF across its faces."}, {"q": "What is the purpose of the damping material in an ultrasound scanner?", "a": "It prevents reflection of the pulse from behind the piezoelectric crystal."}, {"q": "Define an ultrasound A-scan.", "a": "A single transducer produce pulses that travel along a single path through the patient?"}, {"q": "How does an ultrasound A-scan calculate the distance to boundaries between tissues?", "a": "2 x Distance = v x t, where v is the speed of the ultrasound and t is the time interval between the emitted and reflected pulse."}, {"q": "Define an ultrasound B scan.", "a": "The signal from an array of transducers is processed by computer to build up a 2D image."}, {"q": "What determines the brightness of the dots on a B scan display?", "a": "The amplitude of the reflected ultrasound from that point."}]}, {"name": "27.7-27.8 Reflection of ultrasound", "cards": [{"q": "What determines the acoustic impedence of a substance?", "a": "The density and the speed of sound in the substance."}, {"q": "State the units of acoustic impedance.", "a": "kgm⁻²s⁻¹"}, {"q": "What is the intensity reflection coefficient for ultrasound?", "a": "The ratio (reflected intensity of ultrasound ÷ incident intensity of ultrasound)"}, {"q": "What factor determines the refelction intensity coefficient for ultrasound at a boundary?", "a": "The difference between the acoustic impedances of the two substances."}, {"q": "For what reason does a coupling gel need to be used when performing an ultrasound?", "a": "Air pockets between the transducer and skin cause reflection of nearly all of the ultrasound at the skin-air boundary."}, {"q": "What is meant by an ultrasound coupling gel?", "a": "A substance applied to the skin and transducer with an impedance similar to skin."}, {"q": "What is impedance/acoustic matching?", "a": "When two substances havce similar acoustic impedances so negligible reflection of ultrasound occurs."}, {"q": "What causes ulatrasound to undergo doppler shift?", "a": "Reflection from moving blood cells."}, {"q": "Define doppler ultrasound used for.", "a": "Measuring the speed (and volume) of blood flow."}, {"q": "How would you define measured in doppler ultrasound to determine the velocity of the blood?", "a": "The observed change in frequency of the reflected ultrasound pulse."}, {"q": "How is blood flow viewed during a doppler ultrasound?", "a": "The signal is processed by computer and displayed as a colour coded image on a screen."}, {"q": "For what reason does the transducer have to placed away from the normal during a doppler ultrasound?", "a": "To ensure there is a component of the blood flow's velocity in the direction of the ultrasound pulse."}, {"q": "What is ∆f in the equation? ∆f = (2fvcosθ)÷c", "a": "Change in the observed frequency of the reflected ultrasound."}, {"q": "What is v in the equation? ∆f = (2fvcosθ)/c", "a": "Blod flow speed."}, {"q": "What is θ in the equation? ∆f = (2fvcosθ)/c", "a": "The angle between the tranducer axis and the blood flow."}, {"q": "What is c in the equation? ∆f = (2fvcosθ)/c", "a": "The speed of ultrasound in blood."}]}]}]}, {"name": "WJEC GCSE Physics", "level": "GCSE", "topics": [{"name": "Electrical Circuits", "subtopics": [{"name": "1.1", "cards": [{"q": "What is the symbol for a variable resistor?", "a": "rectangle with diagonal arrow", "d": "sym:variable_resistor"}, {"q": "What is the symbol for an LED?", "a": "circle with triangle and line inside (like a play button) and two small arrows coming off", "d": "sym:led"}, {"q": "What is the symbol for a thermistor?", "a": "rectangle with line through (like a hockey stick)", "d": "sym:thermistor"}, {"q": "What is the symbol for an open switch?", "a": "two separated circles with a diagonal line from one circle", "d": "sym:switch"}, {"q": "Which type of circuit has components in different loops?", "a": "Parallel"}, {"q": "What is current?", "a": "Rate of flow of electrons or charge (per second)"}, {"q": "What is the unit of current?", "a": "A (Amps)"}, {"q": "How do we measure current?", "a": "With an ammeter in series"}, {"q": "What is voltage?", "a": "Difference in electrical energy between two points"}, {"q": "What is the unit of voltage?", "a": "V (Volts)"}, {"q": "How do we measure voltage?", "a": "With a voltmeter in parallel"}, {"q": "What happens to current in a series circuit?", "a": "Stays the same everywhere"}, {"q": "What happens to current in a parallel circuit?", "a": "Splits or shared between loops"}, {"q": "What happens to voltage in a series circuit?", "a": "Splits or shared between components"}, {"q": "What happens to voltage in a parallel circuit?", "a": "Stays the same everywhere"}, {"q": "What is a measure of how difficult it is for current to flow?", "a": "Resistance"}, {"q": "What is the unit of resistance?", "a": "Ω (Ohms)"}, {"q": "What equation links voltage, current and resistance?", "a": "Current = Voltage / Resistance"}, {"q": "What happens to resistance in series?", "a": "Adds up so total resistance is bigger (R=R1+R2)"}, {"q": "HT: What happens to resistance in parallel?", "a": "Total resistance is lower than the smallest resistance (1/R = 1/R1 + 1/R2)"}, {"q": "Draw the current voltage graph for a resistor at constant temperature", "a": "straight diagonal line (directly proportional)", "d": "iv:ohmic"}, {"q": "Draw the current voltage graph for a filament lamp", "a": "curve (as voltage increases current increases at a decreasing rate)", "d": "iv:lamp"}, {"q": "Draw the current voltage graph for a diode", "a": "flat horizontal line and then sharp rise", "d": "iv:diode"}, {"q": "What is power?", "a": "How much energy is transferred per second"}, {"q": "What equation links voltage, current and power?", "a": "P = I x V"}, {"q": "As light intensity increases what happens to the resistance of an LDR?", "a": "Decreases at a decreasing rate"}, {"q": "What are LDRs used for in the UK?", "a": "Streetlights"}, {"q": "As temperature increases what happens to the resistance of an ntc thermistor?", "a": "Decreases at a decreasing rate"}, {"q": "What are ntc thermistors used for in the UK?", "a": "Fire alarms"}]}]}, {"name": "Generating Electricity", "subtopics": [{"name": "1.2", "cards": [{"q": "What does renewable mean?", "a": "Will not run out and will quickly replenish"}, {"q": "Name 4 non renewable energy sources", "a": "Coal, Oil, Gas, Nuclear"}, {"q": "Name 4 renewable energy sources", "a": "Solar, Wind, Hydroelectric, Wave, Biomass, Geothermal, Tidal"}, {"q": "Which power station uses hot rocks underground to heat water?", "a": "Geothermal"}, {"q": "What does to commission mean?", "a": "Set up and build"}, {"q": "Give an advantage of Nuclear power stations", "a": "No CO2 produced, very efficient, lots of electricity, small amount of fuel, reliable"}, {"q": "Give a disadvantage of Nuclear power stations", "a": "Produces radioactive waste, expensive to commission and decommission"}, {"q": "Give an advantage of Wind power stations", "a": "No fuel cost, No CO2 produced, Cheap to run"}, {"q": "Give a disadvantage of Wind power stations", "a": "Unreliable, don’t produce much electricity, ugly"}, {"q": "Give an advantage of Hydroelectric power stations", "a": "No fuel cost, No CO2 produced, Quick start up time, lots of electricity"}, {"q": "Give a disadvantage of Hydroelectric power stations", "a": "Destroy habitats, harm wildlife, large area of land needed"}, {"q": "How is a Biomass power station \"carbon neutral\"?", "a": "Plants take in carbon dioxide as they grow and release the same carbon dioxide when burned, this recycles the CO2"}, {"q": "What environmental problem is caused by carbon dioxide?", "a": "Global Warming"}, {"q": "What environmental problem is caused by sulfur dioxide?", "a": "Acid Rain"}, {"q": "Which type of power station is the biggest polluter of carbon dioxide?", "a": "Fossil fuels (Coal, Oil, Gas)"}, {"q": "Which type of power station is the biggest polluter of sulfur dioxide?", "a": "Coal"}, {"q": "In a power station what happens after water is heated to make steam?", "a": "Steam turns a turbine"}, {"q": "What are the 8 different types/forms of energy?", "a": "Heat, Elastic, Chemical, Kinetic, Light, Electrical, Gravitational Potential, Sound"}, {"q": "Give 2 examples of things that have chemical energy", "a": "Battery, Food, Fuel, Petrol"}, {"q": "Give 2 examples of things that have kinetic energy", "a": "Anything that is moving"}, {"q": "What diagram shows us energy transfers?", "a": "Sankey"}, {"q": "On a Sankey diagram which energy goes on the left-hand side?", "a": "Input"}, {"q": "On a Sankey diagram which energy goes up/down?", "a": "Wasted Output"}, {"q": "What is the law of conservation of energy?", "a": "Energy cannot be created or destroyed; it is transformed from one type to another"}, {"q": "What is the unit of energy?", "a": "J (Joules)"}, {"q": "What does efficient mean?", "a": "Doesn't waste much energy"}, {"q": "What is the efficiency equation?", "a": "efficiency = useful output / total input   x 100"}, {"q": "Why is there a x100 in the efficiency equation?", "a": "To give a percentage"}, {"q": "What is the National Grid?", "a": "A system of power stations, cables, pylons and transformers that transport electricity to our homes"}, {"q": "Why do we have a National Grid connecting all power stations together?", "a": "Reliable (if one power station breaks there is a backup)"}, {"q": "Which type of power station can be used in an emergency?", "a": "Hydroelectric"}, {"q": "What is the role of a step-up transformer?", "a": "Increase voltage, decrease current so less heat is lost"}, {"q": "What is the role of a step-down transformer?", "a": "Decrease voltage, increase current so it is more safe"}, {"q": "What ensures the National Grid is efficient?", "a": "Step up transformers"}, {"q": "Give 2 ways the National Grid monitor the demand for electricity", "a": "Check TV guides, check weather reports, prepare for special events e.g. Olympics"}, {"q": "What happens if there is a shortage of electricity in the National Grid?", "a": "Power cut"}, {"q": "What happens if there is a surplus of electricity in the National Grid?", "a": "Electricity is wasted"}, {"q": "Why is the demand for electricity lowest between Midnight and 6am?", "a": "Most people are asleep so aren't using much electricity"}, {"q": "Why is the demand for electricity highest around 7pm?", "a": "People are home from work, cooking dinner, watching TV etc"}, {"q": "Why is the demand for electricity never zero?", "a": "Always something using electricity (Hospitals, Freezers etc)"}]}]}, {"name": "Making Use of Energy", "subtopics": [{"name": "1.3", "cards": [{"q": "What is density?", "a": "How many particles are in a volume"}, {"q": "What is the equation to calculate density?", "a": "Density = mass / volume"}, {"q": "What units is density measured in?", "a": "g/cm3 or kg/m3"}, {"q": "Which state is the most dense?", "a": "solid"}, {"q": "How do you find the volume of a regular shaped object (e.g. block of wood)?", "a": "Use a ruler to measure sides then length x width x height"}, {"q": "How do you find the volume of an irregular shaped object (e.g. rock)?", "a": "Use a measuring cylinder of water or Eureka beaker and measure change in volume when object is added"}, {"q": "How do you find the mass of a liquid?", "a": "Mass of liquid = mass of cylinder and liquid - mass of empty cylinder"}, {"q": "Which direction does heat always move?", "a": "From hot to cold"}, {"q": "What sort of materials does conduction happen in?", "a": "Solids"}, {"q": "What materials make the best conductors?", "a": "Metals"}, {"q": "Why are metals the good conductors?", "a": "Free electrons can travel and pass heat on faster"}, {"q": "How do particles pass on heat in conduction?", "a": "Vibrations or collisions with neighbour particles"}, {"q": "What is an insulator?", "a": "A material that reduces heat loss or transfer"}, {"q": "What happens to air as it is heated?", "a": "Particles move further apart so it becomes less dense"}, {"q": "Why is the top of an oven hottest?", "a": "Hot air rises as it is less dense"}, {"q": "How is a convection current set up?", "a": "Hot air rises as it is less dense and cold air sinks as it is more dense"}, {"q": "How is heat transferred in liquids and gases?", "a": "Convection"}, {"q": "How does radiation travel?", "a": "As a heat wave"}, {"q": "How is heat transferred from hot objects e.g. a hob?", "a": "Radiation"}, {"q": "What colour is best at absorbing heat?", "a": "Black"}, {"q": "What colour is best at emitting heat?", "a": "Black"}, {"q": "What colour is best at reflecting heat?", "a": "White/Shiny"}, {"q": "Why does a thermos keep a cup of tea warm?", "a": "Shiny walls reflect heat back into the tea to keep it warm"}, {"q": "Why are houses in Greece painted white?", "a": "To reflect the heat so inside the house stays cool"}, {"q": "How does heat travel from the Sun to the Earth?", "a": "Radiation (heat wave)"}, {"q": "If a black bottle and shiny bottle of cold water are left out in the Sun, why will black heat up quicker?", "a": "Black absorbs heat, shiny reflects heat away"}, {"q": "Why do we need to insulate our homes?", "a": "Reduce heat loss and save money"}, {"q": "Name 3 types of home insulation", "a": "Double glazing, Cavity wall insulation, Loft insulation, Shiny bubble wrap, Fibre glass, Rock wool, Draught excluders"}, {"q": "What is payback time?", "a": "How long it takes to earn the money back for insulation etc"}, {"q": "How do you calculate payback time?", "a": "Payback time = cost / savings per year"}, {"q": "Why does reducing the temperature difference inside and outside the house reduce heat loss?", "a": "The bigger the temperature difference the more heat is transferred"}]}]}, {"name": "Domestic Electricity", "subtopics": [{"name": "1.4", "cards": [{"q": "What does kWh stand for?", "a": "kilowatt hours"}, {"q": "What is measured in kWh?", "a": "units of electricity"}, {"q": "How do you calculate units of electricity used?", "a": "units used (kwh) = power (kW) x time (h)"}, {"q": "How do you calculate the cost of electricity used?", "a": "cost = units used x cost per unit"}, {"q": "What is the difference between AC and DC?", "a": "DC current flows in one direction. AC current constantly changes direction"}, {"q": "Name 2 items that use DC", "a": "Anything with batteries"}, {"q": "Name 2 items that use AC", "a": "Anything with a plug"}, {"q": "Is UK mains electricity AC or DC?", "a": "AC"}, {"q": "What is the voltage of UK mains electricity?", "a": "230V (220-240)"}, {"q": "On an energy banding sticker which letter and colour are most efficient?", "a": "A Green (A+ or A++)"}, {"q": "What is a fuse?", "a": "Glass tube with thin wire inside"}, {"q": "How does a fuse protect from fires?", "a": "Fuse wire melts when current exceeds limit and breaks the circuit"}, {"q": "What are the standard UK fuse sizes?", "a": "3A, 5A, 13A"}, {"q": "What would happen if an 11A appliance is fitted with a 5A fuse?", "a": "The appliance won't work as the fuse will melt before the current is high enough to turn it on"}, {"q": "What would happen if an 2A appliance is fitted with a 5A fuse?", "a": "There could be a fire because the current allowed before the fuse melts is too high"}, {"q": "Give a disadvantage of fitting every appliance with a fuse", "a": "It needs to be replaced if it blows"}, {"q": "What does MCB stand for?", "a": "Miniature Circuit Breaker"}, {"q": "Why are MCBs better than fuses?", "a": "Can be reset, work much faster"}, {"q": "What does RCCB stand for?", "a": "Residual Current Circuit Breaker"}, {"q": "Which wires do RCCBs measure the current in?", "a": "Live and Neutral"}, {"q": "What do RCCBs protect from?", "a": "Electric shock (electrocution)"}, {"q": "What type of devices use RCCBs?", "a": "Lawnmowers and power tools"}, {"q": "What is the main parallel circuit used in homes called?", "a": "Ring main"}, {"q": "What are the three wires in a domestic UK circuit?", "a": "Live, Earth and Neutral"}, {"q": "Which wire are fuses and switches connect to?", "a": "Live"}, {"q": "What is the purpose of the Earth wire?", "a": "Safely carry current to ground if there is a fault"}, {"q": "Give 2 advantages of the ring main", "a": "Thinner cables, Cables carry less current, Sockets can be placed anywhere, Each socket has same voltage, Sockets can be operated independently"}, {"q": "Where are the mains switch and fuses/MCBs found in the house?", "a": "Consumer unit"}]}]}, {"name": "Features of Waves", "subtopics": [{"name": "1.5", "cards": [{"q": "What is the amplitude of a wave?", "a": "Maximum displacement (half height)"}, {"q": "What is the wavelength of a wave?", "a": "Length of one complete wave (e.g. peak to peak)"}, {"q": "What is the frequency of a wave?", "a": "The number of waves per second"}, {"q": "What is the time period of a wave?", "a": "The time it takes for one complete wave"}, {"q": "What is the unit for wavelength?", "a": "m (metres)"}, {"q": "What is the unit for frequency?", "a": "Hz (hertz)"}, {"q": "What is the wave equation?", "a": "Wave speed = wavelength x frequency"}, {"q": "What is the symbol used to indicate wavelength?", "a": "λ (lambda)"}, {"q": "What is a transverse wave?", "a": "A wave with oscillations (vibrations) at right angles to the direction of motion (propagation)"}, {"q": "What is a longitudinal wave?", "a": "A wave with oscillations (vibrations) in the same direction as motion (propagation)"}, {"q": "Give an example of a transverse wave", "a": "Water waves, light, EM spectrum"}, {"q": "Give an example of a longitudinal wave", "a": "Sound wave, pressure wave"}, {"q": "What is the law of reflection?", "a": "angle of incidence = angle of reflection"}, {"q": "What is the bending of light called?", "a": "refraction"}, {"q": "Why does light bend when it enters a glass block?", "a": "slows down as it enters a more dense material"}, {"q": "Write the EM spectrum in order from longest to shortest wavelength", "a": "Radio, Microwave, Infrared, Visible, Uv, Xray, Gamma"}, {"q": "What do all EM waves have in common?", "a": "Travel at the same speed, all transverse waves"}, {"q": "Which EM wave as the longest wavelength/lowest frequency?", "a": "Radio"}, {"q": "Which EM wave as the shortest wavelength/highest frequency?", "a": "Gamma"}, {"q": "What are some uses and dangers of Gamma rays?", "a": "Used to treat cancer, Ionising"}, {"q": "What does ionising mean?", "a": "Removes electrons, damages DNA and causes cancer"}, {"q": "What type of EM waves do satellites use?", "a": "Microwaves"}, {"q": "What are some disadvantages of satellites?", "a": "Time delay, Can be affected by weather"}, {"q": "Describe the orbit of a Geosynchronous satellite", "a": "orbits the Earth every 24 hours, however only returns to exactly the same place once every 24 hours"}, {"q": "Describe the orbit of a Geostationary satellite", "a": "stays above a fixed point of the Earth and takes 24 hours to orbit"}, {"q": "Which type of satellite are used for satellite TV and communications?", "a": "Geostationary"}]}]}, {"name": "Total Internal Reflection", "subtopics": [{"name": "1.6", "cards": [{"q": "What does TIR stand for?", "a": "Total Internal Reflection"}, {"q": "What are the two conditions for TIR?", "a": "angle of incidence greater than critical angle and travelling in more dense material"}, {"q": "What happens if angle of incidence is smaller than critical angle?", "a
