tal momentum after it."}, {"q": "What are the units of momentum?", "a": "kilogram metres per second (kg m/s)"}, {"q": "What is the equation to calculate momentum?", "a": "Momentum = mass x velocity (p=mv)"}, {"q": "Explain the relationship between force applied and change in momentum", "a": "The greater the force, the greater the change in momentum"}, {"q": "Explain how a crumple zone reduces the force on passengers in a crash.", "a": "It increases the time over which the car stops, reducing the rate of change of momentum and therefore the force."}, {"q": "What is the unit of momentum? (HT)", "a": "Kgm/s"}, {"q": "What unit is used for momentum?", "a": "kgm/s (kilogram metres per second)"}, {"q": "Explain the relationship between force applied and time taken to change momentum", "a": "The greater the force, the shorter the time to change momentum"}, {"q": "Write the equation linking force, change in momentum and time.", "a": "Force = change in momentum ÷ time (F = Δp/t)."}, {"q": "Explain how an air bag reduces the force on a car passenger in a crash.", "a": "It increases the time taken to stop, reducing the rate of change of momentum and so the force."}]}, {"name": "Stopping distances", "cards": [{"q": "Define stopping distance of a car", "a": "Thinking distance plus braking distance"}, {"q": "What two parts make up the stopping distance of a vehicle?", "a": "Thinking distance plus braking distance."}, {"q": "The stopping distance of a vehicle is the sum of the …..", "a": "thinking and breaking distances"}, {"q": "What is the definition for thinking distance?", "a": "Distance travelled between seeing the object and applying the brakes"}, {"q": "Define thinking distance", "a": "How far the car travels before the driver puts the brakes on"}, {"q": "Give two factors that increase a driver's thinking distance.", "a": "Tiredness, alcohol or drugs, distractions, or higher speed (any two)."}, {"q": "Reaction time is…", "a": "the time it takes a driver to react"}, {"q": "What is the definition for braking distance?", "a": "Distance travelled between applying the brakes and coming to a stop"}, {"q": "Define braking distance", "a": "How far the car travels while the brakes are applied before it stops"}, {"q": "Give two factors that increase braking distance.", "a": "Higher speed, wet/icy roads, worn tyres or brakes, or a heavier load (any two)."}, {"q": "A typical reaction time is …", "a": "0.2-0.9 s"}, {"q": "How do we calculate overall stopping distance?", "a": "Overall Stopping distance = Thinking distance + Braking distance"}, {"q": "State two factors that will affect thinking distance", "a": "Alertness of driver (alcohol/drugs), speed of car"}, {"q": "State two factors that affect only the braking distance, not the thinking distance.", "a": "The condition of the brakes and tyres, and the road surface (e.g. wet or icy)."}, {"q": "Why does a large deceleration in a crash lead to a large force on the occupants?", "a": "A large change of momentum in a short time means a high rate of change of momentum, and force = rate of change of momentum."}]}]}, {"name": "Topic 3 – Conservation of Energy", "subtopics": [{"name": "Energy stores and transfers", "cards": [{"q": "What are the energy stores?", "a": "Chemical, kinetic, gravitational, elastic, thermal, magnetic, electrostatic and nuclear"}, {"q": "Write the equation for the elastic potential energy stored in a stretched spring.", "a": "Elastic potential energy = ½ × spring constant × extension² (E = ½kx²)."}, {"q": "What is the equation linking gravitationa field strength, gravitational potential energy and height?", "a": "Ep=mgh"}, {"q": "Give 2 examples of things that have kinetic energy", "a": "Anything that is moving"}, {"q": "How is energy transferred?", "a": "Mechanically, electrically, by heating, by radiation (sound and light)"}, {"q": "Write the equation linking energy transferred, power and time.", "a": "Energy = power × time (E = Pt)."}, {"q": "What is the equation linking energy transferred, power and time?", "a": "P=E/t"}, {"q": "What diagram shows us energy transfers?", "a": "Sankey"}, {"q": "What is the principle of conservation of energy?", "a": "Energy is not created or destroyed"}, {"q": "Name four energy stores.", "a": "Kinetic, gravitational potential, elastic potential, thermal, chemical, nuclear, magnetic or electrostatic (any four)."}, {"q": "What is the magnetic energy store?", "a": "Energy stored in magnets that are attracting or repelling"}, {"q": "What type of energy is the energy transferred to an object when it is moved?", "a": "Work done"}, {"q": "Give the equation linking efficiency, useful energy output and total energy input", "a": "Efficiency = (useful energy output/total energy input) x 100%"}, {"q": "Name the eight energy stores.", "a": "Kinetic, gravitational potential, elastic potential, thermal, chemical, nuclear, magnetic and electrostatic."}, {"q": "A ball is dropped. Describe the main energy transfer as it falls.", "a": "Energy is transferred from the gravitational potential store to the kinetic store."}, {"q": "What is meant by a closed system in terms of energy?", "a": "One where no energy enters or leaves, so the total energy stays constant."}]}, {"name": "Efficiency and energy resources", "cards": [{"q": "State the unit of power", "a": "watt, W"}, {"q": "Write two equations for electrical power.", "a": "Power = potential difference × current (P = VI), and Power = current² × resistance (P = I²R)."}, {"q": "What is the equation linking power, time and work done?", "a": "P=W/t"}, {"q": "What equation links voltage, current and power?", "a": "P = I x V"}, {"q": "What is double insulation?", "a": "Plastic casing on the outside of an appliance so the user cannot get an electric shock"}, {"q": "For an ideal transformer, what is the relationship between input and output power?", "a": "They are equal: Vp × Ip = Vs × Is."}, {"q": "What are the units of power?", "a": "Watts"}, {"q": "What does renewable mean?", "a": "Will not run out and will quickly replenish"}, {"q": "Define power (general)", "a": "Rate of energy transfer or rate of work done"}, {"q": "Compare the penetrating power of alpha, beta and gamma radiation.", "a": "Alpha is stopped by paper/skin, beta by a few mm of aluminium, and gamma is only reduced by thick lead or concrete."}, {"q": "What is the equation for calculating efficiency from energy?", "a": "Efficiency = useful energy output/total energy input"}, {"q": "Name 4 non renewable energy sources", "a": "Coal, Oil, Gas, Nuclear"}, {"q": "Give the equation linking electrical power, voltage and current", "a": "power = voltage x current"}, {"q": "Write the equation for efficiency as a percentage.", "a": "Efficiency = (useful energy transferred ÷ total energy supplied) × 100%."}, {"q": "Give two ways of reducing unwanted energy transfers in a home.", "a": "Loft/cavity-wall insulation and draught-proofing (reducing conduction and convection losses)."}, {"q": "Why is wind power considered unreliable?", "a": "It only generates electricity when the wind blows, which cannot be controlled to match demand."}]}]}, {"name": "Topic 4 – Waves", "subtopics": [{"name": "Wave properties", "cards": [{"q": "State the unit of frequency", "a": "hertz, Hz"}, {"q": "What is the difference between a transverse and a longitudinal wave?", "a": "In a transverse wave the oscillations are at right angles to the direction of energy transfer; in a longitudinal wave they are parallel to it.", "d": "wave:transverse"}, {"q": "What is the frequency of the alternating current in UK mains electricity?", "a": "50Hz"}, {"q": "What is the time period of a wave?", "a": "The time it takes for one complete wave"}, {"q": "Define the time period of an a.c. supply", "a": "The time taken for one complete cycle"}, {"q": "Give one example each of a transverse and a longitudinal wave.", "a": "Transverse: light or a water wave. Longitudinal: sound."}, {"q": "What equation links frequency and time period?", "a": "F = 1 / T"}, {"q": "What is the unit for wavelength?", "a": "m (metres)"}, {"q": "Define the frequency of an a.c. supply", "a": "The number of cycles in one second"}, {"q": "Describe a longitudinal wave in terms of compressions and rarefactions.", "a": "It is a series of compressions (particles close together) and rarefactions (particles spread out) travelling along the wave.", "d": "wave:longitudinal"}, {"q": "What is the unit of frequency?", "a": "Hertz (Hz)"}, {"q": "What is the unit for frequency?", "a": "Hz (hertz)"}, {"q": "What is a transverse wave?", "a": "The oscillations are perpendicular to the direction of travel of the wave"}, {"q": "Write the equation linking wave speed, frequency and wavelength.", "a": "Wave speed = frequency × wavelength (v = fλ)."}, {"q": "Describe the Edexcel method for measuring the speed of water ripples in a tank.", "a": "Use a strobe/ruler to measure the wavelength and count ripples per second for the frequency, then use v = fλ."}, {"q": "What is the frequency of a wave with a time period of 0.02 s?", "a": "50 Hz (1 ÷ 0.02)."}]}, {"name": "Wave behaviour and sound", "cards": [{"q": "What is the law of reflection?", "a": "The angle of incidence is equal to the angle of reflection"}, {"q": "How could you measure the speed of sound in air?", "a": "Time an echo over a known distance, or use two microphones a known distance apart connected to a timer, then use speed = distance ÷ time."}, {"q": "Define normal reaction force", "a": "Any force that is part of an interaction pair that is produced in response to a force acting"}, {"q": "What happens if angle of incidence is smaller than critical angle?", "a": "Refraction"}, {"q": "What causes refraction?", "a": "The change in speed of a wave as it crosses a boundary"}, {"q": "State the law of reflection.", "a": "The angle of incidence equals the angle of reflection (both measured from the normal)."}, {"q": "Can sound waves travel through space?", "a": "no"}, {"q": "What happens if angle of incidence is equal to critical angle?", "a": "Travel along boundary (maximum refraction)"}, {"q": "What happens to the pitch of a sound when the source moves towards the observer?", "a": "It is higher as the waves are compressed"}, {"q": "What is the difference between specular and diffuse reflection?", "a": "Specular reflection is from a smooth surface giving a clear image; diffuse reflection is from a rough surface scattering light in many directions."}, {"q": "Does a sound wave travel faster in water or air?", "a": "water"}, {"q": "What happens if angle of incidence is larger than critical angle?", "a": "Total Internal Reflection"}, {"q": "What happens to the pitch of a sound when the source moves away from the observer?", "a": "It is lower as the waves are stretched"}, {"q": "What is the range of frequencies audible to a typical human?", "a": "About 20 Hz to 20 000 Hz."}, {"q": "How is ultrasound used to measure the depth of water?", "a": "Send a pulse downward, time the echo returning, then use distance = speed × time ÷ 2."}, {"q": "What happens to a wave's frequency when it refracts?", "a": "The frequency stays the same; the speed and wavelength change."}]}]}, {"name": "Topic 5 – Light and the EM Spectrum", "subtopics": [{"name": "The electromagnetic spectrum", "cards": [{"q": "List the five properties of all electromagnetic waves", "a": "They all transfer energy, travel at the same speed in a vacuum, can be reflected, can be refracted, and are transverse"}, {"q": "What do all electromagnetic waves have in common?", "a": "They are transverse, transfer energy, and travel at the same speed (the speed of light) through a vacuum."}, {"q": "What is the range of gamma radiation in air?", "a": "unlimited in air"}, {"q": "What do all EM waves have in common?", "a": "Travel at the same speed, all transverse waves"}, {"q": "Give two uses of radio waves", "a": "Broadcasting and communication"}, {"q": "Give a use of radio waves.", "a": "Broadcasting television and radio signals (communications)."}, {"q": "What will absorb (stop) gamma radiation?", "a": "several centimetres of lead"}, {"q": "What are some uses and dangers of Gamma rays?", "a": "Used to treat cancer, Ionising"}, {"q": "Give two uses of microwaves", "a": "Cooking and satellite transmissions"}, {"q": "Give a use of microwaves.", "a": "Satellite communications and cooking food in a microwave oven."}, {"q": "How does gamma radiation alter the mass and atomic number of the parent nucleus", "a": "unchanged (energy is released as the particles in the nucleus reorganise to a lower energy arrangement)"}, {"q": "What type of EM waves do satellites use?", "a": "Microwaves"}, {"q": "Give two uses of infra-red radiation", "a": "Heaters and night-vision equipment"}, {"q": "State two properties shared by all electromagnetic waves.", "a": "They are transverse and travel at the same speed (the speed of light) in a vacuum."}, {"q": "How are radio waves produced and detected?", "a": "They are produced by oscillating charges in an aerial (alternating current) and can induce an alternating current when absorbed by an aerial."}]}, {"name": "Reflection, refraction and lenses", "cards": [{"q": "How does light change direction when it enters a more optically dense medium?", "a": "It refracts towards the normal line"}, {"q": "What type of image does a convex (converging) lens form of a distant object?", "a": "A real, inverted, diminished image."}, {"q": "Draw a ray diagram to show how light is reflected by a plane mirror.", "a": ""}, {"q": "How does light change direction when it enters a less optically dense medium?", "a": "It refracts away from the normal line"}, {"q": "What is the focal length of a lens?", "a": "The distance from the centre of the lens to the principal focus (where parallel rays converge)."}, {"q": "Draw a ray diagram to show how light is refracted at a surface between two materials.", "a": ""}, {"q": "Define critical angle", "a": "The angle of incidence when the angle of refraction is 90°"}, {"q": "What is the difference between a real and a virtual image?", "a": "A real image can be projected onto a screen because rays actually meet; a virtual image cannot, because the rays only appear to come from it."}, {"q": "How do convex lenses form an image?", "a": "In a convex lens, parallel rays of light are brought to a focus at the principal focus."}, {"q": "What happens to light if i is less than the critical angle?", "a": "Refraction with a weak reflected ray"}, {"q": "Write the equation for magnification.", "a": "Magnification = image height ÷ object height."}, {"q": "What is the focal length?", "a": "The distance from the lens to the principal focus is called the focal length."}, {"q": "What happens to light if i is equal to the critical angle?", "a": "Angle of refraction is 90° and weak reflection"}, {"q": "State the law of reflection.", "a": "The angle of incidence equals the angle of reflection, both measured from the normal."}, {"q": "Why does a ray of light bend towards the normal entering glass from air?", "a": "It slows down in the denser glass, changing its direction."}]}, {"name": "Colour and black body radiation", "cards": [{"q": "What colour are the hottest stars?", "a": "Blue"}, {"q": "What is a perfect black body?", "a": "An object that absorbs all the radiation that hits it and is also the best possible emitter of radiation."}, {"q": "What colour is the live wire in a three core cable?", "a": "brown"}, {"q": "What colour is best at absorbing heat?", "a": "Black"}, {"q": "What colour are the coolest stars?", "a": "Red"}, {"q": "Why does a red filter make white light appear red?", "a": "It transmits (lets through) red light and absorbs the other colours."}, {"q": "What colour is the neutral wire in a three core cable?", "a": "blue"}, {"q": "What colour is best at emitting heat?", "a": "Black"}, {"q": "What colour is the earth wire in a three core cable?", "a": "green and yellow"}, {"q": "What colour is best at reflecting heat?", "a": "White/Shiny"}, {"q": "How do colour filters work?", "a": "Colour filters work by absorbing certain wavelengths (and colour) and transmitting other wavelengths (and colour)."}, {"q": "What determines the colour of an opaque object?", "a": "The colour of an opaque object is determined by which wavelengths of light are more strongly reflected. Wavelengths that are not reflected are absorbed. If all wavelengths are reflected equally the object appears white. If all wavelengths are absorbed the objects appears black."}, {"q": "What are the three primary colours?", "a": "Red, Green, Blue"}, {"q": "What determines the colour of an opaque object?", "a": "The colours of light it reflects; the others are absorbed."}, {"q": "What happens to a body when it absorbs and emits radiation at equal rates?", "a": "Its temperature stays constant."}]}]}, {"name": "Topic 6 – Radioactivity", "subtopics": [{"name": "Atomic structure and models", "cards": [{"q": "What is the relative charge of a proton?", "a": "+1"}, {"q": "Describe the nuclear (Rutherford) model of the atom.", "a": "A tiny, dense, positively charged nucleus at the centre containing most of the mass, with electrons orbiting at a distance."}, {"q": "The radius of an atom is …?", "a": "0.1 nm (1 x 1010 m)"}, {"q": "What 2 things are found in the nucleus of an atom?", "a": "Protons and Neutrons"}, {"q": "What is the mass number of an atom?", "a": "The number of protons and neutrons"}, {"q": "What did the alpha-scattering experiment show that the plum pudding model could not explain?", "a": "Most alpha particles passed straight through but a few were deflected or bounced back, showing the atom is mostly empty space with a small, dense, positive nucleus."}, {"q": "Who came up with the Plumb Pudding model of the atom", "a": "J J Thompson"}, {"q": "When looking at an element on the periodic table which number is the proton number?", "a": "Bottom number"}, {"q": "What is the atomic number of an atom?", "a": "The number of protons"}, {"q": "What are the relative charges of a proton, neutron and electron?", "a": "Proton +1, neutron 0, electron −1."}, {"q": "Describe the Plumb Pudding model of the atom", "a": "A ball of positive charge with negative electrons embedded in it"}, {"q": "How do you calculate the number of neutrons in an atom?", "a": "Nucleon number - Proton number (top-bottom)"}, {"q": "How do we calculate the number of neutrons in an atom?", "a": "Mass number - atomic number"}, {"q": "What is the approximate radius of an atom compared with its nucleus?", "a": "An atom is about 1 × 10⁻¹⁰ m across, roughly 10 000 times larger than its nucleus."}, {"q": "How did the nuclear model replace the plum pudding model?", "a": "Alpha-scattering results (some particles deflected back) showed the positive charge and mass are concentrated in a tiny nucleus, not spread out."}]}, {"name": "Radiation, decay and half-life", "cards": [{"q": "What do we call the observed random jerking motion of pollen?", "a": "Brownian motion"}, {"q": "What is an alpha particle?", "a": "Two protons and two neutrons (a helium nucleus)."}, {"q": "Give an example of a random error", "a": "A one off error that creates anomalous data (not the same as human error)"}, {"q": "What does ionising mean?", "a": "Removes electrons, damages DNA and causes cancer"}, {"q": "What is ionising radiation?", "a": "Radiation from the nucleus of an atom that can ionise atoms"}, {"q": "Which type of radiation is the most strongly ionising?", "a": "Alpha radiation."}, {"q": "Particles are arranged randomly, but touching in a …?", "a": "liquid"}, {"q": "What name is given to the theory that describe gas as particles constantly moving in random directions?", "a": "Kinetic theory"}, {"q": "What is an alpha particle made up of?", "a": "2 protons and 2 neutrons"}, {"q": "What is meant by the activity of a radioactive source, and what is its unit?", "a": "The rate at which nuclei decay, measured in becquerels (Bq)."}, {"q": "Particles move around randomly in a ….?", "a": "gas"}, {"q": "Why do atoms undergo radioactive decay?", "a": "Due to an imbalance in the number of protons and neutrons"}, {"q": "What is the charge of an alpha particle?", "a": "+2"}, {"q": "What is meant by the half-life of a radioactive source?", "a": "The average time for half of the undecayed nuclei (or the activity) to decay."}, {"q": "Why can we not say exactly when a particular nucleus will decay?", "a": "Radioactive decay is a random process; we can only give a probability."}]}, {"name": "Uses, dangers, fission and fusion", "cards": [{"q": "What is meant by irradiation?", "a": "An object is exposed to ionising radiation, the ionisation stops when the source is removed"}, {"q": "What is the difference between specific latent heat of fusion and of vaporisation?", "a": "Fusion is for melting/freezing (solid↔liquid); vaporisation is for boiling/condensing (liquid↔gas)."}, {"q": "Latent heat of fusion is for changing…?", "a": "solid to liquid"}, {"q": "What is specific latent heat of fusion?", "a": "Amount of heat energy needed to change 1kg from solid to liquid"}, {"q": "What is meant by radioactive contamination?", "a": "Particles of a radioactive isotope on/in an objectwhich expose it to ongoing irradiation"}, {"q": "What is the difference between irradiation and contamination?", "a": "Irradiation is being exposed to radiation from an outside source; contamination is getting radioactive material on or inside you."}, {"q": "Define contamination", "a": "The unwanted presence of materials containing radioactive atoms"}, {"q": "Why is SLH of fusion less than SLH vaporisation?", "a": "More bonds to break going from liquid to gas then from solid to liquid"}, {"q": "Define nuclear fission", "a": "The splitting of a nucleus into two daughter nuclei and neutrons"}, {"q": "Why is contamination often more dangerous than brief irradiation?", "a": "The radioactive material stays with you and keeps emitting radiation, sometimes inside the body."}, {"q": "Define irradiation", "a": "When an object is exposed to radiation"}, {"q": "How is a chain reaction made in nuclear fission?", "a": "When a nucleus splits it releases more neutrons that go on to split other nuclei"}, {"q": "What causes nuclear fission?", "a": "A slow moving neutron is absorbed by a heavy nucleus"}, {"q": "What is the difference between nuclear fission and nuclear fusion?", "a": "Fission splits a large nucleus into smaller ones; fusion joins small nuclei into a larger one. Both release energy."}, {"q": "Why is fusion hard to achieve on Earth?", "a": "Very high temperatures and pressures are needed to overcome the electrostatic repulsion between nuclei."}]}]}, {"name": "Topic 7 – Astronomy", "subtopics": [{"name": "The solar system and orbits", "cards": [{"q": "What force causes one object to orbit another?", "a": "Gravitation force"}, {"q": "What force keeps planets, moons and satellites in orbit?", "a": "Gravity (gravitational attraction)."}, {"q": "How many stars are in our solar system?", "a": "One - the sun"}, {"q": "What are some disadvantages of satellites?", "a": "Time delay, Can be affected by weather"}, {"q": "What is the difference between the paths of comets and planets?", "a": "The paths of comets are much more elliptical"}, {"q": "For a stable circular orbit, what happens if the orbital radius is smaller?", "a": "The object must move faster; a smaller orbit means a higher orbital speed."}, {"q": "Name the planets in our Solar System in order of distance from the sun.", "a": "Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune"}, {"q": "Describe the orbit of a Geosynchronous satellite", "a": "orbits the Earth every 24 hours, however only returns to exactly the same place once every 24 hours"}, {"q": "What is the orbital period of an object?", "a": "The time taken to complete one orbit"}, {"q": "Why is the velocity of an object in a circular orbit always changing even at constant speed?", "a": "Its direction is constantly changing, and velocity is a vector, so a changing direction means changing velocity (acceleration)."}, {"q": "What defines a planet?", "a": "A body that orbits a star, is massive enough for its own gravity to make it round shaped, and has \"cleared its neighbourhood\" of smaller objects around its orbit."}, {"q": "Describe the orbit of a Geostationary satellite", "a": "stays above a fixed point of the Earth and takes 24 hours to orbit"}, {"q": "What is the solar system?", "a": "The Sun and the planets, dwarf planets and asteroids that orbit the Sun"}, {"q": "What provides the centripetal force that keeps a planet in orbit?", "a": "The gravitational attraction between the planet and the Sun."}, {"q": "For a stable orbit, what happens to the orbital speed if the radius decreases?", "a": "The object must travel faster."}]}, {"name": "Stars and the universe", "cards": [{"q": "What is a galaxy?", "a": "A group of billions of stars"}, {"q": "Name the stages in the life cycle of a star about the size of the Sun.", "a": "Nebula → protostar → main sequence star → red giant → white dwarf."}, {"q": "Outline the life cycle of a star for stars the size of our Sun and stars much bigger than our Sun.", "a": "See diagram -->"}, {"q": "In which stage of the life cycle of a star is hydrogen fused into helium?", "a": "Main Sequence"}, {"q": "What is the name of our galaxy?", "a": "The Milky Way"}, {"q": "What keeps a main sequence star stable?", "a": "The inward force of gravity is balanced by the outward pressure from the energy released by nuclear fusion."}, {"q": "What elements are formed by a red giant?", "a": "Elements up to neon, and a small number of heavy elements."}, {"q": "In which stage of the life cycle of a star does a star spend most of its life?", "a": "Main Sequence"}, {"q": "Name the star classes from hottest to coolest", "a": "O B A F G K M"}, {"q": "How does red-shift support the idea that the universe is expanding?", "a": "More distant galaxies show greater red-shift, meaning they are moving away faster, which is what you expect if the whole universe is expanding."}, {"q": "What elements are formed by a red supergiant?", "a": "All elements up to iron."}, {"q": "In which stage of the life cycle of a star is our Sun currently?", "a": "Main Sequence"}, {"q": "What is the apparent magnitude of a star?", "a": "How bright it appears to be"}, {"q": "Outline the life cycle of a star similar to the Sun.", "a": "Nebula → protostar → main sequence → red giant → white dwarf."}, {"q": "What two pieces of evidence support the Big Bang theory?", "a": "The red-shift of distant galaxies and the cosmic microwave background radiation."}]}]}, {"name": "Topic 8 – Energy: Forces Doing Work", "subtopics": [{"name": "Work, power and energy", "cards": [{"q": "Give the equation linking work done, force and distance", "a": "Work done = force x distance"}, {"q": "Write the equation for work done by a force.", "a": "Work done = force × distance moved in the direction of the force (W = Fd)."}, {"q": "What are the units of work done?", "a": "joules"}, {"q": "What is the equation to calculate work done?", "a": "Work done = force x distance"}, {"q": "What is the unit of work done, and what is it equivalent to?", "a": "The joule (J); 1 J = 1 N m (one newton-metre)."}, {"q": "State the equation which links distance, force and work done", "a": "W=Fs"}, {"q": "What unit is used for work done?", "a": "J (Joules)"}, {"q": "What is the unit of work done?", "a": "Joules (J)"}, {"q": "HT: How can you find the work done in stretching a spring?", "a": "Area under force-extension graph (W=1/2 F x)"}, {"q": "Write the equation for work done by a force.", "a": "Work done = force × distance moved along the direction of the force (W = Fd)."}, {"q": "Write two equations for power.", "a": "Power = work done ÷ time (P = W/t) and Power = energy transferred ÷ time (P = E/t)."}, {"q": "What is 1 watt equal to?", "a": "1 joule per second."}, {"q": "A crane does 6000 J of work in 3 s. What is its power?", "a": "2000 W (6000 ÷ 3)."}, {"q": "What is meant by 1 joule of work?", "a": "The work done when a force of 1 N moves an object 1 m in the direction of the force."}]}]}, {"name": "Topic 9 – Forces and Their Effects", "subtopics": [{"name": "Forces, vectors and moments", "cards": [{"q": "Give the equation linking moment, force and perpendicular distance", "a": "Moment = force x perpendicular distance"}, {"q": "What is the moment of a force?", "a": "The turning effect of a force about a pivot."}, {"q": "State the equation which links force, distance and moment", "a": "M = F x d"}, {"q": "What is the principle of moments?", "a": "Sum of clockwise moments equals sum of anticlockwise moments about a point"}, {"q": "What is the centre of gravity?", "a": "The point through which all the weight of a body acts"}, {"q": "Write the equation for the moment of a force.", "a": "Moment = force × perpendicular distance from the pivot (M = Fd)."}, {"q": "What is the unit of a moment?", "a": "Nm"}, {"q": "Where is the centre of gravity of a regular shape?", "a": "The point where the axes of symmetry cross"}, {"q": "State the principle of moments for a balanced object.", "a": "The total clockwise moment about a pivot equals the total anticlockwise moment."}, {"q": "Write the moment equation", "a": "moment of a force = force × distance"}, {"q": "How does a lever make a task easier?", "a": "It lets a small force at a large distance from the pivot produce a large moment (turning effect)."}, {"q": "Write the moment equation in standard symbols", "a": "M = F d"}, {"q": "How do gears change the moment (turning effect)?", "a": "A larger gear turning a smaller one changes the speed and the moment transmitted; a large gear gives a larger moment but turns more slowly."}, {"q": "What is a free-body force diagram?", "a": "A diagram showing all the forces acting on a single object as labelled arrows."}, {"q": "Write the equation for the moment of a force.", "a": "Moment = force × perpendicular distance from the pivot (M = Fd)."}, {"q": "How can forces be represented and combined?", "a": "As vectors (scaled arrows); a scale drawing or the parallelogram method gives the resultant."}, {"q": "State the condition for an object to be balanced about a pivot.", "a": "The total clockwise moment equals the total anticlockwise moment."}]}]}, {"name": "Topic 10 – Electricity and Circuits", "subtopics": [{"name": "Current, voltage and resistance", "cards": [{"q": "State what happens to air resistance as an object speeds up", "a": "Air resistance increases"}, {"q": "Write the equation linking charge, current and time.", "a": "Charge = current × time (Q = It)."}, {"q": "State the equation which links charge flow, current and time", "a": "Q=It"}, {"q": "What is the symbol for a variable resistor?", "a": "rectangle with diagonal arrow", "d": "sym:variable_resistor"}, {"q": "State the unit of voltage", "a": "volt, V"}, {"q": "What is electric current?", "a": "The rate of flow of electric charge."}, {"q": "State the equation which links current, potential difference and resistance", "a": "V=IR"}, {"q": "What is the symbol for a thermistor?", "a": "rectangle with line through (like a hockey stick)", "d": "sym:thermistor"}, {"q": "State the unit of resistance", "a": "ohm"}, {"q": "What is potential difference?", "a": "The energy transferred per unit charge between two points in a circuit (the 'push' driving the current)."}, {"q": "What is the unit for potential difference?", "a": "Volts (V)"}, {"q": "What is voltage?", "a": "Difference in electrical energy between two points"}, {"q": "What are the charge carriers in a metal?", "a": "Electrons"}, {"q": "Write the equation linking charge, current and time.", "a": "Charge = current × time (Q = It)."}, {"q": "Write the equation linking potential difference, current and resistance.", "a": "Potential difference = current × resistance (V = IR)."}, {"q": "Describe the Edexcel required practical to find how resistance depends on wire length.", "a": "Measure current and pd for different lengths of wire, calculate resistance (V/I) and plot resistance against length — it gives a straight line through the origin."}]}, {"name": "Series and parallel circuits", "cards": [{"q": "What happens if you put a switch in a series circuit?", "a": "It will turn all the bulbs on and off"}, {"q": "In a series circuit, what is true about the current?", "a": "It is the same at every point in the circuit."}, {"q": "What is a series circuit?", "a": "A circuit with only one route for charge to flow"}, {"q": "What happens to current in a series circuit?", "a": "Stays the same everywhere"}, {"q": "What happens to the energy supplied to a series circuit?", "a": "It is shared between all the bulbs so the more bulbs there are, the dimmer they will be"}, {"q": "What is a parallel circuit?", "a": "A circuit with more than one route for charge to flow"}, {"q": "What happens to current in a parallel circuit?", "a": "Splits or shared between loops"}, {"q": "What happens to the current in a series circuit?", "a": "It is the same at every point"}, {"q": "State the rule for current in a series circuit", "a": "the current is the same at every point in the circuit and in every component"}, {"q": "What is the main parallel circuit used in homes called?", "a": "Ring main"}, {"q": "What happens if one bulb breaks in a series circuit?", "a": "The circuit is broken so all the bulbs go out"}, {"q": "State the rule for current in a parallel circuit", "a": "the total current through the whole circuit is the sum of the currents through the separate components"}, {"q": "What happens if you put a switch in a parallel circuit?", "a": "Depending on where the switch is, it can turn all the bulbs on and off together, or turn the bulbs in one branch on and off on their own"}, {"q": "In a series circuit, how do the potential differences across components relate to the supply?", "a": "They add up to the supply potential difference."}, {"q": "Why does adding a resistor in parallel decrease the total resistance?", "a": "It gives the current an extra path, so more current can flow for the same potential difference."}, {"q": "In a parallel circuit, what happens to the other branches if one is switched off?", "a": "They keep working, because each branch is a separate path."}]}, {"name": "Mains electricity and power", "cards": [{"q": "Explain role of live wire", "a": "Provides the path along with electrical energy travels to the appliance"}, {"q": "What is the purpose of a transformer?", "a": "To change the size of an alternating potential difference."}, {"q": "Draw the circuit symbol for a fuse", "a": "Fuse: a rectangle with a line running straight through it.", "d": "sym:fuse"}, {"q": "What is the role of a step-up transformer?", "a": "Increase voltage, decrease current so less heat is lost"}, {"q": "Explain role of neutral wire", "a": "Completes the circuit"}, {"q": "What is the difference between a step-up and a step-down transformer?", "a": "A step-up transformer increases the potential difference (more turns on the secondary); a step-down transformer decreases it (fewer turns on the secondary)."}, {"q": "An example of alternating current is…?", "a": "mains electricity"}, {"q": "What is the role of a step-down transformer?", "a": "Decrease voltage, increase current so it is more safe"}, {"q": "Explain role of earth wire", "a": "If there is a fault, a large current flows through the earth wire to the Earth, which melts the fuse"}, {"q": "Why must transformers use alternating current, not direct current?", "a": "A changing (alternating) current produces a continually changing magnetic field, which is needed to induce a potential difference in the secondary coil."}, {"q": "An example of direct current is…", "a": "batteries"}, {"q": "Give 2 ways the National Grid monitor the demand for electricity", "a": "Check TV guides, check weather reports, prepare for special events e.g. Olympics"}, {"q": "How does a fuse work?", "a": "If the current is too high, the fuse melts which breaks the circuit"}, {"q": "What are the voltage and frequency of UK mains electricity?", "a": "About 230 V and 50 Hz."}, {"q": "State the colours of the live, neutral and earth wires.", "a": "Live is brown, neutral is blue, and earth is green-and-yellow."}, {"q": "Write two equations for electrical power.", "a": "Power = potential difference × current (P = VI) and Power = current² × resistance (P = I²R)."}, {"q": "Why is the case of an appliance connected to the earth wire?", "a": "For safety: if the live wire touches the case, a large current flows to earth and blows the fuse instead of giving a shock."}]}]}, {"name": "Topic 11 – Static Electricity", "subtopics": [{"name": "Static charge and electric fields", "cards": [{"q": "How can an insulator become electrically charged?", "a": "By electrons moving when the object is rubbed with another insulator"}, {"q": "How does an insulator become electrically charged by friction?", "a": "Rubbing transfers electrons from one material to the other; the material that gains electrons becomes negative and the one that loses them becomes positive."}, {"q": "Define static electricity", "a": "The transfer of electrons when there is friction between two insulators"}, {"q": "How can a charged object attract an uncharged object?", "a": "By attracting or repelling electrons in the uncharged object, so the surface has the opposite charge to the charged object"}, {"q": "What is an electric field?", "a": "A region around a charged object where another charge experiences a force."}, {"q": "What is a spark?", "a": "When there is a very high voltage between two surfaces that causes the built up charge to flow - seen as a spark"}, {"q": "State four uses of static electricity", "a": "Paint spraying, electrostatic precipitators, ink jet printers and photocopiers"}, {"q": "What happens to the strength of an electric field as you move away from a charge?", "a": "It gets weaker, shown by field lines becoming further apart."}, {"q": "Describe the force between opposite charges", "a": "Attractive"}, {"q": "State a danger of static electricity", "a": "If there is a spark, there could be a fire or an explosion"}, {"q": "Explain how a charged object can attract a small uncharged object.", "a": "The field of the charged object induces opposite charge on the near side of the uncharged object, so there is a net attraction."}, {"q": "Describe the force between two like charges", "a": "Repulsive"}, {"q": "How is static charge removed safely?", "a": "By connecting the object to earth, so electrons flow along the wire until the object is neutral"}, {"q": "Which particles move when an insulator is charged by friction?", "a": "Electrons; the material gaining electrons becomes negative and the one losing them becomes positive."}, {"q": "Describe the electric field around an isolated positive charge.", "a": "Radial field lines pointing away from the charge, getting further apart (weaker) with distance."}, {"q": "Give one danger and one use of static electricity.", "a": "Danger: a spark igniting fuel vapour. Use: electrostatic spray painting or dust precipitators."}]}]}, {"name": "Topic 12 – Magnetism and the Motor Effect", "subtopics": [{"name": "Magnets and magnetic fields", "cards": [{"q": "What is a magnetic field?", "a": "A volume of space around a magnet where magnetic materials are affected"}, {"q": "Which way do the field lines point around a positive charge?", "a": "Away from the positive charge (they point in the direction of the force on a positive test charge)."}, {"q": "What is the definition of a magnetic field?", "a": "The area around a magnet where a force acts on another magnet or magnetic material"}, {"q": "Draw the magnetic field for a bar magnet", "a": "Loops from N to S, lots of lines at the ends of the magnet", "d": "mag:bar"}, {"q": "What happens if two north poles are placed near each other?", "a": "They repel"}, {"q": "What is the difference between a permanent and an induced magnet?", "a": "A permanent magnet produces its own magnetic field all the time; an induced magnet only becomes magnetic when placed in a magnetic field and loses most of it when removed."}, {"q": "The area around a magnet where a force acts on another magnet or magnetic material in the…", "a": "Magnetic field"}, {"q": "Describe the magnetic field of a current carrying wire", "a": "circles around the wire getting further apart"}, {"q": "What is meant by a hard magnetic material?", "a": "It keeps its magnetism when it is magnetised"}, {"q": "Name three magnetic materials.", "a": "Iron, cobalt and nickel (steel is also magnetic)."}, {"q": "Two like poles always ______", "a": "repel"}, {"q": "If a current carrying wire is held vertically with current flowing downwards what direction would the magnetic field be?", "a": "clockwise"}, {"q": "Give an example of a hard magnetic material", "a": "Steel"}, {"q": "What is the difference between a permanent and an induced magnet?", "a": "A permanent magnet is always magnetic; an induced magnet is only magnetic while in a magnetic field."}, {"q": "Sketch and describe the magnetic field around a bar magnet.", "a": "Field lines run from the north pole to the south pole, closest together (strongest) at the poles.", "d": "mag:bar"}, {"q": "What is the shape of the magnetic field around a straight current-carrying wire?", "a": "Concentric circles around the wire; the direction is given by the right-hand grip rule."}]}, {"name": "The motor effect", "cards": [{"q": "What is Fleming's left hand rule?", "a": "Thumb = motion, First finger = field, Second finger = current"}, {"q": "What is the motor effect?", "a": "When a current-carrying wire is placed in a magnetic field it experiences a force."}, {"q": "What does Fleming's left hand rule represent?", "a": "The relative orientation of the directions of the force, the current in the conductor and the magnetic field."}, {"q": "What does each finger represent in Fleming's Left-Hand Rule?", "a": "Thumb = movement (force) , First finger = magnetic field, Second finger = current"}, {"q": "How can you increase the force created by the motor effect?", "a": "Stronger magnet, bigger current, more turns"}, {"q": "What is the unit of magnetic flux density?", "a": "The tesla (T)."}, {"q": "State the equation which links current, force, length of conductor and magnetic flux density", "a": "F=BIl"}, {"q": "How can you increase the size of the force on a wire in a motor?", "a": "Increase current, Increase magnetic field strength, Increase number of turns (length of wire)"}, {"q": "What makes a loudspeaker vibrate?", "a": "The motor effect"}, {"q": "What does Fleming's left-hand rule give you?", "a": "The direction of the force (thumb) from the field (first finger) and current (second finger)."}, {"q": "Flemming's left hand rule shows the relative directions of what things?", "a": "Force, magnetic field and current"}, {"q": "What does each finger represent in Fleming's Right Hand Rule?", "a": "Thumb = movement (force) , First finger = magnetic field, Second finger = current"}, {"q": "Explain how a simple electric motor works.", "a": "A current-carrying coil in a magnetic field experiences forces on each side (motor effect) in opposite directions, creating a turning moment that spins the coil; a split-ring commutator reverses the current every half turn to keep it rotating."}, {"q": "Write the equation for the force on a current-carrying conductor in a magnetic field.", "a": "Force = magnetic flux density × current × length (F = BIL)."}, {"q": "What does Fleming's left-hand rule give the direction of?", "a": "The force (thumb), from the field (first finger) and current (second finger)."}, {"q": "Give two ways to increase the turning speed of a simple electric motor.", "a": "Increase the current or use a stronger magnetic field (or add more turns to the coil)."}]}]}, {"name": "Topic 13 – Electromagnetic Induction", "subtopics": [{"name": "Generator effect and transformers", "cards": [{"q": "What does an alternator produce, and how?", "a": "Alternating current; a coil rotates in a magnetic field and slip rings keep the output connected the same way each half turn."}, {"q": "What is the generator effect?", "a": "If an electrical conductor moves relative to a magnetic field or if there is a change in the magnetic field around a conductor, a potential difference is induced across the ends of the conductor. If the conductor is part of a complete circuit, a current is induced in the conductor. This is called the generator effect."}, {"q": "How can you increase the current induced from a generator?", "a": "Move wire (or magnet) faster, Add more turns to wire, Increase magnetic field strength"}, {"q": "What does an alternator use the generator effect for?", "a": "To generate AC"}, {"q": "N1=2000  V1=240V   V2=4.8V  how many turns are on the secondary coil?", "a": "40 turns"}, {"q": "What does a dynamo use the generator effect for?", "a": "To generate DC"}, {"q": "How do microphones use the generator effect?", "a": "Microphones use the generator effect to convert the pressure variations in sound waves into variations in current in electrical circuits."}, {"q": "What is the generator (dynamo) effect?", "a": "A potential difference is induced when a conductor and a magnetic field move relative to each other, cutting field lines."}, {"q": "Give two ways to increase the induced potential difference in a generator.", "a": "Rotate the coil faster or use a stronger magnetic field (or more turns on the coil)."}, {"q": "Write the transformer turns equation.", "a": "Vp/Vs = Np/Ns."}, {"q": "For an ideal transformer, how do input and output power compare?", "a": "They are equal: VpIp = VsIs."}, {"q": "Why must transformers be used with alternating current?", "a": "AC produces a continually changing magnetic field, which is needed to induce a voltage in the secondary coil."}, {"q": "Why does the National Grid transmit at high voltage?", "a": "High voltage means lower current, reducing energy wasted as heat in the cables."}]}]}, {"name": "Topic 14 – Particle Model", "subtopics": [{"name": "Density and states of matter", "cards": [{"q": "Give the equation linking density, mass and volume", "a": "Density = mass/volume"}, {"q": "Write the equation that links density, mass and volume.", "a": "Density = mass ÷ volume (ρ = m/V)."}, {"q": "Name the change of state when a liquid becomes a solid", "a": "freezing"}, {"q": "What is density?", "a": "How many particles are in a volume"}, {"q": "Give the equation linking pressure difference, height of fluid, density and g", "a": "Pressure difference = height x density x g"}, {"q": "What is the SI unit of density?", "a": "Kilograms per cubic metre (kg/m³). g/cm³ is also common."}, {"q": "Name the change of state when a solid becomes a liquid", "a": "melting"}, {"q": "What is the equation to calculate density?", "a": "Density = mass / volume"}, {"q": "State the units of density", "a": "kg/m cubed or g/cm cubed"}, {"q": "How would you find the density of a small regularly-shaped block?", "a": "Measure its mass on a balance, measure its dimensions to calculate the volume, then divide mass by volume."}, {"q": "Name the change of state when a liquid becomes a gas", "a": "evaporation"}, {"q": "What units is density measured in?", "a": "g/cm3 or kg/m3"}, {"q": "Which states of matter are fluids?", "a": "Liquids and gases"}, {"q": "Write the equation linking density, mass and volume.", "a": "Density = mass ÷ volume (ρ = m/V)."}, {"q": "Describe the Edexcel practical for finding the density of an irregular solid.", "a": "Find its mass on a balance, find its volume by displacement of water in a measuring cylinder, then divide mass by volume."}, {"q": "Compare the particle arrangement in a solid, a liquid and a gas.", "a": "Solid: fixed, regular, vibrating. Liquid: close but random, able to flow. Gas: far apart, random, fast-moving.", "d": "particle:solid"}]}, {"name": "Internal energy, heating and gases", "cards": [{"q": "What causes Brownian motion?", "a": "Particles in a liquid or gas colliding with pollen"}, {"q": "What is meant by the internal energy of a substance?", "a": "The total kinetic and potential energy of all the particles that make up the substance."}, {"q": "Define specific heat capacity", "a": "The energy needed to raise the temperature 1 kg of a material by 1ᵒC"}, {"q": "What causes gas pressure?", "a": "Particles collide with surface of an object and exert a force which creates a pressure"}, {"q": "What is Boyle's law?", "a": "Pressure is inversely proportional to volume if the temperature is constant"}, {"q": "Define the specific heat capacity of a material.", "a": "The energy needed to raise the temperature of 1 kg of the material by 1 °C (or 1 K)."}, {"q": "What are the units of specific heat capacity", "a": "J/kg°C"}, {"q": "Give 2 assumptions of kinetic theory", "a": "Particles constantly move, travel in random directions, travel in straight lines, don't lose energy in collisions"}, {"q": "What is the value of absolute zero in degrees C?", "a": "-273 degrees C"}, {"q": "Define the specific latent heat of a substance.", "a": "The energy needed to change the state of 1 kg of the substance with no change in temperature."}, {"q": "What does it mean if a substance A has a higher specific heat capacity than substance B?", "a": "It takes more energy to increase its temp by 1 deg"}, {"q": "What temperature is absolute zero?", "a": "0 kelvin = -273 degrees celsius"}, {"q": "What is zero degrees C in Kelvin?", "a": "+273 K"}, {"q": "Define the specific heat capacity of a material.", "a": "The energy needed to raise the temperature of 1 kg of it by 1 °C."}, {"q": "Write the equation linking energy, mass, specific heat capacity and temperature change.", "a": "Energy = mass × specific heat capacity × temperature change (E = mcΔθ)."}, {"q": "Why does the temperature stay constant while a substance is boiling?", "a": "The energy supplied is used to break bonds between particles rather than to raise their kinetic energy.", "d": "graph:heatingwater"}, {"q": "What happens to the pressure of a fixed mass of gas if it is heated at constant volume?", "a": "The pressure increases, because the particles move faster and hit the walls harder and more often."}]}]}, {"name": "Topic 15 – Forces and Matter", "subtopics": [{"name": "Forces and elasticity", "cards": [{"q": "State Hooke's law", "a": "The extension of a spring is proportional to the force applied"}, {"q": "Write the equation linking force, spring constant and extension.", "a": "Force = spring constant × extension (F = kx)."}, {"q": "State the equation which links extension, force and spring constant", "a": "F=ke"}, {"q": "Whose law states that extension of a spring is directly proportional to the force applied?", "a": "Hooke's law"}, {"q": "Define elastic behaviour", "a": "Object returns to its original length when the force is removed"}, {"q": "What is the limit of proportionality?", "a": "The point beyond which extension is no longer proportional to force, so the line on a force–extension graph starts to curve."}, {"q": "What is the unit of the spring constant?", "a": "Newtons per meter (N/m)"}, {"q": "When you double the force on a spring what happens to the extension?", "a": "It doubles"}, {"q": "Define elastic limit", "a": "If a force greater than the elastic limit is applied, the object will not return to its original length when the load is removed"}, {"q": "What is the difference between elastic and inelastic (plastic) deformation?", "a": "In elastic deformation the object returns to its original shape when the force is removed; in inelastic deformation it stays permanently changed.", "d": "graph:forceext"}, {"q": "What is the unit of the spring extension?", "a": "Metres (m)"}, {"q": "What is the equation given by Hooke's law?", "a": "Force = spring constant x extension (F = k x)"}, {"q": "Define extension", "a": "New length - original length"}, {"q": "State Hooke's law.", "a": "The extension of a spring is directly proportional to the force applied, up to the limit of proportionality."}, {"q": "Write the equation for the energy stored in a stretched spring.", "a": "Elastic potential energy = ½ × spring constant × extension² (E = ½kx²)."}, {"q": "Describe the Edexcel required practical to investigate force and extension of a spring.", "a": "Add known weights to a spring, measure the extension each time, and plot force against extension — a straight line shows Hooke's law up to the limit of proportionality.", "d": "graph:forceext"}]}, {"name": "Pressure in fluids", "cards": [{"q": "Give the equation linking pressure, force and area", "a": "Pressure = force/area"}, {"q": "Write the equation linking pressure, force and area.", "a": "Pressure = force ÷ area (p = F/A)."}, {"q": "Increasing temperature ______________ pressure in a gas if volume is constant", "a": "increases"}, {"q": "What happens to the pressure applied if the area decreases?", "a": "The pressure increases"}, {"q": "At constant temperature, what happens to the pressure of a fixed mass of gas if its volume is decreased?", "a": "The pressure increases, because the particles hit the walls more often in the smaller space (pressure × volume stays constant)."}, {"q": "How does the pressure change as depth increases in a fluid?", "a": "Increases"}, {"q": "What happens to the pressure applied as the depth increases?", "a": "The pressure increases"}, {"q": "State the relationship between the pressure and volume of a fixed mass of gas at constant temperature.", "a": "Pressure is inversely proportional to volume, so p × V is constant (Boyle's law)."}, {"q": "What does the pressure in fluids cause on a surface?", "a": "A force normal (at right angles) to the surface."}, {"q": "What can we say about the pressure at a particular depth?", "a": "The pressure is the same in all directions"}, {"q": "Why does the pressure in a liquid increase with depth?", "a": "There is a greater weight of liquid above pushing down, so more liquid particles press on a given area."}, {"q": "Why does pressure increase with depth?", "a": "There is a greater mass of water above the point, therefore the weight of water above that point is greater which applies a compression force."}, {"q": "Write the equation for the pressure due to a column of liquid.", "a": "Pressure = height × density × gravitational field strength (p = hρg)."}, {"q": "Write the equation for the pressure due to a column of liquid.", "a": "Pressure = height × density × gravitational field strength (p = hρg)."}, {"q": "Why does pressure in a liquid increase with depth?", "a": "There is a greater weight of liquid above pressing down on a given area."}, {"q": "What causes upthrust on a submerged object?", "a": "The pressure is greater on the bottom of the object than on the top, giving a net upward force."}]}]}]}, {"name": "Edexcel IGCSE Physics", "level": "IGCSE", "topics": [{"name": "Forces and Motion", "subtopics": [{"name": "Movement and Position", "cards": [{"q": "Define vector", "a": "A quantity that has both magnitude and direction"}, {"q": "Define scalar", "a": "A quantity that has magnitude only"}, {"q": "Give the equation linking speed, distance and time", "a": "Speed = distance/time"}, {"q": "Describe distance-time graph for constant speed", "a": "Straight line sloping up and right"}, {"q": "Describe distance-time graph for stationary object", "a": "Horizontal line"}, {"q": "State how to find speed from distance-time graph", "a": "Find the gradient of the line"}, {"q": "Define acceleration", "a": "Rate of change in velocity"}, {"q": "Give the equation linking acceleration, change in speed and time", "a": "Acceleration = change in speed/time taken"}, {"q": "Describe speed-time graph for constant speed", "a": "Horizontal line"}, {"q": "Describe speed-time graph for constant acceleration", "a": "Straight line sloping up and right"}, {"q": "State how to find acceleration from distance-time graph", "a": "Find the gradient of the line"}, {"q": "State how to find distance from speed-time graph", "a": "Find the area under the line"}, {"q": "State the unit of speed", "a": "m/s"}, {"q": "State the unit of acceleration", "a": "m/s2 (metre per second squared)"}]}, {"name": "Forces and Shape", "cards": [{"q": "State Hooke's law", "a": "The extension of a spring is proportional to the force applied"}, {"q": "Define elastic behaviour", "a": "Object returns to its original length when the force is removed"}, {"q": "Define elastic limit", "a": "If a force greater than the elastic limit is applied, the object will not return to its original length when the load is removed"}, {"q": "Define extension", "a": "New length - original length"}, {"q": "Define plastic behaviour", "a": "Object will not return to its original length when the force is removed"}, {"q": "Describe load-extension graph for elastic band", "a": "Curve that is steep, less steep, steep again"}]}, {"name": "Forces and Movement", "cards": [{"q": "Describe the three things forces can do to a body", "a": "Change body's shape, speed or direction"}, {"q": "Define friction", "a": "Force that opposes motion"}, {"q": "Define resultant force", "a": "Total force acting on a body"}, {"q": "Define balanced force", "a": "Forces acting on a body are equal in size but opposite in direction"}, {"q": "Define unbalanced force", "a": "The force acting in one direction is greater than the force acting in the opposite direction"}, {"q": "Give the equation linking force, mass and acceleration", "a": "Force = mass x acceleration"}, {"q": "Define weight", "a": "Force that acts on a mass because of the gravitational force"}, {"q": "Give the equation linking weight, mass and gravitational field strength (g)", "a": "Weight = mass x g"}, {"q": "State what happens to air resistance as an object speeds up", "a": "Air resistance increases"}, {"q": "Define terminal velocity", "a": "Constant speed reached by a falling object when the drag force and weight are balanced"}, {"q": "Define stopping distance of a car", "a": "Thinking distance plus braking distance"}, {"q": "Define thinking distance", "a": "How far the car travels before the driver puts the brakes on"}, {"q": "Define braking distance", "a": "How far the car travels while the brakes are applied before it stops"}, {"q": "State two factors that will affect thinking distance", "a": "Alertness of driver (alcohol/drugs), speed of car"}, {"q": "State four factors that will affect braking distance", "a": "Speed of car, mass of car, condition of brakes/tyres, condition of road (wet/icy)"}]}, {"name": "Momentum", "cards": [{"q": "Give the equation linking momentum, mass and velocity", "a": "Momentum = mass x velocity"}, {"q": "Give the units of momentum", "a": "kg m/s"}, {"q": "Define momentum in words", "a": "How difficult it is to stop a moving object"}, {"q": "Explain the relationship between force applied and change in momentum", "a": "The greater the force, the greater the change in momentum"}, {"q": "Explain the relationship between force applied and time taken to change momentum", "a": "The greater the force, the shorter the time to change momentum"}, {"q": "Explain conservation of momentum", "a": "Total momentum before = total momentum after"}, {"q": "Explain how car safety features reduce the force applied", "a": "They increase the time taken for the momentum to change"}, {"q": "Name two car safety features that increase the time taken to change momentum", "a": "Air bag, crumple zone"}, {"q": "State Newton's third law", "a": "For every action there is an equal and opposite reaction"}]}, {"name": "The Turning Effect of Forces", "cards": [{"q": "Give the equation linking moment, force and perpendicular distance", "a": "Moment = force x perpendicular distance"}, {"q": "Give the units of moments", "a": "Nm (newtons metres)"}, {"q": "Give the principal of moments", "a": "Clockwise moments = anticlockwise moments"}, {"q": "What is the centre of gravity?", "a": "The point through which all the weight of a body acts"}, {"q": "Where is the centre of gravity of a regular shape?", "a": "The point where the axes of symmetry cross"}, {"q": "What force acts UPWARDS at the supports of a beam?", "a": "Reaction force"}, {"q": "If a beam is balanced, what is true of the upwards and downwards forces?", "a": "Upward and downward forces are balanced"}, {"q": "If a heavy object is placed near one end of a beam, where is the reaction force greatest?", "a": "The end nearest the object"}, {"q": "If a heavy object is placed in the middle of a beam, where is the reaction force greatest?", "a": "The reaction forces are the same"}]}]}, {"name": "Electricity", "subtopics": [{"name": "Units", "cards": [{"q": "State the unit of power", "a": "watt, W"}, {"q": "State the unit of energy", "a": "joule, J"}, {"q": "State the unit of current", "a": "amp, A"}, {"q": "State the unit of voltage", "a": "volt, V"}, {"q": "State the unit of frequency", "a": "hertz, Hz"}, {"q": "State the unit of charge", "a": "coulomb, C"}, {"q": "State the unit of resistance", "a": "ohm"}]}, {"name": "Mains Electricity", "cards": [{"q": "Explain role of live wire", "a": "Provides the path along with electrical energy travels to the appliance"}, {"q": "Explain role of neutral wire", "a": "Completes the circuit"}, {"q": "Explain role of earth wire", "a": "If there is a fault, a large current flows through the earth wire to the Earth, which melts the fuse"}, {"q": "How does a fuse work?", "a": "If the current is too high, the fuse melts which breaks the circuit"}, {"q": "What is double insulation?", "a": "Plastic casing on the outside of an appliance so the user cannot get an electric shock"}, {"q": "Explain the heating effect of current", "a": "A heating element has a high resistance so when current flows, electrical energy is transferred to heat and light energy"}, {"q": "Define power (general)", "a": "Rate of energy transfer or rate of work done"}, {"q": "Give the equation linking electrical power, voltage and current", "a": "power = voltage x current"}, {"q": "Explain how to choose which fuse to use", "a": "The fuse should be the next higher than the normal current used"}, {"q": "Define direct current", "a": "The current always flows in one direction"}, {"q": "Define alternating current", "a": "The current continually changes direction"}, {"q": "Define the time period of an a.c. supply", "a": "The time taken for one complete cycle"}, {"q": "Define the frequency of an a.c. supply", "a": "The number of cycles in one second"}]}, {"name": "Energy and Voltage in Circuits", "cards": [{"q": "Define current", "a": "Flow of charge"}, {"q": "Give the equations linking current, charge and time", "a": "Current = charge/time"}, {"q": "What are the charge carriers in a metal?", "a": "Electrons"}, {"q": "Define voltage", "a": "The amount of energy transferred by each unit of charge"}, {"q": "What do we use to measure current?", "a": "Ammeter"}, {"q": "How should an ammeter be connected?", "a": "In series with the device that you want to measure the current flowing through"}, {"q": "What do we use to measure voltage?", "a": "Voltmeter"}, {"q": "How should a voltmeter be connected?", "a": "In parallel with the device that you want to measure the voltage across"}, {"q": "Give the equation linking voltage, energy  and charge", "a": "voltage = energy/charge"}, {"q": "What happens if you put a switch in a series circuit?", "a": "It will turn all the bulbs on and off"}, {"q": "What happens to the energy supplied to a series circuit?", "a": "It is shared between all the bulbs so the more bulbs there are, the dimmer they will be"}, {"q": "What happens to the current in a series circuit?", "a": "It is the same at every point"}, {"q": "What happens if one bulb breaks in a series circuit?", "a": "The circuit is broken so all the bulbs go out"}, {"q": "What happens if you put a switch in a parallel circuit?", "a": "Depending on where the switch is, it can turn all the bulbs on and off together, or turn the bulbs in one branch on and off on their own"}, {"q": "What happens if one bulb breaks in a parallel circuit?", "a": "Bulbs in other branches will keep working"}, {"q": "What happens to the current in a parallel circuit?", "a": "The current flowing into a junction will be equal to the current flowing out of a junction"}, {"q": "Give the equation linking voltage, resistance and current", "a": "voltage = resistance x current"}, {"q": "Describe how currrent changes with voltage for a wire or resistor", "a": "Current is proportional to voltage"}, {"q": "Describe how current changes with voltage for a filament bulb", "a": "As the voltage and current increase, the resistance increases, so the current increases less"}, {"q": "Describe how current changes with voltage for a diode", "a": "In one direction, the current is zero as the resistance is very high. In the opposite direction the resistance is low"}, {"q": "What does a variable resistor do?", "a": "Changes the current in a circuit because the resistance changes"}, {"q": "What is the relationship between temperature and resistance of a thermistor?", "a": "As the temperature increases, the resistance of the thermistor decreases"}, {"q": "What is the relationship between light intensity and resistance of a light-dependent resistor?", "a": "As the light intensity increases, the resistance of the LDR decreases"}]}, {"name": "Electric Charge", "cards": [{"q": "Define electrical insulator", "a": "A material with few free electrons, so they cannot move easily"}, {"q": "Define electrical conductor", "a": "A material with many free electrons, so they can move easily through the material"}, {"q": "What is the relative charge of an electron?", "a": "-1"}, {"q": "What is the relative charge of a proton?", "a": "+1"}, {"q": "How can an insulator become electrically charged?", "a": "By electrons moving when the object is rubbed with another insulator"}, {"q": "What happens when charged objects are brought close together?", "a": "Objects with like charges repel and objects with opposite charges attract"}, {"q": "How can a charged object attract an uncharged object?", "a": "By attracting or repelling electrons in the uncharged object, so the surface has the opposite charge to the charged object"}, {"q": "State four uses of static electricity", "a": "Paint spraying, electrostatic precipitators, ink jet printers and photocopiers"}, {"q": "State a danger of static electricity", "a": "If there is a spark, there could be a fire or an explosion"}, {"q": "How is static charge removed safely?", "a": "By connecting the object to earth, so electrons flow along the wire until the object is neutral"}]}]}, {"name": "Waves", "subtopics": [{"name": "Properties of Waves", "cards": [{"q": "What is a transverse wave?", "a": "The oscillations are perpendicular to the direction of travel of the wave"}, {"q": "What is a longitudinal wave", "a": "The oscillations are parallel to the direction of travel of the wave"}, {"q": "Define amplitude", "a": "The maximum movement of a particle from its rest position (distance from centre to peak of the wave)"}, {"q": "Define wavelength", "a": "The distance between two identical points on adjacent waves"}, {"q": "Define the time period of a wave", "a": "The time taken for one complete wave to be produced"}, {"q": "Define the frequency of a wave", "a": "The number of waves in one second"}, {"q": "Give the equation linking wave speed, frequency and wavelength", "a": "Wave speed = frequency x wavelength"}, {"q": "What is a wave?", "a": "A wave is a way of transferring energy or information without the transfer of matter"}, {"q": "Give two examples of transverse waves", "a": "Water, light (any of the electromagnetic spectrum)"}, {"q": "Give two examples of longitudinal waves", "a": "Sound, ultrasound"}]}, {"name": "The Electromagnetic Spectrum", "cards": [{"q": "List the electromagnetic spectrum in order of increasing wavelength", "a": "Gamma, x-rays, ultra-violet, visible light, infra-red, microwaves, radio waves"}, {"q": "List the electromagnetic spectrum in order of increasing frequency", "a": "Radio waves, microwaves, infra-red, visible light, ultra-violet, x-rays, gamma"}, {"q": "List the five properties of all electromagnetic waves", "a": "They all transfer energy, travel at the same speed in a vacuum, can be reflected, can be refracted, and are transverse"}, {"q": "Give two uses of radio waves", "a": "Broadcasting and communication"}, {"q": "Give two uses of microwaves", "a": "Cooking and satellite transmissions"}, {"q": "Give two uses of infra-red radiation", "a": "Heaters and night-vision equipment"}, {"q": "Give two uses of visible light", "a": "Photography and optical fibres"}, {"q": "Give one use of ultra-violet radiation", "a": "Fluorescent lamps to show up security markings"}, {"q": "Give two uses of x-rays", "a": "Observing inside objects (airport security) and imaging inside the human body (medical applications)"}, {"q": "Give two uses of gamma radiation", "a": "Cancer treatment and sterilising medical equipment"}, {"q": "Give a danger of microwaves", "a": "Internal heating of body tissue"}, {"q": "Give a danger of infra-red radiation", "a": "Skin burns"}, {"q": "Give two dangers of gamma radiation", "a": "Cancer, mutations"}, {"q": "Give two dangers of ultra-violet radiation", "a": "Skin cancer, blindness"}]}, {"name": "Light and Sound", "cards": [{"q": "What is the law of reflection?", "a": "The angle of incidence is equal to the angle of reflection"}, {"q": "What causes refraction?", "a": "The change in speed of a wave as it crosses a boundary"}, {"q": "What is the Doppler effect?", "a": "The apparent change in frequency of a wave due to the source moving relative to the observer"}, {"q": "What happens to the pitch of a sound when the source moves towards the observer?", "a": "It is higher as the waves are compressed"}, {"q": "What happens to the pitch of a sound when the source moves away from the observer?", "a": "It is lower as the waves are stretched"}, {"q": "How do you draw the normal?", "a": "At 90° to the boundary"}, {"q": "Where do you measure the angle of incidence?", "a": "Between the incident ray and the normal"}, {"q": "Where do you measure the angle of reflection?", "a": "Between the reflected ray and the normal"}, {"q": "Where do you measure the angle of refraction?", "a": "Between the refracted ray and the normal"}, {"q": "Why does light refract when it crosses a boundary?", "a": "It changes speed"}, {"q": "How does light change direction when it enters a more optically dense medium?", "a": "It refracts towards the normal line"}, {"q": "How does light change direction when it enters a less optically dense medium?", "a": "It refracts away from the normal line"}, {"q": "Give the equation linking the refractive index, angle of incidence and angle of refraction", "a": "n = sin(i)/sin(r)"}, {"q": "Define critical angle", "a": "The angle of incidence when the angle of refraction is 90°"}, {"q": "What are the two conditions for total internal reflection to occur?", "a": "Boundary is more to less optically dense, angle i is greater than critical angle"}, {"q": "What happens to light if i is less than the critical angle?", "a": "Refraction with a weak reflected ray"}, {"q": "What happens to light if i is equal to the critical angle?", "a": "Angle of refraction is 90° and weak reflection"}, {"q": "What happens to light if i is greater than the critical angle?", "a": "Total internal reflection"}, {"q": "Give two uses of total internal reflection", "a": "Prismatic periscope and optical fibres"}, {"q": "Give the equation linking refractive index and the critical angle", "a": "n = 1/sin(c)"}, {"q": "What is the range of frequencies that humans can hear?", "a": "20 Hz to 20 000 Hz"}, {"q": "How can you measure the speed of s ler tube and counter"}, {"q": "List the types of ionising radiation from most to least ionising", "a": "Alpha, beta, gamma"}, {"q": "Why is alpha radiation the most ionising?", "a": "It has the biggest charge and biggest mass"}, {"q": "List the types of ionising radiation from most to least penetrating", "a": "Gamma, beta, alpha"}, {"q": "What is background radiation?", "a": "Low-level ionising radiation that is produced all the time"}, {"q": "Name 3 sources of background radiation", "a": "Radon gas, cosmic rays, food and drink"}, {"q": "Why is radioactive decay random?", "a": "We don't know which nucleus will decay next"}, {"q": "What is activity?", "a": "The number of radioactive decays per second"}, {"q": "What are the units of activity?", "a": "becquerels, Bq"}, {"q": "Define half life in terms of numbers of nuclei", "a": "The time taken for half of the nuclei to decay"}, {"q": "Define half life in terms of activity", "a": "The time taken for the activity to halve"}, {"q": "Why do we measure background radiation?", "a": "To subtract it from the measured activity to get the true activity"}, {"q": "Which ionising radiation is used to sterilise medical equipment?", "a": "Gamma"}, {"q": "What is meant by irradiation?", "a": "An object is exposed to ionising radiation, the ionisation stops when the source is removed"}, {"q": "What is meant by radioactive contamination?", "a": "Particles of a radioactive isotope on/in an objectwhich expose it to ongoing irradiation"}, {"q": "Which ionising radiation is used to monitor the thickness of plastic sheets?", "a": "Beta"}, {"q": "How is ionising radiation be used in medicine?", "a": "In tracers and radiotherapy (cancer treatment)"}, {"q": "What is radiocarbon dating?", "a": "Using the activity of half-life of carbon-14 to date an object"}, {"q": "How is exposure to ionising radiation monitored?", "a": "With a film badge that \"fogs\" due to exposure"}]}, {"name": "Fission and Fusion", "cards": [{"q": "Define nuclear fission" /* ---------- SVG diagram library ---------- */
function svg(inner,vb){return '<svg viewBox="'+vb+'" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>';}
function wires(l,r){return '<line x1="8" y1="45" x2="'+l+'" y2="45"/><line x1="'+r+'" y1="45" x2="192" y2="45"/>';}
function arrow(x1,y1,x2,y2,cls){cls=cls||'';var a=Math.atan2(y2-y1,x2-x1),h=9;
  var xa=x2-h*Math.cos(a-0.4),ya=y2-h*Math.sin(a-0.4),xb=x2-h*Math.cos(a+0.4),yb=y2-h*Math.sin(a+0.4);
  return '<line class="'+cls+'" x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'"/><polyline class="'+cls+'" points="'+xa+','+ya+' '+x2+','+y2+' '+xb+','+yb+'"/>';}
function wavy(x1,x2,y,cls){cls=cls||'';var d='M'+x1+' '+y,n=6,step=(x2-x1)/n;
  for(var i=0;i<n;i++){var cx=x1+step*(i+0.5),cy=y+(i%2?9:-9);d+=' Q '+cx+' '+cy+' '+(x1+step*(i+1))+' '+y;}
  return '<path class="'+cls+'" d="'+d+'"/>';}
