mers used?", "a": "reduce current so that less heat is lost in cables, increases efficiency"}]}, {"name": "Static electricity", "cards": [{"q": "Define static electricity", "a": "The transfer of electrons when there is friction between two insulators"}, {"q": "What is a spark?", "a": "When there is a very high voltage between two surfaces that causes the built up charge to flow - seen as a spark"}, {"q": "Describe the force between opposite charges", "a": "Attractive"}, {"q": "Describe the force between two like charges", "a": "Repulsive"}, {"q": "As the distance from the charge increases the force_______", "a": "descreases"}, {"q": "What is the direction of an electric field?", "a": "positive to negative"}, {"q": "What is an electrostatic force?", "a": "The non-contact force between two charged objects"}]}]}, {"name": "Particle Model of Matter", "subtopics": [{"name": "Changes of state and the particle model", "cards": [{"q": "Name the change of state when a liquid becomes a solid", "a": "freezing"}, {"q": "Name the change of state when a solid becomes a liquid", "a": "melting"}, {"q": "Name the change of state when a liquid becomes a gas", "a": "evaporation"}, {"q": "Name the change of state when a gas becomes a liquid", "a": "condensation"}, {"q": "Name the change of state when a solid becomes a gas (without passing through liquid form)", "a": "sublimation"}, {"q": "Changes of state are caused by the amount of _________ a substance has", "a": "energy"}, {"q": "State changes are examples of ___________ change", "a": "physical"}, {"q": "Physical changes are ones which can be _____________", "a": "reversed"}, {"q": "A change which creates new products and cannot be reversed is _________ change", "a": "chemical"}, {"q": "Draw a particle diagram for a solid", "a": "Solid: particles in a fixed regular lattice, touching, vibrating in place.", "d": "particle:solid"}, {"q": "Draw a particle diagram for a liquid", "a": "Liquid: particles touching but random, able to slide past each other.", "d": "particle:liquid"}, {"q": "Draw a particle diagram for a gas", "a": "Gas: particles far apart, random, moving quickly in all directions.", "d": "particle:gas"}, {"q": "Particles are arranged regularly in a ….?", "a": "solid"}, {"q": "Particles are arranged randomly, but touching in a …?", "a": "liquid"}, {"q": "Particles move around randomly in a ….?", "a": "gas"}, {"q": "Why does temperature of a substance increase as it is heated?", "a": "Particles gain more kinetic energy and temperature is a measure of kinetic energy"}, {"q": "How much mass a substance contains compared to it's volume is…", "a": "density"}, {"q": "State the equation which links density, mass and volume", "a": "ρ=m/v"}, {"q": "State the units of density", "a": "kg/m3"}, {"q": "State the units of volume", "a": "m3"}, {"q": "Density RPA: How do you find the volume of a regular shape?", "a": "Use a ruler to measure width, length and height"}, {"q": "Density RPA: What is the equation for the volume of a cube?", "a": "Volume = b x h x d"}, {"q": "Density RPA: What equipment is needed to find the volume of an irregular shaped object?", "a": "Eureka can and a measuring cylinder"}, {"q": "Density RPA: How do you find the mass of a liquid?", "a": "Measure the mass of a measuring cylinder, measure the mass of the water and the measuring cylinder find the difference"}, {"q": "Density RPA: What piece of equipment is used to find mass?", "a": "Balance"}]}, {"name": "Internal energy and energy transfers", "cards": [{"q": "The energy stored inside a system by the particles which make it up is known as ____________ energy", "a": "internal"}, {"q": "What is internal energy?", "a": "The total kinetic energy and potential energy of all the particles in a system"}, {"q": "Energy stored within moving objects is __________", "a": "kinetic"}, {"q": "Energy stored in particles because of their position is…?", "a": "potential energy"}, {"q": "Particles wich are further apart have _________ potential energy", "a": "more"}, {"q": "Sketch the heating curve for water", "a": "Heating curve for water: rising, flat at 0°C (melting), rising, flat at 100°C (boiling), rising.", "d": "graph:heatingwater"}, {"q": "Why doesn't temperature increase during melting?", "a": "Energy is being used to weaken forces between particles"}, {"q": "Why doesn't temperature increase during evaporation", "a": "Energy is being used to weaken forces between particles"}, {"q": "The amount of energy required to change the state of one kilogram of a substance with no change in temperature is the …?", "a": "specific latent heat"}, {"q": "Latent heat of fusion is for changing…?", "a": "solid to liquid"}, {"q": "Latent heat of vaporisation is for changing….?", "a": "liquid to vapour (gas)"}, {"q": "The energy needed to raise the temperature 1 kg of a material by 1ᵒC is the __________", "a": "specific heat capacity"}]}, {"name": "Particle model and pressure", "cards": [{"q": "The average kinetic energy of particles is known as the ___________", "a": "temperature"}, {"q": "Increasing temperature ______________ pressure in a gas if volume is constant", "a": "increases"}, {"q": "The force exerted by gas on a surface as the particles collide with it is known as….?", "a": "gas pressure"}]}]}, {"name": "Atomic Structure", "subtopics": [{"name": "Atoms and isotopes", "cards": [{"q": "Define atom", "a": "The smallest part of an element that can exist."}, {"q": "All substances are made up of…?", "a": "atoms"}, {"q": "The radius of an atom is …?", "a": "0.1 nm (1 x 1010 m)"}, {"q": "The overall charge on an atom is…", "a": "zero/neutral"}, {"q": "Who came up with the Plumb Pudding model of the atom", "a": "J J Thompson"}, {"q": "Describe the Plumb Pudding model of the atom", "a": "A ball of positive charge with negative electrons embedded in it"}, {"q": "Was the Plumb Pudding model correct?", "a": "no"}, {"q": "What experiment did Rutherford do?", "a": "Alpha particle scattering"}, {"q": "What did Rutherford's experiment reveal?", "a": "Atoms have a central area of positive charge with electrons surrounding it"}, {"q": "Who discovered that electrons are located in energy levels?", "a": "Niels Bohr"}, {"q": "What did Jame Chadwick discover about the atom?", "a": "That the nucleus contains neutrons as well as protons"}, {"q": "What did John Dalton contribute to our understanding of atomic theory?", "a": "Matter is made up of descrete, spherical particles, known as atoms"}, {"q": "Name the three subatomic particles", "a": "proton, neutron, electron"}, {"q": "Which particles are located in the atoms nucleus", "a": "protons, neutrons"}, {"q": "What is the charge of each subatomic particle?", "a": "proton +1, neutron 0, electron -1"}, {"q": "What is the mass of each subatomic particle?", "a": "proton 1, neutron 1, elecrton ≈ 0"}, {"q": "Define peer review", "a": "Checking of scientific results by other scientific experts"}, {"q": "Define mass number", "a": "The total number of protons and neutrons in an atom"}, {"q": "Define atomic number", "a": "The number of protons in an atom (number of electrons is the same in a neutral atom)"}, {"q": "Electrons in atoms are located in ___________", "a": "energy levels"}, {"q": "Absorption of radiation by an atom may result in ____________ moving to a ________________ energy level", "a": "electrons, higher"}, {"q": "Emission of radiation from an atom may lead to _____________ moving to a ______________ energy level", "a": "electrons, lower"}, {"q": "Define background radiation", "a": "Radiation that comes from the surroundings"}, {"q": "Define isotope", "a": "An atom of the same element with different numbers of neutrons"}, {"q": "We cannot predict when a given atom will decay, this means that radioactive deacy is ….?", "a": "random"}, {"q": "Given an example of a source of background radiation", "a": "Radon from rocks, the sun, nuclear power, hospital treatments"}]}, {"name": "Atoms and nuclear radiation", "cards": [{"q": "Name the three types of radiation", "a": "alpha, beta and gamma"}, {"q": "What is an alpha particle?", "a": "two protons and two neutrons"}, {"q": "What is a beta particle?", "a": "an electron"}, {"q": "What is gamma radiation?", "a": "electromagnetic wave (NOT a particle)"}, {"q": "What is the range of alpha radiation in air?", "a": "short - 5 cm in air"}, {"q": "What is the range of gamma radiation in air?", "a": "unlimited in air"}, {"q": "What's the range of beta radiation in air?", "a": "medium - about 1 m"}, {"q": "What will absorb (stop) alpha radiation?", "a": "paper/skin"}, {"q": "What will absorb (stop) beta radiation?", "a": "about 5 mm aluminium"}, {"q": "What will absorb (stop) gamma radiation?", "a": "several centimetres of lead"}, {"q": "What is the ionising power of alpha radiation?", "a": "very high"}, {"q": "What is the ionising power of beta radiation?", "a": "medium"}, {"q": "What is the ionising power of gamma radiation?", "a": "low"}, {"q": "What is meant by the ionising power of radiation?", "a": "how likely it is to ionise atoms which it comes into contact with"}, {"q": "How does alpha decay alter the mass number of the parent nucleus?", "a": "decreases by 4"}, {"q": "How does alpha decay alter the atomic number of the parent nucleus?", "a": "decreases by 2"}, {"q": "How does beta decay alter the mass number of the parent nucleus?", "a": "stays the same"}, {"q": "How does beta decay alter the atomic number of the parent nucleus?", "a": "increases by 1"}, {"q": "How does gamma radiation alter the mass and atomic number of the parent nucleus", "a": "unchanged (energy is released as the particles in the nucleus reorganise to a lower energy arrangement)"}, {"q": "The process of radiation removing electrons from atoms to form ions is called…?", "a": "ionisation"}, {"q": "Define radioactive decay", "a": "An unstable nucleus changes to become more stabe and gives out radiation"}, {"q": "Define activity", "a": "Rate at which decay occurs"}, {"q": "What are the units of activity?", "a": "Becquerels (Bq)"}, {"q": "Define count rate", "a": "Number of decays recorded each second by a Geiger-Muller tube"}, {"q": "Defne half life", "a": "The time taken for number of radioactive nuclei in a sample to halve OR time taken for count rate (or activity) from a sample to fall to half its initial value"}, {"q": "How do you find the half life from a graph?", "a": "Find the maximum activity, halve it and read off the corresponding time"}]}, {"name": "Hazards and uses of radioactive emissions", "cards": [{"q": "If ionisation happens in DNA it can cause ___________ which may result in ____________", "a": "mutations, cancer"}, {"q": "Define contamination", "a": "The unwanted presence of materials containing radioactive atoms"}, {"q": "Define irradiation", "a": "When an object is exposed to radiation"}, {"q": "Does an irradiatied object become radioactive itself?", "a": "no"}]}, {"name": "Nuclear fission and fusion", "cards": [{"q": "Define fission", "a": "The splitting of a large and unstable nucleus that releases energy"}, {"q": "Define fusion", "a": "The joining of two light nuclei to form a heavier nucleus that releases energy"}, {"q": "What two conditions need to be present for fusion to take place?", "a": "High temp and pressure"}]}]}, {"name": "Forces", "subtopics": [{"name": "Forces and their interactions", "cards": [{"q": "State the equation which links gravitaional field strength, mass and weight", "a": "W=mg"}, {"q": "What is the unit of weight?", "a": "Newtons (N)"}, {"q": "What is the unit of mass?", "a": "kilograms (kg)"}, {"q": "What is unit of gravitational field strength?", "a": "newtons per kilogram (N/kg)"}, {"q": "What is the unit of force?", "a": "Newtons (N)"}, {"q": "What is the unit of distance?", "a": "meters (m)"}, {"q": "A value with magnitude only is a ________?", "a": "scalar"}, {"q": "A value with magnitude and direction is a ____________?", "a": "vector"}, {"q": "Distance an speed are examples of _________ quantities", "a": "scalar"}, {"q": "Force, displacement and velocity are examples of __________ quantities", "a": "vector"}, {"q": "What is a contact force?", "a": "A force between two object which are touching"}, {"q": "What ia a non-contact force?", "a": "A force between objects which are separated by space."}, {"q": "Give two examples of contact forces", "a": "e.g. friction, air resistance"}, {"q": "List three non-contact forces", "a": "gravitational, electrostatic, magnetic"}, {"q": "Define weight", "a": "A downward force created by the interactiono f a mass with an object gravitational field"}, {"q": "Define a field", "a": "This is set up around any object that exhibits a non-contact interaction"}, {"q": "Interaction pair", "a": "Equal and opposite forces resulting from a single interaction"}, {"q": "Define normal reaction force", "a": "Any force that is part of an interaction pair that is produced in response to a force acting"}, {"q": "Define resultant force", "a": "The total ingle force acting on a body when two or more forces are acting on it"}, {"q": "Define weight", "a": "The force ofgravity acting on an object's mass"}, {"q": "What device is used to measure weight?", "a": "A newtonmeter"}, {"q": "What is the name of the single point at which an object's mass appears to act?", "a": "centre of mass"}, {"q": "The center of mas of an object is…", "a": "the single point at which the objects weight appears to act."}, {"q": "Define gravitational field strength", "a": "The amount of force each kilogram of mass is pulled down by on earth"}]}, {"name": "Work done and energy transfer", "cards": [{"q": "State the equation which links distance, force and work done", "a": "W=Fs"}, {"q": "What is the unit of work done?", "a": "Joules (J)"}, {"q": "Work is done when an object is ….", "a": "… moved through a distance"}, {"q": "When work is done on a gas, what happens to the gas?", "a": "The internal energy increases and it can also cause an increase in temperature."}, {"q": "What is the definition of work?", "a": "The energy transferred to an object when a force acts over a distance"}]}, {"name": "Forces and elasticity", "cards": [{"q": "State the equation which links extension, force and spring constant", "a": "F=ke"}, {"q": "What is the unit of the spring constant?", "a": "Newtons per meter (N/m)"}, {"q": "What is the unit of the spring extension?", "a": "Metres (m)"}, {"q": "When a spring is stretched and can then return to its original length it is known as __________ _______________", "a": "elastic deformation or elastic behaviour"}, {"q": "When a spring is stretched and its length is permanently altered it is known as ___________  ____________", "a": "Inelastic deformation or inelastic behaviour"}, {"q": "The limit of proportionallity of a spring is…", "a": "the length a spring can be stretched to before it no longer returns to its original length"}, {"q": "Sketch the Force (y) -Extension (x) curve for stretching a spring from no force to beyond its elastic limit.", "a": "Force–extension (spring): straight line (Hooke's law) to the limit of proportionality, then curves.", "d": "graph:forceext"}, {"q": "Define an elastic object", "a": "The extension is directly proportional to the force applied to it"}, {"q": "Define elastic deformation", "a": "A temporary change in the size or shape of an object when a force is applied"}, {"q": "What is inelastic deformation?", "a": "A permanenet chang in the size or shape of an object when a force is applied"}, {"q": "What is the elastic limit?", "a": "The point at which a material no longer returns back to its original length when it is stretched or compressed"}, {"q": "Define elastic potential energy", "a": "The work done in stretching or compressing an object"}, {"q": "Deformation RPA: What do we mean by 'elastic limit'?", "a": "The point at which there material doesn't return to its' original length it is permenantly deformed"}, {"q": "Deformation RPA: When doing the experiement how do you kow you have gone past the elastic limit?", "a": "It is no longer proportional"}, {"q": "Deformation RPA: How do you measure the extension?", "a": "Find the difference between the starting point and the new length"}, {"q": "Deformation RPA: What values are plotted on the graph?", "a": "Force (x) v extension (y)"}, {"q": "Deformation RPA: What are the IV, DV and CV?", "a": "IV: Force applied DV: extension CV: type of spring, return spring to start position"}]}, {"name": "Moments, levers and gears", "cards": [{"q": "State the equation which links force, distance and moment", "a": "M = F x d"}, {"q": "What is the unit of a moment?", "a": "Nm"}, {"q": "Write the moment equation", "a": "moment of a force = force × distance"}, {"q": "Write the moment equation in standard symbols", "a": "M = F d"}, {"q": "What is the unit of moment of a force?", "a": "Newton-metres, Nm"}, {"q": "Where should the distance be measured when calculating moments?", "a": "The perpendicular distance from the pivot to the line of action of the force."}, {"q": "When an object is balanced, what can be said about the moments?", "a": "The total clockwise moment about a pivot equals the total anticlockwise moment"}, {"q": "What is the role of a lever?", "a": "Levers amplify the force applied."}, {"q": "What is the role of a gear?", "a": "Gears change the force or rotational speed of a system."}, {"q": "Define moment", "a": "The turning effect when a force acts at a perpendicular distance from a pivot"}, {"q": "In what two ways can you increase a moment?", "a": "Increase force or distance from pivot"}, {"q": "What is a lever?", "a": "A simple machine that transmits the rotational effect of forces"}, {"q": "What is the priniciple of moments?", "a": "If a system is in equilibrium the clockwise moment must equal the anticlockwise moment"}]}, {"name": "Pressure and pressure differences in fluids", "cards": [{"q": "How does the pressure change as depth increases in a fluid?", "a": "Increases"}, {"q": "What is a fluid?", "a": "A liquid or a gas."}, {"q": "Define pressure", "a": "The force per unit area exerted on a surface"}, {"q": "What does the pressure in fluids cause on a surface?", "a": "A force normal (at right angles) to the surface."}, {"q": "Write the generic pressure equation", "a": "pressure = force (normal to a surface) / area (of that surface)"}, {"q": "Write the generic pressure equation in standard symbols", "a": "p = F/A"}, {"q": "What are the units of pressure?", "a": "Pascals, Pa"}, {"q": "A 10 N force is exerted on a 20 cm² piston. If this is connected to a 60 cm² via a hydraulic system, what will be the force produced?", "a": "30 N"}, {"q": "Why does pressure increase with depth?", "a": "There is a greater mass of water above the point, therefore the weight of water above that point is greater which applies a compression force."}, {"q": "Why does pressure increase with density?", "a": "There is a greater mass of water above the point, therefore the weight of water above that point is greater which applies a compression force."}, {"q": "Explain upthrust in terms of pressure", "a": "There is a greater pressure on the bottom surface of an object than on the top surface_x000D_\nThis creates a resultant force upwards; the upthrust."}, {"q": "What causes atmospheric pressure?", "a": "Air molecules colliding with a surface create. At each collision they apply a force normal to the surface"}, {"q": "How are atmospheric pressure and altitude related?", "a": "As altitude increases, pressure decreases. This is a non-linear relationship."}, {"q": "Why does atmospheric pressure decrease with an increase in height?", "a": "As altitude increases, the size of the column of air above a point decreases, reducing the weight of the air above that point. Also as altitude increases, the air becomes less dense, which means that air particles collide less frequently with the surface."}, {"q": "How are the pressure and volume of gas held at constant temperature related?", "a": "They are inversely proportional"}, {"q": "In what direction does pressure act in a fluid?", "a": "All directions"}]}, {"name": "Forces and motion", "cards": [{"q": "State the equation which links distance, speed and time", "a": "s=vt"}, {"q": "State the equation which links acceleration, change in velocity and time taken", "a": "a=Δv/t"}, {"q": "State the equation which links acceleration, mass and resultant force", "a": "F = ma"}, {"q": "What is the unit of speed or velocity?", "a": "metres per secons (m/s)"}, {"q": "What are the units of acceleration?", "a": "metres per second squared (m/s2)"}, {"q": "State Newton's First Law", "a": "The velocity of an object will only change if a resultant force is acting on the object."}, {"q": "If balanced forces act on a moving object it will …", "a": "continue to travel at a constant speed"}, {"q": "If balanced forces act on a stationary object it will …", "a": "remain stationary"}, {"q": "State Newton's Second Law", "a": "Force = mass x acceleration (The acceleration of an object is proportional to the resultant force acting on the object, and inversley proportional to the mass of the object)"}, {"q": "State Newton's Third Law", "a": "Whenever two objects interact, the forces they exert on each other are equal and opposite"}, {"q": "The tendency of objects to continue in their state of rest or of uniform motion is known as …", "a": "inertia"}, {"q": "Newtons 2nd RPA: What are the IV, DV, CV?", "a": "IV: Force applied DV: acceleration CV: mass of trolly, distance travelled"}, {"q": "Newtons 2nd RPA: What do you plot on the graph?", "a": "Force (x) v acceleration (y)"}, {"q": "Newtons 2nd RPA: Do lightgates improve acuracy, precision or reproducability?", "a": ""}, {"q": "Newtons 2nd RPA: Why do we use an air track to complete this experiment?", "a": "reduce friction"}, {"q": "Newtons 2nd RPA: How do we know that the graph shows a directly proportional relationship?", "a": "straight line through 0,0"}, {"q": "The distance and object moves and the direction in which it moves is known as the _________", "a": "displacement"}, {"q": "The speed of an object in a particular derection is its ___________", "a": "velocity"}, {"q": "The change of an objects speed in a given time is the _________", "a": "acceleration"}, {"q": "On a distance time graph a straight line represents…", "a": "constant speed"}, {"q": "On a distance time graph a upward curve represents…", "a": "acceleration"}, {"q": "On a distance time graph a curved line becoming horizontal represents…", "a": "decelleration"}, {"q": "On a distance time graph a horizontal line represents…", "a": "stationary"}, {"q": "On a distance time graph the gradient is used to calculate the …", "a": "speed or velocity"}, {"q": "A typical walking speed is …", "a": "1.5 m/s"}, {"q": "A typical running speed is …", "a": "3 m/s"}, {"q": "A typical cycling speed is …", "a": "6 m/s"}, {"q": "Sound in air travels at …", "a": "330 m/s"}, {"q": "On a velocity time graph an upwards straight line represents …", "a": "acceleration"}, {"q": "On a velocity time graph a downwards straight line represents …", "a": "decelleration"}, {"q": "On a velocity time graph a horizontal line represents …", "a": "constant speed"}, {"q": "On a velocity time graph a horizontal line along the x-axis represents…", "a": "stationary object"}, {"q": "On a velocity time graph, when the line falls below the x-axis it indicates that the object is …", "a": "moving backwards"}, {"q": "Calcuating the gradient of a velocity time graph gives the …", "a": "acceleration"}, {"q": "Calculating the area under a velocity time graph gives the …", "a": "distance travelled"}, {"q": "Define terminal velocity", "a": "The maximum veolcity an object can reach"}, {"q": "What is the resultant force on an object travelling at terminal velocity", "a": "0"}, {"q": "Sketch the velocity time graph for a parachutist", "a": "draw on board"}, {"q": "Acceleration of falling objects close to the earth is ________", "a": "9.8 m/s2"}, {"q": "When the force moving an object is balanced by frictional forces it is moving at its _____________ _____________", "a": "terminal velocity"}, {"q": "The stopping distance of a vehicle is the sum of the …..", "a": "thinking and breaking distances"}, {"q": "The distance a vehicle travels while the driver is reacting is the …", "a": "thinking distance"}, {"q": "The distance a vehicle travels which the driver is breaking is the …", "a": "breaking distance"}, {"q": "Reaction time is…", "a": "the time it takes a driver to react"}, {"q": "A typical reaction time is …", "a": "0.2-0.9 s"}, {"q": "Factors which influence reaction time are…", "a": "tiredness, drug, alcohol, distractions"}, {"q": "Fctors which affect breaking distance are …", "a": "weather conditions, conditions of breaks and tyres"}, {"q": "Both thinking and breaking distance are affected by which factor?", "a": "speed of vehicle"}, {"q": "The greater the speed of a vehicle, the _________ the force required to stop the vehicle", "a": "greater"}]}, {"name": "Momentum", "cards": [{"q": "State the equation which links mass, momentum and velocity", "a": "ρ = mv"}, {"q": "State the equation for momentum (HT)", "a": "P = m x v"}, {"q": "What are the units of momentum?", "a": "kilogram metres per second (kg m/s)"}, {"q": "What is the unit of momentum? (HT)", "a": "Kgm/s"}, {"q": "Define momentum (HT)", "a": "The product of an objects mass and velocity"}, {"q": "What is conservation of momentum? (H)T", "a": "In any closed system the total momentum before an event is equal to the total momentum after the event"}, {"q": "Moving objects with mass are said to have __________? (HT)", "a": "momentum"}, {"q": "What is the total momentum before and after an explosion?", "a": "0 kg m/s"}, {"q": "What happens to momentum when a force acts on an object that is moving or able to move?", "a": "A change in momentum occurs, where the rate of change of momentum is equal to the force"}, {"q": "Why is it safer to wear a seatbelt during a crash?", "a": "The seatbelt increases the time taken for your body to stop This decreases the rate of change of momentum Which decreases the force applied to your body Reducing the chance of injury"}, {"q": "Why is it safer to have an airbag during a crash?", "a": "The airbag increases the time taken for your body to stop This decreases the rate of change of momentum Which decreases the force applied to your body Reducing the chance of injury"}]}]}, {"name": "Waves", "subtopics": [{"name": "Waves in air, fluids and solids", "cards": [{"q": "Write the equation linking frequency, wavelength and wave speed", "a": "v = fλ"}, {"q": "What equation links frequency and time period?", "a": "F = 1 / T"}, {"q": "What is the unit of frequency?", "a": "Hertz (Hz)"}, {"q": "What is the unit of wavelength?", "a": "metres (m)"}, {"q": "What is the unit of wave speed?", "a": "metres per second (m/s)"}, {"q": "The maximum displacement of a point on a wiavw away from its undeisturbed position is the…", "a": "Amplitude"}, {"q": "The distance from a point on one wave to the equivalent point on the next wave is the …", "a": "wavelength"}, {"q": "The number of waves passing a point each second is the…", "a": "Frequency"}, {"q": "Name an example of a longitudinal wave", "a": "Sound"}, {"q": "Name an example of a transverse wave", "a": "light, water, any electromagnetic"}, {"q": "Oscillations are along the same direction as the direction of travel is a _________ wave", "a": "longitudinal"}, {"q": "Oscillations are at right angles to the direction of travel in a ____________ wave", "a": "transverse"}, {"q": "The time needed for one wave to pass a given point is the…", "a": "period"}, {"q": "The region in a longitudinal wave where particles are closest together is a …", "a": "compression"}, {"q": "The region in a longitudinal wave where particels are furthest apart is a…", "a": "rarefaction"}, {"q": "Draw a transverse wave and label the wavelength and amplitude", "a": "Transverse wave: oscillations ⟂ to travel. Wavelength = crest→crest; amplitude = rest→crest.", "d": "wave:transverse"}, {"q": "Draw a longitudinal wave and label the wavelength", "a": "Longitudinal wave: oscillations ∥ to travel, with compressions and rarefactions.", "d": "wave:longitudinal"}, {"q": "Can sound waves travel through space?", "a": "no"}, {"q": "Does a sound wave travel faster in water or air?", "a": "water"}, {"q": "How do sound waves travel through solids?", "a": "Vibrations in the solid cause the sound wave to travel."}, {"q": "How do humans hear a range of sounds?", "a": "Within the ear, sound waves cause the ear drum and other parts to vibrate which causes the sensation of sound. The conversion of sound waves to vibrations of solids works over a limited frequency range. This restricts the limits of human hearing."}, {"q": "What is the range of normal human hearing?", "a": "20 Hz to 20 kHz"}, {"q": "What are ultrasound waves?", "a": "Ultrasound waves have a frequency higher than the upper limit of hearing for humans."}, {"q": "How are ultrasound waves used for imaging?", "a": "Ultrasound waves are partially reflected when they meet a boundary between two different media. The time taken for the reflections to reach a detector can be used to determine how far away such a boundary is. This allows ultrasound waves to be used for both medical and industrial imaging."}, {"q": "What are seismic waves?", "a": "Seismic waves are produced by earthquakes."}, {"q": "What are P-waves?", "a": "P-waves are longitudinal, seismic waves. P-waves travel at different speeds through solids and liquids."}, {"q": "What are S-waves?", "a": "S-waves are transverse, seismic waves. S-waves cannot travel through a liquid."}, {"q": "What do P-waves and S-waves provide evidence for?", "a": "P-waves and S-waves provide evidence for the structure and size of the Earth’s core, which are not easily observable."}, {"q": "How are waves used to detect objects in deep water and measure water depth?", "a": "Echo sounding, using high frequency sound waves"}, {"q": "The process taking place when a wave bounces off of a surface", "a": "reflection"}, {"q": "The process taking place when a wave enters a different density medium and changes direction", "a": "refracion"}, {"q": "Refraction changes both the _________ and ___________ of a wave", "a": "direction and speed"}, {"q": "Which two angles are equal in reflection", "a": "angle of incidence and angle of reflection"}, {"q": "What is the word for reflection from a smooth surface?", "a": "Specular reflection"}, {"q": "What is the word for reflection from a rough surface?", "a": "Diffuse reflection"}, {"q": "What happens to waves at the boundary between materials?", "a": "They can be reflected, absorbed or transmitted."}, {"q": "Draw a ray diagram to show how light is reflected by a plane mirror.", "a": ""}, {"q": "What is the relationship between the angles of incidence and reflection.", "a": "Angle of incidence = angle of reflection"}, {"q": "Waves have different velocities in different substances. What effect does this lead to?", "a": "Refraction"}, {"q": "Draw a ray diagram to show how light is refracted at a surface between two materials.", "a": ""}, {"q": "Draw a wave front diagram to explain how refraction is related to the change of speed that happens when a wave travels from one medium to another.", "a": ""}, {"q": "Reflection RPA: Where is the angle of incidence measured?", "a": "Between the incident ray and the normal"}, {"q": "Reflection RPA: Where is the angle of reflection measured?", "a": "Between the reflected ray and the normal"}, {"q": "Refraction RPA: What is the precision of a standard protractor?", "a": "1 degree"}, {"q": "Refraction RPA: What a normal line?", "a": "a line 90 deg to the boundary where you measure the angle of incidence from"}, {"q": "Refraction RPA: What would happen if you shine light down a normal?", "a": "No refraction"}, {"q": "Refraction RPA: Why do we take repeat readings?", "a": "to take a mean to to reduce the effect of random errors"}, {"q": "When a wave meets an object, what can happen to it?", "a": "It may be transmitted, absorbed or reflected"}]}, {"name": "Electromagnetic waves", "cards": [{"q": "Name a use of radio waves", "a": "TV and radio transmission"}, {"q": "What is the speed of elecrtomagnetic radiation?", "a": "300 000 000 m/s"}, {"q": "What is the EM radiation with the shortest wavelength?", "a": "gamma"}, {"q": "What is the EM radiation with the longest wavelength?", "a": "Radio"}, {"q": "What is the EM radiation with the highest frequency?", "a": "Gamma"}, {"q": "What is the EM radiation with the lowest frequency?", "a": "Radio"}, {"q": "List the EM spectrum from long to short wavelength.", "a": "Radio, microwave, infrared, visible, UV, X-rays, gamma"}, {"q": "Can EM waves travel through space?", "a": "yes"}, {"q": "What EM wave is used for satellite communication?", "a": "microwave"}, {"q": "Give one use of microwaves", "a": "cooking food"}, {"q": "Give two uses of IR radiation", "a": "electrical heaters, infrared cameras"}, {"q": "Give a use of visible radiation", "a": "Fibre optic communications"}, {"q": "Which radiation is used in sun tanning?", "a": "UV"}, {"q": "Give one use of X-rays.", "a": "Medical imaging"}, {"q": "Give one use of gamma rays", "a": "Medical treatments"}, {"q": "Why are X-rays good for taking images of bone?", "a": "absorbed by bone but transmitted through soft tissue"}, {"q": "Why are gamma rays used in medical treatment?", "a": "Can kill cancer cells"}, {"q": "What are the risks of exposure to UV radiation?", "a": "Premature skin aging, increased risk of skin cancer"}, {"q": "What are the risks of exposure of X-rays?", "a": "X-rays are ionising so can cause mutations which may result in cancer"}, {"q": "What are the risks of exposure to gamma rays?", "a": "Gamma rays are ionising so can cause mutations which may result in cancer"}, {"q": "How can radio waves be produced?", "a": "Oscillations in electrical circuits."}, {"q": "How are radio waves related to alternating current?", "a": "When radio waves are absorbed they may create an alternating current with the same frequency as the radio wave itself, so radio waves can themselves induce oscillations in an electrical circuit."}, {"q": "How are electromagnetic waves related to atoms and nuclei?", "a": "Changes in atoms and the nuclei of atoms can result in electromagnetic waves being generated or absorbed over a wide frequency range."}, {"q": "Where do gamma rays originate from?", "a": "Changes in the nucleius of an atom."}, {"q": "What is radiation dose?", "a": "Radiation dose is a measure of the risk of harm resulting from an exposure of the body to the radiation."}, {"q": "What are the units of radiation dose?", "a": "Sieverts, Sv"}, {"q": "How many millisieverts (mSv) make up 1 sievert (Sv)?", "a": "1000 millisieverts (mSv) = 1 sievert (Sv)"}, {"q": "What effect do ultraviolet waves have on skin?", "a": "They can cause it to age prematurely and they increase the risk of skin cancer."}, {"q": "Which types of EM radiation are ionising?", "a": "X-rays and gamma rays"}, {"q": "What effects can ionising radiation have on the body?", "a": "They can cause mutation of genes and cancer."}, {"q": "What are the uses of each type of EM radiation?", "a": "radio waves – television and radio • microwaves – satellite communications, cooking food • infrared – electrical heaters, cooking food, infrared cameras • visible light – fibre optic communications • ultraviolet – energy efficient lamps, sun tanning • X-rays and gamma rays – medical imaging and treatments"}, {"q": "List the EM spectrum from short to long wavelength.", "a": "Gamma, xray, UV, Visible, IR, Micro, Radio"}, {"q": "An object is said to _________ radiation when energy from an EM wave is taken up by the object", "a": "absorb"}, {"q": "An object is said to _________ radiation when a wave can pass through the object", "a": "transmit"}, {"q": "How do convex lenses form an image?", "a": "In a convex lens, parallel rays of light are brought to a focus at the principal focus."}, {"q": "What is the focal length?", "a": "The distance from the lens to the principal focus is called the focal length."}, {"q": "What is a real image?", "a": "One that can be shown on a screen."}, {"q": "What is a virtual image?", "a": "One that does not exist, and only appears to."}, {"q": "What type of image does a convex lens produce?", "a": "Real or virtual"}, {"q": "What type of image does a concave lens produce?", "a": "Virtual"}, {"q": "What is the equation from the Physics equation sheet for magnification?", "a": "Magnification = image height / object height"}, {"q": "What are the units of magnification?", "a": "Magnification is a ratio and so has no units."}, {"q": "Draw two symbols that may be used to represent a convex lens", "a": ""}, {"q": "Draw two symbols that may be used to represent a concave lens", "a": ""}, {"q": "What are the three rules for convex lenses?", "a": "An incident ray travelling parallel to the axis refracts through the lens and passes through the principal focus on the other side. An incident ray passing through the centre of the lens carries on in the same direction. An incident ray passing through the principal focus before meeting the lens refracts through the lens and travels parallel to the axis."}, {"q": "What are the three rules for concave lenses?", "a": "An incident ray travelling parallel to the axis refracts through the lens and travels as though it has come from the principal focus. An incident ray passing through the centre of the lens carries on in the same direction. An incident ray passing through the lens towards the far-side principal focus refracts through the lens and travels parallel to the axis."}, {"q": "What should you do if the refracted rays do not cross on the far side of the lens?", "a": "Track them back as virtual (dotted) rays"}, {"q": "Where does the image occur on a ray diagram?", "a": "Where the rays cross"}, {"q": "What three features of images should be used to describe them?", "a": "Orientation (Upright or inverted), Size (Magnified, diminished or the same size) and whether they are Real or Virtual"}, {"q": "How is a convex lens represented in ray diagrams?", "a": ""}, {"q": "How is a concave lens represented in ray diagrams?", "a": ""}, {"q": "What is the difference between the colours in the visible light spectrum?", "a": "They each have their own narrow band of wavelength and frequency."}, {"q": "How do colour filters work?", "a": "Colour filters work by absorbing certain wavelengths (and colour) and transmitting other wavelengths (and colour)."}, {"q": "What determines the colour of an opaque object?", "a": "The colour of an opaque object is determined by which wavelengths of light are more strongly reflected. Wavelengths that are not reflected are absorbed. If all wavelengths are reflected equally the object appears white. If all wavelengths are absorbed the objects appears black."}, {"q": "What does the colour of visible light correspond to?", "a": "A narrow band of frequency and wavelength"}, {"q": "What are the three primary colours?", "a": "Red, Green, Blue"}, {"q": "What are the three secondary colours?", "a": "Magenta, Cyan, Yellow"}, {"q": "How is cyan light made?", "a": "By mixing green and blue light"}, {"q": "How is yellow light made?", "a": "By mixing red and green light"}, {"q": "How is magenta light made?", "a": "By mixing red and blue light"}, {"q": "What is an opaque object?", "a": "An object that doesn't transmit light"}, {"q": "What types of object transmit light?", "a": "Translucent and transparent"}, {"q": "Why does red glass appear to be red when you look through it?", "a": "Only red light is transmitted and all other colours are absorbed"}, {"q": "Why does yellow glass appear to be yellow when red, green and blue light is shone through it?", "a": "Only red and green light are transmitted (which appear to be yellow). Blue light is absorbed"}, {"q": "What is the difference between transparent and translucent materials?", "a": "Transparent objects transmit light in straight lines. Translucent objects scatter the light that is transmitted."}, {"q": "Why does a red apple appear to be red under white light?", "a": "Red light is reflected and all other colours are absorbed"}, {"q": "Why does a green apple appear to be black behind a blue filter?", "a": "Blue filters only transmit blue light. The green light from the apple is absorbed."}, {"q": "What words are used to describe objects which transmit light?", "a": "Transparent or translucent"}]}, {"name": "Black body radiation", "cards": [{"q": "All objects emit infrared radiation. The hotter the object…", "a": "the more infrared radiation it radiates in a given time."}, {"q": "What is a perfect black body?", "a": "A perfect black body is an object that absorbs all of the radiation incident on it. A black body does not reflect or transmit any radiation. Since a good absorber is also a good emitter, a perfect black body\nwould be the best possible emitter."}, {"q": "What can be said about the rate that an object absorbs and emits radiation?", "a": "A body at constant temperature is absorbing radiation at the same rate as it is emitting radiation. The temperature of a body increases when the body absorbs radiation faster than it emits radiation."}, {"q": "What factors affect the temperature of the Earth?", "a": "The temperature of the Earth depends on many factors including: the rates of absorption and emission of radiation, reflection of radiation into space."}, {"q": "In the required practical activity about infra-red variation, what is the independent variable?", "a": "The surface surrounding the heat source."}, {"q": "IR RPA: Which surface type would emit the most IR?", "a": "Dark matt"}, {"q": "IR RPA: Which surface type would emit the least IR?", "a": "Light shiny"}, {"q": "IR RPA: Which surface shiny or dull black will emit the most IR?", "a": "dull black"}, {"q": "IR RPA: What control variables are there in this experiment?", "a": "Distance IR meter is from surface, amount of water, starting temp"}, {"q": "IR RPA: Why is a data logger better than a thermometer?", "a": "Higher resolution = more accurate. Reduces the effect of random error (parallax)"}, {"q": "IR RPA: What are the IV, DV and CV?", "a": "IV: surface type DV: amount of IR emitted CV: start temp of water, amount of water, distance IR detector is from surface"}, {"q": "IR RPA: Is the data produced continuous or discrete? What graph would you draw?", "a": "Discrete - bar chart"}]}]}, {"name": "Magnetism and Electromagnetism", "subtopics": [{"name": "Permanent and induced magnetism, magnetic forces and fields", "cards": [{"q": "The places on a magnet where the magnetic forces are the strongest are called the…", "a": "poles"}, {"q": "What is the definition of a magnetic field?", "a": "The area around a magnet where a force acts on another magnet or magnetic material"}, {"q": "The area around a magnet where a force acts on another magnet or magnetic material in the…", "a": "Magnetic field"}, {"q": "Two like poles always ______", "a": "repel"}, {"q": "Tow opposite poles always _______", "a": "attract"}, {"q": "What is a permanent magnet?", "a": "A magnet that produces its own magnetic field."}, {"q": "What is an induced magnet?", "a": "A magnetic material which becomes a magnet when placed in a magnetic field."}, {"q": "A magnetic material which becomes a magnet when placed in a magnetic field is a _______ _________", "a": "induced magnet"}, {"q": "What type of magnet loses its magnetism when it is removed from a magnetic field?", "a": "induced magnet"}, {"q": "Which three elements are magnetic?", "a": "iron, cobalt and nickel"}, {"q": "Draw the magnetic field around a bar magnet", "a": "Bar magnet: field lines loop from N to S, closest (strongest) at the poles.", "d": "mag:bar"}, {"q": "What two methods can you use to obesrve the field around a bar magnet?", "a": "Iron filings or plotting compass"}, {"q": "Draw the magnetic field between two like poles.", "a": "Two like poles: lines repel, with a neutral point between them.", "d": "mag:like"}, {"q": "Draw the magnetic field between two unlike poles.", "a": "Two unlike poles: lines run from N to S, attracting.", "d": "mag:unlike"}, {"q": "How can you use a compass to plot the magnetic field pattern of a magnet?", "a": "Place the compass in the field around the magnet. Draw a dot where the compass points.(North and South). Move the compass so that the South direction of the needle is at the dot you just drew. Repeat until the lines form a loop."}, {"q": "The strength of magnetic field surrounding a conducting wire depends on…", "a": "Size of current and distance from wire"}]}, {"name": "The motor effect", "cards": [{"q": "When current flows through a conducting wire…", "a": "A magnetic field is produced around the wire. The strength of the magnetic field depends on the current through the wire and the distance from the wire."}, {"q": "Give the name for the magnet created using a coil of wire", "a": "solenoid"}, {"q": "Where is the strongest field in an electromganet created by a coil of wire?", "a": "inside the coil"}, {"q": "What two words describe the magnetic field within the coil of a solenoid?", "a": "strong and uniform"}, {"q": "What is an electromagnet?", "a": "A solenoid containing an iron core which increases its strength"}, {"q": "What is an important property of a solenoid/electromagnet as a magnet", "a": "can be switched on and off with electric current"}, {"q": "What is a solenoid?", "a": "Shaping a wire to form a solenoid increases the strength of the magnetic field created by a current through the wire. The magnetic field inside a solenoid is strong and uniform."}, {"q": "How can the strength of a solenoid be increased?", "a": "By adding an iron core."}, {"q": "What is an electromagnet?", "a": "It is a solenoid with an iron core."}, {"q": "Draw the magnetic field pattern of a solenoid.", "a": "Bar magnet: field lines loop from N to S, closest (strongest) at the poles.", "d": "mag:bar"}, {"q": "Draw is the magnetic field pattern around a current carrying wire.", "a": "Bar magnet: field lines loop from N to S, closest (strongest) at the poles.", "d": "mag:bar"}, {"q": "Give three ways of increasing the force of a solenoid.", "a": "Add iron core, increase number of coils of wire, increase current, move magnetic material closer"}, {"q": "What is the motor effect?", "a": "When a conductor carrying a current is placed in a magnetic field the magnet producing the field and the conductor exert a force on each other. This is called the motor effect."}, {"q": "What does Fleming's left hand rule represent?", "a": "The relative orientation of the directions of the force, the current in the conductor and the magnetic field."}, {"q": "Give three ways of increasing the force of a motor.", "a": "Increase the number of coils of wire, increase the strength of the magnetic field, increase the current"}, {"q": "The right hand thumb rule shows relative direction of…", "a": "current and magnetic field around a wire"}, {"q": "State the equation which links current, force, length of conductor and magnetic flux density", "a": "F=BIl"}, {"q": "Flemming's left hand rule shows the relative directions of what things?", "a": "Force, magnetic field and current"}, {"q": "In Flemming's LH rule, the thumb gives the direction of …", "a": "Force"}, {"q": "In Flemming's LH rule, the second finger gives the direction of …", "a": "Current"}, {"q": "In Flemming's LH rule, the first finger gives the direction of …", "a": "Magnetic Field"}, {"q": "What happens to a coil of wire carrying a current in a magnetic field?", "a": "It rotates"}, {"q": "When a conductor carrying a current is placed in a magnetic field, the magnet and the conductor ….", "a": "exert an equal and opposit force on one another"}, {"q": "What is the unit of magnetic flux density?", "a": "Tesla (T)"}, {"q": "Which rule can be used to determine the direction a motor will rotate?", "a": "Flemming's left hand rule."}, {"q": "How do loudspeakers and headphones use the motor effect?", "a": "They convert variations in current in electrical circuits to the pressure variations in sound waves."}]}, {"name": "Induced potential, transformers and the National Grid", "cards": [{"q": "What is the generator effect?", "a": "If an electrical conductor moves relative to a magnetic field or if there is a change in the magnetic field around a conductor, a potential difference is induced across the ends of the conductor. If the conductor is part of a complete circuit, a current is induced in the conductor. This is called the generator effect."}, {"q": "How does an induced current that generates a magnetic field affect the original scenario?", "a": "It opposes the change that generated the field."}, {"q": "What does an alternator use the generator effect for?", "a": "To generate AC"}, {"q": "What does a dynamo use the generator effect for?", "a": "To generate DC"}, {"q": "How do microphones use the generator effect?", "a": "Microphones use the generator effect to convert the pressure variations in sound waves into variations in current in electrical circuits."}, {"q": "What does a basic transformer consist of?", "a": "A primary coil and a secondary coil wound on an iron core."}, {"q": "Why is iron used as the core of a transformer?", "a": "It is easily magnetised."}, {"q": "In a step-up transformer, which potential difference is greater?", "a": "Vs"}, {"q": "In a step-down transformer, which potential difference is greater?", "a": "Vp"}, {"q": "If transformers were 100% efficient, what would the electrical power output be?", "a": "It would equal the electrical power input."}]}]}, {"name": "Space Physics", "subtopics": [{"name": "Solar system and orbital motion", "cards": [{"q": "How many stars are in our solar system?", "a": "One - the sun"}, {"q": "Name the planets in our Solar System in order of distance from the sun.", "a": "Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune"}, {"q": "What defines a planet?", "a": "A body that orbits a star, is massive enough for its own gravity to make it round shaped, and has \"cleared its neighbourhood\" of smaller objects around its orbit."}, {"q": "What defines a moon?", "a": "A natural object which orbits a planet"}, {"q": "What type of object is pluto?", "a": "Dwarf planet"}, {"q": "What is the name of our galaxy?", "a": "Milky Way"}, {"q": "How was the Sun formed?", "a": "From clouds of dust and gas drawn together by gravity, which caused fusion reactions to occur."}, {"q": "Outline the life cycle of a star for stars the size of our Sun and stars much bigger than our Sun.", "a": "See diagram -->"}, {"q": "What force pulls the dust and gas together?", "a": "Gravitational force"}, {"q": "What is nuclear fusion?", "a": "When two small nuclei fuse together to form one larger nucleus, releasing energy in the reaction."}, {"q": "How does nuclear fusion relate to stars?", "a": "The energy released by fusion reactions leads to the light that we see from stars. It causes an outward force that would cause the star to expand if it weren't in equilibrium with the force of the gravitational collapse."}, {"q": "Which elements are produced in fusion in stars?", "a": "All naturally occuring elements, up to iron."}, {"q": "Where are elements heavier than this produced?", "a": "In a supernova"}, {"q": "How are they distributed across the universe?", "a": "In the supernova explosion"}, {"q": "What two forces are balanced during the stable period of a stars life?", "a": "The radiation pressure and the force of gravity"}, {"q": "What elements are formed by a red giant?", "a": "Elements up to neon, and a small number of heavy elements."}, {"q": "What elements are formed by a red supergiant?", "a": "All elements up to iron."}, {"q": "What elements are formed in a supernova?", "a": "Elements heavier than iron"}, {"q": "What is the force that keeps planets and satellites in orbit?", "a": "Gravitational force"}, {"q": "What shape are the orbits of the planets?", "a": "Circular"}, {"q": "What is an artificial satellite?", "a": "Something man-made which is in orbit of the Earth"}, {"q": "In a circular orbit, how can there be changing velocity if the speed is constant?", "a": "As it is attracted by gravity, it is constantly changing direction to remain in the circular orbit."}, {"q": "If the speed of an orbit changes, what else must change in a stable orbit?", "a": "The radius of orbit"}]}, {"name": "Red-shift", "cards": [{"q": "What is the Doppler Effect?", "a": "The observed frequency of waves emitted by a moving object appear changed."}, {"q": "What is red-shift?", "a": "There is an observed increase in the wavelength of light from most distant galaxies. The further away the galaxies, the faster they are moving and the bigger the observed increase in wavelength."}, {"q": "What is the Big Bang theory?", "a": "It suggests that the universe began from a very small region that was extremely hot and dense."}, {"q": "How does observed red-shift support the Big Bang theory?", "a": "It shows that the universe is expanding, so therefore must have once been much smaller."}, {"q": "Since 1998 onwards, observations of supernovae suggest that…", "a": "The furthest away galasxies are moving away from us even faster."}, {"q": "Why is it important for scientists to observe?", "a": "Observations allow them to obtain data, which they use to arrive at theories like the Big Bang theory."}, {"q": "There is still lots that scientists don't understand about the universe such as dark matter and dark energy. What are they an explanation for?", "a": "The expansion of the universe is slower than scientists would expect, so there must be something holding the universe together. We think about 68% of the universe is dark energy, 27% is dark matter and the rest is our known universe. We call them dark because we don't know much about them, but believe that they must exist to make sense of observations."}]}, {"name": "Black body radiation", "cards": [{"q": "What is a perfect black body?", "a": "A perfect black body is an object that absorbs all of the radiation incident on it. No radiation is reflected or transmitted. Black bodies are good emitters of radiation too."}, {"q": "What factors affect the amount and type of radiation emitted by a body?", "a": "Colour, surface area and temperature"}, {"q": "Draw a graph of intensity against wavelength for the radiation emitted from a black body", "a": "draw on board"}, {"q": "As the temperature of a back body is increased, what happens to the intensity of all wavelengths?", "a": "They increase. The intensity for short wavelengths increases more rapidly than long wavelengths."}, {"q": "As the temperature of a back body is increased, what happens to the peak wavelength?", "a": "It decreases"}, {"q": "What happens to the distribution of a black body if its temperature is decreased?", "a": "The intensity of all wavelengths decreases and the peak wavelength increases"}]}]}]}, {"name": "AQA Combined Physics", "level": "GCSE", "topics": [{"name": "Skills", "subtopics": [{"name": "Working scientifically", "cards": [{"q": "Define accuracy", "a": "When a result is close to the true value"}, {"q": "Give an example of a random error", "a": "A one off error that creates anomalous data (not the same as human error)"}, {"q": "What do you do when equipment has a zero error?", "a": "Add/subtract the error value from all readings"}, {"q": "Define precision", "a": "When a set of results has a small range"}, {"q": "Define repeatable", "a": "When the original experimenter repeats the investigation using the same method and equipment and finds the same results"}, {"q": "Define reproducible", "a": "When the experiment is repeated by another person or by using different equipment and get the same results"}, {"q": "Define resolution", "a": "The smallest reading taken by a piece of equipment"}, {"q": "What is the resolution of a 30cm ruler?", "a": "1 mm"}, {"q": "What is the resolution of a standard protractor?", "a": "1 degree"}, {"q": "What is the resolution of an analogue clock?", "a": "1 sec"}, {"q": "Define independent variable", "a": "The variable that is changed"}, {"q": "Define dependent variable", "a": "The variable that is measured"}, {"q": "Define control variable", "a": "A variable that is kept the same as it would effect the dependant variable"}, {"q": "How do you calculate the uncertainty in a single date point?", "a": "± 1/2 the resolution"}, {"q": "How do you calculate the uncertainty in set of data?", "a": "± 1/2 range"}]}, {"name": "Command words", "cards": [{"q": "What do you have to do if an exam question says 'compare'?", "a": "Describe the similarities and differences between the things in the quesiton"}, {"q": "What do you have to do if an exam question says 'define'?", "a": "Write the knowledge organiser definition"}, {"q": "What do you have to do if an exam question says 'describe'?", "a": "Write down some facts, events or processes in an accurate way"}, {"q": "What do you have to do if an exam question says 'design'?", "a": "Write a method for the investigation"}, {"q": "What do you have to do if an exam question says 'determine'?", "a": "Use data/information from the question in your answer"}, {"q": "What do you have to do if an exam question says 'evaluate'?", "a": "Use the information in the question as well as your own knowledge to consider evidence for an against something"}, {"q": "What do you have to do if an exam question says 'justify'?", "a": "Use information in the question to support your answer"}, {"q": "What do you have to do if an exam question says 'predict'?", "a": "Write a possible outcome that could happen from the information given"}]}, {"name": "Prefixes", "cards": [{"q": "what does the prefix tera- (T in 40 µC?", "a": "0.04"}]}]}, {"name": "Energy", "subtopics": [{"name": "Energy changes in a system", "cards": [{"q": "What is the equation linking kinetic energy, mass and velocity?", "a": "Ek= 0.5mv2"}, {"q": "What is the equation linking gravitationa field strength, gravitational potential energy and height?", "a": "Ep=mgh"}, {"q": "What is the equation linking energy transferred, power and time?", "a": "P=E/t"}, {"q": "What is the equation linking power, time and work done?", "a": "P=W/t"}, {"q": "What is the equation for calculating work?", "a": "Work = Force x distance"}, {"q": "What are the units of energy?", "a": "joules"}, {"q": "What are the units of mass?", "a": "kilograms"}, {"q": "What are the units of velocity?", "a": "metres per second"}, {"q": "What are the units of gravitational field strength?", "a": "newtons per kilogram"}, {"q": "What are the units of power?", "a": "Watts"}, {"q": "What are the units of work done?", "a": "joules"}, {"q": "What is the magnetic energy store?", "a": "Energy stored in magnets that are attracting or repelling"}, {"q": "What is the electrostatic energy store?", "a": "Energy stored n electric charges that are attracting or repelling"}, {"q": "What is a nuclear energy store?", "a": "Energy stored in the nuclei of atoms that can fuse or split."}, {"q": "Energy stored in the nuclei of atoms is in the __________ store.", "a": "nuclear"}, {"q": "List 4 energy stores.", "a": "Four from: chemical, kinetic, gravitational potential, elastic potential, internal, nuclear, magnetic, electrostatic."}, {"q": "Energy stored in objects which move.", "a": "kinetic"}, {"q": "What is a kinetic energy store", "a": "Energy stored in objects which move"}, {"q": "Chemical energy is stored as…?", "a": "chemicals waiting to react"}, {"q": "A battery is a store of __________ energy.", "a": "chemical"}, {"q": "Food is a store of __________ energy.", "a": "chemical"}, {"q": "A moving object is a store of ____________ energy", "a": "kinetic"}, {"q": "What is a gravitational potential store?", "a": "energy storred in objects raised up against the force of gravity."}, {"q": "A rock at the top of a hill is a store of ___________ energy.", "a": "gravitational potential"}, {"q": "What is an elastic potential store?", "a": "Energy stored in an object which has been stretched or compressed."}, {"q": "A compressed spring is a store of ___________ energy", "a": "elastic potential"}, {"q": "An inflated balloon is a store of __________ energy", "a": "elastic potential"}, {"q": "What is the type of energy transferred when a force moves through a distance?", "a": "Mechanical transfer"}, {"q": "Mechanical transfer is…?", "a": "The energy transfer when a force moves through a distance"}, {"q": "Electrical transfer is…?", "a": "Energy transferred when a charge moves."}, {"q": "What is the energy transferred when a charge moves?", "a": "electrical transfer"}, {"q": "What is the energy transferred by electromagnetic radiation?", "a": "Radiation transfer"}, {"q": "Radiation transfer is…?", "a": "The energy transferred by electromagnetic radiation."}, {"q": "Heat transfer is…?", "a": "Energy transferred when an object is heated."}, {"q": "When an object is heated the energy transferr is a…?", "a": "heat transfer"}, {"q": "List 4 energy stores.", "a": "Mechanical, electrical, radiation and heat."}, {"q": "The internal energy store is…", "a": "energy stored in the movement of particles."}, {"q": "The internal energy store of an object can be changed by…?", "a": "heating or cooling"}, {"q": "Define specific heat capacity", "a": "The energy needed to raise the temperature 1 kg of a material by 1ᵒC"}, {"q": "What are the units of specific heat capacity", "a": "J/kg°C"}, {"q": "What does it mean if a substance A has a higher specific heat capacity than substance B?", "a": "It takes more energy to increase its temp by 1 deg"}, {"q": "What is the difference between heat and temperature?", "a": "Heat = total energy stored in a substance Temp = measure of average kinetic energy of the particles in the substance"}, {"q": "Consider 4kg of copper and 4kg of gold, both at 50ᵒC. Which one contains the most heat energy?", "a": "gold - higher SHC"}, {"q": "SHC RPA: What piece of equipment is used to measure mass?", "a": "Balance"}, {"q": "SHC RPA: What piece of equipment is used to measure the energy transferred?", "a": "Joulemeter"}, {"q": "SHC RPA: What piece of equipment is used to measure temp?", "a": "Thermometer"}, {"q": "SHC RPA: What values do you plot on the graph?", "a": "x: energy transferred y: temperature"}, {"q": "SHC RPA: What variables need to be controlled in this experiment?", "a": "Voltage of powerpack, Duration of practical, energy transfer to the surroundings"}]}, {"name": "Conservation and dissipation of energy", "cards": [{"q": "What is the equation for calculating efficiency from energy?", "a": "Efficiency = useful energy output/total energy input"}, {"q": "What is the equation for calculating efficiency from power?", "a": "Efficiency = useful power output/useful power input"}, {"q": "What is the law of conservation of energy?", "a": "Energy cannot be created and destroyed but only transferred from one store to another."}, {"q": "What term is used to describe energy becoming spread out or transferred to a \"wasted\" store?", "a": "dissipation"}, {"q": "What term is used to describe a method for reducing unwanted energy transfers by reducing friction?", "a": "lubrication"}, {"q": "What is a thermal insulator?", "a": "A non-conductive material which reduces thermal energy transfers."}, {"q": "What is the name for a method of reducing energy transfers by the use of non-conductive materials?", "a": "insulation"}, {"q": "How does the thermal conductivity of the walls affect a building’s rate of cooling?", "a": "High TC means high rate of ET"}, {"q": "How does the thickness of the walls affect a building’s rate of cooling?", "a": "Thick = slow"}, {"q": "SHC RPA: Why do you wrap the sample in insulation?", "a": "To reduce unwanted energy transfers to the surroundings"}, {"q": "What is the definition of power?", "a": "Power is the rate of transfer of energy or the rate of doing work"}, {"q": "What does the efficiency of an appliance tell us?", "a": "The proportion of the input energy/power that is transferred in a useful way"}, {"q": "Define Efficiency", "a": "The proportion of input energy that is transferred usefully within a system"}]}, {"name": "National and global energy resources", "cards": [{"q": "Name two non-renewable energy resources", "a": "Fossil fuels, nuclear fuel"}, {"q": "What are some advantages of fossil fuels as an energy resource?", "a": "reliable, cheap"}, {"q": "What is a reliable energy source", "a": "one which can produce energy all the time."}, {"q": "What are some disadvantages of fossil fuels?", "a": "carbon dioxide (greenhouse gas) produced leading to global warming. Can produce sulphur dioxide causing acid rain."}, {"q": "What are some advantages of nuclear fuel?", "a": "No carbon dioxide produced, reliable."}, {"q": "What are some disadvantages of nuclear fuel?", "a": "nuclear waste remains radioactive for thousands of years. Expensive to build and decommission"}, {"q": "List 4 renewable energy resources.", "a": "Any 4 from: biofuel, wind, hydroelectricity, geothermal, tidal, wave, solar."}, {"q": "What are some advantages of biofuels?", "a": "carbon neutral, reliable"}, {"q": "What are some disadvantages of biofuels?", "a": "production of fuel can damage ecosystems and reduce variety of crops grown"}, {"q": "What are some advantages of wind power?", "a": "No carbon dioxide produced"}, {"q": "What are some disadvantages of wind power?", "a": "unreliable, expensive to construct"}, {"q": "What are some advantages of hydroelectricity?", "a": "No carbon dioxide produced"}, {"q": "What are some disadvantages of hydroelectricty?", "a": "blocks rivers preventing fish migration, unreliable (may not produce electricity during droughts)"}, {"q": "What are some advantages of geothermal energy?", "a": "doesn't damage ecosystems, reliable."}, {"q": "What are some disadvantages of geothermal energy?", "a": "fluids drawn from ground may contain greenhouse gases such as CO2 and methane.These contribute to global warming"}, {"q": "What are some advantages of tidal energy?", "a": "No carbon dioxide produced."}, {"q": "What are some disadvantages of tidal energy?", "a": "unreliable - tides vary, may damage tidal ecosystem"}, {"q": "What are some advantages of wave power?", "a": "No carbon dioxide produced"}, {"q": "What are some disadvantages of wave power?", "a": "unreliable - may not produce electricity when calm seas"}, {"q": "What are some advantages of solar power?", "a": "No carbon dioxide produced"}, {"q": "What are some disadvantages of solar power?", "a": "unreliable - no electricity produced at night and limited on cloudy days. Expensive to construct."}]}]}, {"name": "Electricity", "subtopics": [{"name": "Current, potential difference and resistance", "cards": [{"q": "State the equation which links charge flow, current and time", "a": "Q=It"}, {"q": "State the equation which links current, potential difference and resistance", "a": "V=IR"}, {"q": "State the equation which links current, potential difference and power", "a": "P=IV"}, {"q": "State the equation which links current, power and resistance", "a": "P=I2R"}, {"q": "State the equation which links energy transferred, power and time", "a": "E=Pt"}, {"q": "State the equation which links charge flow, energy transferred and potential difference", "a": "E=QV"}, {"q": "What is the unit of charge flow?", "a": "Coulomb ( C )"}, {"q": "What is the unit of current?", "a": "Amps (A)"}, {"q": "What is the unit for potential difference?", "a": "Volts (V)"}, {"q": "What is the unit for resistance?", "a": "Ohms (Ω)"}, {"q": "What is the unit for power?", "a": "Watts (W)"}, {"q": "Draw the circuit symbol for a switch", "a": "Open switch: a gap in the wire with a hinged lever lifted off the contact.", "d": "sym:switch"}, {"q": "Draw the circuit symbol for a closed switch", "a": "Closed switch: the lever rests on the contact, completing the circuit.", "d": "sym:switch_closed"}, {"q": "Draw the circuit symbol for a cell", "a": "Cell: one long thin line (+) and one short thick line (–).", "d": "sym:cell"}, {"q": "Draw the circuit symbol for a battery", "a": "Battery: two or more cells in series (repeated long/short pairs).", "d": "sym:battery"}, {"q": "Draw the circuit symbol for a diode", "a": "Diode: a triangle pointing to a bar; current flows only in the arrow's direction.", "d": "sym:diode"}, {"q": "Draw the circuit symbol for a resistor", "a": "Resistor: a plain rectangular box in the wire.", "d": "sym:resistor"}, {"q": "Draw the circuit symbol for a variable resistor", "a": "Variable resistor: a rectangle with a diagonal arrow through it.", "d": "sym:variable_resistor"}, {"q": "Draw the circuit symbol for an LED", "a": "LED: a diode with two small arrows pointing away (emitting light).", "d": "sym:led"}, {"q": "Draw the circuit symbol for a lamp", "a": "Lamp: a circle with a cross inside.", "d": "sym:lamp"}, {"q": "Draw the circuit symbol for a fuse", "a": "Fuse: a rectangle with a line running straight through it.", "d": "sym:fuse"}, {"q": "Draw the circuit symbol for a voltmeter", "a": "Voltmeter: a circle with a V inside; connected in parallel.", "d": "sym:voltmeter"}, {"q": "Draw the circuit symbol for an ammeter", "a": "Ammeter: a circle with an A inside; connected in series.", "d": "sym:ammeter"}, {"q": "Draw the circuit symbol for a thermistor", "a": "Thermistor: a resistor rectangle with a diagonal line ending in a horizontal foot.", "d": "sym:thermistor"}, {"q": "Draw the circuit symbol for an LDR", "a": "LDR: a resistor in a circle with two arrows pointing in (light in).", "d": "sym:ldr"}, {"q": "Electric Current is….?", "a": "the flow of electric charge"}, {"q": "Potential difference between two points in a circuit is….?", "a": "the work done when a couloumb of charge passes between the points."}, {"q": "In a circuit the potential difference causes …..?", "a": "charge to flow"}, {"q": "Resistance is…?", "a": "caused by anything which opposes the flow of electric charge"}, {"q": "Particles which can be 'charges' in electric circuits are…", "a": "electrons or ions"}, {"q": "Define voltage", "a": "The amount of energy per unit charge"}, {"q": "Define current", "a": "The rate of flow of charge"}, {"q": "Define resistance", "a": "How difficult it is for charge to flow"}, {"q": "What is an ammeter?", "a": "A device used to measure current"}, {"q": "What is a voltmeter?", "a": "A device used to measure potential difference"}, {"q": "Define potential difference", "a": "The amount of energy per unit charge across a device"}, {"q": "What are the 4 factors that effect the resistance of a wire?", "a": "Length, cross section, material and temperature"}, {"q": "Why are metals good conductors?", "a": "They have delocalised electrons"}, {"q": "Resistance RPA: What are the IV, DV and CV?", "a": "IV: Length of wire, DV: Resistance of wire, CV: cross section, temp of wire"}, {"q": "Resistance RPA: Name a safety concern related to this practical", "a": "Burns - hot wire. Turn of equipment between readings"}, {"q": "Resitance RPA: State two reasons why we turn the equipment off between readings", "a": "1) To try and control the temperature of a wire (CV) 2) So the wire doesn’t get hot so that you down burn yourself"}, {"q": "Resitance RPA: What values are plotted on the graph?", "a": "x: Length y: resistance"}, {"q": "Resitance RPA: What is the relationship between length and resistance?", "a": "Directly proportional"}, {"q": "Resitance RPA: How do you know the relationship between length and resistance is directly proportional?", "a": "The graph is a straight line through origin"}, {"q": "What is Ohms law?", "a": "The potential difference across a component is directly proportional to current through it"}, {"q": "What is an ohmic conductor?", "a": "A component that has a fixed resistance at a constant temp"}, {"q": "What is an LDR?", "a": "Device where the resistance decreases when the brightness increases"}, {"q": "What is a thermiser?", "a": "Device where the resistance decreases when the temp increases"}, {"q": "What is a diode?", "a": "Device that only allows current to flow in one direction"}, {"q": "What is the relationship between resistance and light intensity in an LDR?", "a": "Light increase, resistance decreases"}, {"q": "What is the relationship between resistance and temp in a thermistor?", "a": "Hotter = lower resistance"}, {"q": "Draw the I-V characteristic for a fixed resistor", "a": "Ohmic conductor / fixed resistor: a straight line through the origin (I ∝ V).", "d": "iv:ohmic"}, {"q": "Draw the I-V characteristic for a filament lamp see", "a": "Filament lamp: an S-shaped curve — gradient falls as it heats and resistance rises.", "d": "iv:lamp"}, {"q": "Draw the I-V characteristic for a diode", "a": "Diode: ~no current until the threshold voltage, then a sharp rise (almost none in reverse).", "d": "iv:diode"}, {"q": "Describe the I-V characteristic for a fixed resistor", "a": "Current and potential difference are directly proportional, resistance is constant", "d": "iv:ohmic"}, {"q": "Describe the I-V characteristic of a filament lamp", "a": "Resistance is not constant, it increases as p.d. increases", "d": "iv:lamp"}, {"q": "Explain why resistance increases with increased p.d. in a filament lamp", "a": "temperature increases causing ions to vibrate and increasing collisions with electrons flowing through the filament"}, {"q": "Describe the I-V characteristic of a diode", "a": "The current only flows through the diode in one direction, there is a very high resistance in the reverse direction.", "d": "iv:diode"}, {"q": "The _________ wire is a safety feature of appliances", "a": "earth"}, {"q": "IV RPA: What is the role of a variable resistor?", "a": "Allows you to control the current in the circuit by changing the resistance"}, {"q": "IV RPA: What are the IV, DV and CV?", "a": "IV: Current, DV: Potential difference, CV: temp"}]}, {"name": "Series and parallel circuits", "cards": [{"q": "What is a series circuit?", "a": "A circuit with only one route for charge to flow"}, {"q": "What is a parallel circuit?", "a": "A circuit with more than one route for charge to flow"}, {"q": "How do you calculate the resistance in a series circuit?", "a": "Resistance adds up"}, {"q": "State the rule for current in a series circuit", "a": "the current is the same at every point in the circuit and in every component"}, {"q": "State the rule for potential difference in a series circuit", "a": "the total potential difference of the power supply is shared between components"}, {"q": "State the rule for resistance in a series circuit", "a": "the more resistors, the greater the resistance. RT=R1+R2"}, {"q": "State the rule for current in a parallel circuit", "a": "the total current through the whole circuit is the sum of the currents through the separate components"}, {"q": "State the rule for potential difference in a parallel circuit", "a": "the potential difference across each branch in the circuit is the same"}, {"q": "State the rule for resistance in a parallel circuit", "a": "adding more resistors in parallel decreases resistance"}]}, {"name": "Domestic uses and safety", "cards": [{"q": "Current which regularly changes direction is called…", "a": "alternating current"}, {"q": "An example of alternating current is…?", "a": "mains electricity"}, {"q": "Current which flows in one direction is…?", "a": "direct current"}, {"q": "An example of direct current is…", "a": "batteries"}, {"q": "What is the potential difference of mains electricity in the UK?", "a": "230V"}, {"q": "What is the frequency of the alternating current in UK mains electricity?", "a": "50Hz"}, {"q": "What colour is the live wire in a thr
