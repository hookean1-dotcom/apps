 'particle:gas':()=>particles('gas'),

 'wave:transverse':()=>transverse(),
 'wave:longitudinal':()=>longitudinal(),

 'mag:bar':()=>magBar(),
 'mag:like':()=>magPair(true),
 'mag:unlike':()=>magPair(false),

 'feyn:betaminus':()=>feyn('n','p','e⁻','ν̄ₑ','W⁻'),
 'feyn:betaplus':()=>feyn('p','n','e⁺','νₑ','W⁺'),
 'feyn:ecapture':()=>feynEC(),
 'feyn:emrepulsion':()=>feynEM(),

 'graph:forceext':()=>graph('<path class="acc" d="M30 130 L 108 52 Q 128 34 160 28"/>','F','x'),
 'graph:stressstrain':()=>graph('<path class="acc" d="M30 130 L 96 56 Q 108 44 128 44 Q 150 46 158 30"/><line class="red" x1="158" y1="26" x2="163" y2="34"/><line class="red" x1="163" y1="26" x2="158" y2="34"/>','σ','ε'),
 'graph:heatingwater':()=>graph('<path class="acc" d="M30 128 L 52 100 L 84 100 L 104 60 L 140 60 L 162 30"/>','T','t')
};
function graph(inner,yl,xl){
  var axes='<line x1="30" y1="20" x2="30" y2="132"/><line x1="28" y1="130" x2="176" y2="130"/>'
    +arrow(30,132,30,18,'')+arrow(28,130,178,130,'')
    +'<text class="ts" x="18" y="26" text-anchor="middle" font-size="13">'+yl+'</text>'
    +'<text class="ts" x="176" y="146" text-anchor="middle" font-size="13">'+xl+'</text>';
  return svg(axes+inner,'0 0 190 152');
}
function particles(kind){
  var pos=[],r=11,i,j;
  if(kind==='solid'){for(j=0;j<4;j++)for(i=0;i<4;i++)pos.push([34+i*32,28+j*32]);}
  else if(kind==='liquid'){pos=[[30,40],[58,32],[86,44],[116,34],[142,46],[40,72],[70,66],[100,74],[128,64],[150,80],[34,104],[64,110],[92,102],[120,112],[148,106]];}
  else{pos=[[36,34],[110,28],[150,58],[60,80],[130,104],[38,116],[96,66]];}
  var s='';
  pos.forEach(function(p){s+='<circle class="accf" cx="'+p[0]+'" cy="'+p[1]+'" r="'+r+'"/>';});
  if(kind==='gas'){pos.forEach(function(p){s+=arrow(p[0]+r,p[1]-r,p[0]+r+13,p[1]-r-11,'');});}
  return svg('<rect x="6" y="10" width="176" height="128" rx="10" fill="none"/>'+s,'0 0 190 148');
}
function transverse(){
  var mid=70,amp=32,path='M20 '+mid,x;
  for(x=20;x<=210;x+=2){var y=mid-amp*Math.sin((x-20)/190*4*Math.PI);path+=' L '+x+' '+y.toFixed(1);}
  var wl='<line class="acc dash" x1="67.5" y1="'+(mid-amp)+'" x2="115" y2="'+(mid-amp)+'"/>'+arrow(67.5,20,115,20,'acc');
  var wtxt='<text class="t acc" x="91" y="14" text-anchor="middle" font-size="12">&#955;</text>';
  var ampl=arrow(150,mid,150,mid-amp,'red')
    +'<text class="t redf" x="158" y="'+(mid-amp/2)+'" font-size="11">amp</text>';
  return svg('<line class="ts" x1="20" y1="'+mid+'" x2="210" y2="'+mid+'" stroke-dasharray="3 4"/><path class="acc" d="'+path+'"/>'+wl+wtxt+ampl,'0 0 224 120');
}
function longitudinal(){
  var s='',y1=34,y2=92;
  var xs=[16,22,28,40,54,70,76,82,88,100,116,132,138,144,150,162,178];
  xs.forEach(function(x){s+='<line x1="'+x+'" y1="'+y1+'" x2="'+x+'" y2="'+y2+'"/>';});
  var wl=arrow(82,22,144,22,'acc')+'<text class="t acc" x="113" y="16" text-anchor="middle" font-size="12">&#955;</text>';
  var lab='<text class="ts" x="85" y="110" text-anchor="middle" font-size="10">compression</text><text class="ts" x="165" y="110" text-anchor="middle" font-size="10">rarefaction</text>';
  return svg(s+wl+lab+arrow(150,63,196,63,''),'0 0 210 118');
}
function magBar(){
  var m='<rect x="70" y="60" width="80" height="34" rx="3"/><line x1="110" y1="60" x2="110" y2="94"/>'
    +'<text class="t redf" x="90" y="82" text-anchor="middle" font-size="15">N</text>'
    +'<text class="t bluef" x="130" y="82" text-anchor="middle" font-size="15">S</text>';
  var loops='';
  [10,26,42].forEach(function(o){
    loops+='<path class="acc" d="M90 62 C '+(60-o)+' '+(40-o)+', '+(160+o)+' '+(40-o)+', 130 62"/>';
    loops+='<path class="acc" d="M90 92 C '+(60-o)+' '+(114+o)+', '+(160+o)+' '+(114+o)+', 130 92"/>';
  });
  loops+=arrow(112,49,116,49,'acc')+arrow(112,105,108,105,'acc');
  return svg(loops+m,'0 0 220 150');
}
function magPair(like){
  var left='<rect x="24" y="58" width="52" height="34" rx="3"/><line x1="50" y1="58" x2="50" y2="92"/>'
    +'<text class="t redf" x="62" y="80" text-anchor="middle" font-size="13">N</text>';
  var right='<rect x="144" y="58" width="52" height="34" rx="3"/><line x1="170" y1="58" x2="170" y2="92"/>'
    +(like?'<text class="t redf" x="158" y="80" text-anchor="middle" font-size="13">N</text>'
          :'<text class="t bluef" x="158" y="80" text-anchor="middle" font-size="13">S</text>');
  var f='';
  if(like){
    [0,16,32].forEach(function(o){
      f+='<path class="acc" d="M76 '+(75-o*0.2)+' C 96 '+(60-o)+', 96 '+(30-o)+', 96 20"/>';
      f+='<path class="acc" d="M144 '+(75-o*0.2)+' C 124 '+(60-o)+', 124 '+(30-o)+', 124 20"/>';
    });
    f+='<line class="ts dash" x1="110" y1="52" x2="110" y2="100"/><text class="t redf" x="110" y="116" text-anchor="middle" font-size="15">&#215;</text><text class="ts" x="110" y="132" text-anchor="middle" font-size="9">neutral point</text>';
    f+=arrow(88,60,84,52,'acc')+arrow(132,60,136,52,'acc');
  }else{
    [0,15,30].forEach(function(o){f+='<path class="acc" d="M76 75 C 110 '+(58-o)+', 110 '+(58-o)+', 144 75"/>';});
    [0,15].forEach(function(o){f+='<path class="acc" d="M76 76 C 110 '+(94+o)+', 110 '+(94+o)+', 144 76"/>';});
    f+=arrow(108,63,114,63,'acc');
  }
  return svg(left+right+f,'0 0 220 150');
}
function feyn(bl,tl,p1,p2,W){
  var s='';
  s+=arrow(40,140,100,80,'')+'<text class="t" x="34" y="146" font-size="12">'+bl+'</text>';
  s+=arrow(100,80,40,20,'')+'<text class="t" x="30" y="18" font-size="12">'+tl+'</text>';
  s+=wavy(100,150,80,'acc')+'<text class="t acc" x="118" y="72" font-size="11">'+W+'</text>';
  s+=arrow(150,80,190,44,'')+'<text class="t" x="176" y="38" font-size="12">'+p1+'</text>';
  s+=arrow(150,80,190,116,'')+'<text class="t" x="174" y="130" font-size="12">'+p2+'</text>';
  s+='<circle class="fillc" cx="100" cy="80" r="3"/><circle class="fillc" cx="150" cy="80" r="3"/>';
  return svg(s,'0 0 210 160');
}
function feynEC(){
  var s='';
  s+=arrow(40,20,100,80,'')+'<text class="t" x="30" y="18" font-size="12">p</text>';
  s+=arrow(40,140,100,80,'')+'<text class="t" x="28" y="146" font-size="12">e⁻</text>';
  s+=wavy(100,150,80,'acc')+'<text class="t acc" x="118" y="72" font-size="11">W⁺</text>';
  s+=arrow(150,80,190,44,'')+'<text class="t" x="178" y="38" font-size="12">n</text>';
  s+=arrow(150,80,190,116,'')+'<text class="t" x="172" y="130" font-size="12">νₑ</text>';
  s+='<circle class="fillc" cx="100" cy="80" r="3"/><circle class="fillc" cx="150" cy="80" r="3"/>';
  return svg(s,'0 0 210 160');
}
function feynEM(){
  var s='';
  s+=arrow(30,140,80,86,'')+'<text class="t" x="22" y="146" font-size="12">e⁻</text>';
  s+=arrow(80,86,30,32,'')+'<text class="t" x="20" y="26" font-size="12">e⁻</text>';
  s+=arrow(180,140,130,86,'')+'<text class="t" x="176" y="146" font-size="12">e⁻</text>';
  s+=arrow(130,86,180,32,'')+'<text class="t" x="174" y="26" font-size="12">e⁻</text>';
  s+=wavy(80,130,86,'acc')+'<text class="t acc" x="105" y="78" text-anchor="middle" font-size="12">&#947;</text>';
  s+='<circle class="fillc" cx="80" cy="86" r="3"/><circle class="fillc" cx="130" cy="86" r="3"/>';
  return svg(s,'0 0 210 160');
}
function drawDiagram(id){try{return DIA[id]?DIA[id]():'';}catch(e){return '';}}

/* ---------- App ---------- */
const $=function(s){return document.querySelector(s);};
const courseSel=$('#courseSel'),topicSel=$('#topicSel'),subSel=$('#subSel');
let state={ci:0,ti:-1,si:-1,count:3,pool:[],shown:[],revealed:false};

function opt(v,t){var o=document.createElement('option');o.value=v;o.textContent=t;return o;}

function initCourses(){
  DATA.courses.forEach(function(c,i){courseSel.appendChild(opt(i,c.name));});
  courseSel.value=0;
}
function fillTopics(){
  var c=DATA.courses[state.ci];topicSel.innerHTML='';
  topicSel.appendChild(opt(-1,'All topics'));
  c.topics.forEach(function(t,i){topicSel.appendChild(opt(i,t.name));});
  topicSel.value=state.ti;
}
function fillSubs(){
  subSel.innerHTML='';
  if(state.ti===-1){subSel.appendChild(opt(-1,'—'));subSel.value=-1;subSel.disabled=true;return;}
  subSel.disabled=false;
  var t=DATA.courses[state.ci].topics[state.ti];
  subSel.appendChild(opt(-1,'All sub-topics'));
  t.subtopics.forEach(function(s,i){
    subSel.appendChild(opt(i,(s.name&&s.name!=='General')?s.name:'(general)'));
  });
  subSel.value=state.si;
}
function buildPool(){
  var c=DATA.courses[state.ci];var pool=[];
  var topics= state.ti===-1 ? c.topics : [c.topics[state.ti]];
  topics.forEach(function(t){
    var subs = (state.ti!==-1 && state.si!==-1) ? [t.subtopics[state.si]] : t.subtopics;
    subs.forEach(function(s){ if(s) s.cards.forEach(function(card){
      pool.push({q:card.q,a:card.a,d:card.d,topic:t.name,sub:s.name});
    }); });
  });
  state.pool=pool;
}
function shuffleArr(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function pickShown(){
  var p=state.pool.slice();shuffleArr(p);
  state.shown=p.slice(0,Math.min(state.count,p.length));
}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  var grid=$('#grid');grid.innerHTML='';
  grid.classList.toggle('compact',state.count!==3);
  var c=DATA.courses[state.ci];
  var scope = state.ti===-1 ? 'All topics' : (state.si===-1? c.topics[state.ti].name : (subSel.options[subSel.selectedIndex]?subSel.options[subSel.selectedIndex].text:''));
  $('#meta').innerHTML='<span class="chip lvl">'+esc(c.level)+'</span>'
    +'<span class="chip">'+esc(scope)+'</span>'
    +'<span class="count-note">Showing '+state.shown.length+' of '+state.pool.length+' questions</span>';
  if(!state.shown.length){grid.innerHTML='<div class="empty">No questions in this selection.</div>';return;}
  state.shown.forEach(function(card,idx){
    var el=document.createElement('div');el.className='card'+(state.revealed?' flip':'');
    var dia='';
    if(card.d){var g=drawDiagram(card.d);if(g)dia='<div class="diagram">'+g+'</div>';}
    el.innerHTML=
      '<div class="inner">'
      +'<div class="face front"><div class="qnum"><span class="dot"></span>Q'+(idx+1)+' &middot; '+esc(card.sub&&card.sub!=="General"?card.sub:card.topic)+'</div>'
      +'<div class="qtext">'+esc(card.q)+'</div>'
      +'<div class="tap"><svg viewBox="0 0 24 24"><path d="M9 11V6a2 2 0 1 1 4 0v5m0-2a2 2 0 1 1 4 0v3m0-1a2 2 0 1 1 4 0v4a6 6 0 0 1-6 6h-2a7 7 0 0 1-5-3l-3-4a2 2 0 0 1 3-2.5l2 1.5"/></svg>Tap to reveal answer</div></div>'
      +'<div class="face back"><div class="qnum"><span class="dot"></span>Answer</div>'
      +'<div class="scrolly">'+dia+'<div class="atext">'+esc(card.a)+'</div>'
      +(card.d?'<div class="acap">Diagram &mdash; sketch this in your notes to check.</div>':'')
      +'</div></div>'
      +'</div>';
    el.addEventListener('click',function(){el.classList.toggle('flip');});
    grid.appendChild(el);
  });
}

function refreshAll(){buildPool();pickShown();state.revealed=false;setRevealLabel();render();}

courseSel.addEventListener('change',function(){state.ci=+courseSel.value;state.ti=-1;state.si=-1;fillTopics();fillSubs();refreshAll();});
topicSel.addEventListener('change',function(){state.ti=+topicSel.value;state.si=-1;fillSubs();refreshAll();});
subSel.addEventListener('change',function(){state.si=+subSel.value;refreshAll();});
$('#countSeg').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;
  var kids=e.currentTarget.children;for(var i=0;i<kids.length;i++)kids[i].classList.remove('on');b.classList.add('on');
  var ci=$('#customCount');ci.value='';ci.classList.remove('on');
  state.count=+b.dataset.n;pickShown();state.revealed=false;setRevealLabel();render();});
$('#customCount').addEventListener('input',function(e){
  var kids=$('#countSeg').children;for(var i=0;i<kids.length;i++)kids[i].classList.remove('on');
  var v=parseInt(e.target.value,10);
  if(!v||v<1){e.target.classList.remove('on');
    var d3=$('#countSeg').querySelector('[data-n="3"]');if(d3)d3.classList.add('on');
    state.count=3;pickShown();state.revealed=false;setRevealLabel();render();return;}
  if(v>60){v=60;e.target.value='60';}
  e.target.classList.add('on');
  state.count=v;pickShown();state.revealed=false;setRevealLabel();render();});
$('#shuffleBtn').addEventListener('click',function(){pickShown();state.revealed=false;setRevealLabel();render();});
$('#revealBtn').addEventListener('click',function(){state.revealed=!state.revealed;
  var cards=document.querySelectorAll('.card');for(var i=0;i<cards.length;i++)cards[i].classList.toggle('flip',state.revealed);
  setRevealLabel();});
function setRevealLabel(){
  $('#revealBtn').innerHTML=state.revealed
    ?'<svg viewBox="0 0 24 24"><path d="M3 3l18 18M10.6 10.6a2 2 0 0 0 2.8 2.8M9.4 5.1A9.9 9.9 0 0 1 12 5c6.5 0 10 7 10 7a13 13 0 0 1-2.2 3M6.1 6.1A13 13 0 0 0 2 12s3.5 7 10 7a9.6 9.6 0 0 0 3.5-.6"/></svg>Hide all'
    :'<svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>Reveal all';
}

/* theme */
var themeBtn=$('#themeBtn');
function setTheme(t){document.documentElement.setAttribute('data-theme',t);
  $('#themeIcon').outerHTML = t==='dark'
    ? '<svg id="themeIcon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>'
    : '<svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>';}
var dark=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches;
setTheme(dark?'dark':'light');
themeBtn.addEventListener('click',function(){dark=!dark;setTheme(dark?'dark':'light');});

/* boot */
var totalCards=0;DATA.courses.forEach(function(c){c.topics.forEach(function(t){t.subtopics.forEach(function(s){totalCards+=s.cards.length;});});});
$('#tot').textContent=DATA.courses.length+' courses · '+totalCards.toLocaleString()+' questions';
initCourses();state.ti=-1;fillTopics();fillSubs();refreshAll();
</script>
</body>
</html>
