cteristic graph for a Diode.", "a": "Diode: ~no current until the threshold voltage, then a sharp rise (almost none in reverse).", "d": "iv:diode"}, {"q": "What is the behaviour of an LDR", "a": "Resistance falls as light intensity increase"}, {"q": "What is the behaviour of a diode?", "a": "Conduct little/no current in reverse bias. Resistance falls rapidly above the threshold voltage (0.6V) forward bias"}, {"q": "Draw the circuit symbol for a Battery.", "a": "Battery: two or more cells in series (repeated long/short pairs).", "d": "sym:battery"}, {"q": "What is the behaviour of a thermistor?", "a": "Resistance falls as temperature increase"}, {"q": "Define positive temperature coefficient", "a": "Resistance increases with increasing temperature"}, {"q": "Give an example of a component with a negative temperature coefficient", "a": "Thermistor"}, {"q": "What is the behaviour of a lamp", "a": "As current increases, temperature and resistance increase significantly"}, {"q": "Give an application of a Diode", "a": "Converting AC to DC"}, {"q": "Give an application of an LED", "a": "Efficient lighting"}, {"q": "Give an application of a Thermistor", "a": "Temperature sensor e.g. in a thermostat for controlling heating"}, {"q": "Give an application of an LDR", "a": "Light sensor e.g. in automatic lighting"}]}, {"name": "4.3 - Circuits", "cards": [{"q": "Give Kirchoffs 1st law (current circuit rule)", "a": "Total current entering a junction is equal to total current leaving a junction"}, {"q": "Rule for current in series", "a": "Same for each component"}, {"q": "Rule for current in parallel", "a": "Depends on the resistance of each component"}, {"q": "Rule for pd in series", "a": "Is shared between the components"}, {"q": "Rule for pd in parallel", "a": "Is the same for each branch"}, {"q": "Give Kirchoffs 2nd law (PD circuit rule)", "a": "Sum of the EMFs is equal to the sum of the potential differences around a single loop"}, {"q": "How to calulcatie total resistance of resistors in series", "a": "Sum of the individual resistances"}, {"q": "How to calulcatie total resistance of n identical resistors in series", "a": "n x R"}, {"q": "How to calulcatie total resistance of n identical resistors in parallel", "a": "R ÷ n"}, {"q": "How to calulcatie total resistance of resistors in parallel", "a": "1/RT=1/R1+1/R2..."}, {"q": "How does adding a resistor in series affect the total resistance", "a": "Always increases the total resistance"}, {"q": "How does adding a resistor in parallel affect the total resistance", "a": "Always decreases the total resistance"}, {"q": "What is the total EMF of two cells that are connected the same way around", "a": "Their EMFs are added"}, {"q": "What is the total EMF If cells are connected in opposite directions", "a": "The total EMF is the difference between their EMFs"}, {"q": "What is the effect of connecting two identical resistors in parallel", "a": "Resistance is halved"}, {"q": "What is the effect of connecting two identical resistors in series", "a": "Resistance is doubled"}]}, {"name": "4.4 - EMF, Internal Resistance and Potential Dividers", "cards": [{"q": "The ratio of the pds in a potential divider is the same ratio as", "a": "the resistances"}, {"q": "Describe a potential divider", "a": "Two or more resistors in series with a fixed source of EMF"}, {"q": "Define lost volts", "a": "The pd dropped across the internal resistance"}, {"q": "Define internal resistance", "a": "The opposition to current created by the charge carriers having to flow through the source of EMF"}, {"q": "Define terminal pd", "a": "The work done per unit charge supplied to the load resistance"}, {"q": "How can you calculate the current supplied by a cell that has internal resistance", "a": "Equal to the EMF divided by the total resistance in the circuit (internal resistance + load resistance)"}, {"q": "How does the power wasted by heating the internal resistance relate to the current?", "a": "Proportional to the square of the current being supplied"}, {"q": "As the current drawn from a source increases what happens to the PD", "a": "The terminal/output pd falls"}, {"q": "What is found in a light sensing circuit?", "a": "A potential divider containing an LDR"}, {"q": "What is found in a temperature sensing circuit?", "a": "A potential divider containing a thermistor"}, {"q": "If the resistance of a component in a potential divider falls what happens to the PD", "a": "The pd across it decreases"}, {"q": "Share of the total pd across each resistor in a potential divider is equal to", "a": "its share of the total resistance"}, {"q": "The gradient of an output pd against current graph is equal to", "a": "Internal resistance"}]}]}, {"name": "Section 6 - Further Mechanics and Thermal Physics", "subtopics": [{"name": "6.1 - Thermal Energy and Temperature", "cards": [{"q": "Define Internal energy (J)", "a": "The sum of the randomly distributed kinetic and potential energy of the particles in an object"}, {"q": "What are the two ways of changing the internal energy of a system", "a": "Heating and doing work on it"}, {"q": "If an object/system does work what will happen to the internal energy?", "a": "Its internal energy will decrease (provided no thermal energy transfers occur)"}, {"q": "What are the conditions for an object to remain at constant temperature", "a": "The rate at which thermal energy is being transferred is equal to the rate at which work is done"}, {"q": "What is the First law of thermodynamics", "a": "The change in internal energy of a system equal to the sum of the energy transferred by heat and the work done on the system"}, {"q": "Define Thermal Equilibrium", "a": "Two objects at the same temperature so no heat flows between them"}, {"q": "Define Absolute zero", "a": "The temperature at which the internal energy of a system is at its lowest possible value"}, {"q": "Give 0⁰C in K", "a": "273 K"}, {"q": "For two objects in contact heat will always flow…?", "a": "from the hotter to the cooler"}, {"q": "Mechanism by which heat flows", "a": "Particles collide and transfer kinetic energy creating a net flow of energy from the hotter to the cooler object"}, {"q": "Mechanism by which doing work can increase temperature", "a": "The object exerting a force transfers kinetic energy to the particles."}, {"q": "Absolute temperature", "a": "A measure of the average kinetic energy of the particles in a substance."}]}, {"name": "6.2 - Heat Capacity and Latent Heat", "cards": [{"q": "Define Specific heat capacity (c)", "a": "The energy needed to raise the temperature of 1kg of the material by 1 degree Celsius/Kelvin without any change of state."}, {"q": "What are the units of specific heat capacity (c)", "a": "J kg⁻¹ K⁻¹"}, {"q": "What is ∆Q in ∆Q = mc∆T", "a": "Thermal energy gained (or lost if negative) by an object (provided no change in state)"}, {"q": "In an inversion tube the GPE lost by the material = …?", "a": "the thermal energy gained assuming no energy is transferred to the surroundings"}, {"q": "Equation for electrical energy supplied to a heater", "a": "W = IVt"}, {"q": "When heating a material electrically and with no change in state electrical energy supplied equals …?", "a": "the increase in thermal energy (IVt = mc∆T) assuming no heat losses to the surroundings"}, {"q": "For a fluid flowing through an electric heater electrical power supplied equals…?", "a": "the increase in thermal energy of the fluid per second (IV = c ∆T ∆m/∆t)  ∆m/∆t = mass flowing through per second (kg s⁻¹)"}, {"q": "Give the specific heat capacity of water", "a": "4200 J kg⁻¹ K⁻¹"}, {"q": "Define specific latent heat of vaporisation (L)", "a": "The energy required to change 1kg of a liquid to a gaseous state with no change in temperature"}, {"q": "Define specific latent heat of fusion (L)", "a": "The energy required to change 1 kg of solid to liquid with no change in temperature."}, {"q": "What are the units of Latent heat (L)", "a": "J kg⁻¹"}, {"q": "When melting a solid or boiling a liquid all of the heat transferred goes into…?", "a": "breaking the bonds between atoms/molecules (temperature is constant)"}, {"q": "Define sublimation", "a": "A solid vapourises directly to a gaseous state"}, {"q": "What is m in ∆Q = mL", "a": "The mass of substance which has changed state"}, {"q": "If an object changes temperature and state what equation could you use to calculate the thermal energy gained?", "a": "∆Q = mc∆T + mL"}]}, {"name": "6.3 - Gas Laws and the Ideal Gas Equations", "cards": [{"q": "Define an isothermal change", "a": "A change in volume and/or pressure at constant temperature"}, {"q": "Boyle's law: Pressure is inversely proportional to...", "a": "Volume for a fixed mass of gas at constant temperature"}, {"q": "Define an isobaric change", "a": "A change in volume and/or temperature at constant pressure"}, {"q": "Define an adiabatic process", "a": "A change involving no flow of heat"}, {"q": "Charles's law: Volume is proportional to...", "a": "Absolute temperature for a fixed mass of gas at constant pressure."}, {"q": "Equation for work done during an isobaric change", "a": "p∆V"}, {"q": "Gay Lassac's Law: Pressure is proportional to...", "a": "Absolute temperature for a fixed mass of gas at constant volume"}, {"q": "What is Avogadro's law", "a": "Equal volumes of gases at the same temperature and pressure contain equal numbers of molecules (or n α V if p and T are constant)"}, {"q": "What is R in pV = nRT", "a": "Molar Gas Constant"}, {"q": "What is N in pV = NkT", "a": "Number of particles"}, {"q": "What is n in pV = nRT", "a": "number of moles"}, {"q": "Temperature in the ideal gas equation must always be measured in", "a": "Kelvin"}, {"q": "What is k in pV = NkT", "a": "Boltzmann constant"}, {"q": "Give the ideal gas equation", "a": "pV = NkT OR pV = nRT"}, {"q": "What is an ideal gas?", "a": "A theoretical gas that obeys the gas laws at all pressures and temperatures"}]}, {"name": "6.4 - Avogadro's number, moles and mass", "cards": [{"q": "Define avagadro's constant", "a": "The number of atoms in 12 grams of carbon-12"}, {"q": "Define one mole", "a": "An amount of a substance in which the number of atoms/molecules is equal to Avogadro's constant"}, {"q": "Define molar mass", "a": "The mass of one mole of a substance (equal to the mass number in grams)"}, {"q": "How to calculate atomic/molecular mass (kg)", "a": "Nucleon number multiplied by the atomic mass unit (u)"}, {"q": "Define an atomic mass unit", "a": "1/12th the mass of a Carbon-12 atom"}, {"q": "What is the relationship between number of moles and number of particles", "a": "Number of particles = number of moles × Avogadro's constant"}, {"q": "What is the relationship between molar mass and molecular/atomic mass", "a": "Molar mass = Molecular mass x Avogadro's Number"}, {"q": "Nk =", "a": "nR"}, {"q": "Equation for number of moles =", "a": "Number of particles÷Avogadro's number"}, {"q": "pV/nT =", "a": "R"}, {"q": "pV/NT =", "a": "k"}]}, {"name": "6.5 - Kinetic Theory and Pressure", "cards": [{"q": "What are the units of pressure", "a": "Pascal (Pa or Nm⁻²)"}, {"q": "Define pressure", "a": "The force per unit area exerted by a gas normally to a surface"}, {"q": "Describe brownian motion", "a": "Evidence for the continuous, rapid and random motion of gas particles"}, {"q": "If the temperature of a gas is doubled velocity increases by", "a": "√2"}, {"q": "If two different gases are at the same temperature the average kinetic energy of their particles must be…?", "a": "the same"}, {"q": "Why does increasing temperature increase pressure of a gas", "a": "Particles have greater kinetic energy so there is a greater rate of collisions and greater change in momentum per collision with the container"}, {"q": "Why does increasing volume decrease pressure of a gas", "a": "P=F/A. Spacing of particles increases so rate of collisions with the container decreases decreasing the force exerted. Container has a larger surface area."}, {"q": "If a particle experiences a change in momentum there must be a force acting due to …?", "a": "Newton's second law"}, {"q": "If a container exerts a force on a particle the particle must exert a force on the container due to …?", "a": "Newton's third law"}, {"q": "Define mean square speed", "a": "The mean average value of the squares of all of the speeds of the individual particles in a gas."}, {"q": "Define root mean square speed", "a": "The square root of the mean average value of the squares of all of the speeds of the individual particles in a gas."}, {"q": "What is N in pV = ¹/₃ N m (c)²", "a": "Number of particles"}, {"q": "What is (c)² in pV = ¹/₃ N m (c)²", "a": "Mean square speed"}, {"q": "What does ³/₂kT give?", "a": "Mean kinetic energy of a gas particle"}, {"q": "What is true about the energy in an ideal gas?", "a": "Purely kinetic (i.e. no potential energy)"}, {"q": "What does ³/₂NkT give?", "a": "Total internal energy of an ideal gas."}, {"q": "Kinetic theory assumption concerning volume", "a": "The volume of the particles in a gas is negligible compared to the volume of the container"}, {"q": "Kinetic theory assumption concerning forces", "a": "There are no forces between particles except during collisions"}, {"q": "Kinetic theory assumption concerning motion", "a": "Particles are in continuous, random motion."}, {"q": "Kinetic theory assumption concerning collisions", "a": "The collisions particles undergo with each other and the container are all elastic"}, {"q": "Kinetic theory assumption concerning time", "a": "The duration of collisions is negligible compared to the time between collisions"}]}]}, {"name": "Section 7 -Fields and their consequences", "subtopics": [{"name": "7.1 - Fields", "cards": [{"q": "What happens when a body enters a force-field?", "a": "A body experiences a non-contact force"}, {"q": "How is a force field represented?", "a": "By a vector whose direction must be determined by inspection"}, {"q": "What is a gravitational field?", "a": "A region in which a mass will experience a gravitational force."}, {"q": "What is gravitational field strength?", "a": "The force per unit mass exerted on test mass at that point in the field."}, {"q": "What are the units of gravitational field strength?", "a": "N kg⁻¹"}, {"q": "What does the direction of a gravitational field line show?", "a": "The direction of force on a test mass at that point in the field."}, {"q": "What is represented by the spacing of field lines in a field line diagram?", "a": "Field strength."}, {"q": "What is the similarity between gravitational and electrostatic forces", "a": "They both follow the inverse-square law."}, {"q": "What is a uniform gravitational field?", "a": "A region in which the gravitational field strength is constant."}, {"q": "How is a uniform gravitational field shown in a field line diagram?", "a": "Parallel, evenly spaced field lines."}]}, {"name": "7.2 – Gravitational Fields", "cards": [{"q": "What is meant by a gravitational field?", "a": "A region where a mass experiences a gravitational force."}, {"q": "What is meant by gravitational field strength?", "a": "The force per unit mass exerted on test mass at that point in the field."}, {"q": "In what units is gravitational field strength measured?", "a": "N kg⁻¹"}, {"q": "What does the direction of a gravitational field line show?", "a": "The direction of force on a test mass at that point in the field."}, {"q": "In the equation a field line diagram, what does the spacing of field lines stand for?", "a": "Field strength."}, {"q": "Define a radial gravitational field.", "a": "A gravitational field produced by a spherical (or point) mass in which the field lines all point towards the centre of mass of the object causing the field."}, {"q": "Define a uniform gravitational field.", "a": "A region where the gravitational field strength is constant."}, {"q": "How is a uniform gravitational field shown in a field line diagram?", "a": "Parallel, equally spaced field lines."}, {"q": "How would you define a point mass?", "a": "A idealised mass with zero size. The field outside a spherical mass can be modelled as the field around a point mass."}, {"q": "Give Newton's Law of Gravitation.", "a": "The gravitational attraction between two objects is proportional to the product of their masses and inversely proportional to the square of the distance between their centres of mass"}, {"q": "Write down Kepler's 1st Law.", "a": "A planet's orbit is an ellipse with the Sun at one of the two foci"}, {"q": "How would you define an aphelion?", "a": "The point in an orbit when an object is furthest from the sun and travelling slowest."}, {"q": "Define a perihelion.", "a": "The point in an orbit when an object is closest to the sun and travelling fastest."}, {"q": "Write down Kepler's 2nd Law.", "a": "A line segment joining the planet to the Sun sweeps out equal areas in equal time intervals."}, {"q": "Write down Kepler's 3rd Law.", "a": "For planets in the solar system the square of the orbital period is proportional to the cube of the average orbital radius."}, {"q": "Describe how gravitational field strength changes with distance from a point mass.", "a": "It obeys an inverse-square law."}, {"q": "What is meant by geostationary satellite?", "a": "A satellite with an orbital period of 24 hours which orbits above the equator in the same direction as the Earth's rotation so its apparent position in the sky remains unchanged."}, {"q": "What is meant by a satellite?", "a": "An object which orbits planet."}, {"q": "What is the absolute gravitational potential of a point?", "a": "The work done per unit mass to move an object from an infinite distance away to that point in the field."}, {"q": "How does gravitational potential change as distance from a point mass changes?", "a": "It is inversely proportional to distance."}, {"q": "How would you define escape velocity?", "a": "The velocity at which the magnitude of an object's kinetic energy is larger than the magnitude of its gravitational potential energy."}, {"q": "What is meant by gravitational potential energy?", "a": "The work done to move an object from infinity to a point in the gravitational field."}]}, {"name": "7.3 – Electric Fields", "cards": [{"q": "Define an electric field.", "a": "A region where a charge experiences an electrostatic force."}, {"q": "Give the definition of electric field strength.", "a": "The force per unit charge on a positive test charge placed at that point"}, {"q": "State the units of electric field strength.", "a": "NC⁻¹ (or Vm⁻¹)"}, {"q": "What quantity does ε0 stand for?", "a": "permittivity of free space"}, {"q": "What quantity does εr stand for?", "a": "Relative permittivity (of a dielectric)."}, {"q": "What does the direction of an electric field line show?", "a": "The direction of the force exerted on a positive test charge."}, {"q": "What does the spacing of electric field lines show?", "a": "Field strength."}, {"q": "Are test charges positive or negative?", "a": "positive"}, {"q": "Which units are equivalent to Vm⁻¹?", "a": "N C⁻¹"}, {"q": "What is E = V/d used to calculate?", "a": "To find the uniform field strength between two parallel plates."}, {"q": "How would you define a dipole?", "a": "A pair of opposite sign charges separated by a small distance (e.g. a polar molecule like HCl)"}, {"q": "Write down Coulomb's law in words.", "a": "The force between two point charges is proportional to the product of the two charges and inversely proportional to the square of their separation distance."}, {"q": "How would you define electric potential difference?", "a": "The work done per unit positive charge in moving between two points"}, {"q": "Give the definition of absolute electric potential of a point.", "a": "The work done per unit positive charge to move from infinity to that point in the field."}, {"q": "What is the absolute electric potential an infinite distance from a 1C charge?", "a": "0"}, {"q": "Which units are equivalent to a V?", "a": "J C⁻¹"}, {"q": "How are the electrostatic force between two point charges and their separation distance related?", "a": "It is inversely proportional to the square of separation OR inverse square law"}, {"q": "How are potential and distance from a point charge related?", "a": "Potential α 1/distance"}, {"q": "Define a uniform electric field.", "a": "A region of space in which the electric field strength is the same at all points"}, {"q": "Define a radial field.", "a": "An electric field generated by a point charge OR a field that obeys the inverse square law."}, {"q": "What is meant by a neutral point in an electric field?", "a": "A point at which the resultant field strength is zero"}, {"q": "Is electric field strength a vector or a scalar quantity?", "a": "Vector"}, {"q": "Is electrical potential a vector or scalar quantity?", "a": "Scalar"}, {"q": "Give a similarity between electric and gravitational fields.", "a": "Both obey inverse square law for field strength (around a point mass/charge). Both have infinite range. Both act between two objects at a distance."}, {"q": "Write down two differences between electric and gravitational fields?", "a": "Gravitational fields act on masses, electric fields on charges: electric fields are much stronger that gravitational fields: electric fields can be attractive or repulsive, gravitational fields are always attractive: potential is always negative in a gravitational field."}, {"q": "When would you use V = Q / (4 pi ε0 r)?", "a": "To find the potential around a point charge/in a radial field."}, {"q": "How are electric potential energy and electric potential related?", "a": "EPE = V x q where q is the charge in the field."}]}, {"name": "7.4 – Capacitance", "cards": [{"q": "Describe the construction of a capacitor.", "a": "Two conducting plates separated by an insulator."}, {"q": "What is the relationship between charge stored and pd across a capacitor?", "a": "Charge is proportional to voltage"}, {"q": "Describe what happens to the two plates of an uncharged capacitor when a p.d. is applied to it?", "a": "Electrons/charge flows off of one plate and flows on to the other causing one to become positive and the other negative."}, {"q": "What units are equivalent to a Farad?", "a": "CV-1 or coulombs per volt"}, {"q": "What does the area under a charge pd graph give you?", "a": "The energy stored in a capacitor E = ½ QV = ½ CV2 = ½ Q2/C"}, {"q": "What quantities increase and decrease when a capacitor is charging?", "a": "Q, V increase and I decreases"}, {"q": "What quantities increase and decrease when a capacitor is discharging?", "a": "Q,V and I all decrease"}, {"q": "What is the expression for the half-life of a capacitor", "a": "T½ = 0.69RC"}, {"q": "What is representd by the area under a p.d. - charge graphs?", "a": "Electrical energy transferred OR work done."}, {"q": "What is represented by the gradient of a charge-p.d. graph for a capacitor?", "a": "Capacitance"}, {"q": "What is the relationship between energy stored and p.d. on a capacitor?", "a": "Energy stored is proportional to p.d. squared"}, {"q": "What is the relationship between energy stored and charge on a capacitor?", "a": "Energy stored is proportional to charge squared"}, {"q": "Out of Q, V and I which variable(s) follow the relationship x = x0 e-(t/RC) when discharging a capacitor?", "a": "Q, V and I"}, {"q": "Out of Q, V and I which variable(s) follow the relationship x = x0 e-(t/RC) when charging a capacitor?", "a": "I"}, {"q": "Out of Q, V and I which variable(s) follow the relationship x = x0 (1 - e-(t/RC) ) when charging a capacitor?", "a": "Q and V"}, {"q": "How do you calculate time constant in a capacitor circuit?", "a": "RC"}, {"q": "What is meant by the constant-ratio nature of exponential decay?", "a": "In equal time intervals the quantity decreases by equal factors."}, {"q": "How much charge remains after one time constant when discharging a capacitor?", "a": "e-1 OR 0.37 OR 37%"}, {"q": "How much charge remains after n time constants when discharging a capacitor?", "a": "e-n"}, {"q": "What is represented by the gradient of charge-time graph when charging a capacitor?", "a": "Charging current."}, {"q": "State a two uses of capacitors.", "a": "Energy storage e.g. for camera flashes,defibrillators spot welding…, timing circuits, voltage smoothing, audio filters."}, {"q": "What is the material between the 2 parallel plates of a capacitor called?", "a": "Dielectric"}, {"q": "What factors affect the capacitance of a capacitor?", "a": "Area, distance between the plates, and the dielectric"}, {"q": "What is the formula for capacitance which contains a term for the dielectrric?", "a": "C = (A ε0 εr/d"}, {"q": "What is meant by the permittivity of free space?", "a": "It is a measure of the ease at which an electric field can pass through a vacuum."}, {"q": "What is relative permittivity", "a": "Relative permittivity is the factor by which the electric field between the charges is decreased relative to vacuum."}, {"q": "What is the dielectric constant?", "a": "The dielectric constant is the ratio of the permittivity of a substance to the permittivity of free space."}, {"q": "What happens to the molecules in a dielectric to increase the overall capacitance?", "a": "The molecules become polarised."}, {"q": "How does a dielectric increase the capacitance?", "a": "A capacitor with a dielectric stores the same charge as one without a dielectric, but at a lower voltage. So reducing the capacitance raises the voltage."}, {"q": "In experiments to pass a very high current through a gas, a bank of capacitors of total capacitance 50 μF is charged to 30 kV. If the bank of capacitors could be discharged completely in 5.0 ms, what would be the mean power delivered?", "a": "4.5MW"}, {"q": "Show that the CR has units of seconds", "a": "CR = (Q/V) x (V/I) = Q/I = t"}]}, {"name": "7.5 – Magnetic Fields", "cards": [{"q": "What produces a magnetic field?", "a": "Moving charges and permanent magnets."}, {"q": "What does the direction of a magnetic field line show?", "a": "The direction of force on a free north pole."}, {"q": "In which direction do magnetic field lines flow?", "a": "From north to south."}, {"q": "How is a uniform magnetic field represented by field lines?", "a": "Parallel"}, {"q": "What does the spacing of magnetic field lines show?", "a": "Magnetic field strength/flux density."}, {"q": "How do you find the direction of the field lines around a current?", "a": "Using the right hand grip rule."}, {"q": "How is a field line or current running into the paper shown?", "a": "⊗"}, {"q": "How is a field line or current running out of the paper shown?", "a": ". in a circle"}, {"q": "For what reason does a current experience a force in a magnetic field?", "a": "The current's magnetic field interacts with the external one."}, {"q": "What is represented by the thumb in Fleming's Left Hand rule.", "a": "(Direction of) force"}, {"q": "What is represented by the first finger in Fleming's Left Hand rule.", "a": "(Direction of the) magnetic field"}, {"q": "What does the second finger represent in Fleming's LHR?", "a": "(Direction of) current"}, {"q": "When would you use Fleming's Left Hand Rule?", "a": "To find the direction of a current/moving charge in a magnetic field."}, {"q": "In what situation is F = BIL sinθ used?", "a": "To find the magnitude of force on a wire (carrying current) in a magnetic field."}, {"q": "In the equation F = BIL sinθ, what does θ stand for?", "a": "The angle between the current and the field direction."}, {"q": "Give the SI unit of flux density.", "a": "Tesla (T)"}, {"q": "Define a magnetic flux density.", "a": "The field strength that would cause a wire carrying a current of 1A perpendicular to the field to experience a force of 1N per m of length."}, {"q": "What experiment can be done to find flux density in the lab?", "a": "Set up a current carrying wire between the poles of a magnet on top of a top-pan balance."}, {"q": "What is F = Bqv used to calculate?", "a": "To find the force acting on a particle moving (at right angles) to a magnetic field?"}, {"q": "When would you use r = mv/BQ?", "a": "To find the radius of the path of a particle moving in a uniform magnetic field."}, {"q": "For what reason does a charged particle describe circular motion in a uniform magnetic field?", "a": "(There is a constant) force always acting at right angles to motion."}]}, {"name": "7.6 – Electromagnetic Induction", "cards": [{"q": "Define magnetic flux.", "a": "It is the total component of the magnetic flux density passing at right angles through a surface of area A OR ∅ = BA cosθ"}, {"q": "What is the SI unit for flux?", "a": "Wb (Weber)"}, {"q": "In the equation ∅ = BA cosθ, what does ∅ stand for?", "a": "Flux"}, {"q": "How are flux and flux linkage related?", "a": "Flux linkage is flux multiplied by the number of turns on the coil"}, {"q": "What does θ represent in ∅ = BA cosθ?", "a": "The angle between the flux/field and the normal/perpendicular to the surface."}, {"q": "How do you calculate flux linkage?", "a": "N∅ where N is the number of turns on the coil and ∅ is the flux passing through the coil."}, {"q": "How are flux and flux density related?", "a": "Flux density is the flux per unit area perpendicular to the field."}, {"q": "How is flux represented in a field line diagram?", "a": "The total number of field lines passing through the object/surface."}, {"q": "How is flux density represented in a field line diagram?", "a": "The spacing of field lines."}, {"q": "In what other units is Tesla commonly expressed?", "a": "Wbm⁻² (or Nm⁻¹A⁻¹)"}, {"q": "Give Faraday's law.", "a": "The magnitude of an induced EMF is directly proportional to the rate of change of flux linkage."}, {"q": "What does ε represent in ε = -∆(N∅)/∆t?", "a": "Induced EMF."}, {"q": "Which law is described by the proportionality ε α ∆(N∅)/∆t?", "a": "Faraday's Law (of electromagnetic induction)."}, {"q": "Write down Lenz's law.", "a": "The direction of an induced EMF or current is always in such a direction as to oppose the change that created it."}, {"q": "What principle leads to Lenz's law?", "a": "Conservation of energy."}, {"q": "For what reason is there a negative sign in the equation ε = -∆(N∅)/∆t?", "a": "It is due to Lenz's law OR conservation of energy."}, {"q": "What type of transformer has more turns on its primary coil?", "a": "A step down transformer."}, {"q": "What type of transformer has more turns on its secondary coil?", "a": "A step down transformer."}, {"q": "Write down two ways in which energy losses in transformers are reduced?", "a": "Low resistance primary and secondary windings/laminated core/soft iron core"}, {"q": "For what reason is a laminated core used in a transformer?", "a": "To reduce the heating effect of (induced) eddy currents."}, {"q": "How would you define a laminated core?", "a": "A core made up of layers that are separated by an insulator."}, {"q": "Define soft iron.", "a": "Iron that can be easily magnetised and demagnetised."}, {"q": "Define an eddy current in a transformer.", "a": "A current induced by the changing flux in the core."}]}]}]}, {"name": "OCR A A-Level Physics", "level": "A-Level", "topics": [{"name": "Module 2 — Foundations of Physics", "subtopics": [{"name": "2.1 Prefixes", "cards": [{"q": "What is the value of the prefix T (tera)", "a": "10¹²"}, {"q": "What is the value of the prefix G (giga)", "a": "10⁹"}, {"q": "What is the value of the prefix M (mega)", "a": "10⁶"}, {"q": "What is the value of the prefix k (kilo)", "a": "10³"}, {"q": "What is the value of the prefix d (deci)", "a": "10⁻¹"}, {"q": "What is the value of the prefix c (centi)", "a": "10⁻²"}, {"q": "What is the value of the prefix m (milli)", "a": "10⁻³"}, {"q": "What is the value of the prefix μ (micro)", "a": "10⁻⁶"}, {"q": "What is the value of the prefix n (nano)", "a": "10⁻⁹"}, {"q": "What is the value of the prefix p (pico)", "a": "10⁻¹²"}]}, {"name": "2.1-2.2 Quantities and units", "cards": [{"q": "What six base units of the SI system are used in A Level Physics?", "a": "metre, kilogram, second, Ampere, Kelvin, Mole"}, {"q": "What six base quantities of the SI system are used in A Level Physics?", "a": "length, mass, time, electric current, absolute temperature, amount of substance."}, {"q": "What is the base unit of mass?", "a": "kg"}, {"q": "What is the base unit of length?", "a": "m"}, {"q": "What is the base unit of time?", "a": "s"}, {"q": "What is the base unit of current?", "a": "A"}, {"q": "What is the base unit of absolute temperature?", "a": "K"}, {"q": "What is the Unit of potential difference?", "a": "V"}, {"q": "Give the units of density.", "a": "kgm⁻³"}, {"q": "State the SI unit of energy.", "a": "J"}, {"q": "State the SI unit of power.", "a": "W"}, {"q": "State the SI unit of charge.", "a": "C"}, {"q": "the volt is equivalent to which units?", "a": "JC⁻¹"}, {"q": "What base units are equivalent to the Newton?", "a": "kgms⁻²"}, {"q": "What base units are equivalent to the Joule?", "a": "kgm²s⁻²"}, {"q": "Which units are equivalent to the Pascal?", "a": "Nm⁻²"}, {"q": "State the units of momentum.", "a": "kgms⁻¹"}, {"q": "State the units of resistivity.", "a": "Ωm"}, {"q": "Which units are equivalent to a Watt?", "a": "Js⁻¹"}, {"q": "In what units is angular velocity (ω) measured?", "a": "rad. s⁻¹"}, {"q": "What is 1m² in mm²?", "a": "10⁶mm²"}, {"q": "What is 1m³ in cm³?", "a": "10⁶cm³"}, {"q": "What is 1km² in m²?", "a": "1x10⁶m²"}, {"q": "What is 1cm³ in mm³?", "a": "10³mm³"}, {"q": "There are 10²⁴ free charge carriers per m³ of a material. How many are there per mm³?", "a": "10¹⁵"}, {"q": "10⁶ particles strike each mm² of a surface per second. How many strike 1m² of the surface per second?", "a": "10¹²"}, {"q": "If there is 1 particle per mm³, how many are there per m³?", "a": "10⁹"}, {"q": "Water has a density of 1000kgm⁻³. What is this in kgcm⁻³?", "a": "10⁻³"}, {"q": "Water has a density of 1000kgm⁻³. What is this in gcm⁻³?", "a": "1"}]}, {"name": "1 Measurements, errors and uncertainties", "cards": [{"q": "How would you define a control variable?", "a": "Something that must be kept constant to prevent it affecting the dependent variable"}, {"q": "Define the repeatability of results.", "a": "Similar results would be obtained from repeats of the same measurement from the same experimental set up."}, {"q": "What is meant by the reproducibility of results", "a": "Similar results would be obtained from repeats by different people with different equipment."}, {"q": "How can you ensure a metre rule is held vertically?", "a": "Use a plumb line, set square or spirit level"}, {"q": "How do you avoid parallax error?", "a": "Ensure eye, object and scale are all in line with each other OR ensure object and scale are directly adjacent to each other"}, {"q": "What does the term the term random error mean?", "a": "Errors that cause the measurement to vary in unpredictable ways."}, {"q": "How would you define a systematic error?", "a": "An error that causes the measurements to differ from the true value by a consistent amount."}, {"q": "How would you define a zero error?", "a": "An error that occurs due to the measuring instrument reading a non-zero reading when the measured quantity is zero."}, {"q": "Define the accuracy of a result.", "a": "How close a measurement is to the 'true' or accepted value"}, {"q": "What does the term the precision of results mean?", "a": "How close repeated measurements are to each other."}, {"q": "Define the resolution of a measuring instrument.", "a": "The smallest change in quantity that can be measured."}, {"q": "What determines the resolution when using a multimeter?", "a": "The scale selected."}, {"q": "What is the resolution of a metre rule?", "a": "1mm"}, {"q": "What is the resolution of vernier calipers?", "a": "0.1mm"}, {"q": "What is the resolution of a micrometer", "a": "0.01mm"}, {"q": "How do you find the absolute uncertainty from repeated readings?", "a": "± ½ the range of the repeats"}, {"q": "How do you estimate uncertainty when repeated results are identical?", "a": "± ½ the resolution of the instrument"}, {"q": "How do you calculate percentage uncertainty?", "a": "(Absolute uncertainty ÷ 'calculated OR measured' value) × 100"}, {"q": "What do you do to the uncertainties when quantities are added or subtracted?", "a": "The absolute uncertainties are added together"}, {"q": "What do you do to the uncertainties when quantities are multiplied or divided?", "a": "The percentage uncertainties are added together"}, {"q": "What do you do to the uncertainties when a quantity is raised to a power?", "a": "The percentage uncertainty is multiplied by that power"}, {"q": "How do you find the uncertainty in a gradient?", "a": "± (gradient of the line of best fit − gradient of the line of worst fit)"}, {"q": "Define a line of worst fit.", "a": "The steepest or shallowest line that passes through the error bars."}, {"q": "What are error bars?", "a": "Lines to show the range of the absolute uncertainty of each data point on a graph"}, {"q": "How do you find uncertainty in a y-intercept?", "a": "± (y-intercept of the line of best fit − y-intercept of the line of worst fit)"}]}]}, {"name": "Module 3 — Forces and Motion", "subtopics": [{"name": "2.3-2.6 & 3.1-3.4 Describing Motion", "cards": [{"q": "How would you define a scalar quantity?", "a": "A quantity with magnitude but no direction."}, {"q": "Define a vector quantity.", "a": "A quantity with magnitude and direction."}, {"q": "When adding two perpendicular vectors what can you use to find the direction of the resultant?", "a": "Trigonometry"}, {"q": "When adding two perpendicular vectors what can you use to find the magnitude of the resultant?", "a": "Pythagoras' Theorem"}, {"q": "What is meant by vector resolution?", "a": "The process of splitting a vector into two perpendicular components."}, {"q": "How would you define a resultant vector?", "a": "The sum of two or more individual vectors."}, {"q": "How is the resultant found in a vector diagram when adding several vectors together?", "a": "Join the vectors nose to tail and the resultant is from the tail of the first to the nose of the last vector."}, {"q": "How would you define displacement?", "a": "The distance of an object from a point in a specific direction (vector)"}, {"q": "How would you define velocity?", "a": "Rate of change of displacement (vector) ∆s/∆t if constant"}, {"q": "What is meant by speed?", "a": "Change in distance traveled per unit time (scalar)"}, {"q": "Define acceleration.", "a": "Rate of change of velocity (vector) ∆v/∆t if constant"}, {"q": "In what units is acceleration measured?", "a": "ms⁻²"}, {"q": "Define constant velocity.", "a": "Speed and direction of motion don't change"}, {"q": "What is shown by the gradient of a distance-time graph?", "a": "Speed"}, {"q": "What does the gradient of a displacement-time graph represent?", "a": "Velocity"}, {"q": "What is shown by the gradient of a velocity-time graph?", "a": "Acceleration"}, {"q": "What does the area under a velocity-time graph represent?", "a": "Change in displacement"}, {"q": "What does the area under an acceleration-time graph represent?", "a": "Change in velocity"}]}, {"name": "3.5-3.8 Modelling Motion", "cards": [{"q": "When can the suvat equations by used?", "a": "When there is constant acceleration and motion along a straight line."}, {"q": "What is the effect of mass on the acceleration for an object in free-fall?", "a": "None"}, {"q": "How are displacement and time for an object falling freely from rest related?", "a": "Displacement is proportional to time squared (sαt²)"}, {"q": "What is a projectile", "a": "An object acted upon only by the force of gravity"}, {"q": "What shape is the path of a projectile?", "a": "Parabolic"}, {"q": "What is the initial vertical velocity of an object projected horizontally?", "a": "Zero"}, {"q": "What angle of projection that results in maximum range", "a": "45°"}, {"q": "Ignoring air resistance what is the acceleration of a projectile?", "a": "Always g downwards"}, {"q": "How does horizontal velocity vary in projectile motion?", "a": "It is constant"}, {"q": "How do the initial and final velocities compare if a projectile returns to its starting height?", "a": "They have the same magnitude but opposite direction/sign."}, {"q": "What equation used for the horizontal component of projectile motion?", "a": "Displacement = Velocity x time (since horizontal velocity is constant)"}, {"q": "What aspect links the vertical and horizontal motion of a projectile", "a": "Time taken to fall"}, {"q": "Why can SUVAT equations can be used for the vertical component of projectile motion", "a": "Since the motion is in a single direction with a constant acceleration"}, {"q": "What is the vertical velocity at the peak of projectile motion?", "a": "Zero"}]}, {"name": "4.1 – 4.4 Forces in Action", "cards": [{"q": "What is the centre of mass of an object?", "a": "The point at which the weight can be assumed to act."}, {"q": "What does the weight of an object depend on?", "a": "It's mass and the gravitational field strength (W=mg)"}, {"q": "How would you define a free-body diagram?", "a": "It is a diagram showing the set of forces acting on a single object."}, {"q": "What is meant by weight?", "a": "The force due to gravity that acts through an objects centre of mass."}, {"q": "How would you define friction?", "a": "The force that acts between two surfaces in contact to oppose motion."}, {"q": "What is meant by drag?", "a": "The resistive force that acts on an object moving through a fluid"}, {"q": "Define tension.", "a": "The force within a stretched object such as a cable or rope."}, {"q": "How would you define upthrust?", "a": "The upward buoyant force that acts on an object in a fluid."}, {"q": "What is meant by a normal contact force?", "a": "A force that acts perpendicular to a surface when an object rests on it."}, {"q": "How do you calculate the component of weight down a slope?", "a": "W sin (θ) where θ is the angle between the slope and horizontal."}, {"q": "How do you calculate the component of weight acting perpendicular to a slope?", "a": "W cos (θ) where θ is the angle between the slope and horizontal."}, {"q": "What are the key factors in determining the magnitude of drag force acting on an object in a fluid?", "a": "Speed and cross-sectional area"}, {"q": "What is meant by terminal velocity?", "a": "The maximum speed reached by a falling object when drag and weight are equal."}]}, {"name": "4.5-4.8 Moments, pressure and upthrust", "cards": [{"q": "How would you define a moment?", "a": "The turning effect produced by a force."}, {"q": "What units do moments have?", "a": "Nm"}, {"q": "How do you calculate a moment about a point?", "a": "Force x perpendicular distance to the line of action of the force"}, {"q": "What does the term a body being in equilibrium mean?", "a": "The net force and the net moment acting on the body are both zero."}, {"q": "What is the principle of moments?", "a": "For an object in rotational equilibrium the sum of the clockwise moments about any point is equal to the sum of anticlockwise moments about that point."}, {"q": "How would you define a couple?", "a": "A pair of equal and opposite forces acting on an object with different lines of action."}, {"q": "How do you calculate the moment of a couple?", "a": "Force x perpendicular distance between the lines of action of the forces."}, {"q": "What is meant by a triangle of forces?", "a": "A vector diagram of the three forces acting on an object in equilibrium."}, {"q": "Define a resultant/net force.", "a": "The vector sum of forces acting on an object"}, {"q": "What is the density of a substance?", "a": "mass per unit volume."}, {"q": "Give the units of density.", "a": "kgm⁻³"}, {"q": "How would you define pressure?", "a": "Normal force acting per unit area"}, {"q": "What is Archimedes principle?", "a": "The upthrust exerted on an object is equal to the weight of fluid displaced"}, {"q": "What is p in the equation p = hρg", "a": "Pressure exerted by a fluid"}, {"q": "What is ρ in the equation p = hρg", "a": "Density of the fluid"}, {"q": "What is h in the equation p = hρg", "a": "Depth of the fluid"}]}, {"name": "5.1-5.4 Work, Energy and Power", "cards": [{"q": "How would you define work done equivalent to?", "a": "Energy Transferred"}, {"q": "What are the SI base units equivalent to the Joule?", "a": "kgm²s⁻²"}, {"q": "How would you work out work done?", "a": "W = F x cosΘ (distance moved x component of the force in the direction of motion)"}, {"q": "What is Θ in W = F x cosΘ?", "a": "The angle between the force and motion."}, {"q": "What is meant by energy?", "a": "The capacity of one object or system to do work (or cause a change) on another."}, {"q": "What is shown by the area under a force-distance graph?", "a": "Work done."}, {"q": "What is the principle of conservation of energy?", "a": "The energy of a closed system always remains constant. Energy can never be created or destroyed, only transferred."}, {"q": "What form of energy is due to the motion of a mass?", "a": "kinetic energy"}, {"q": "What form of energy is due to the position of a mass in a gravitational field?", "a": "gravitational potential energy"}, {"q": "What form of energy is due to the bonds between atoms in a substance?", "a": "chemical energy"}, {"q": "What form of energy is due to a reversible change in shape of an object?", "a": "elastic potential energy"}, {"q": "What form of energy is due to the position of a charge in an electric field?", "a": "electrical potential energy"}, {"q": "What form of energy is due to the forces between protons and neutrons in an atom?", "a": "nuclear energy"}, {"q": "What form of energy is due to electromagnetic waves?", "a": "Radiant energy"}, {"q": "What form of energy is due to the mechanical wave motion of atoms?", "a": "Sound energy"}, {"q": "What form of energy is due to randomly distributed potential and kinetic energies of the atoms within a system?", "a": "Thermal energy"}, {"q": "What effect does friction have on the energy of a moving object?", "a": "Transfers kinetic energy primarily to thermal energy"}, {"q": "Describe the energy transformations for an object sliding downhill at constant speed.", "a": "Gravitational potential energy decreases at the same rate as work is done by friction."}, {"q": "Describe the energy transformations for a vehicle travelling uphill at constant speed.", "a": "Work is being done by the driving force and the is equal to the gain in gravitational potential energy plus work done by friction"}, {"q": "What is meant by power?", "a": "Power is the rate at which work is done P = W/t"}, {"q": "What is the derived unit of Power?", "a": "Watt (W)"}, {"q": "What are the equivalent SI base units of the Watt?", "a": "kgm²s⁻³"}, {"q": "What is the equation P = Fv used for?", "a": "The power developed by an object moving at constant speed against a constant resistive force."}, {"q": "How do you calculate % efficiency?", "a": "(Useful output energy/total input energy) x 100"}]}, {"name": "6.1-6.4 Materials", "cards": [{"q": "Define a tensile force.", "a": "A force produces an extension of the object."}, {"q": "What is meant by a compressive force?", "a": "A force that reduces the length of an object."}, {"q": "What is Hooke's Law?", "a": "Force is proportional to extension so long as the elastic limit is not exceeded."}, {"q": "What is meant by elastic deformation?", "a": "When an object will return to its original shape when the load is removed."}, {"q": "How would you define plastic deformation?", "a": "A permanent change in shape that remains once the load is removed."}, {"q": "What is k in F = kx", "a": "The force constant."}, {"q": "What are the units of force constant (k)", "a": "Nm⁻¹"}, {"q": "What is shown by the area under a force-extension graph?", "a": "The work done stretching the object."}, {"q": "What does the term an elastic material mean?", "a": "A material which can be significantly deformed and will return to it's original shape."}, {"q": "Define tensile stress.", "a": "The force applied per unit cross sectional area."}, {"q": "Define tensile strain.", "a": "The fractional change in length of an object."}, {"q": "How would you define a ductile material?", "a": "A material which ccan be drawn into a wire of hammered into thin sheets."}, {"q": "What is the limit of proportionality of a material?", "a": "The point at which a material stops obeying Hooke's Law"}, {"q": "What is the elastic limit of a material?", "a": "The point at which a material starts to plastically deform."}, {"q": "What is the yield point of a material?", "a": "The point at which the material starts to extend rapidly as stress increases."}, {"q": "What is the ultimate tensile strength of a material?", "a": "The maximum stress a material can withstand before breaking."}, {"q": "What is the breaking strength of a material?", "a": "The stress at the point of fracture."}, {"q": "Define a strong material.", "a": "One with a high ultimate tensile strength."}, {"q": "In what units is Young Modulus measured?", "a": "Pa OR Nm⁻²"}, {"q": "When does the Young Modulus apply to a material?", "a": "When stress is proportional to strain OR when it is obeying Hooke's law"}, {"q": "How do you find the Young Modulus from a stress-strain graph?", "a": "The gradient of the initial straight line region."}, {"q": "What material property does Young Modulus measure?", "a": "The stiffness."}, {"q": "How would you define a brittle material?", "a": "A material the show only elastic behaviour up to its breaking point, without plastically deforming."}, {"q": "What is meant by a polymeric material?", "a": "A material made from long chain molecules."}]}, {"name": "7.1-7.4 Newton's Laws and Momentum", "cards": [{"q": "What is Newton's 1st Law of motion?", "a": "An object will remain at rest of move at a constant velocity unless acted upon by a resultant force"}, {"q": "What is Newton's 3rd Law of motion?", "a": "When two objects interact they exert forces on each other that are equal in magnitude, opposite in direction and of the same type of force."}, {"q": "What is Newton's 2nd Law of motion?", "a": "Resultant force acting on an object is proportional to its rate of change of momentum, and is in the same direction."}, {"q": "What two sets of units can be used for momentum?", "a": "Ns OR kgms⁻¹"}, {"q": "How do you calculate the momentum of an object?", "a": "Mass × velocity (p=mv)"}, {"q": "What is the principle of conservation of momentum?", "a": "The total momentum in a system of interacting objects is constant provided no external force acts."}, {"q": "What is meant by an elastic collision?", "a": "A collision in which kinetic energy is conserved"}, {"q": "Define an inelastic collision.", "a": "A collision in which some kinetic energy is transferred to other forms"}, {"q": "How would you work out impulse?", "a": "Force × time"}, {"q": "How are impulse and momentum related?", "a": "Impulse is equal to change in momentum."}, {"q": "What is represented by the area under a force time graph", "a": "Impulse"}, {"q": "Define reprsented by the gradient of a momentum-time graph.", "a": "Resultant force"}, {"q": "What is the change in momentum when an object of momentum p collides elastically at right angles with a wall?", "a": "-2p"}, {"q": "When can F=ma be used?", "a": "When an object has constant mass."}]}]}, {"name": "Module 4 — Electrons, Waves and Photons", "subtopics": [{"name": "8.1-8.4 Charge and Current", "cards": [{"q": "How would you define a charge carrier?", "a": "A charged particle capable of transferring electric current."}, {"q": "What do we mean when we say charge is quantised?", "a": "It can only take certain values (always ne)"}, {"q": "If n electrons are removed from a neutral object what is its charge?", "a": "ne"}, {"q": "What is meant by an electrolyte?", "a": "A liquid containing charged ions."}, {"q": "Define a metallic conductor.", "a": "A material comprising a lattice of positive ions and delocalised electrons that carry electrical current"}, {"q": "In which direction does conventional current flow?", "a": "From positive to negative."}, {"q": "In which direction do electrons flow in a circuit?", "a": "From negative to positive."}, {"q": "How would you define an ion?", "a": "A non-neutral atom or molecule."}, {"q": "Define a cation.", "a": "A positively charged ion"}, {"q": "What is meant by an anion?", "a": "A negatively charged ion."}, {"q": "Define an anode.", "a": "A positive electrode."}, {"q": "How would you define a cathode?", "a": "A negative electrode."}, {"q": "How is an ammeter connected?", "a": "In series"}, {"q": "What is the resistance of an ideal ammeter?", "a": "Zero."}, {"q": "Give Kirchoff's first law.", "a": "At any point in a circuit the sum of the currents entering that point is equal to sum of the currents leaving."}, {"q": "What is n in the equation I = nAve and what are its units?", "a": "Number density of free charge carriers m⁻³"}, {"q": "Define A in the equation I = nAve.", "a": "Cross-sectional area of the conductor."}, {"q": "What is e in the equation I = nAve?", "a": "The elementary charge (1.6x10⁻¹⁹C)"}, {"q": "What is v in the equation I = nAve?", "a": "The drift velocity of the charge carriers."}, {"q": "How would you define a conductor?", "a": "A material with a large number density of charge carriers ~10²⁸m⁻³"}, {"q": "Define an insulator.", "a": "A material with a low number density of charge carriers."}, {"q": "Define a semiconductor.", "a": "A material with an intermediate number density of charge carriers ~10¹⁷m⁻³"}]}, {"name": "9.1-9.11 Energy, Power and Resistance 1", "cards": [{"q": "Define potential difference.", "a": "The work done per unit charge between two points"}, {"q": "What is the SI unit for potential difference?", "a": "Volt (V)"}, {"q": "the volt is equivalent to which units?", "a": "Joules per Coulomb (JC⁻¹ )"}, {"q": "What is EMF (Electromotive force)?", "a": "The work done per unit charge supplied to the charge carriers"}, {"q": "How is a voltmeter connected?", "a": "In parallel."}, {"q": "What is the resistance of an ideal voltmeter?", "a": "Infinite."}, {"q": "How would you define thermionic emission?", "a": "The emission of electrons from the surface of a heated metal."}, {"q": "What is the work done on an electron when it passes through a p.d. of V volts?", "a": "eV where e is the charge on the electron."}, {"q": "What is Ohm's Law?", "a": "For a metallic conductor at constant temperature the p.d. is proportional to current."}, {"q": "What is meant by electrical resistance?", "a": "The opposition of an object to a flow of current through it."}, {"q": "How would you work out resistance?", "a": "V/I"}, {"q": "an Ohm is equivalent to which units?", "a": "VA⁻¹"}, {"q": "For what reason does resistance increases with temperature?", "a": "The amplitude of lattice ion vibrations increases causing more frequent collisions between electrons and lattice ions, leading to the electrons doing more work as they move through the wire."}, {"q": "For what reason does current flow lead to heating in components?", "a": "Electrons collide with the lattice ions and transfer some of their kinetic energy to the lattice ion's vibrations."}, {"q": "Define an Ohmic conductor.", "a": "An object for which p.d. is proportional to current."}, {"q": "What does the term the threshold pd of a diode mean?", "a": "The pd at which resistance starts to fall rapidly as pd increases."}]}, {"name": "9.7-9.11 Energy, Power and Resistance 2", "cards": [{"q": "State the units of resistivity.", "a": "Ωm"}, {"q": "What is ρ in R = ρL / A?", "a": "The resitivity of the material."}, {"q": "What is L in R = ρL / A?", "a": "The length of the wire."}, {"q": "What is meant by A in R = ρL / A?", "a": "The cross-sectional area of the wire"}, {"q": "As a metal gets hotter what happens to its resitivity?", "a": "It increases."}, {"q": "Give the meaning of a negative temperature coefficient component.", "a": "One in which the resistance drops as temperature increases."}, {"q": "For what reason does resistance of a thermistor fall as temperature increases?", "a": "The number density of charge carriers increases."}, {"q": "What are thermistors commonly used in?", "a": "Temperature sensors."}, {"q": "For what reason does the resistance of an LDR as light intensity changes?", "a": "Light increases the number density of charge carriers in the LDR."}, {"q": "What are LDRs commonly used in?", "a": "Light intensity sensors."}, {"q": "What happens to the resistance of an LDR as light intensity increases?", "a": "It decreases."}, {"q": "How would you define a kilowatt-hour (kWh)?", "a": "The energy supplied when 1kW of power is supplied for 1 hour."}, {"q": "How many Joules are equavlent to a kWh", "a": "3.6MJ"}]}, {"name": "10.1 – 10.6 – Electric circuits", "cards": [{"q": "Give Kirchoff's second law.", "a": "Sum of the EMFs is equal to the sum of the potential drops around a closed circuit loop."}, {"q": "What law is Kirchoff's second law a consequence of?", "a": "Conservation of Energy"}, {"q": "What can we say about the current through components in series?", "a": "Same for each component"}, {"q": "What can we say about the current on different parallel branches?", "a": "It depends on the resistance of each branch."}, {"q": "What can we say about the pd across parallel branches in a circuit?", "a": "It is the same for each branch"}, {"q": "How do you find the total pd across several components in series?", "a": "It is equal to the sum of the pds across each component"}, {"q": "How do you find the total EMF from cells connected in series with the same polarity?", "a": "Their EMFs are added"}, {"q": "How do you find the total EMF from cells connected in series with opposite polarity?", "a": "The total EMF is the difference between their EMFs"}, {"q": "How do you calculate the total resistance of resistors in series?", "a": "Sum of the individual resistances"}, {"q": "What is the total resistance of n identical resistors in series?", "a": "n x R"}, {"q": "What is the total resistance of n identical resistors in parallel?", "a": "R ÷ n"}, {"q": "How do you calculate the resistance of resistors in parallel?", "a": "1/RT=1/R1+1/R2..."}, {"q": "How does the total resistance change when a resistor is added in series?", "a": "It always increases"}, {"q": "How does the total resistance change when a resistor is added in parallel?", "a": "It always decreases"}, {"q": "What is the effect of connecting two identical resistors in parallel?", "a": "Resistance is halved"}, {"q": "What is the effect of connecting two identical resistors in series?", "a": "Resistance is doubled"}, {"q": "Define internal resistance.", "a": "The opposition to current created by the charge carriers having to flow through the source of EMF"}, {"q": "What are the lost volts for a power supply?", "a": "The pd dropped across the internal resistance OR the difference between the EMF and the terminal pd."}, {"q": "What happens to the terminal pd of a source as the current supplied increases?", "a": "It falls due to the increasing lost volts to the internal resistance."}, {"q": "How do you calculate lost volts for a supply?", "a": "Ir where r is the internal resistance."}, {"q": "How are EMF, terminal pd and lost volts related?", "a": "EMF = terminal pd + lost volts"}, {"q": "How do you find the internal resistance from a graph or terminal pd against current?", "a": "-gradient"}, {"q": "How do you find the EMF from a graph or terminal pd against current?", "a": "y-intercept"}, {"q": "What is meant by a potential divider?", "a": "Two or resitances in series with a fixed source of EMF."}, {"q": "What determines the ratio of the pd across the resistors in a potential divider?", "a": "It is equal to the ratio of their resistances."}, {"q": "How can a light sensor be made?", "a": "By creating a potential divider containing an LDR."}, {"q": "How can a temperature sensor be made?", "a": "By creating a potential divider containing a thermistor."}, {"q": "What component can be used to supply an adjustable output pd?", "a": "A potentiometer."}]}, {"name": "11.1 – 11.5 Waves – Key Properties", "cards": [{"q": "How would you define a progressive wave?", "a": "A progressive wave that transfers energy through space."}, {"q": "How would you define a transverse wave?", "a": "A wave in which the oscillations are perpendicular to the direction of wave propagation"}, {"q": "What is meant by a longitudinal wave?", "a": "A wave in which the oscillations are parallel to the direction of wave propagation"}, {"q": "State an example of a longitudinal wave.", "a": "Sound, primary seismic waves"}, {"q": "State an example of a transverse waves.", "a": "Waves on a stretched string, secondary seismic waves, electromagnetic radiation"}, {"q": "What are the regions of high pressure in a longitudinal wave called?", "a": "Compressions"}, {"q": "What are the regions of low pressure in a longitudinal wave called?", "a": "Rarefactions"}, {"q": "What is the displacement of a wave?", "a": "The distance of a particle in the medium from it's equilibrium position in a particular direction."}, {"q": "What is the equilibrium position in wave motion?", "a": "The position of the medium when undisturbed by a wave."}, {"q": "What is the amplitude of a wave?", "a": "Maximum displacement of the medium from the equilibrium position."}, {"q": "What is the frequency of a wave?", "a": "The number of wave cycles per second OR the number of waves passing a point per unit time"}, {"q": "What is the time period of a wave?", "a": "Time taken for one complete oscillation OR time for a whole wavelength to pass a fixed point."}, {"q": "How are frequency and time period related?", "a": "f = 1/T or inverse proportionality"}, {"q": "How many radians of phase are there in one complete wave cycle?", "a": "2π rad"}, {"q": "What term describes a phase difference of zero between two points on a wave?", "a": "In phase"}, {"q": "What term describes a phase difference of pi radians between two points on a wave?", "a": "In antiphase"}, {"q": "What is the phase difference between points half a wavelngth apart?", "a": "180 degrees OR π rad"}, {"q": "What is the phase difference between points quarter of a wavelngth apart?", "a": "90 degrees OR π/2 rad"}, {"q": "What is meant by an oscillation?", "a": "A displacement one way and then the other about an equilibrium position."}, {"q": "How would you define diffraction?", "a": "The spreading out of waves after passing through a slit/around an obstacle."}, {"q": "What effect does reducing the size of a single slit have on diffraction?", "a": "Diffracted waves spread out more"}, {"q": "What is the effect of decreasing the wavelength on diffraction?", "a": "Diffracted waves spread out less"}, {"q": "What does the term the intensity of a wave mean?", "a": "Intensity is the energy delivered by the wave per second per square metre normal to the wave"}, {"q": "How is the intensity of a wave related to the amplitude?", "a": "Intensity is proportional to amplitude squared."}, {"q": "How does intensity change as distance from a point source of waves changes?", "a": "Inverse square law or I = P / 4πr²"}, {"q": "What is a mechanical wave", "a": "A wave that requires a medium."}]}, {"name": "11.6 – 11.9 EM Spectrum, Polarisation and Refraction", "cards": [{"q": "What is the difference between mechanical waves and electromagentic waves?", "a": "EM waves don't require a medium."}, {"q": "Define an electromagneitc wave.", "a": "An oscillation of the electric and magentic fields at right angles to each other."}, {"q": "What is the speed of all EM waves in a vacuum/air?", "a": "3x10⁸ms⁻¹"}, {"q": "List the regions of the EM spectrum in order of incresasing wavelength.", "a": "Radio waves, Microwaves, Infrared, Visible Light, Ultraviolet, X-rays, Gamma rays"}, {"q": "Which two regions of the EM spectrum overlap?", "a": "X-rays and gamma rays."}, {"q": "Give the range of wavelengths (in powers of 10) of radio waves.", "a": ">10⁻¹"}, {"q": "Write down the range of wavelengths (in powers of 10) of microwaves.", "a": "10⁻¹ - 10⁻³"}, {"q": "Write down the range of wavelengths (in powers of 10) of infrared.", "a": "10⁻³ - 10⁻⁶"}, {"q": "Write down the range of wavelengths of visible light.", "a": "7x10⁻⁷ - 4x10⁻⁷"}, {"q": "Give the range of wavelengths (in powers of 10) of ultraviolet.", "a": "10⁻⁷ - 10⁻⁸"}, {"q": "Write down the range of wavelengths (in powers of 10) of X-rays.", "a": "10⁻⁸ - 10⁻¹³"}, {"q": "Give the range of wavelengths (in powers of 10) of gamma rays.", "a": "<10⁻¹⁰"}, {"q": "Why can't longitudinal waves be polarised?", "a": "Longitudinal waves already only have a single driection of oscillation."}, {"q": "What is the effect of a polarising filter?", "a": "It only transmits the component of the oscillations parallel to the filter"}, {"q": "What is the effect of perpendicular polarising filters", "a": "No light is transmitted"}, {"q": "State a use of polarising filters.", "a": "LCD screens, 3D TV, polarimetry in manufacturing, anti-glare sunglasses"}, {"q": "What effect does reflection have on the polarisation of light?", "a": "Reflected light is partially polarised in the plane of the surface."}, {"q": "What effect does scattering light have on polarisation?", "a": "Scattered light is polarised"}, {"q": "Which wave property always remains constant when a wave travels from one medium to another?", "a": "Frequency"}, {"q": "When entering a material with a higher refractive index what happens to wave speed?", "a": "decreases"}, {"q": "When entering a material with a lower refractive index what happens to wavelength?", "a": "increases"}, {"q": "What is the definition of the refractive index of a material", "a": "Speed of light in a vacuum/Speed of light in material"}, {"q": "What are the angles of incidence and refraction measured relative to?", "a": "The normal to the boundary"}, {"q": "Which way do waves refract when entering a material with a higher refractive index?", "a": "Toward the normal"}, {"q": "Which way do waves refract when entering a material with a lower refractive index?", "a": "Away from the normal"}, {"q": "What is the angle of refraction at the critical angle?", "a": "Ninety degrees"}, {"q": "What are the conditions required for total internal reflection?", "a": "Wave must be travelling in a material with a higher index and meeting a boundary with a material of lower refractive index.The angle of incidence must be greater than the critical angle."}]}, {"name": "12.1 – 12.3 – Superposition and Interference", "cards": [{"q": "What two phenomena occur when a wave goes from a higher to a lower refractive index at an angle of incidence less than the critical angle?", "a": "The ray is refracted and partially reflected."}, {"q": "What is the principle of superposition", "a": "When two waves meet at a point the resultant displacement is the (vector) sum of the displacements of the individual waves."}, {"q": "Define constructive interference.", "a": "When two waves superpose in phase causing an increase amplitude."}, {"q": "Define destructive interference.", "a": "When two waves superpose in antiphase causing a decreased amplitude."}, {"q": "What are coherent sources of waves?", "a": "Sources that emit waves with a constant phase difference (and the same frequency)."}, {"q": "What is meant by an interference pattern?", "a": "A pattern of regions of constructive and destructive interference produced by coherent sources of waves."}, {"q": "What path difference is required for waves to be in phase?", "a": "A whole number of wavelengths"}, {"q": "What path difference is required for waves to be in antiphase?", "a": "An odd number of half wavelengths"}, {"q": "Describe the relationship between path difference and phase difference for coherent sources.", "a": "(Path difference/wavelength) x 2π"}, {"q": "What term describes a phase difference of zero between two waves?", "a": "In phase"}, {"q": "What term describes a phase difference of π radians between two waves?", "a": "In antiphase"}, {"q": "What is x in the double slit equation (λ = ax/D)?", "a": "Fringe separation"}, {"q": "What is D in the double slit equation (λ = ax/D)?", "a": "Distance between the double slits and the screen"}, {"q": "What is meant by a in the double slit equation (λ = ax/D)?", "a": "Distance between the double slits"}, {"q": "What occurs to cause a dark fringe in the double slit experiment?", "a": "Destructive interference of the light from each slit"}, {"q": "What occurs to cause a bright fringe in the double slit experiment?", "a": "Constructive interference of the light from each slit"}, {"q": "What did Young's double slit experiment demonstrate about the nature of light?", "a": "That light exhibits wave behaviour."}, {"q": "What name is given to light of a single frequency/wavelength?", "a": "Monochromatic"}, {"q": "For what reason did Young place a single slit before the double slit?", "a": "To ensure the light from each of the double slits was in phase."}]}, {"name": "12.4- 12.6 Stationary Waves and Harmonics", "cards": [{"q": "What are the condition required for a stationary wave to form?", "a": "Two waves travelling/propagating in opposite directions superpose with the same frequency and similar amplitudes"}, {"q": "How would you define an antinode on a stationary wave?", "a": "A point where the progressive waves are in phase and constructively interfering resulting in maximum amplitude"}, {"q": "Define an node on a stationary wave.", "a": "A point where the progressive waves are in antiphase and are destructively interfering resulting in minimum amplitude"}, {"q": "How many wavelengths are there between adjacent nodes of a standing wave?", "a": "Half a wavelength"}, {"q": "What is the phase difference between points either side of a node in a standing wave?", "a": "Pi Rad/180 degrees"}, {"q": "What is the phase difference of points that are between two adjacent nodes of a standing wave?", "a": "Zero"}, {"q": "How does phase vary along a progressive wave?", "a": "Changes continuously across each wave cycle."}, {"q": "How does amplitude vary in a stationary wave?", "a": "It varies continuously along the wave. It is a maximum at antinodes and a minimum at nodes."}, {"q": "How does amplitude vary in a progressive wave?", "a": "It is the same at every point along the wave."}, {"q": "What type of wave doesn't tranfer energy?", "a": "Stationary waves"}, {"q": "What is the fundamental frequency of a string?", "a": "The lowest frequency which produces a stationary wave on the string."}, {"q": "What factors determine the fundamental frequency on a string", "a": "Length, tension and the thickness of the string."}, {"q": "What determines the pitch produced by a stationary wave in a musical instrument?", "a": "The frequency of the 1st harmonic"}, {"q": "What determines the loudness of sound?", "a": "The amplitude of the sound wave"}, {"q": "For what reason can only certain frequency stationary waves be produced on a stretched string?", "a": "There must be nodes at the fixed ends and only certain frequencies/wavelengths allow this."}, {"q": "What feature of a stationary wave is always formed at an open end of a tube?", "a": "(Displacement) Antinode"}, {"q": "What feature of a stationary wave is always formed at a closed end of a tube?", "a": "(Displacement) Node"}]}, {"name": "13.1 & 13.4 Photons and Wave-particle Duality", "cards": [{"q": "What determines the energy of a photon?", "a": "The frequency/wavelength"}, {"q": "Define a photon.", "a": "A quantum of energy of electromagnetic radiation"}, {"q": "How do you calculate the energy of a photon?", "a": "E = hf OR E =hc/λ"}, {"q": "What is meant by an electron volt?", "a": "The energy gained or lost by an electron passing through a potential difference of 1V"}, {"q": "How do convert from eV to J?", "a": "multiply by 1.6x10^-19"}, {"q": "How do convert from J to eV?", "a": "divide by 1.6x10^-19"}, {"q": "What is the threshold p.d. of an LED?", "a": "The minimum potential difference required for the LED to produce light."}, {"q": "How can the threshold p.d. of an LED be used to find photon energy?", "a": "The energy transferred by the electrons (e x V) is equal to the energy of the photons produced (hf)."}, {"q": "Define wave particle duality.", "a": "It describes how all matter can display both wave and particle properties."}, {"q": "What is the key piece of evidence for wave particle duality?", "a": "When an electron beam passes through polycrystaline graphite it produces a diffraction and interference pattern pattern."}, {"q": "What does the De Broglie wave equation apply to?", "a": "Everything"}, {"q": "How are momentum and wavelength related?", "a": "Inverse proportionality"}]}, {"name": "13.2-13.3 The Photoelectric Effect", "cards": [{"q": "What is the photoelectric effect?", "a": "The emission of electrons from a metal surface when illuminated with light."}, {"q": "What is the atomic structure of a metal?", "a": "A lattice of positive ions surrounded by a sea of free electrons."}, {"q": "Define a photoelectron.", "a": "An electron that has been removed from a metal by absorbing a photon"}, {"q": "What is the work function?", "a": "The minimum energy required to remove an electron from the surface of a metal"}, {"q": "What is the threshold frequency?", "a": "The minimum frequency of light required to produce photoelectrons from a metal"}, {"q": "What is monochromatic light", "a": "Light of a single frequency/wavelength"}, {"q": "Describe the relationship between work function and threshold frequency.", "a": "∅ = hf₀"}, {"q": "What is required for a photon to be able to produce photoelectrons?", "a": "Its frequency is greater than the threshold frequency"}, {"q": "Why can't light sources below the threshold frequency produce photoelectrons?", "a": "The photon energy is less than the work function"}, {"q": "How do photons and electrons interact?", "a": "A single photon can be absorbed/emitted by a single electron which gains/loses the energy of the photon."}, {"q": "What is the effect on an electron of absorbing a photon?", "a": "The electron gains the energy of the photon"}, {"q": "What effect does increasing the frequency of a monochromatic light source have on photoelectrons produced?", "a": "Photoelectrons will have a greater maximum kinetic energy"}, {"q": "What is the effect of increasing the intensity of a monochromatic light source on photoelectrons produced?", "a": "More photoelectrons will be produced but they will have the same maximum kinetic energy"}, {"q": "For what reason does the kinetic energy of photoelectrons from monochromatic light vary in the photoelectric effect?", "a": "The work function is a minimum energy. Some electrons are liberated from deeper into the metal and require more energy to be liberated."}, {"q": "What two factors that determine the maximum kinetic energy of photoelectrons?", "a": "The frequency of the light and the work function of the metal"}, {"q": "What determines the rate at which energy is delivered by a wave?", "a": "Intensity/amplitude of the wave"}, {"q": "What is hf in Einstein's photoelectric effect equation (hf = 𝜙 + KE(max))", "a": "The energy of the incident photon."}, {"q": "What is 𝜙 in Einstein's photoelectric effect equation (hf = 𝜙 + KE(max))", "a": "The work function of the metal."}, {"q": "What is KE(max) in Einstein's photoelectric effect equation (hf = 𝜙 + KE(max))", "a": "The maximum kinetic energy of the photoelectrons"}, {"q": "According to the wave model how is energy transferred from light to electrons in a metal?", "a": "It is delivered continuously and builds up over time"}, {"q": "If light is above the threshold frequency, how long will it take for photoelectrons to start being produced?", "a": "It is instantaneous"}, {"q": "What happens if very intense light that is below the threshold frequency is used?", "a": "No photoelectrons are produced, regardless of intensity."}]}]}, {"name": "Module 5 — Newtonian World and Astrophysics", "subtopics": [{"name": "14.1-14.5 Thermal Physics", "cards": [{"q": "What is meant by thermal equilibrium?", "a": "When two objects at the same temperature so no heat flows between them."}, {"q": "Define absolute zero temperature.", "a": "The temperature at which the internal energy of a system is at its lowest possible value"}, {"q": "What is 0⁰C in Kelvin?", "a": "273 K"}, {"q": "Describe the relationship between absolute temperature and the average KE of particles in a substance.", "a": "Absolute temperature is proportional to average kinetic energy of the particles in a substance."}, {"q": "What is the triple point of a substance?", "a": "The temperature and pressure at which a substance can exist in all three phases in thermal equilibrium."}, {"q": "Describe the kinetic model of a solid.", "a": "A regular arrangement of particles that are strongly attracted to each other. Particles vibrate but can't change positions in the structure."}, {"q": "Describe the kinetic model of a liquid.", "a": "Particles are attracted to each other but are free to move around."}, {"q": "Describe the kinetic model of a gas.", "a": "Particles are far apart and there are no forces of attraction between them."}, {"q": "What is the internal energy of a substance?", "a": "The sum of the randomly distributed kinetic and potential energy of the particles in an object"}, {"q": "Why doesn't the temperature of a substance change whilst it is changing state?", "a": "The electrostatic potential of the particles is changing rather than the kinetic energy."}, {"q": "For what reason is the electrostatic potential energy of liquids and solids negative?", "a": "Energy must be supplied to the substance to break the bonds between particles."}, {"q": "What effect does increasing the temperature have on the particles in a substance?", "a": "It increases their average kinetic energy."}, {"q": "What is the specific heat capacity (c) of a material?", "a": "The energy needed to raise the temperature of 1kg of the material by 1 degree Celsius/Kelvin without any change of state."}, {"q": "What are the units of specific heat capacity (c)", "a": "J kg⁻¹ K⁻¹"}, {"q": "What is ∆Q in ∆Q = mc∆θ", "a": "Thermal energy gained (or lost if negative) by an object (provided no change in state)."}, {"q": "How do you calculate the total energy supplied to an electrical heater.", "a": "W = IVt"}, {"q": "What is the specific heat capacity of water", "a": "4200 J kg⁻¹ K⁻¹"}, {"q": "What is the specific latent heat of vaporisation (L) of a substance?", "a": "The energy required to change 1kg of a liquid to a gaseous state with no change in temperature"}, {"q": "What is the specific latent heat of fusion (L) of a substance?", "a": "The energy required to change 1 kg of solid to liquid with no change in temperature."}, {"q": "Give the units of latent heat (L).", "a": "J kg⁻¹"}, {"q": "m in ∆Q = mL", "a": "The mass of substance which has changed state"}, {"q": "When would you use the equation ∆Q = mc∆T + mL?", "a": "If an object changes temperature and changes state during heating."}]}, {"name": "15.1 Avogadro's number, moles and mass", "cards": [{"q": "What is Avagadro's constant?", "a": "A number of particles equal to the number of atoms in 12 grams of carbon-12"}, {"q": "What is meant by one mole of a substance?", "a": "An amount in which the number of atoms/molecules is equal to Avogadro's constant."}, {"q": "What is the molar mass of a substance?", "a": "The mass of one mole of a substance."}, {"q": "How do you find the mass of one atom from its nucleon number?", "a": "Multiply nucleon number by the atomic mass unit (u) in kg."}, {"q": "Define the atomic mass un
